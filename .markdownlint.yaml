---
# Shared configuration for markdownlint-cli2 AND PyMarkdownLnt
# markdownlint-cli2 reads the flat MD rules at the top level
# PyMarkdownLnt reads the 'plugins:' key (ignores flat MD rules)
# See: https://github.com/DavidAnson/markdownlint-cli2
# See: https://pymarkdownlnt.readthedocs.io/en/latest/

# ---- markdownlint flat rules (used by markdownlint-cli2) ----
# Line length - disable (too restrictive for technical documentation)
MD013: false
# Allow inline HTML (badges, callouts, etc.)
MD033: false
# Allow bare URLs (common in technical docs)
MD034: false
# Allow emphasis used as headers
MD036: false
# Allow punctuation in headers (technical terms)
MD026: false
# Allow multiple consecutive blank lines
MD012: false
# Allow fenced code blocks without language
MD040: false
# Allow lists without surrounding blank lines
MD032: false
# Allow fenced code blocks without surrounding blank lines
MD031: false
# ATX-style headers required
MD003:
  style: atx
# Consistent unordered list style
MD004:
  style: dash
# Allow backslash escapes
MD044: false
# Alt text in images
MD045: false
# Allow ordered lists with continuous numbering across lists
MD029: false
# Allow hard tabs inside code blocks (e.g. Makefile examples)
MD010:
  code_blocks: false
# Allow broken link fragments (local docs may reference anchors not yet present)
MD051: false
# Allow headings not surrounded by blank lines (common in technical READMEs)
MD022: false
# Allow duplicate headings (changelogs and docs often repeat section names)
MD024: false
# Allow tables with inconsistent column counts
MD056: false

# ---- PyMarkdownLnt plugin configuration (used by pymarkdown) ----
plugins:
  # Disable line-length rule globally (too restrictive for technical docs)
  md013:
    enabled: false

  # Allow inline HTML (useful for badges and complex formatting)
  md033:
    enabled: false

  # Allow bare URLs (common in technical documentation)
  md034:
    enabled: false

  # Allow emphasis used instead of headers (useful for callouts)
  md036:
    enabled: false

  # Allow punctuation in headers (technical terms often need it)
  md026:
    enabled: false

  # Allow multiple spaces after hash on atx style headers
  md018:
    enabled: false

  # Allow multiple consecutive blank lines (useful for section separation)
  md012:
    enabled: false

  # Configure proper names that can have multiple uppercase letters
  md037:
    enabled: false

  # Allow backslash escapes
  md044:
    enabled: false

  # Disable requirements for alt text in images (may not always be needed)
  md045:
    enabled: false

  # Configure header styles - enforce ATX style headers (# ## ###)
  md003:
    style: atx

  # Configure unordered list styles - use consistent dash style
  md004:
    style: dash

  # Configure ordered list styles - use ordered style for numbered lists
  md029:
    style: ordered

  # Allow duplicate headers (common in changelogs and documentation)
  md024:
    siblings_only: true

  # Configure indentation for code blocks - allow both fenced and indented
  md046:
    style: consistent

  # Configure blanks around fences
  md031:
    enabled: true
  md032:
    enabled: true
