---
# NAS media services container configuration
# Applied to: sonarr, radarr, bazarr, prowlarr, qbittorrent, jellyfin

# Default container resources for NAS services
lxc_cores: 1
lxc_memory: 512
lxc_swap: 0
lxc_disk_size: 8

# Service-specific overrides
# jellyfin: cores=2, memory=2048, disk=16 (transcoding)
# qbittorrent: memory=1024, disk=8
