---
# Consolidated Inventory for Homelab Infrastructure
#
# This file provides a unified view of all infrastructure components
# for use with root-level playbooks (site.yml, playbooks/*.yml)
#
# For collection-specific operations, use the collection inventories:
#   - K3s: ansible_collections/homelab/k3s/inventory/hosts.yml
#   - Proxmox LXC: ansible_collections/homelab/proxmox_lxc/inventory/proxmox.yml

all:
  children:
    # Proxmox Virtual Environment Hosts
    # Note: Uses 'ansible' user created by playbooks/bootstrap-proxmox.yml
    # Run bootstrap first with --ask-pass if ansible user doesn't exist
    proxmox_hosts:
      hosts:
        pve-mac:
          ansible_host: 192.168.0.56
          proxmox_node: pve-mac
        pve-nas:
          ansible_host: 192.168.0.57
          proxmox_node: pve-nas
      vars:
        ansible_user: ansible
        ansible_become: true

    # K3s Kubernetes Cluster
    k3s_cluster:
      children:
        server:
          hosts:
            k3-01:
              ansible_host: 192.168.0.111
        agent:
          hosts:
            k3-02:
              ansible_host: 192.168.0.112
            k3-03:
              ansible_host: 192.168.0.113
            k3-04:
              ansible_host: 192.168.0.114
      vars:
        ansible_user: pbs

    # Bastion Hosts (secured jump hosts for infrastructure access)
    bastion_hosts:
      hosts:
        k3s-bastion:
          ansible_host: 192.168.0.110
          container_id: 110
          proxmox_node: pve-mac
        nas-bastion:
          ansible_host: 192.168.0.109
          container_id: 109
          proxmox_node: pve-nas
      vars:
        ansible_user: pbs

    # Core Monitoring Services
    monitoring:
      hosts:
        prometheus:
          ansible_host: 192.168.0.200
          container_id: 200
          proxmox_node: pve-mac
          service_port: 9090
        grafana:
          ansible_host: 192.168.0.201
          container_id: 201
          proxmox_node: pve-mac
          service_port: 3000
        alertmanager:
          ansible_host: 192.168.0.206
          container_id: 206
          proxmox_node: pve-mac
          service_port: 9093
        loki:
          ansible_host: 192.168.0.210
          container_id: 210
          proxmox_node: pve-mac
          service_port: 3100
        pve-exporter:
          ansible_host: 192.168.0.207
          container_id: 207
          proxmox_node: pve-mac
          service_port: 9221
        pve-exporter-nas:
          ansible_host: 192.168.0.240
          container_id: 240
          proxmox_node: pve-nas
          service_port: 9221

    # Core Networking Services
    networking:
      hosts:
        unbound:
          ansible_host: 192.168.0.202
          container_id: 202
          proxmox_node: pve-mac
          service_port: 53
        wireguard:
          ansible_host: 192.168.0.203
          container_id: 203
          proxmox_node: pve-mac
          service_port: 51820
        adguard:
          ansible_host: 192.168.0.204
          container_id: 204
          proxmox_node: pve-mac
          service_port: 3000
        traefik:
          ansible_host: 192.168.0.205
          container_id: 205
          proxmox_node: pve-mac
          # Main HTTP entrypoint; dashboard available on port 8080
          service_port: 80
        step-ca:
          ansible_host: 192.168.0.211
          container_id: 211
          proxmox_node: pve-mac
          service_port: 8443
        openwrt:
          ansible_host: 192.168.0.209
          container_id: 209
          proxmox_node: pve-mac
          service_port: 80

    # Home Automation
    automation:
      hosts:
        homeassistant:
          ansible_host: 192.168.0.208
          container_id: 208
          proxmox_node: pve-mac
          service_port: 8123

    # NAS Media Services
    nas_services:
      hosts:
        sonarr:
          ansible_host: 192.168.0.230
          container_id: 230
          proxmox_node: pve-nas
          service_port: 8989
        radarr:
          ansible_host: 192.168.0.231
          container_id: 231
          proxmox_node: pve-nas
          service_port: 7878
        bazarr:
          ansible_host: 192.168.0.232
          container_id: 232
          proxmox_node: pve-nas
          service_port: 6767
        prowlarr:
          ansible_host: 192.168.0.233
          container_id: 233
          proxmox_node: pve-nas
          service_port: 9696
        qbittorrent:
          ansible_host: 192.168.0.234
          container_id: 234
          proxmox_node: pve-nas
          # WebUI port (default 8080); no conflict with traefik dashboard
          # as services run on different hosts
          service_port: 8080
        jellyfin:
          ansible_host: 192.168.0.235
          container_id: 235
          proxmox_node: pve-nas
          service_port: 8096

    # NAS Virtual Machines (KVM/QEMU)
    nas_vm:
      hosts:
        truenas:
          ansible_host: 192.168.0.220
          vm_id: 220
          proxmox_node: pve-nas
          service_port: 80

    # Secure Enclave (Pentesting Environment)
    # IMPORTANT: This group contains intentionally vulnerable systems
    # All hosts are network-isolated from production infrastructure
    secure_enclave:
      children:
        enclave_infrastructure:
          hosts:
            enclave-bastion:
              ansible_host: 192.168.0.250
              container_id: 250
              proxmox_node: pve-mac
              description: "Secure jump host for enclave access"
            enclave-router:
              ansible_host: 192.168.0.251
              container_id: 251
              proxmox_node: pve-mac
              description: "Network router and firewall for enclave"
              isolated_ip: 10.10.0.1
        enclave_attackers:
          hosts:
            kali-attacker:
              ansible_host: 192.168.0.252
              container_id: 252
              proxmox_node: pve-mac
              description: "Kali Linux pentesting workstation"
              isolated_ip: 10.10.0.10
        enclave_targets:
          # Vulnerable targets (dynamically populated during deployment)
          # Default targets: dvwa, juice_shop
          hosts:
            dvwa-target:
              ansible_host: 10.10.0.100
              container_id: 253
              proxmox_node: pve-mac
              description: "Damn Vulnerable Web Application"
              service_port: 80
            juice-shop:
              ansible_host: 10.10.0.102
              container_id: 255
              proxmox_node: pve-mac
              description: "OWASP Juice Shop"
              service_port: 3000
      vars:
        ansible_user: root
        enclave_isolated_network: 10.10.0.0/24
        enclave_management_network: 192.168.0.248/29

    # All LXC Containers (for bulk operations and shared Proxmox config)
    lxc_containers:
      children:
        bastion_hosts:
        monitoring:
        networking:
        automation:
        nas_services:

  vars:
    # Default connection settings
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

    # Domain configuration
    homelab_domain: homelab.local
