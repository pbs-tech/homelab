---
# Comprehensive rollback and disaster recovery playbook
# Usage: ansible-playbook playbooks/rollback.yml -e "rollback_target=phase3" -e "backup_timestamp=2024-01-15_14:30:00"

- name: Rollback validation and preparation
  hosts: localhost
  gather_facts: false
  vars:
    rollback_log_dir: /var/log/homelab/rollback
    rollback_timestamp: {{ ansible_date_time.epoch }}
  tasks:
    - name: Validate rollback parameters
      assert:
        that:
          - rollback_target is defined
          - rollback_target in ['phase1', 'phase2', 'phase3', 'phase4', 'phase5', 'full']
        fail_msg: rollback_target must be specified and valid (phase1-5 or full)
        success_msg: Rollback target validation passed

    - name: Create rollback log directory
      file:
        path: {{ rollback_log_dir }}
        state: directory
        mode: '0755'
        recurse: true

    - name: Generate rollback session ID
      set_fact:
        rollback_session_id: "rollback-{{ rollback_timestamp }}"
        rollback_log_file: "{{ rollback_log_dir }}/{{ rollback_timestamp }}-{{ rollback_target }}.log"

    - name: Log rollback initiation
      lineinfile:
        path: {{ rollback_log_file }}
        line: [{{ ansible_date_time.iso8601 }}] Rollback initiated - Target: {{ rollback_target }}, Session: {{ rollback_session_id }}
        create: true
        mode: '0644'

    - name: Pre-rollback system state capture
      shell: |
        echo "=== Pre-rollback System State ===" >> {{ rollback_log_file }}
        echo "Timestamp: {{ ansible_date_time.iso8601 }}" >> {{ rollback_log_file }}
        echo "Target: {{ rollback_target }}" >> {{ rollback_log_file }}
        echo "Session: {{ rollback_session_id }}" >> {{ rollback_log_file }}
        echo "" >> {{ rollback_log_file }}

        # Capture service states
        echo "Active services:" >> {{ rollback_log_file }}
        systemctl list-units --state=active --type=service | grep -E "(prometheus|grafana|traefik|k3s)" >> {{ rollback_log_file }} || true
        echo "" >> {{ rollback_log_file }}

        # Capture network state
        echo "Network interfaces:" >> {{ rollback_log_file }}
        ip addr show >> {{ rollback_log_file }} || true
        echo "" >> {{ rollback_log_file }}

- name: Execute rollback procedures
  hosts: all
  gather_facts: true
  serial: {{ rollback_serial | default('25%') }}
  vars:
    rollback_phases:
      phase1: [foundation, bastion]
      phase2: [networking, dns, "vpn"]
      phase3: [monitoring, prometheus, "grafana"]
      phase4: [applications, homeassistant, "media"]
      phase5: [k3s, cluster]
      full: ["all"]
  tasks:
    - name: Set rollback scope
      set_fact:
        services_to_rollback: {{ rollback_phases[rollback_target] }}

    - name: Stop services before rollback
      systemd:
        name: {{ item }}
        state: stopped
      loop: {{ services_to_stop | default([]) }}
      ignore_errors: true
      when: inventory_hostname in groups[item] or item in group_names

    - name: Create service backup before rollback
      shell: |
        backup_dir="/opt/backups/rollback-{{ hostvars['localhost']['rollback_session_id'] }}"
        mkdir -p "$backup_dir"

        # Backup configurations
        if [ -d "/etc/prometheus" ]; then
          tar -czf "$backup_dir/prometheus-config-$(hostname)-$(date +%Y%m%d-%H%M%S).tar.gz" /etc/prometheus/
        fi

        if [ -d "/etc/grafana" ]; then
          tar -czf "$backup_dir/grafana-config-$(hostname)-$(date +%Y%m%d-%H%M%S).tar.gz" /etc/grafana/
        fi

        if [ -d "/etc/traefik" ]; then
          tar -czf "$backup_dir/traefik-config-$(hostname)-$(date +%Y%m%d-%H%M%S).tar.gz" /etc/traefik/
        fi

        echo "Configuration backup completed for {{ inventory_hostname }}"
      when: rollback_target in [phase3, full] or 'monitoring' in services_to_rollback

    - name: Restore from backup
      shell: |
        if [ -n "{{ backup_timestamp | default('') }}" ]; then
          backup_file="/opt/backups/{{ backup_timestamp }}/{{ inventory_hostname }}-config.tar.gz"
          if [ -f "$backup_file" ]; then
            echo "Restoring from backup: $backup_file"
            cd / && tar -xzf "$backup_file"
            echo "Restore completed for {{ inventory_hostname }}"
          else
            echo "Backup file not found: $backup_file"
            exit 1
          fi
        else
          echo "No backup timestamp specified, using configuration management rollback"
        fi
      when: backup_timestamp is defined

    - name: Rollback using Ansible (configuration management approach)
      block:
        - name: Apply previous known-good configuration
          include_tasks: ../ansible_collections/homelab/common/tasks/rollback_{{ item }}.yml
          loop: {{ services_to_rollback }}
          when: not backup_timestamp is defined

        - name: Verify service configurations
          shell: |
            # Validate configuration files
            case "{{ item }}" in
              "prometheus")
                /usr/local/bin/promtool check config /etc/prometheus/prometheus.yml
                ;;
              "grafana")
                grafana-cli admin settings | head -5
                ;;
              "traefik")
                traefik version
                ;;
              *)
                echo "No specific validation for {{ item }}"
                ;;
            esac
          loop: {{ services_to_rollback }}
          register: config_validation
          ignore_errors: true

    - name: Restart services after rollback
      systemd:
        name: {{ item }}
        state: restarted
        daemon_reload: true
      loop: {{ services_to_restart | default([]) }}
      when: inventory_hostname in groups[item] or item in group_names

    - name: Wait for service health checks
      uri:
        url: {{ item.url }}
        method: GET
        return_content: true
        status_code: [200, 401]  # Some services return 401 for auth
      register: health_check
      retries: 5
      delay: 10
      loop: {{ service_health_checks | default([]) }}
      when: item.service in services_to_rollback

- name: Post-rollback validation
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Gather rollback results
      set_fact:
        rollback_summary:
          session_id: {{ rollback_session_id }}
          target: {{ rollback_target }}
          timestamp: {{ ansible_date_time.iso8601 }}
          hosts_processed: {{ ansible_play_hosts | length }}
          status: {{ 'success' if ansible_failed_result is not defined else 'partial_failure' }}

    - name: Log rollback completion
      lineinfile:
        path: {{ rollback_log_file }}
        line: [{{ ansible_date_time.iso8601 }}] Rollback completed - Status: {{ rollback_summary.status }}, Hosts: {{ rollback_summary.hosts_processed }}

    - name: Run post-rollback tests
      shell: |
        echo "=== Post-rollback Validation ===" >> {{ rollback_log_file }}

        # Basic connectivity tests
        ansible all -m ping -i inventory/hosts.yml >> {{ rollback_log_file }} 2>&1 || true

        # Service availability tests
        ansible-playbook tests/test_suite.yml -e "test_types=['unit']" --tags quick >> {{ rollback_log_file }} 2>&1 || true

        echo "" >> {{ rollback_log_file }}
        echo "=== Rollback Session Complete ===" >> {{ rollback_log_file }}
      ignore_errors: true

    - name: Display rollback summary
      debug:
        msg: |
          ========================
          Rollback Summary
          ========================
          Session ID: {{ rollback_summary.session_id }}
          Target: {{ rollback_summary.target }}
          Status: {{ rollback_summary.status }}
          Hosts Processed: {{ rollback_summary.hosts_processed }}
          Log File: {{ rollback_log_file }}

          Next Steps:
          - Review rollback log for details
          - Verify service functionality
          - Update incident documentation
          - Consider preventive measures

    - name: Generate rollback report
      template:
        src: rollback_report.html.j2
        dest: {{ rollback_log_dir }}/{{ rollback_session_id }}-report.html
        mode: '0644'
      vars:
        rollback_data: {{ rollback_summary }}

    - name: Notify rollback completion
      uri:
        url: {{ notification_webhook_url }}
        method: POST
        body_format: json
        body:
          text: Rollback {{ rollback_summary.status }} - {{ rollback_summary.session_id }}
          details: {{ rollback_summary }}
      when: notification_webhook_url is defined
      ignore_errors: true
