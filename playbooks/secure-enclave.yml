---
# Secure Enclave Deployment Playbook
# Deploys an isolated pentesting and security research environment

- name: Deploy Secure Enclave Infrastructure
  hosts: localhost
  gather_facts: true
  become: false

  vars_files:
    - ../ansible_collections/homelab/common/inventory/group_vars/all.yml

  pre_tasks:
    - name: Display legal and compliance warning
      ansible.builtin.debug:
        msg:
          - "╔══════════════════════════════════════════════════════════════╗"
          - "║              ⚠️  LEGAL & COMPLIANCE WARNING ⚠️                ║"
          - "╚══════════════════════════════════════════════════════════════╝"
          - ""
          - "This environment contains INTENTIONALLY VULNERABLE systems."
          - ""
          - "LEGAL REQUIREMENTS:"
          - "  • Authorized use ONLY - Obtain written authorization"
          - "  • Comply with organizational security policies"
          - "  • Follow applicable laws (CFAA, GDPR, etc.)"
          - "  • Never attack systems without explicit permission"
          - "  • Do not use for malicious purposes"
          - ""
          - "COMPLIANCE:"
          - "  • All activity is logged and monitored"
          - "  • Logs retained for 90 days minimum"
          - "  • Subject to audit and review"
          - "  • Violators subject to disciplinary/legal action"
          - ""
          - "DISCLAIMER:"
          - "  • For educational and testing purposes only"
          - "  • Use at your own risk"
          - "  • No warranty or guarantee provided"
          - "  • Not for production use"
          - ""
          - "═══════════════════════════════════════════════════════════════"

    - name: Display deployment information
      ansible.builtin.debug:
        msg:
          - "╔══════════════════════════════════════════════════════════════╗"
          - "║          SECURE ENCLAVE DEPLOYMENT                           ║"
          - "╚══════════════════════════════════════════════════════════════╝"
          - ""
          - "Network Isolation:"
          - "  • Isolated subnet: 10.10.0.0/24"
          - "  • Firewall blocks all traffic to production"
          - "  • Internet access allowed for updates"
          - ""
          - "Components:"
          - "  • Enclave Bastion (192.168.0.250)"
          - "  • Enclave Router (192.168.0.251)"
          - "  • Kali Attacker VM (10.10.0.10)"
          - "  • Vulnerable Targets (10.10.0.100+)"
          - ""
          - "Safety Features:"
          - "  • Auto-shutdown after 4h idle"
          - "  • Daily shutdown at 2 AM"
          - "  • Comprehensive audit logging"
          - "  • Network isolation enforcement"
          - ""
          - "═══════════════════════════════════════════════════════════════"

    - name: Acknowledge legal terms
      ansible.builtin.pause:
        prompt: |

          By continuing, you acknowledge that:
          1. You have authorization to deploy this environment
          2. You will use it only for authorized security testing
          3. You understand all activity is logged and monitored
          4. You comply with all applicable laws and policies

          Press ENTER to accept and continue, or Ctrl+C to cancel
      when: not (skip_confirmation | default(false))

  roles:
    - role: homelab.proxmox_lxc.secure_enclave  # noqa: syntax-check[specific]
      tags:
        - secure-enclave
        - enclave

  post_tasks:
    - name: Display access information
      ansible.builtin.debug:
        msg:
          - ""
          - "════════════════════════════════════════════════════════"
          - "Secure Enclave Deployment Complete!"
          - "════════════════════════════════════════════════════════"
          - ""
          - "Access Instructions:"
          - ""
          - "1. SSH to enclave bastion:"
          - "   ssh pbs@192.168.0.250"
          - ""
          - "2. Check enclave status:"
          - "   enclave-status"
          - ""
          - "3. Connect to attacker VM:"
          - "   enclave-connect"
          - ""
          - "4. View monitoring dashboard:"
          - "   enclave-monitor"
          - ""
          - "5. Emergency shutdown:"
          - "   enclave-shutdown"
          - ""
          - "Network Information:"
          - "  Bastion: 192.168.0.250"
          - "  Router: 192.168.0.251"
          - "  Attacker: 10.10.0.10 (Kali Linux)"
          - "  DVWA: 10.10.0.100"
          - "  Metasploitable3: 10.10.0.101"
          - ""
          - "Security Notes:"
          - "  ✓ Network isolated from production"
          - "  ✓ Auto-shutdown enabled (4h idle)"
          - "  ✓ Audit logging active"
          - "  ✓ Firewall blocking production access"
          - ""
          - "Documentation: ansible_collections/homelab/proxmox_lxc/roles/secure_enclave/README.md"
          - ""
          - "════════════════════════════════════════════════════════"

- name: Verify Enclave Deployment
  hosts: localhost
  gather_facts: false
  become: false

  tasks:
    - name: Wait for bastion to be accessible
      ansible.builtin.wait_for:
        host: 192.168.0.250
        port: 22
        delay: 5
        timeout: 60
      ignore_errors: true
      register: bastion_check

    - name: Display verification results
      ansible.builtin.debug:
        msg:
          - "Deployment Verification:"
          - "  Bastion (192.168.0.250): {{ 'ONLINE' if bastion_check is succeeded else 'OFFLINE - Check deployment' }}"
          - ""
          - "To verify network isolation:"
          - "  1. SSH to attacker VM: ssh root@10.10.0.10 (from bastion)"
          - "  2. Test blocked access: ping 192.168.0.200 (should fail)"
          - "  3. Test allowed access: ping 8.8.8.8 (should succeed)"
          - "  4. Scan targets: nmap -sn 10.10.0.0/24"
      tags:
        - verify
        - validation
