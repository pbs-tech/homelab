---
# Secure Enclave Deployment Playbook
# Deploys an isolated pentesting and security research environment

- name: Deploy Secure Enclave Infrastructure
  hosts: localhost
  gather_facts: true
  become: false

  vars_files:
    - ../ansible_collections/homelab/common/inventory/group_vars/all.yml

  pre_tasks:
    - name: Display deployment warning
      ansible.builtin.debug:
        msg:
          - "╔══════════════════════════════════════════════════════════════╗"
          - "║          SECURE ENCLAVE DEPLOYMENT                           ║"
          - "║                                                              ║"
          - "║  This playbook will deploy an isolated pentesting           ║"
          - "║  environment with intentionally vulnerable systems.          ║"
          - "║                                                              ║"
          - "║  Network Isolation:                                          ║"
          - "║    - Isolated subnet: 10.10.0.0/24                          ║"
          - "║    - Firewall blocks all traffic to production              ║"
          - "║    - Internet access allowed for updates                    ║"
          - "║                                                              ║"
          - "║  Components:                                                 ║"
          - "║    - Enclave Bastion (192.168.0.250)                        ║"
          - "║    - Enclave Router (192.168.0.251)                         ║"
          - "║    - Kali Attacker VM (10.10.0.10)                          ║"
          - "║    - Vulnerable Targets (10.10.0.100+)                      ║"
          - "║                                                              ║"
          - "║  Safety Features:                                            ║"
          - "║    - Auto-shutdown after 4h idle                            ║"
          - "║    - Daily shutdown at 2 AM                                 ║"
          - "║    - Comprehensive audit logging                            ║"
          - "║                                                              ║"
          - "║  For authorized security testing and training only!          ║"
          - "╚══════════════════════════════════════════════════════════════╝"

    - name: Pause for confirmation
      ansible.builtin.pause:
        prompt: "Press ENTER to continue with enclave deployment, or Ctrl+C to cancel"
      when: not (skip_confirmation | default(false))

  roles:
    - role: homelab.proxmox_lxc.secure_enclave
      tags:
        - secure-enclave
        - enclave

  post_tasks:
    - name: Display access information
      ansible.builtin.debug:
        msg:
          - ""
          - "════════════════════════════════════════════════════════"
          - "Secure Enclave Deployment Complete!"
          - "════════════════════════════════════════════════════════"
          - ""
          - "Access Instructions:"
          - ""
          - "1. SSH to enclave bastion:"
          - "   ssh pbs@192.168.0.250"
          - ""
          - "2. Check enclave status:"
          - "   enclave-status"
          - ""
          - "3. Connect to attacker VM:"
          - "   enclave-connect"
          - ""
          - "4. View monitoring dashboard:"
          - "   enclave-monitor"
          - ""
          - "5. Emergency shutdown:"
          - "   enclave-shutdown"
          - ""
          - "Network Information:"
          - "  Bastion: 192.168.0.250"
          - "  Router: 192.168.0.251"
          - "  Attacker: 10.10.0.10 (Kali Linux)"
          - "  DVWA: 10.10.0.100"
          - "  Metasploitable3: 10.10.0.101"
          - ""
          - "Security Notes:"
          - "  ✓ Network isolated from production"
          - "  ✓ Auto-shutdown enabled (4h idle)"
          - "  ✓ Audit logging active"
          - "  ✓ Firewall blocking production access"
          - ""
          - "Documentation: ansible_collections/homelab/proxmox_lxc/roles/secure_enclave/README.md"
          - ""
          - "════════════════════════════════════════════════════════"

- name: Verify Enclave Deployment
  hosts: localhost
  gather_facts: false
  become: false

  tasks:
    - name: Wait for bastion to be accessible
      ansible.builtin.wait_for:
        host: 192.168.0.250
        port: 22
        delay: 5
        timeout: 60
      ignore_errors: true
      register: bastion_check

    - name: Display verification results
      ansible.builtin.debug:
        msg:
          - "Deployment Verification:"
          - "  Bastion (192.168.0.250): {{ 'ONLINE' if bastion_check is succeeded else 'OFFLINE - Check deployment' }}"
          - ""
          - "To verify network isolation:"
          - "  1. SSH to attacker VM: ssh root@10.10.0.10 (from bastion)"
          - "  2. Test blocked access: ping 192.168.0.200 (should fail)"
          - "  3. Test allowed access: ping 8.8.8.8 (should succeed)"
          - "  4. Scan targets: nmap -sn 10.10.0.0/24"
      tags:
        - verify
        - validation
