---
# Create an Ubuntu cloud-init VM template on Proxmox hosts
#
# Usage:
#   ansible-playbook playbooks/create-vm-template.yml --ask-vault-pass
#   ansible-playbook playbooks/create-vm-template.yml --ask-vault-pass --limit pve-mac
#   ansible-playbook playbooks/create-vm-template.yml --ask-vault-pass -e vm_template_disk_size=32G

- name: Create Ubuntu cloud-init VM template
  hosts: proxmox_hosts
  gather_facts: false
  serial: 1

  vars:
    vm_template_id: 9000
    vm_template_name: ubuntu-2404-cloud
    vm_template_storage: local-lvm
    vm_template_memory: 2048
    vm_template_cores: 2
    vm_template_disk_size: ""  # Empty = original image size; e.g. "32G" to resize

    cloud_image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
    cloud_image_dir: /var/lib/vz/template/iso
    cloud_image_filename: "{{ cloud_image_url | basename }}"

    # Cloud-init defaults baked into the template
    # Override per-clone: -e ci_ip_config="ip=192.168.0.X/24,gw=192.168.0.1"
    ci_ip_config: "ip=192.168.0.90/24,gw=192.168.0.1"
    ci_dns_servers: "1.1.1.1 1.0.0.1"
    ci_search_domain: homelab.lan

    # Per-VM firewall — same security groups as container_base
    # basic-network: DHCP, DNS (UDP+TCP), ICMP (required for internet access)
    # allow-ssh: SSH from LAN
    vm_template_firewall_groups:
      - basic-network
      - allow-ssh
      - allow-web
    vm_template_firewall_extra_rules:
      - "IN ACCEPT -source 192.168.0.0/24 -log nolog # Allow LAN traffic"

    # SSH key content read from the controller, written to a temp file on the Proxmox host
    # because qm set --sshkeys expects a file path on the remote host
    ssh_public_key: "{{ lookup('file', '~/.ssh/homelab_ed25519.pub') }}"

  tasks:
    - name: Download Ubuntu cloud image
      ansible.builtin.get_url:
        url: "{{ cloud_image_url }}"
        dest: "{{ cloud_image_dir }}/{{ cloud_image_filename }}"
        mode: "0644"
        timeout: 600

    # Destroy existing template so this playbook is fully idempotent
    - name: Check if template already exists
      ansible.builtin.command:
        cmd: "qm status {{ vm_template_id }}"
      register: template_exists
      changed_when: false
      failed_when: false

    - name: Destroy existing template
      ansible.builtin.command:
        cmd: "qm destroy {{ vm_template_id }} --purge"
      when: template_exists.rc == 0
      changed_when: true

    # Build the VM and convert to template
    - name: Create base VM
      ansible.builtin.command:
        cmd: >-
          qm create {{ vm_template_id }}
          --name {{ vm_template_name }}
          --memory {{ vm_template_memory }}
          --cores {{ vm_template_cores }}
          --net0 virtio,bridge=vmbr0,firewall=1
          --ostype l26
      changed_when: true

    - name: Import cloud image as disk
      ansible.builtin.command:
        cmd: >-
          qm importdisk {{ vm_template_id }}
          {{ cloud_image_dir }}/{{ cloud_image_filename }}
          {{ vm_template_storage }}
      changed_when: true

    - name: Attach disk and configure hardware
      ansible.builtin.command:
        cmd: >-
          qm set {{ vm_template_id }}
          --scsihw virtio-scsi-pci
          --scsi0 {{ vm_template_storage }}:vm-{{ vm_template_id }}-disk-0
          --ide2 {{ vm_template_storage }}:cloudinit
          --boot order=scsi0
          --agent enabled=1
          --serial0 socket
          --vga serial0
      changed_when: true

    - name: Resize template disk
      ansible.builtin.command:
        cmd: "qm resize {{ vm_template_id }} scsi0 {{ vm_template_disk_size }}"
      changed_when: true
      when: vm_template_disk_size | length > 0

    # Write the SSH public key to a temp file on the Proxmox host
    # qm set --sshkeys reads a file path on the local (Proxmox) filesystem
    - name: Write SSH public key to temp file
      ansible.builtin.copy:
        content: "{{ ssh_public_key }}"
        dest: /tmp/vm-template-sshkey.pub
        mode: "0600"
      changed_when: false

    - name: Set cloud-init defaults
      ansible.builtin.command:
        cmd: >-
          qm set {{ vm_template_id }}
          --ciuser ansible
          --sshkeys /tmp/vm-template-sshkey.pub
          --ipconfig0 "{{ ci_ip_config }}"
          --nameserver "{{ ci_dns_servers }}"
          --searchdomain "{{ ci_search_domain }}"
      changed_when: true

    - name: Remove temp SSH key file
      ansible.builtin.file:
        path: /tmp/vm-template-sshkey.pub
        state: absent
      changed_when: false

    # Deploy per-VM firewall file to /etc/pve/firewall/<vmid>.fw
    # Same pattern as container_base: pmxcfs rejects copy/template, so use shell heredoc
    # Clones get their own VMID and need their own firewall file — this only covers the template itself
    - name: Deploy per-VM firewall configuration
      ansible.builtin.shell:
        cmd: |
          cat > '/etc/pve/firewall/{{ vm_template_id }}.fw' << 'FWEOF'
          [OPTIONS]
          enable: 1

          [RULES]
          {% for group in vm_template_firewall_groups %}
          GROUP {{ group }}
          {% endfor %}
          {% for rule in vm_template_firewall_extra_rules %}
          {{ rule }}
          {% endfor %}
          FWEOF
        executable: /bin/bash
      changed_when: true

    - name: Convert to template
      ansible.builtin.command:
        cmd: "qm template {{ vm_template_id }}"
      changed_when: true

    - name: Show result
      ansible.builtin.debug:
        msg: |
          Template {{ vm_template_id }} ({{ vm_template_name }}) ready on {{ inventory_hostname }}

          NOTE: Clones get a new VMID and need their own firewall file.
          Deploy one with:
            cat > /etc/pve/firewall/<clone-vmid>.fw << 'EOF'
            [OPTIONS]
            enable: 1
            [RULES]
            GROUP basic-network
            GROUP allow-ssh
            IN ACCEPT -source 192.168.0.0/24 -log nolog # Allow LAN traffic
            EOF
