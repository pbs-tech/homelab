---
# Application services deployment
# Home automation, media services, and other applications

- name: Deploy automation services
  hosts: automation
  become: true
  gather_facts: true
  pre_tasks:
    - name: Ensure automation containers exist
      include_role:
        name: homelab.common.container_base
      vars:
        container_resources:
          cores: "{{ lxc_cores | default(2) }}"
          memory: "{{ lxc_memory | default(1024) }}"
          swap: "{{ lxc_swap | default(0) }}"
          disk_size: "{{ lxc_disk_size | default(16) }}"
      when: container_id is defined

  roles:
    - role: homelab.common.common_setup
      tags: [common_setup]

    - role: homelab.proxmox_lxc.homeassistant
      when: inventory_hostname is search('homeassistant')
      tags: [homeassistant, automation]

- name: Deploy NAS services
  hosts: nas_services
  become: true
  gather_facts: true
  serial: 2 # Deploy NAS services in batches to avoid resource contention
  pre_tasks:
    - name: Ensure NAS containers exist
      include_role:
        name: homelab.common.container_base
      vars:
        container_resources:
          cores: "{{ lxc_cores | default(1) }}"
          memory: "{{ lxc_memory | default(512) }}"
          swap: "{{ lxc_swap | default(0) }}"
          disk_size: "{{ lxc_disk_size | default(8) }}"
      when: container_id is defined

  roles:
    - role: homelab.common.common_setup
      tags: [common_setup]

    - role: homelab.proxmox_lxc.sonarr
      when: inventory_hostname is search('sonarr')
      tags: [sonarr, media]

    - role: homelab.proxmox_lxc.radarr
      when: inventory_hostname is search('radarr')
      tags: [radarr, media]

    - role: homelab.proxmox_lxc.bazarr
      when: inventory_hostname is search('bazarr')
      tags: [bazarr, media]

    - role: homelab.proxmox_lxc.prowlarr
      when: inventory_hostname is search('prowlarr')
      tags: [prowlarr, media]

    - role: homelab.proxmox_lxc.qbittorrent
      when: inventory_hostname is search('qbittorrent')
      tags: [qbittorrent, media]

    - role: homelab.proxmox_lxc.jellyfin
      when: inventory_hostname is search('jellyfin')
      tags: [jellyfin, media]

  post_tasks:
    - name: Verify application services
      uri:
        url: http://{{ ansible_host }}:{{ service_port }}
        method: GET
        timeout: 30
        status_code: [200, 302, 404]
      delegate_to: localhost
      when: service_port is defined
      ignore_errors: true
      register: ignore_errors_register
