---
# Application services deployment
# Home automation, media services, and other applications

- name: Deploy automation services
  hosts: automation
  become: true
  gather_facts: false  # Defer until containers exist
  pre_tasks:
    - name: Ensure automation containers exist
      ansible.builtin.include_role:
        name: homelab.common.container_base
      vars:
        container_resources:
          cores: "{{ lxc_cores | default(2) }}"
          memory: "{{ lxc_memory | default(1024) }}"
          swap: "{{ lxc_swap | default(0) }}"
          disk_size: "{{ lxc_disk_size | default(16) }}"
      when: container_id is defined

    - name: Gather facts after container is available
      ansible.builtin.setup:

  roles:
    - role: homelab.common.common_setup
      tags: [common_setup]

    - role: homelab.proxmox_lxc.homeassistant
      when: inventory_hostname is search('homeassistant')
      tags: [homeassistant, automation]

- name: Deploy TrueNAS VM
  hosts: truenas
  gather_facts: false
  become: false
  roles:
    - role: homelab.proxmox_lxc.truenas
      tags: [truenas, nas]
  tags: [truenas, nas, applications]

- name: Deploy media stack VM
  hosts: media-stack
  become: true
  gather_facts: false
  roles:
    - role: homelab.proxmox_lxc.media_stack
      tags: [media-stack, media]
  tags: [media-stack, media, applications]

- name: Install monitoring agent on media-stack VM
  hosts: media-stack
  become: true
  gather_facts: true
  roles:
    - role: homelab.common.monitoring_agent
      tags: [monitoring_agent, node_exporter]
  tags: [monitoring_agent, media-stack, applications]

- name: Deploy OCI registry
  hosts: registry
  become: true
  gather_facts: false
  pre_tasks:
    - name: Ensure registry container exists
      ansible.builtin.include_role:
        name: homelab.common.container_base
      vars:
        container_resources:
          cores: "{{ lxc_cores | default(1) }}"
          memory: "{{ lxc_memory | default(512) }}"
          swap: "{{ lxc_swap | default(0) }}"
          disk_size: "{{ lxc_disk_size | default(20) }}"
      when: container_id is defined

    - name: Gather facts after container is available
      ansible.builtin.setup:

  roles:
    - role: homelab.common.common_setup
      tags: [common_setup]

    - role: homelab.proxmox_lxc.zot
      tags: [zot, registry]
  tags: [registry, applications]

- name: Configure K3s nodes for OCI registry
  hosts: k3s_cluster
  become: true
  gather_facts: false
  tasks:
    - name: Fetch step-ca root certificate
      ansible.builtin.slurp:
        src: /etc/step-ca/certs/root_ca.crt
      delegate_to: step-ca
      register: step_ca_root_cert

    - name: Install step-ca root certificate
      ansible.builtin.copy:
        content: "{{ step_ca_root_cert.content | b64decode }}"
        dest: /usr/local/share/ca-certificates/homelab-ca.crt
        mode: "0644"
      notify: Update CA certificates

    - name: Create /etc/rancher/k3s directory
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Deploy registries.yaml
      ansible.builtin.copy:
        content: |
          mirrors:
            registry.homelab.lan:
              endpoint:
                - "https://registry.homelab.lan"
          configs:
            "registry.homelab.lan":
              auth:
                username: "{{ vault_zot_admin_user }}"
                password: "{{ vault_zot_admin_password }}"
              tls:
                ca_file: /etc/ssl/certs/homelab-ca.crt
        dest: /etc/rancher/k3s/registries.yaml
        mode: "0644"
      no_log: true
      notify: Restart k3s

  handlers:
    - name: Update CA certificates
      ansible.builtin.command: update-ca-certificates
      changed_when: true

    - name: Restart k3s
      ansible.builtin.systemd:
        name: "{{ 'k3s' if inventory_hostname in groups['server'] else 'k3s-agent' }}"
        state: restarted
  tags: [registry, k3s]
