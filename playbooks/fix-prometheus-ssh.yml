---
# One-shot recovery: fix sshd UseDNS + re-inject SSH key in Prometheus container
- name: Fix Prometheus container SSH
  hosts: pve-mac
  gather_facts: false
  become: true
  vars:
    ssh_pubkey: "{{ lookup('file', '~/.ssh/homelab_ed25519.pub') }}"
    container_id: 200
  tasks:
    - name: Remove UseDNS lines and prepend UseDNS no to sshd_config
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ container_id }} -- bash -c
          'sed -i "/UseDNS/d" /etc/ssh/sshd_config
          && sed -i "1s/^/UseDNS no\n/" /etc/ssh/sshd_config'
        executable: /bin/bash
      changed_when: true

    - name: Ensure homelab_ed25519 key in ansible authorized_keys
      ansible.builtin.shell:
        cmd: >-
          pct exec {{ container_id }} -- bash -c
          'grep -qxF "{{ ssh_pubkey }}" /home/ansible/.ssh/authorized_keys 2>/dev/null
          || echo "{{ ssh_pubkey }}" >> /home/ansible/.ssh/authorized_keys'
        executable: /bin/bash
      changed_when: true

    - name: Restart sshd in container
      ansible.builtin.shell:
        cmd: pct exec {{ container_id }} -- systemctl restart ssh
        executable: /bin/bash
      changed_when: true
