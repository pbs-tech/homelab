---
# Bootstrap playbook to configure ansible user on Proxmox hosts
#
# Prerequisites (one-time, via Proxmox web console on each host):
#   useradd -m -s /bin/bash ansible
#   mkdir -p /home/ansible/.ssh && chmod 700 /home/ansible/.ssh
#   echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMDp6d9l3RnKiD8ZxnoL9geJQ8/IrPMhTfCpSLpMrB+6 homelab-ansible' \
#     > /home/ansible/.ssh/authorized_keys
#   chmod 600 /home/ansible/.ssh/authorized_keys && chown -R ansible:ansible /home/ansible/.ssh
#   echo 'ansible ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/ansible && chmod 440 /etc/sudoers.d/ansible
#
# Run with: ansible-playbook playbooks/bootstrap-proxmox.yml

- name: Bootstrap Proxmox hosts with ansible user
  hosts: proxmox_hosts
  gather_facts: true
  become: true

  vars:
    ansible_service_user: ansible
    ansible_service_group: ansible
    # SSH key file - homelab-specific key used for all Ansible management
    ansible_ssh_public_key_file: ~/.ssh/homelab_ed25519.pub

  tasks:
    - name: Create ansible group
      ansible.builtin.group:
        name: "{{ ansible_service_group }}"
        state: present

    - name: Create ansible user
      ansible.builtin.user:
        name: "{{ ansible_service_user }}"
        group: "{{ ansible_service_group }}"
        groups: sudo
        shell: /bin/bash
        create_home: true
        state: present

    - name: Create .ssh directory for ansible user
      ansible.builtin.file:
        path: "/home/{{ ansible_service_user }}/.ssh"
        state: directory
        owner: "{{ ansible_service_user }}"
        group: "{{ ansible_service_group }}"
        mode: "0700"

    - name: Copy SSH public key to ansible user
      ansible.posix.authorized_key:
        user: "{{ ansible_service_user }}"
        key: "{{ lookup('file', ansible_ssh_public_key_file) }}"
        state: present

    - name: Configure passwordless sudo for ansible user
      ansible.builtin.copy:
        content: "{{ ansible_service_user }} ALL=(ALL) NOPASSWD: ALL\n"
        dest: "/etc/sudoers.d/{{ ansible_service_user }}"
        mode: "0440"
        owner: root
        group: root
        validate: 'visudo -cf %s'

    - name: Ensure sudo group has sudo privileges
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: '^%sudo'
        line: '%sudo ALL=(ALL:ALL) ALL'
        validate: 'visudo -cf %s'

    # UFW route rules for LXC container access
    - name: Check if UFW is installed
      ansible.builtin.command: which ufw
      register: ufw_check
      changed_when: false
      failed_when: false

    - name: Configure UFW route rules for LXC containers
      when: ufw_check.rc == 0
      block:
        - name: Allow routed traffic TO container network
          community.general.ufw:
            rule: allow
            route: true
            dest: "{{ container_network_cidr | default('192.168.0.0/24') }}"
            comment: Allow traffic to LXC containers

        - name: Allow routed traffic FROM container network
          community.general.ufw:
            rule: allow
            route: true
            src: "{{ container_network_cidr | default('192.168.0.0/24') }}"
            comment: Allow traffic from LXC containers

    # Proxmox cluster firewall configuration
    # pmxcfs doesn't support Ansible's atomic file operations (copy/template)
    - name: Configure Proxmox cluster firewall
      ansible.builtin.shell:
        cmd: |
          cat > /etc/pve/firewall/cluster.fw << 'FWEOF'
          [OPTIONS]
          policy_in: DROP
          policy_out: ACCEPT
          enable: 1

          [group basic-network]
          IN ACCEPT -p udp -sport 67 -dport 68 -log nolog # DHCP
          IN ACCEPT -p udp -dport 53 -log nolog # DNS
          IN ACCEPT -p tcp -dport 53 -log nolog # DNS TCP
          IN ACCEPT -p icmp -log nolog # Ping

          [group allow-ssh]
          IN ACCEPT -source 192.168.0.0/24 -p tcp -dport 22 -log nolog # SSH from LAN

          [group allow-web]
          IN ACCEPT -p tcp -dport 80 -log nolog # HTTP
          IN ACCEPT -p tcp -dport 443 -log nolog # HTTPS

          [RULES]
          IN ACCEPT -p tcp -dport 22 -log nolog # Allow SSH
          IN ACCEPT -p tcp -dport 8006 -log nolog # Allow Proxmox Web UI
          IN ACCEPT -p icmp # Allow ICMP/ping
          IN ACCEPT -source 192.168.0.0/24 # Allow management network
          GROUP basic-network
          GROUP allow-ssh
          FWEOF
        executable: /bin/bash
      run_once: true
      changed_when: true

    - name: Display completion message
      ansible.builtin.debug:
        msg: |
          Ansible user '{{ ansible_service_user }}' has been created on {{ inventory_hostname }}.
          UFW route rules configured for LXC container access.
          Proxmox cluster firewall configured.

          You can now update your inventory to use:
            ansible_user: ansible

          Test with: ssh ansible@{{ ansible_host }}
