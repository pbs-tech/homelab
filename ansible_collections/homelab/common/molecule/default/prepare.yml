---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # Fix /tmp permissions for apt in Docker containers
    - name: Ensure /tmp directory has correct permissions
      ansible.builtin.file:
        path: /tmp
        state: directory
        mode: '1777'
        owner: root
        group: root

    # Clean and reinitialize apt for Docker containers
    - name: Clean apt cache
      ansible.builtin.command: apt-get clean
      changed_when: false
      failed_when: false
      when: ansible_os_family == "Debian"

    - name: Remove apt lists
      ansible.builtin.file:
        path: /var/lib/apt/lists
        state: absent
      when: ansible_os_family == "Debian"

    - name: Recreate apt lists directory
      ansible.builtin.file:
        path: /var/lib/apt/lists
        state: directory
        mode: '0755'
        owner: root
        group: root
      when: ansible_os_family == "Debian"

    - name: Update apt cache with retries
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
      retries: 3
      delay: 5
      register: apt_update
      until: apt_update is success
      when: ansible_os_family == "Debian"

    # Install tzdata for timezone configuration
    - name: Install tzdata package
      ansible.builtin.apt:
        name: tzdata
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive
      when: ansible_os_family == "Debian"
