---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Verify common packages are installed
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      check_mode: true
      loop:
        - curl
        - wget
        - htop
        - vim
      register: package_check

    - name: Assert packages are installed
      ansible.builtin.assert:
        that: not item.changed
        fail_msg: "Package {{ item.item }} is not installed"
        success_msg: "Package {{ item.item }} is installed"
      loop: "{{ package_check.results }}"

    - name: Check timezone configuration
      ansible.builtin.command: timedatectl show --property=Timezone --value
      register: timezone_check
      changed_when: false

    - name: Assert timezone is set
      ansible.builtin.assert:
        that:
          - timezone_check.stdout | length > 0
        fail_msg: Timezone not properly configured
        success_msg: "Timezone is configured: {{ timezone_check.stdout }}"
