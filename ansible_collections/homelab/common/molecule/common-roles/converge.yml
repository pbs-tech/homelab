---
- name: Converge
  hosts: all
  become: true
  gather_facts: true
  vars:
    test_ssh_key: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... molecule-test-key"
    
  pre_tasks:
    # Create mock SSH key for testing
    - name: Create SSH key directory
      file:
        path: /tmp
        state: directory
        mode: '0755'
        
    - name: Create mock SSH private key
      copy:
        content: |
          -----BEGIN OPENSSH PRIVATE KEY-----
          # Mock key for molecule testing
          -----END OPENSSH PRIVATE KEY-----
        dest: "{{ security_config.ssh_key_path }}"
        mode: '0600'
        
    - name: Create mock SSH public key
      copy:
        content: "{{ test_ssh_key }}"
        dest: "{{ security_config.ssh_key_path }}.pub"
        mode: '0644'

  tasks:
    # Test common_setup role
    - name: Test common setup role
      include_role:
        name: homelab.common.common_setup
      tags: [common_setup]

    # Test container_base role (will skip Proxmox tasks but test variable logic)
    - name: Test container base role variable computation
      include_role:
        name: homelab.common.container_base
        tasks_from: main
      vars:
        # Skip actual Proxmox API calls in molecule
        ansible_check_mode: false
      tags: [container_base]
      ignore_errors: true  # Expected to fail on Proxmox API calls

    # Test security_hardening role
    - name: Test security hardening role
      include_role:
        name: homelab.common.security_hardening
      tags: [security_hardening]

  post_tasks:
    - name: Verify container configuration variables are computed correctly
      assert:
        that:
          - container_resources is defined
          - container_resources.cores is defined
          - lxc_config is defined
          - container_network is defined
          - container_startup_order is defined
          - container_node is defined
        fail_msg: "Container base role variables not computed correctly"
        success_msg: "Container base role variables computed successfully"
        
    - name: Verify node selection logic for monitoring service
      assert:
        that:
          - container_node == "pve-mac"  # prometheus-lxc should go to pve-mac
        fail_msg: "Node selection logic incorrect for monitoring service"
        success_msg: "Node selection logic working correctly"
        
    - name: Display computed container configuration
      debug:
        msg:
          - "Container Node: {{ container_node }}"
          - "Container Resources: {{ container_resources }}"
          - "Startup Order: {{ container_startup_order[group_names[0]] | default('N/A') }}"