---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Verify all required variables are defined
      ansible.builtin.assert:
        that:
          - homelab_domain is defined
          - homelab_network is defined
          - container_defaults is defined
          - security_config is defined
          - proxmox_config is defined
        fail_msg: Required configuration variables are missing
        success_msg: All required configuration variables are present

    - name: Verify container_base role variables
      ansible.builtin.assert:
        that:
          - container_resources is defined
          - container_resources.cores == container_defaults.cores
          - container_resources.memory == container_defaults.memory
          - lxc_config is defined
          - lxc_config.unprivileged == container_defaults.unprivileged
          - container_network is defined
          - container_startup_order is defined
        fail_msg: Container base role variables not properly configured
        success_msg: Container base role variables configured correctly

    - name: Verify node selection logic
      ansible.builtin.assert:
        that:
          - container_node == "pve-mac" # For prometheus-lxc (monitoring service)
        fail_msg: Container node selection logic is incorrect
        success_msg: Container node selection working correctly

    - name: Verify startup order assignment
      ansible.builtin.assert:
        that:
          - container_startup_order.monitoring is defined
          - container_startup_order.monitoring == 2
        fail_msg: Container startup order not properly configured
        success_msg: Container startup order configured correctly

    - name: Check common setup results
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config
      register: sshd_config

    - name: Verify SSH configuration exists
      ansible.builtin.assert:
        that:
          - sshd_config.stat.exists
        fail_msg: SSH configuration not applied
        success_msg: SSH configuration applied successfully
