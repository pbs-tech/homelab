---
galaxy_info:
  author: "Homelab Administrator"
  description: >
    Comprehensive monitoring and observability agent role for homelab
    infrastructure, providing metrics collection, log aggregation, health
    monitoring, and performance analysis for both K3s nodes and LXC containers.
  company: Homelab
  license: Apache-2.0
  min_ansible_version: "2.12"

  platforms:
    - name: Ubuntu
      versions:
        - focal      # 20.04 LTS
        - jammy      # 22.04 LTS
    - name: Debian
      versions:
        - bullseye   # 11
        - bookworm   # 12

  galaxy_tags:
    - homelab
    - monitoring
    - observability
    - prometheus
    - grafana
    - loki
    - metrics
    - logging
    - alerting
    - health
    - performance
    - infrastructure

# Collection dependencies: community.general (>=7.0.0)
