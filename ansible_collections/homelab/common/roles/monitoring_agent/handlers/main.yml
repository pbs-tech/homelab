---
# Monitoring agent handlers

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted

- name: Restart promtail
  ansible.builtin.systemd:
    name: promtail
    state: restarted

# monitoring_agent is not a real systemd unit; node_exporter and promtail handlers above handle restarts
