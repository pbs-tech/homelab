---
# Monitoring agent handlers

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted

- name: Restart promtail
  ansible.builtin.systemd:
    name: promtail
    state: restarted

- name: Restart monitoring_agent
  ansible.builtin.systemd:
    name: monitoring_agent
    state: restarted
  when: monitoring_agent_enabled | default(false)
