---
# Container base tasks
# Common tasks for all container deployments

- name: Ensure Proxmox node is accessible
  uri:
    url: "https://{{ proxmox_api.host }}:8006/api2/json/nodes/{{ container_node }}/status"
    method: GET
    user: "{{ proxmox_api.user }}"
    password: "{{ proxmox_password }}"
    validate_certs: false
    force_basic_auth: true
  delegate_to: localhost
  run_once: true

- name: Create LXC container
  community.general.proxmox:
    api_host: "{{ proxmox_api.host }}"
    api_user: "{{ proxmox_api.user }}"
    api_password: "{{ proxmox_password }}"
    node: "{{ container_node }}"
    vmid: "{{ container_id }}"
    hostname: "{{ inventory_hostname }}"
    ostemplate: "{{ proxmox_api.node }}:vztmpl/{{ lxc_config.template }}"
    cores: "{{ container_resources.cores }}"
    memory: "{{ container_resources.memory }}"
    swap: "{{ container_resources.swap }}"
    disk: "{{ proxmox_api.node }}-{{ lxc_config.storage }}:{{ container_resources.disk_size }}"
    netif: |
      {
        "net0": "name=eth0,bridge={{ container_network.bridge }},ip={{ ansible_host }}/24,gw={{ homelab_network.gateway_ip }},firewall={{ container_network.firewall | int }}"
      }
    unprivileged: "{{ lxc_config.unprivileged }}"
    onboot: "{{ lxc_config.onboot }}"
    state: present
    timeout: 300
  delegate_to: localhost
  register: container_creation

- name: Start container if not running
  community.general.proxmox:
    api_host: "{{ proxmox_api.host }}"
    api_user: "{{ proxmox_api.user }}"
    api_password: "{{ proxmox_password }}"
    node: "{{ container_node }}"
    vmid: "{{ container_id }}"
    state: started
    timeout: 120
  delegate_to: localhost

- name: Wait for container to be reachable
  wait_for:
    host: "{{ ansible_host }}"
    port: 22
    delay: 10
    timeout: 300
    search_regex: OpenSSH
  delegate_to: localhost

- name: Set container startup order
  community.general.proxmox:
    api_host: "{{ proxmox_api.host }}"
    api_user: "{{ proxmox_api.user }}"
    api_password: "{{ proxmox_password }}"
    node: "{{ container_node }}"
    vmid: "{{ container_id }}"
    startup: "order={{ container_startup_order[group_names[0]] | default(10) }}"
  delegate_to: localhost
  when: group_names | length > 0