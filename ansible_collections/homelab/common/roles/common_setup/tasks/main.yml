---
- name: Wait for SSH connection to stabilise
  ansible.builtin.wait_for_connection:
    delay: 5
    timeout: 300
  tags: [molecule-notest]

- name: Wait for network connectivity
  ansible.builtin.wait_for:
    host: 1.1.1.1
    port: 53
    timeout: 60
  tags: [molecule-notest]

- name: Verify DNS resolution is working
  ansible.builtin.command:
    cmd: getent hosts archive.ubuntu.com
  register: dns_check
  retries: 5
  delay: 10
  until: dns_check.rc == 0
  changed_when: false
  failed_when: false
  tags: [molecule-notest]

- name: Configure resolv.conf if DNS not working
  ansible.builtin.copy:
    content: |
      nameserver 1.1.1.1
      nameserver 1.0.0.1
      nameserver 8.8.8.8
    dest: /etc/resolv.conf
    mode: "0644"
  when: dns_check.rc != 0
  tags: [molecule-notest]

- name: Force IPv4 for apt to avoid IPv6 routing issues in LXC
  ansible.builtin.copy:
    content: 'Acquire::ForceIPv4 "true";'
    dest: /etc/apt/apt.conf.d/99force-ipv4
    mode: "0644"
  tags: [molecule-notest]

- name: Stop and mask apt timers to prevent SSH disruption during package ops
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    masked: true
  loop:
    - unattended-upgrades
    - apt-daily.service
    - apt-daily-upgrade.service
    - apt-daily.timer
    - apt-daily-upgrade.timer
  failed_when: false
  tags: [molecule-notest]

- name: Wait for dpkg/apt locks to clear
  ansible.builtin.shell: |
    while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock 2>/dev/null; do
      sleep 2
    done
  changed_when: false
  tags: [molecule-notest]

- name: Update package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  register: apt_update
  retries: 5
  delay: 30
  until: apt_update is succeeded
  when: ansible_facts['os_family'] == "Debian"
  tags: [molecule-notest]

- name: Reconnect after apt operations
  ansible.builtin.wait_for_connection:
    timeout: 120
    delay: 5
  tags: [molecule-notest]

- name: Install common packages
  ansible.builtin.package:
    name: "{{ common_packages[ansible_facts['distribution'] | lower] | default(common_packages.ubuntu) }}"
    state: present
  register: pkg_install
  retries: 3
  delay: 30
  until: pkg_install is succeeded
  tags: [molecule-notest]

- name: Reconnect after package installation
  ansible.builtin.wait_for_connection:
    timeout: 120
    delay: 5
  tags: [molecule-notest]

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
  notify: Restart rsyslog
  tags: [molecule-notest]

- name: Create common users
  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: "{{ item.shell | default('/bin/bash') }}"
    groups: "{{ item.groups | default([]) }}"
    append: true
    create_home: true
  loop: "{{ common_users }}"
  when: common_users | length > 0

- name: Configure SSH authorized keys
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    key: "{{ lookup('file', security_config.ssh_key_path + '.pub') }}"
    state: present
  loop: "{{ common_users }}"
  when: common_users | length > 0

- name: Configure SSH daemon
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    backup: true
    mode: "0600"
    owner: root
    group: root
    validate: sshd -t -f %s
  notify: Restart ssh
  tags: [molecule-notest]

- name: Ensure SSH is enabled and started
  ansible.builtin.service:
    name: ssh
    enabled: true
    state: started
  tags: [molecule-notest]

- name: Configure rsyslog
  ansible.builtin.template:
    src: rsyslog.conf.j2
    dest: /etc/rsyslog.conf
    backup: true
    mode: "0644"
    owner: root
    group: root
  notify: Restart rsyslog
  tags: [molecule-notest]

- name: Create log rotation configuration
  ansible.builtin.template:
    src: logrotate.conf.j2
    dest: /etc/logrotate.d/{{ inventory_hostname }}
    mode: "0644"
    owner: root
    group: root
  when: security_config.log_retention_days is defined
  tags: [molecule-notest]
