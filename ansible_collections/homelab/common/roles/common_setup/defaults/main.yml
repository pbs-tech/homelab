---
# Common setup role defaults
# Used by both K3s nodes and LXC containers

# Package management
common_packages:
  ubuntu:
    - curl
    - wget
    - htop
    - vim
    - git
    - unzip
    - ca-certificates
    - python3
    - python3-pip
  debian:
    - curl
    - wget
    - htop
    - vim
    - git
    - unzip
    - ca-certificates
    - python3
    - python3-pip

# User configuration
common_users: []
# Example:
# common_users:
#   - name: serviceuser
#     shell: /bin/bash
#     groups: ["sudo"]

# SSH configuration
ssh_config:
  port: 22
  permit_root_login: no
  password_authentication: no
  pubkey_authentication: yes
  authorized_keys_file: /home/%u/.ssh/authorized_keys

# Timezone configuration
timezone: "{{ homelab_timezone | default('UTC') }}"

# Logging configuration
rsyslog_config:
  max_message_size: 64k
  preserve_fqdn: on
  remote_logging: false

# Security settings
security_settings:
  disable_ipv6: false
  enable_fail2ban: true
  ufw_default_policy: deny
