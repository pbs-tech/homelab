---
galaxy_info:
  author: "Homelab Administrator"
  description: >
    Foundation role for homelab infrastructure providing standardized system
    configuration, user management, SSH hardening, and logging setup for both
    K3s nodes and LXC containers.
  company: Homelab
  license:
    - Apache-2.0
  min_ansible_version: "2.12"

  platforms:
    - name: Ubuntu
      versions:
        - focal      # 20.04 LTS
        - jammy      # 22.04 LTS
    - name: Debian
      versions:
        - bullseye   # 11
        - bookworm   # 12

  galaxy_tags:
    - homelab
    - common
    - setup
    - infrastructure
    - ssh
    - logging
    - users
    - security
    - system
    - configuration

dependencies:
  - role: ansible.posix
    version: ">=1.5.0"
  - role: community.general
    version: ">=7.0.0"

allow_duplicates: false
