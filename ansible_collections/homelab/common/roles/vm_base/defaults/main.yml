---
# VM base role defaults
# Shared settings for KVM/QEMU virtual machine provisioning

# VM resource defaults
vm_resources:
  cores: 2
  memory: 2048
  disk_size: 32    # GB, OS disk
  sockets: 1

# VM configuration
vm_config:
  bios: ovmf       # UEFI (ovmf) or legacy (seabios)
  machine: q35
  ostype: l26       # Linux 2.6/3.x/4.x/5.x/6.x
  scsihw: virtio-scsi-single
  agent: "1"        # QEMU guest agent
  onboot: true
  storage: local-lvm

# Network configuration (same pattern as container_base)
vm_network:
  bridge: vmbr0
  model: virtio
  firewall: true

# Clone configuration (for template-based VMs)
# When enabled, clones from an existing template instead of creating from scratch
vm_clone:
  enabled: false
  template_id: 9000       # VMID of the template to clone from
  template_name: ubuntu-2404-cloud  # Name of the template (used by module to trigger clone)
  full_clone: true         # Full clone (true) vs linked clone (false)

# Cloud-init configuration (for cloned VMs)
vm_cloudinit:
  enabled: false
  user: ansible
  ip_config: ""            # e.g., "ip=192.168.0.X/24,gw=192.168.0.1"
  dns_servers: ""          # Space-separated DNS servers
  search_domain: ""        # Search domain
  ssh_public_key: ""       # SSH public key content

# ISO configuration (optional — for installer-based VMs)
vm_iso:
  storage: local    # Proxmox storage for ISOs
  file: ""          # ISO filename (empty = no ISO)

# Per-VM firewall security groups (references groups defined in cluster.fw)
vm_firewall_groups:
  - basic-network
  - allow-ssh

# Additional per-VM firewall rules beyond security groups
vm_firewall_extra_rules:
  - "IN ACCEPT -source 192.168.0.0/24 -log nolog # Allow LAN traffic"

# Proxmox API helper — provides unified access to the correct node's config
# Used by the shared proxmox_api_validation.yml tasks
proxmox_api: "{{ proxmox_config[proxmox_node | default(proxmox_default_node)] }}"

# Whether to wait for SSH after VM start
vm_wait_for_ssh: false
vm_ssh_delay: 30
vm_ssh_timeout: 300
