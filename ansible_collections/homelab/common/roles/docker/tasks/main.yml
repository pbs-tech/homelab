---
# Docker installation tasks
# Common role for installing Docker CE on Ubuntu/Debian systems

- name: Check if Docker is installed
  ansible.builtin.stat:
    path: /usr/bin/docker
  register: docker_binary

- name: Install Docker when not present
  when: not docker_binary.stat.exists
  block:
    - name: Install required packages for Docker
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      retries: 3
      delay: 10
      register: _docker_gpg
      until: _docker_gpg is succeeded

    - name: Determine system architecture for Docker
      ansible.builtin.set_fact:
        docker_arch: >-
          {{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else
             'armhf' if ansible_facts['architecture'] == 'armv7l' else
             'amd64' }}

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
      notify: Restart docker

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  when: docker_ensure_group | default(true)

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_group_users | default([]) }}"
  when: docker_group_users | default([]) | length > 0
