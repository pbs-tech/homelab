---
galaxy_info:
  author: "Homelab Administrator"
  description: "Comprehensive security hardening for K3s nodes and LXC containers with CIS compliance"
  company: "Homelab"
  license:
    - "Apache-2.0"
  min_ansible_version: "2.12"
  platforms:
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble
    - name: Debian
      versions:
        - bullseye
        - bookworm
    - name: EL
      versions:
        - 8
        - 9
        - 10
  galaxy_tags:
    - security
    - hardening
    - cis
    - compliance
    - firewall
    - ssh
    - audit
    - fail2ban

dependencies:
  - role: ansible.posix
    when: false  # Collection dependency, not role dependency
  - role: community.general
    when: false  # Collection dependency, not role dependency
