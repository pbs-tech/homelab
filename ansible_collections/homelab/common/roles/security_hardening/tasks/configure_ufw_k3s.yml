---
- name: Get current UFW status
  ansible.builtin.command: ufw status
  register: ufw_status_check
  changed_when: false
  failed_when: false

- name: Configure UFW for K3s nodes
  when: "'Status: active' not in ufw_status_check.stdout or pi_security_hardening.ufw_hardening"
  block:
    - name: Set UFW default policies
      community.general.ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: incoming, policy: deny }
        - { direction: outgoing, policy: allow }
        - { direction: routed, policy: deny }

    - name: Allow SSH from management network
      community.general.ufw:
        rule: allow
        port: "{{ pi_security_hardening.ssh_hardening.port }}"
        src: 192.168.0.0/24
        comment: SSH from management network

    - name: Allow Proxmox management ports
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.comment }}"
      loop:
        - { port: "8006", proto: tcp, comment: "Proxmox Web UI" }
        - { port: "3128", proto: tcp, comment: "Proxmox SPICE proxy" }
        - { port: "5900:5999", proto: tcp, comment: "Proxmox VNC" }
        - { port: "111", proto: tcp, comment: "Proxmox RPC" }
      when: "'proxmox_hosts' in group_names or ansible_hostname is match('pve.*')"

    - name: Allow K3s API server port (6443)
      community.general.ufw:
        rule: allow
        port: 6443
        comment: K3s API server
      when: inventory_hostname in groups['server']

    - name: Allow etcd ports for multi-master
      community.general.ufw:
        rule: allow
        port: 2379:2381
        proto: tcp
        src: "{{ item }}"
        comment: etcd cluster communication
      loop: "{{ groups['server'] | map('extract', hostvars, 'ansible_host') | list }}"
      when:
        - inventory_hostname in groups['server']
        - groups['server'] | length > 1

    - name: Allow K3s inter-node communication
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        src: "{{ ansible_default_ipv4.network }}/{{ ansible_default_ipv4.netmask }}"
        comment: "{{ item.comment }}"
      loop:
        - { port: "10250", proto: tcp, comment: Kubelet metrics }
        - { port: "8472", proto: udp, comment: Flannel VXLAN }
        - { port: "51820", proto: udp, comment: Flannel Wireguard IPv4 }
        - { port: "51821", proto: udp, comment: Flannel Wireguard IPv6 }
        - { port: "5001", proto: tcp, comment: Spegel registry }

    - name: Allow K3s cluster CIDR traffic
      community.general.ufw:
        rule: allow
        src: "{{ item }}"
        comment: K3s cluster traffic
      loop:
        - 10.42.0.0/16 # Default cluster CIDR
        - 10.43.0.0/16 # Default service CIDR

    - name: Allow NodePort range if configured
      community.general.ufw:
        rule: allow
        port: 30000:32767
        comment: NodePort services
      when: k3s_security.allow_nodeports | default(false)

    # Proxmox LXC container routing rules
    # These rules allow traffic to/from LXC containers through the bridge interface
    - name: Allow routed traffic TO container network (Proxmox hosts)
      community.general.ufw:
        rule: allow
        route: true
        dest: "{{ container_network_cidr | default('192.168.0.0/24') }}"
        comment: Allow traffic to LXC containers
      when: "'proxmox_hosts' in group_names or ansible_hostname is match('pve.*')"

    - name: Allow routed traffic FROM container network (Proxmox hosts)
      community.general.ufw:
        rule: allow
        route: true
        src: "{{ container_network_cidr | default('192.168.0.0/24') }}"
        comment: Allow traffic from LXC containers
      when: "'proxmox_hosts' in group_names or ansible_hostname is match('pve.*')"

    - name: Enable UFW with logging
      community.general.ufw:
        state: enabled
        logging: true
