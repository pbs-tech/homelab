---
- name: Pi-specific system hardening
  block:
    - name: Configure Pi boot config for security
      ansible.builtin.lineinfile:
        path: /boot/config.txt
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        backup: true
      loop:
        - regexp: "^gpu_mem="
          line: "gpu_mem={{ pi_security_hardening.pi_system.gpu_split }}"
        - regexp: "^camera_auto_detect="
          line: "camera_auto_detect=0"
        - regexp: "^display_auto_detect="
          line: "display_auto_detect=0"
      notify: reboot pi
      when: pi_security_hardening.pi_system.optimize_memory

    - name: Configure .local domain resolution with avahi-daemon
      block:
        - name: Install avahi-daemon for .local domains
          ansible.builtin.apt:
            name:
              - avahi-daemon
              - avahi-utils
            state: present

        - name: Configure avahi-daemon
          ansible.builtin.template:
            src: avahi-daemon.conf.j2
            dest: /etc/avahi/avahi-daemon.conf
            mode: "0644"
            owner: root
            group: root
          notify: Restart avahi-daemon

        - name: Create .local hostname service file
          ansible.builtin.template:
            src: hostname.service.j2
            dest: "/etc/avahi/services/{{ inventory_hostname }}.service"
            mode: "0644"
            owner: root
            group: root
          notify: Restart avahi-daemon

        - name: Enable and start avahi-daemon
          ansible.builtin.systemd:
            name: avahi-daemon
            enabled: true
            state: started

    - name: Disable unnecessary Pi services (excluding avahi)
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: false
        state: stopped
      loop:
        - bluetooth
        - hciuart
        - triggerhappy
        - cups
        - cups-browsed
      failed_when: false # Services might not exist on all Pi versions

    - name: Configure memory split for headless operation
      ansible.builtin.lineinfile:
        path: /boot/cmdline.txt
        regexp: cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory
        line: >-
          {{ ansible_facts.cmdline | default('') }}
          cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory
        state: present
        backup: true
      notify: reboot pi
      when: "'cgroup_enable=memory' not in ansible_facts.cmdline | default('')"

    - name: Set Pi-specific sysctl values
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - name: vm.swappiness
          value: "10" # Reduce swap usage
        - name: vm.vfs_cache_pressure
          value: "50" # Optimize caching
        - name: vm.dirty_background_ratio
          value: "5" # SD card friendly
        - name: vm.dirty_ratio
          value: "10" # SD card friendly

    - name: Configure log2ram for SD card longevity
      block:
        - name: Check if log2ram is available
          ansible.builtin.stat:
            path: /usr/local/bin/log2ram
          register: log2ram_check

        - name: Install log2ram if not present
          when: not log2ram_check.stat.exists

          block:
            - name: Download log2ram
              ansible.builtin.get_url:
                url: https://github.com/azlux/log2ram/archive/master.tar.gz
                dest: /tmp/log2ram.tar.gz
                mode: "0644"

            - name: Extract log2ram
              ansible.builtin.unarchive:
                src: /tmp/log2ram.tar.gz
                dest: /tmp/
                remote_src: true

            - name: Install log2ram
              ansible.builtin.command: /tmp/log2ram-master/install.sh
              changed_when: true
    - name: Optimize tmpfs usage for Pi
      ansible.posix.mount:
        path: "{{ item.path }}"
        src: tmpfs
        fstype: tmpfs
        opts: "{{ item.opts }}"
        state: mounted
      loop:
        - path: /tmp
          opts: "defaults,noatime,nosuid,size=100M"
        - path: /var/tmp
          opts: "defaults,noatime,nosuid,size=50M"
      when: pi_security_hardening.pi_system.optimize_memory
