---
- name: Configure K3s-compatible sysctl settings
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    # Network security (K3s compatible)
    - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
    - { name: 'net.ipv4.conf.default.send_redirects', value: '0' }
    - { name: 'net.ipv4.conf.all.accept_redirects', value: '0' }
    - { name: 'net.ipv4.conf.default.accept_redirects', value: '0' }
    - { name: 'net.ipv4.conf.all.secure_redirects', value: '0' }
    - { name: 'net.ipv4.conf.default.secure_redirects', value: '0' }
    - { name: 'net.ipv4.conf.all.log_martians', value: '1' }
    - { name: 'net.ipv4.conf.default.log_martians', value: '1' }
    - { name: 'net.ipv4.icmp_echo_ignore_broadcasts', value: '1' }
    - { name: 'net.ipv4.icmp_ignore_bogus_error_responses', value: '1' }
    - { name: 'net.ipv4.tcp_syncookies', value: '1' }
    
    # Kernel security
    - { name: 'kernel.dmesg_restrict', value: '1' }
    - { name: 'kernel.kptr_restrict', value: '1' }  # Less restrictive for K3s
    
    # K3s requires IP forwarding - don't disable
    # net.ipv4.ip_forward and net.ipv6.conf.all.forwarding managed by K3s

- name: Remove unnecessary packages (K3s compatible)
  apt:
    name:
      - telnet
      - rsh-client
      - rsh-redone-client
    state: absent
    autoremove: yes

- name: Set proper permissions on sensitive files
  file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
  loop:
    - { path: '/etc/passwd', mode: '0644' }
    - { path: '/etc/group', mode: '0644' }
    - { path: '/etc/shadow', mode: '0600' }
    - { path: '/etc/gshadow', mode: '0600' }

- name: Configure process accounting
  apt:
    name: acct
    state: present

- name: Enable process accounting
  systemd:
    name: acct
    state: started
    enabled: yes

- name: Configure K3s-specific security settings
  block:
    - name: Ensure K3s directories exist with proper permissions
      file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode }}"
        owner: root
        group: root
      loop:
        - { path: '/etc/rancher/k3s', mode: '0755' }
        - { path: '/var/lib/rancher/k3s', mode: '0755' }
        
    - name: Configure K3s audit logging
      copy:
        content: |
          apiVersion: audit.k8s.io/v1
          kind: Policy
          rules:
          - level: RequestResponse
            resources:
            - group: ""
              resources: ["*"]
          - level: Metadata
            resources:
            - group: "apps"
              resources: ["*"]
          - level: Request
            resources:
            - group: "rbac.authorization.k8s.io"
              resources: ["*"]
        dest: /etc/rancher/k3s/audit-policy.yaml
        mode: '0600'
        owner: root
        group: root
      when: inventory_hostname in groups['server']