---
- name: Restart ssh
  ansible.builtin.systemd:
    name: ssh
    state: restarted
  listen: "restart ssh"

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
  listen: "restart fail2ban"

- name: Reload ufw
  community.general.ufw:
    state: reloaded
  listen: "reload ufw"

- name: Restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted
  listen: "restart rsyslog"

- name: Restart avahi-daemon
  ansible.builtin.systemd:
    name: avahi-daemon
    state: restarted
  listen: "restart avahi-daemon"

- name: Reboot pi
  ansible.builtin.reboot:
    reboot_timeout: 300
    test_command: uptime
  when: ansible_reboot_required | default(false)
  listen: "reboot pi"
