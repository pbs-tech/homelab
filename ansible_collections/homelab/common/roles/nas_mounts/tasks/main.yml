---
# Unprivileged LXC containers cannot call mount(2) directly.
# Solution: mount NFS on the Proxmox host, then bind-mount into the container
# via the LXC config — the same pattern used for the TUN device in container_base.

- name: Install NFS client on Proxmox host
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true
    cache_valid_time: 3600
  delegate_to: "{{ proxmox_config[nas_proxmox_node].host }}"
  become: true
  vars:
    ansible_user: ansible

- name: Detach any stale NFS mounts on Proxmox host
  ansible.builtin.command:
    cmd: umount -l {{ item.path }}
  loop: "{{ nas_mounts }}"
  delegate_to: "{{ proxmox_config[nas_proxmox_node].host }}"
  become: true
  vars:
    ansible_user: ansible
  failed_when: false
  changed_when: false

- name: Create NFS mount points on Proxmox host
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "0755"
  loop: "{{ nas_mounts }}"
  delegate_to: "{{ proxmox_config[nas_proxmox_node].host }}"
  become: true
  vars:
    ansible_user: ansible

- name: Mount NFS shares on Proxmox host (persistent via fstab)
  ansible.posix.mount:
    path: "{{ item.path }}"
    src: "{{ item.src }}"
    fstype: nfs
    opts: "{{ item.opts | default(nas_nfs_opts) }}"
    state: mounted
  loop: "{{ nas_mounts }}"
  delegate_to: "{{ proxmox_config[nas_proxmox_node].host }}"
  become: true
  vars:
    ansible_user: ansible

- name: Create NAS subdirectories on share
  ansible.builtin.command:
    cmd: mkdir -p {{ item }}
    creates: "{{ item }}"
  loop: "{{ nas_subdirs }}"
  when: nas_subdirs | length > 0
  delegate_to: "{{ proxmox_config[nas_proxmox_node].host }}"
  become: true
  vars:
    ansible_user: ansible

- name: Set ownership on NAS subdirectories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ nas_subdir_owner }}"
    group: "{{ nas_subdir_group }}"
    mode: "0755"
  loop: "{{ nas_subdirs }}"
  when: nas_subdirs | length > 0
  delegate_to: "{{ proxmox_config[nas_proxmox_node].host }}"
  become: true
  vars:
    ansible_user: ansible

- name: Add LXC bind mounts to container config
  ansible.builtin.lineinfile:
    path: "/etc/pve/lxc/{{ container_id }}.conf"
    line: "mp{{ idx }}: {{ item.path }},mp={{ item.path }}"
    regexp: "^mp{{ idx }}:"
    state: present
  loop: "{{ nas_mounts }}"
  loop_control:
    index_var: idx
  delegate_to: "{{ proxmox_config[nas_proxmox_node].host }}"
  become: true
  vars:
    ansible_user: ansible
  notify: Restart LXC container
