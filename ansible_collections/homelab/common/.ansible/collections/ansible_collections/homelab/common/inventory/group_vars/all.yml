---
# Shared configuration for all homelab infrastructure
# This file contains common settings used across all collections

# Infrastructure topology
homelab_domain: "homelab.local"
homelab_timezone: "America/New_York"

# Network configuration
homelab_network:
  gateway_ip: "192.168.0.1"
  dns_servers:
    - "192.168.0.202" # Unbound DNS
    - "192.168.0.204" # AdGuard DNS
    - "1.1.1.1" # Fallback
  cluster_cidr: "10.42.0.0/16"
  service_cidr: "10.43.0.0/16"

# Proxmox configuration
proxmox_config:
  pve_mac:
    host: "192.168.0.56"
    user: "root@pam"
    node: "pve-mac"
  pve_nas:
    host: "192.168.0.57"
    user: "root@pam"
    node: "pve-nas"

# K3s cluster configuration
k3s_config:
  version: "v1.30.2+k3s1"
  cluster_name: "homelab"
  api_port: 6443
  server_endpoints:
    - "https://192.168.0.111:6443"
  kubeconfig_path: "/etc/rancher/k3s/k3s.yaml"

# Security configuration
security_config:
  hardening_enabled: true
  audit_enabled: true
  log_retention_days: 30
  ssh_key_path: "~/.ssh/id_rsa"
  vault_password_file: "~/.ansible_vault_pass"

# Container defaults
container_defaults:
  template: "ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
  disk_size: "8"
  cores: 1
  memory: 512
  swap: 0
  onboot: true
  unprivileged: true

# Service configuration
services_config:
  ssl_email: "{{ vault_ssl_email }}"
  traefik:
    host: "192.168.0.205"
    dashboard_port: 8080
  prometheus:
    host: "192.168.0.200"
    port: 9090
  grafana:
    host: "192.168.0.201"
    port: 3000

# Monitoring and logging
monitoring_config:
  enabled: true
  retention_policy: "30d"
  exporters:
    node_exporter_port: 9100
    cadvisor_port: 8080

# Backup configuration
backup_config:
  enabled: true
  retention_days: 7
  backup_path: "/opt/backups"
