---
- name: Converge
  hosts: all
  become: true
  gather_facts: true
  vars:
    # Mock SSH key for testing
    test_ssh_key: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... molecule-test-key"

    # Test user configuration
    common_users:
      - name: testuser
        shell: /bin/bash
        groups: [sudo]

    # Override security settings for container testing
    security_config:
      ssh_key_path: "/tmp/molecule_key"
      hardening_enabled: true
      log_retention_days: 1

  pre_tasks:
    # Create mock SSH key for testing
    - name: Create SSH key directory
      ansible.builtin.file:
        path: /tmp
        state: directory
        mode: "0755"

    - name: Create mock SSH private key
      ansible.builtin.copy:
        content: |
          -----BEGIN OPENSSH PRIVATE KEY-----
          # This is a mock key for testing only
          -----END OPENSSH PRIVATE KEY-----
        dest: "{{ security_config.ssh_key_path }}"
        mode: "0600"

    - name: Create mock SSH public key
      ansible.builtin.copy:
        content: "{{ test_ssh_key }}"
        dest: "{{ security_config.ssh_key_path }}.pub"
        mode: "0644"

  tasks:
    - name: Test common_setup role
      ansible.builtin.include_role:
        name: homelab.common.common_setup
      tags: [common_setup]

    - name: Test security_hardening role
      ansible.builtin.include_role:
        name: homelab.common.security_hardening
      tags: [security_hardening]

  post_tasks:
    - name: Verify common packages are installed
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      check_mode: true
      loop:
        - curl
        - wget
        - htop
        - vim
      register: package_check

    - name: Assert packages were installed
      ansible.builtin.assert:
        that: not item.changed
        fail_msg: "Package {{ item.item }} was not installed"
      loop: "{{ package_check.results }}"

    - name: Verify test user was created
      ansible.builtin.user:
        name: testuser
        state: present
      check_mode: true
      register: user_check

    - name: Assert user exists
      ansible.builtin.assert:
        that: not user_check.changed
        fail_msg: "Test user was not created properly"
