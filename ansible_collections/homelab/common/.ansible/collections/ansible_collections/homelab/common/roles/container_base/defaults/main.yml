---
# Container base role defaults
# Shared settings for both LXC and containerized services

# Container resource defaults (inherited from common config)
container_resources:
  disk_size: "{{ container_defaults.disk_size }}"
  cores: "{{ container_defaults.cores }}"
  memory: "{{ container_defaults.memory }}"
  swap: "{{ container_defaults.swap }}"

# Network configuration
container_network:
  bridge: "vmbr0"
  ip_config: "dhcp"
  firewall: true

# LXC specific settings
lxc_config:
  onboot: "{{ container_defaults.onboot }}"
  unprivileged: "{{ container_defaults.unprivileged }}"
  template: "{{ container_defaults.template }}"
  storage: "local-lvm"

# Proxmox node selection logic
container_node: >-
  {% if inventory_hostname.endswith('-lxc') and (
    inventory_hostname.startswith('sonarr') or
    inventory_hostname.startswith('radarr') or
    inventory_hostname.startswith('bazarr') or
    inventory_hostname.startswith('prowlarr') or
    inventory_hostname.startswith('qbittorrent') or
    inventory_hostname.startswith('jellyfin') or
    inventory_hostname.startswith('pve-exporter-nas')
  ) %}
    {{ proxmox_config.pve_nas.node }}
  {% else %}
    {{ proxmox_config.pve_mac.node }}
  {% endif %}

# Proxmox API settings based on node
proxmox_api: >-
  {% if container_node == proxmox_config.pve_nas.node %}
    {{ proxmox_config.pve_nas }}
  {% else %}
    {{ proxmox_config.pve_mac }}
  {% endif %}

# Container startup order
container_startup_order:
  networking: 1
  monitoring: 2
  automation: 3
  nas_services: 4
  logging: 5
