---
# Shared configuration for all homelab infrastructure
# This file contains common settings used across all collections

# Infrastructure topology
homelab_domain: homelab.lan
homelab_timezone: America/New_York

# Network configuration
homelab_network:
  gateway_ip: 192.168.0.1
  dns_servers:
    - 192.168.0.202 # Unbound DNS
    - 192.168.0.204 # AdGuard DNS
    - 1.1.1.1 # Fallback
  cluster_cidr: 10.42.0.0/16
  service_cidr: 10.43.0.0/16

# Proxmox configuration
# SECURITY: Set validate_certs to true in production after installing valid SSL certs
# See docs/security/proxmox-ssl-setup.md for certificate installation guide
proxmox_config:
  pve-mac:
    host: 192.168.0.56
    user: root@pam
    node: pve-mac
    # API Token Authentication (token-scoped, preferred)
    api_token_id: "{{ vault_proxmox_api_tokens.pve_mac.token_id }}"
    api_token_secret: "{{ vault_proxmox_api_tokens.pve_mac.token_secret }}"
    # WARNING: Set to true in production with valid SSL certificates
    validate_certs: "{{ proxmox_validate_certs | default(false) }}"
  pve-nas:
    host: 192.168.0.57
    user: root@pam
    node: pve-nas
    # API Token Authentication (token-scoped, preferred)
    api_token_id: "{{ vault_proxmox_api_tokens.pve_nas.token_id }}"
    api_token_secret: "{{ vault_proxmox_api_tokens.pve_nas.token_secret }}"
    # WARNING: Set to true in production with valid SSL certificates
    validate_certs: "{{ proxmox_validate_certs | default(false) }}"

# Proxmox API defaults and validation
proxmox_api_defaults:
  # Default timeout for API operations (seconds)
  timeout: 300
  # Default retry configuration
  retry_count: 3
  retry_delay: 5
  # API version compatibility
  api_version: 2
  # SSL/TLS settings - SECURITY: Enable in production
  # Set proxmox_validate_certs=true or -e proxmox_validate_certs=true for production
  validate_certs: "{{ proxmox_validate_certs | default(false) }}"
  # Connection pooling settings
  connection_timeout: 30

# Production SSL configuration flag
# Override with: ansible-playbook ... -e proxmox_validate_certs=true
# Or set in production inventory group_vars
proxmox_validate_certs: false  # CHANGE TO true FOR PRODUCTION

# Deployment environment setting
# Set to 'production' to enforce SSL validation and other security requirements
# Options: development, staging, production
deployment_environment: development

# SSL validation override flag
# Set to true to explicitly acknowledge running without SSL validation in production
# ansible-playbook ... -e proxmox_ssl_validation_override=true
proxmox_ssl_validation_override: false

# Default Proxmox node for operations (can be overridden per host/group)
proxmox_default_node: "pve-mac"

# Proxmox API helper - provides unified access to configuration
proxmox_api: "{{ proxmox_config }}"

# K3s cluster configuration
k3s_config:
  version: v1.30.2+k3s1
  cluster_name: homelab
  api_port: 6443
  server_endpoints:
    - https://192.168.0.111:6443
  kubeconfig_path: /etc/rancher/k3s/k3s.yaml
  # K3s cluster node IPs (for firewall rules and access control)
  node_ips:
    - 192.168.0.111  # k3-01 (server)
    - 192.168.0.112  # k3-02 (agent)
    - 192.168.0.113  # k3-03 (agent)
    - 192.168.0.114  # k3-04 (agent)

# Security configuration
security_config:
  hardening_enabled: true
  audit_enabled: true
  log_retention_days: 30
  ssh_key_path: ~/.ssh/homelab_ed25519
  vault_password_file: ~/.ansible_vault_pass

# Container defaults are defined in inventory/group_vars/lxc_containers.yml
# (with ssh_key) — do not duplicate here.

# Service configuration
services_config:
  ssl_email: "{{ vault_ssl_email }}"
  traefik:
    host: 192.168.0.205
    dashboard_port: 8080
  prometheus:
    host: 192.168.0.200
    port: 9090
  grafana:
    host: 192.168.0.201
    port: 3000

# Monitoring and logging
monitoring_config:
  enabled: true
  retention_policy: 30d
  exporters:
    node_exporter_port: 9100
    cadvisor_port: 8080

# Backup configuration
backup_config:
  enabled: true
  retention_days: 7
  backup_path: /opt/backups
