---
- name: Check if template storage directory exists
  stat:
    path: "{{ lxc_template_storage_path }}"
  register: template_storage_dir
  delegate_to: "{{ inventory_hostname }}"

- name: Create template storage directory if it doesn't exist
  file:
    path: "{{ lxc_template_storage_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: not template_storage_dir.stat.exists
  delegate_to: "{{ inventory_hostname }}"

- name: Check existing LXC templates
  shell: pveam list {{ item.storage }} | grep -E "\.tar\.(xz|zst|gz)$" || true
  register: existing_templates
  loop: "{{ lxc_templates }}"
  when: lxc_templates is defined
  delegate_to: "{{ inventory_hostname }}"
  changed_when: false

- name: Download LXC templates that don't exist
  get_url:
    url: "{{ item.item.url }}"
    dest: "{{ lxc_template_storage_path }}/{{ item.item.filename }}"
    mode: '0644'
    owner: root
    group: root
    timeout: "{{ download_timeout }}"
    force: "{{ item.item.force_download | default(false) }}"
  loop: "{{ existing_templates.results }}"
  when: 
    - item.item is defined
    - (item.item.filename not in item.stdout) or (item.item.force_download | default(false))
  delegate_to: "{{ inventory_hostname }}"
  async: "{{ download_timeout }}"
  poll: 0
  register: download_jobs

- name: Wait for template downloads to complete
  async_status:
    jid: "{{ item.ansible_job_id }}"
  register: download_results
  until: download_results.finished
  retries: "{{ (download_timeout / 30) | int }}"
  delay: 30
  loop: "{{ download_jobs.results }}"
  when: 
    - item.ansible_job_id is defined
    - not item.skipped | default(false)
  delegate_to: "{{ inventory_hostname }}"

- name: Verify downloaded templates
  stat:
    path: "{{ lxc_template_storage_path }}/{{ item.filename }}"
  register: template_verification
  loop: "{{ lxc_templates }}"
  when: lxc_templates is defined
  delegate_to: "{{ inventory_hostname }}"

- name: Show template download status
  debug:
    msg: "Template {{ item.item.filename }} - Available: {{ item.stat.exists }}"
  loop: "{{ template_verification.results }}"
  when: 
    - item.item is defined
    - template_verification is defined

- name: Refresh Proxmox template cache
  shell: pveam update
  delegate_to: "{{ inventory_hostname }}"
  changed_when: false
  failed_when: false