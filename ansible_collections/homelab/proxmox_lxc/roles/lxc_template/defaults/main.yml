---
# Default LXC template configuration - focused on Ubuntu for easier management
lxc_templates:
  - name: ubuntu-22.04-standard
    url: https://download.proxmox.com/images/system/ubuntu-22.04-standard_22.04-1_amd64.tar.zst
    filename: ubuntu-22.04-standard_22.04-1_amd64.tar.zst
    storage: local
    force_download: false
  - name: ubuntu-20.04-standard
    url: https://download.proxmox.com/images/system/ubuntu-20.04-standard_20.04-1_amd64.tar.zst
    filename: ubuntu-20.04-standard_20.04-1_amd64.tar.zst
    storage: local
    force_download: false
  - name: ubuntu-24.04-standard
    url: https://download.proxmox.com/images/system/ubuntu-24.04-standard_24.04-2_amd64.tar.zst
    filename: ubuntu-24.04-standard_24.04-2_amd64.tar.zst
    storage: local
    force_download: false

# Default template to use for containers if not specified
default_lxc_template: ubuntu-22.04-standard

# Proxmox template storage location
lxc_template_storage_path: /var/lib/vz/template/cache

# Maximum number of concurrent downloads
max_concurrent_downloads: 3

# Download timeout in seconds
download_timeout: 1800
