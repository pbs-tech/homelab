---
# Ubuntu cloud-init VM deployment tasks

- name: Verify cloud-init template exists on Proxmox node
  ansible.builtin.command:
    cmd: "qm status {{ ubuntu_vm_template_id }}"
  delegate_to: "{{ proxmox_config[proxmox_node | default(proxmox_default_node)].host }}"
  become: true
  vars:
    ansible_user: ansible
  register: _template_check
  changed_when: false
  failed_when: false
  tags:
    - ubuntu_vm
    - validation

- name: Fail if cloud-init template is missing
  ansible.builtin.fail:
    msg: |
      Cloud-init template {{ ubuntu_vm_template_id }} not found on
      {{ proxmox_config[proxmox_node | default(proxmox_default_node)].node }}.

      Create it first:
        ansible-playbook playbooks/create-vm-template.yml --ask-vault-pass
  when: _template_check.rc != 0
  tags:
    - ubuntu_vm
    - validation

- name: Create Ubuntu VM from cloud-init template
  ansible.builtin.include_role:
    name: homelab.common.vm_base
  tags:
    - ubuntu_vm
    - vm

- name: Display Ubuntu VM access information
  ansible.builtin.debug:
    msg: |
      Ubuntu VM ready (VMID: {{ vm_id }})
      SSH: ssh ansible@{{ ansible_host }}
  tags:
    - ubuntu_vm
