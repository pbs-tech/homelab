---
# Prowlarr deployment tasks

- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present

# Install Docker using common role
- name: Install Docker
  ansible.builtin.include_role:
    name: homelab.common.docker
  vars:
    docker_ensure_group: true

# Validate PUID/PGID - ensure user/group exist or will be created by container
- name: Validate PUID/PGID configuration
  ansible.builtin.assert:
    that:
      - prowlarr_puid is defined
      - prowlarr_pgid is defined
      - prowlarr_puid | int > 0
      - prowlarr_pgid | int > 0
    fail_msg: "prowlarr_puid and prowlarr_pgid must be defined and greater than 0"
    quiet: true

- name: Create prowlarr directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prowlarr_puid }}"
    group: "{{ prowlarr_pgid }}"
    mode: "0755"
  loop:
    - "{{ prowlarr_data_dir }}"
    - "{{ prowlarr_config_dir }}"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ prowlarr_data_dir }}/docker-compose.yml"
    owner: root
    group: docker
    mode: "0640"
  notify: Restart prowlarr

- name: Create Prowlarr systemd service
  ansible.builtin.template:
    src: prowlarr.service.j2
    dest: /etc/systemd/system/prowlarr.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart prowlarr

- name: Configure UFW firewall for Prowlarr
  community.general.ufw:
    rule: allow
    port: "{{ prowlarr_port }}"
    proto: tcp
    comment: "Prowlarr"
  when: prowlarr_configure_firewall

- name: Pull Prowlarr Docker image
  community.docker.docker_image:
    name: "{{ prowlarr_docker_image }}"
    tag: "{{ prowlarr_version }}"
    source: pull
  retries: 3
  delay: 10
  register: docker_pull_result
  until: docker_pull_result is succeeded

- name: Enable and start Prowlarr
  ansible.builtin.systemd:
    name: prowlarr
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Prowlarr to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ prowlarr_port }}"
    method: GET
    status_code: [200, 401]
  register: prowlarr_health
  until: prowlarr_health.status in [200, 401]
  retries: 18
  delay: 5
  ignore_errors: true

- name: Warn if Prowlarr health check failed
  ansible.builtin.debug:
    msg: "Warning: Prowlarr health check did not pass. Service may still be starting."
  when: prowlarr_health is failed

- name: Display Prowlarr access information
  ansible.builtin.debug:
    msg: |
      Prowlarr is ready!
      Access URL: http://{{ ansible_host }}:{{ prowlarr_port }}
      Configure indexers and connect to Sonarr/Radarr.
