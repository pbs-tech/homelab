---
# AdGuard Home deployment and configuration

- name: Create AdGuard user
  ansible.builtin.user:
    name: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin
  tags: setup

- name: Create AdGuard directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    mode: "0755"
  loop:
    - "{{ adguard_install_dir }}"
    - "{{ adguard_work_dir }}"
    - "{{ adguard_config_dir }}"
  tags: setup

- name: Check if AdGuard is already installed
  ansible.builtin.stat:
    path: "{{ adguard_install_dir }}/AdGuardHome"
  register: adguard_binary
  tags: install

- name: Get latest AdGuard Home version
  ansible.builtin.uri:
    url: https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest
    return_content: true
  register: adguard_latest_release
  when: adguard_version == "latest" and not adguard_binary.stat.exists
  tags: install

- name: Set AdGuard version
  ansible.builtin.set_fact:
    adguard_download_version: >-
      {{
        adguard_latest_release.json.tag_name
        if adguard_version == 'latest'
        else adguard_version
      }}
  when: not adguard_binary.stat.exists
  tags: install

- name: Download AdGuard Home
  ansible.builtin.get_url:
    url: >-
      https://github.com/AdguardTeam/AdGuardHome/releases/download/{{-
      adguard_download_version }}/AdGuardHome_linux_amd64.tar.gz
    dest: /tmp/AdGuardHome.tar.gz
    mode: "0644"
  when: not adguard_binary.stat.exists
  tags: install

- name: Extract AdGuard Home
  ansible.builtin.unarchive:
    src: /tmp/AdGuardHome.tar.gz
    dest: "{{ adguard_install_dir | dirname }}"
    remote_src: true
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
  when: not adguard_binary.stat.exists
  notify: Restart adguard
  tags: install

- name: Remove download archive
  ansible.builtin.file:
    path: /tmp/AdGuardHome.tar.gz
    state: absent
  when: not adguard_binary.stat.exists
  tags: install

- name: Generate admin password hash if not provided
  ansible.builtin.shell: |
    set -o pipefail
    password="{{ adguard_admin_password | default('changeme') }}"
    htpasswd -bnBC 10 "" "$password" | tr -d ':\n'
  args:
    executable: /bin/bash
  register: password_hash_result
  when: adguard_admin_password_hash == ""
  changed_when: false
  no_log: true
  tags: config

- name: Set admin password hash
  ansible.builtin.set_fact:
    adguard_admin_password_hash: >-
      {{
        password_hash_result.stdout
        if adguard_admin_password_hash == ''
        else adguard_admin_password_hash
      }}
  when: adguard_admin_password_hash == ""
  no_log: true
  tags: config

- name: Deploy AdGuard Home configuration
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: "{{ adguard_config_dir }}/AdGuardHome.yaml"
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    mode: "0640"
  notify: Restart adguard
  tags: config

- name: Create systemd service file
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=AdGuard Home DNS Server
      After=network.target

      [Service]
      Type=simple
      User={{ adguard_user }}
      Group={{ adguard_group }}
      WorkingDirectory={{ adguard_work_dir }}
      ExecStart={{ adguard_install_dir }}/AdGuardHome \
        -c {{ adguard_config_dir }}/AdGuardHome.yaml \
        -w {{ adguard_work_dir }} \
        --no-check-update
      Restart=on-failure
      RestartSec=10

      # Security hardening
      NoNewPrivileges=true
      PrivateTmp=true
      ProtectSystem=strict
      ProtectHome=true
      ReadWritePaths={{ adguard_work_dir }} {{ adguard_config_dir }}

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/adguard.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart adguard
  tags: service

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  tags: service

- name: Enable and start AdGuard Home
  ansible.builtin.systemd:
    name: adguard
    enabled: true
    state: started
  tags: service

- name: Configure firewall for web interface
  community.general.ufw:
    rule: allow
    port: "{{ adguard_bind_port }}"
    proto: tcp
    comment: "AdGuard Home Web UI"
  when: adguard_enable_firewall | default(true)
  tags: firewall

- name: Configure firewall for DNS
  community.general.ufw:
    rule: allow
    port: "{{ adguard_dns_port }}"
    proto: "{{ item }}"
    comment: "AdGuard Home DNS"
  loop:
    - tcp
    - udp
  when: adguard_enable_firewall | default(true)
  tags: firewall

- name: Wait for AdGuard Home to be ready
  ansible.builtin.wait_for:
    port: "{{ adguard_bind_port }}"
    delay: 5
    timeout: 60
  tags: validate

- name: Test DNS resolution through AdGuard
  ansible.builtin.command: dig @127.0.0.1 -p {{ adguard_dns_port }} google.com +short
  register: dns_test
  changed_when: false
  failed_when: dns_test.rc != 0
  tags: validate
