---
# AdGuard Home deployment and configuration

- name: Validate AdGuard admin password is configured
  ansible.builtin.assert:
    that:
      - adguard_admin_password is defined
      - adguard_admin_password | length >= 12
      - adguard_admin_password != 'changeme'
    fail_msg: >-
      AdGuard admin password must be set in vault (vault_adguard_admin_password)
      and be at least 12 characters. Do not use default 'changeme' password.
    success_msg: "AdGuard admin password is properly configured"
  tags: validate

- name: Install required packages for AdGuard
  ansible.builtin.apt:
    name:
      - apache2-utils
      - curl
    state: present
    update_cache: true
  tags: setup

- name: Check if systemd-resolved is running
  ansible.builtin.service_facts:
  tags: setup

- name: Set systemd-resolved status
  ansible.builtin.set_fact:
    _resolved_active: >-
      {{ 'systemd-resolved.service' in ansible_facts.services
         and ansible_facts.services['systemd-resolved.service'].state == 'running' }}
  tags: setup

- name: Stop systemd-resolved to free port 53
  ansible.builtin.systemd:
    name: systemd-resolved
    state: stopped
    enabled: false
  when: _resolved_active
  tags: setup

- name: Remove systemd-resolved stub resolver symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent
  when: _resolved_active
  tags: setup

- name: Create static resolv.conf
  ansible.builtin.copy:
    content: |
      # Managed by Ansible - AdGuard Home DNS
      nameserver 127.0.0.1
      nameserver 1.1.1.1
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"
  when: _resolved_active
  tags: setup

- name: Create AdGuard group
  ansible.builtin.group:
    name: "{{ adguard_group }}"
    system: true
    state: present
  tags: setup

- name: Create AdGuard user
  ansible.builtin.user:
    name: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin
  tags: setup

- name: Create AdGuard directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    mode: "0755"
  loop:
    - "{{ adguard_install_dir }}"
    - "{{ adguard_work_dir }}"
    - "{{ adguard_config_dir }}"
  tags: setup

- name: Check if AdGuard is already installed
  ansible.builtin.stat:
    path: "{{ adguard_install_dir }}/AdGuardHome"
  register: adguard_binary
  tags: install

- name: Get latest AdGuard Home version
  ansible.builtin.uri:
    url: https://api.github.com/repos/AdguardTeam/AdGuardHome/releases/latest
    return_content: true
  register: adguard_latest_release
  when: adguard_version == "latest" and not adguard_binary.stat.exists
  tags: install

- name: Set AdGuard version
  ansible.builtin.set_fact:
    adguard_download_version: >-
      {{
        adguard_latest_release.json.tag_name
        if adguard_version == 'latest'
        else adguard_version
      }}
  when: not adguard_binary.stat.exists
  tags: install

- name: Set architecture for AdGuard download
  ansible.builtin.set_fact:
    _adguard_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
  when: not adguard_binary.stat.exists
  tags: install

- name: Download AdGuard Home
  ansible.builtin.get_url:
    url: >-
      https://github.com/AdguardTeam/AdGuardHome/releases/download/{{-
      adguard_download_version }}/AdGuardHome_linux_{{ _adguard_arch }}.tar.gz
    dest: /tmp/AdGuardHome.tar.gz
    mode: "0644"
  when: not adguard_binary.stat.exists
  tags: install

- name: Extract AdGuard Home
  ansible.builtin.unarchive:
    src: /tmp/AdGuardHome.tar.gz
    dest: "{{ adguard_install_dir | dirname }}"
    remote_src: true
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
  when: not adguard_binary.stat.exists
  notify: Restart adguard
  tags: install

- name: Remove download archive
  ansible.builtin.file:
    path: /tmp/AdGuardHome.tar.gz
    state: absent
  when: not adguard_binary.stat.exists
  tags: install

- name: Generate admin password hash if not provided
  ansible.builtin.shell: |
    set -o pipefail
    htpasswd -bnBC 10 "" {{ adguard_admin_password | quote }} | tr -d ':'
  args:
    executable: /bin/bash
  register: password_hash_result
  when: adguard_admin_password_hash | length == 0
  changed_when: false
  no_log: true
  tags: config

- name: Set admin password hash
  ansible.builtin.set_fact:
    adguard_admin_password_hash: "{{ password_hash_result.stdout | trim }}"
  when:
    - adguard_admin_password_hash | length == 0
    - password_hash_result.stdout is defined
  no_log: true
  tags: config

- name: Debug - verify password hash was generated
  ansible.builtin.debug:
    msg: "Password hash length: {{ adguard_admin_password_hash | length }}"
  tags: config

- name: Deploy AdGuard Home configuration
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: "{{ adguard_config_dir }}/AdGuardHome.yaml"
    owner: "{{ adguard_user }}"
    group: "{{ adguard_group }}"
    mode: "0640"
  notify: Restart adguard
  tags: config

- name: Create systemd service file
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=AdGuard Home DNS Server
      After=network.target

      [Service]
      Type=simple
      User={{ adguard_user }}
      Group={{ adguard_group }}
      WorkingDirectory={{ adguard_work_dir }}
      ExecStart={{ adguard_install_dir }}/AdGuardHome \
        -c {{ adguard_config_dir }}/AdGuardHome.yaml \
        -w {{ adguard_work_dir }} \
        --no-check-update
      Restart=on-failure
      RestartSec=10

      # Allow binding to privileged ports (80 for web, 53 for DNS)
      AmbientCapabilities=CAP_NET_BIND_SERVICE
      CapabilityBoundingSet=CAP_NET_BIND_SERVICE

      # Security hardening
      PrivateTmp=true
      ProtectSystem=strict
      ProtectHome=true
      ReadWritePaths={{ adguard_work_dir }} {{ adguard_config_dir }}

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/adguard.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart adguard
  tags: service

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  tags: service

- name: Enable and start AdGuard Home
  ansible.builtin.systemd:
    name: adguard
    enabled: true
    state: started
  tags: service

- name: Wait briefly for service to initialize
  ansible.builtin.pause:
    seconds: 3
  tags: service

- name: Check AdGuard service status
  ansible.builtin.service_facts:
  tags: service

- name: Set AdGuard service running status
  ansible.builtin.set_fact:
    _adguard_running: >-
      {{ 'adguard.service' in ansible_facts.services
         and ansible_facts.services['adguard.service'].state == 'running' }}
  tags: service

- name: Display AdGuard service status
  ansible.builtin.debug:
    msg: "AdGuard service state: {{ ansible_facts.services['adguard.service'].state | default('not found') }}"
  tags: service

- name: Get AdGuard journal logs if service failed
  ansible.builtin.command: journalctl -u adguard --no-pager -n 30
  register: adguard_journal
  changed_when: false
  failed_when: false
  when: not _adguard_running
  tags: service

- name: Display AdGuard journal logs
  ansible.builtin.debug:
    var: adguard_journal.stdout_lines
  when: adguard_journal.stdout_lines is defined
  tags: service

- name: Fail if AdGuard service is not running
  ansible.builtin.fail:
    msg: "AdGuard service failed to start. Check the logs above."
  when: not _adguard_running
  tags: service

- name: Allow AdGuard web interface
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ adguard_bind_port }}"
    jump: ACCEPT
    comment: "AdGuard Home Web UI"
  when: adguard_enable_firewall | default(true)
  tags: firewall

- name: Allow AdGuard DNS TCP
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ adguard_dns_port }}"
    jump: ACCEPT
    comment: "AdGuard Home DNS TCP"
  when: adguard_enable_firewall | default(true)
  tags: firewall

- name: Allow AdGuard DNS UDP
  ansible.builtin.iptables:
    chain: INPUT
    protocol: udp
    destination_port: "{{ adguard_dns_port }}"
    jump: ACCEPT
    comment: "AdGuard Home DNS UDP"
  when: adguard_enable_firewall | default(true)
  tags: firewall

- name: Create iptables rules directory
  ansible.builtin.file:
    path: /etc/iptables
    state: directory
    mode: "0755"
  when: adguard_enable_firewall | default(true)
  tags: firewall

- name: Save iptables rules
  ansible.builtin.shell: iptables-save > /etc/iptables/rules.v4
  changed_when: false
  when: adguard_enable_firewall | default(true)
  tags: firewall

- name: Create iptables restore service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Restore iptables rules
      Before=network-pre.target
      Wants=network-pre.target

      [Service]
      Type=oneshot
      ExecStart=/sbin/iptables-restore /etc/iptables/rules.v4
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/iptables-restore.service
    mode: "0644"
  when: adguard_enable_firewall | default(true)
  tags: firewall

- name: Enable iptables restore service
  ansible.builtin.systemd:
    name: iptables-restore
    enabled: true
    daemon_reload: true
  when: adguard_enable_firewall | default(true)
  tags: firewall

- name: Flush handlers to ensure AdGuard is restarted with new config
  ansible.builtin.meta: flush_handlers
  tags: validate

- name: Wait for AdGuard Home web interface to be ready
  ansible.builtin.wait_for:
    port: "{{ adguard_bind_port }}"
    delay: 5
    timeout: 60
  tags: validate

- name: Wait for AdGuard Home DNS service to be ready (TCP)
  ansible.builtin.wait_for:
    port: "{{ adguard_dns_port }}"
    delay: 2
    timeout: 60
  tags: validate

- name: Test DNS resolution through AdGuard
  ansible.builtin.command: dig @127.0.0.1 -p {{ adguard_dns_port }} google.com +short
  register: dns_test
  changed_when: false
  failed_when: dns_test.rc != 0
  tags: validate
