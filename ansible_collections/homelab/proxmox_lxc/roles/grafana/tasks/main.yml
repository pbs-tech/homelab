---
- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: true

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
      - software-properties-common
    state: present

- name: Add Grafana GPG key
  ansible.builtin.apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana repository
  ansible.builtin.apt_repository:
    repo: deb https://apt.grafana.com stable main
    state: present

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true

- name: Create grafana directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0755"
  loop:
    - "{{ grafana_data_dir }}"
    - "{{ grafana_logs_dir }}"
    - "{{ grafana_plugins_dir }}"
    - "{{ grafana_dashboards_dir }}"
    - "{{ grafana_provisioning_dir }}"
    - "{{ grafana_provisioning_dir }}/datasources"
    - "{{ grafana_provisioning_dir }}/dashboards"

- name: Create Grafana configuration file
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: "{{ grafana_config_dir }}/grafana.ini"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0640"
    backup: true
  notify: Restart grafana

- name: Create datasources provisioning configuration
  ansible.builtin.template:
    src: datasources.yml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/datasources.yml"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0644"
  notify: Restart grafana

- name: Create dashboard provisioning configuration
  ansible.builtin.template:
    src: dashboards.yml.j2
    dest: "{{ grafana_provisioning_dir }}/dashboards/dashboards.yml"
    owner: "{{ grafana_user }}"
    group: "{{ grafana_group }}"
    mode: "0644"
  notify: Restart grafana

- name: Install Grafana plugins
  community.grafana.grafana_plugin:
    name: "{{ item }}"
    state: present
  loop: "{{ grafana_plugins }}"
  notify: Restart grafana
  failed_when: false # Plugin installation can fail if already installed or unavailable

- name: Enable and start Grafana
  ansible.builtin.systemd:
    name: grafana-server
    enabled: true
    state: started

- name: Wait for Grafana to start
  ansible.builtin.wait_for:
    host: "{{ grafana_domain }}"
    port: "{{ grafana_port }}"
    delay: 10
    timeout: 60

- name: Check Grafana health
  ansible.builtin.uri:
    url: "{{ grafana_root_url }}/api/health"
    method: GET
    return_content: true
  register: grafana_health
  retries: 5
  delay: 5

- name: Display Grafana status
  ansible.builtin.debug:
    msg: "Grafana is running at {{ grafana_root_url }}"
