---
galaxy_info:
  author: "Homelab Administrator"
  description: "Creates and manages LXC containers in Proxmox VE with secure API authentication"
  company: "Homelab"
  license:
    - "Apache-2.0"
  min_ansible_version: "2.12"
  platforms:
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble
    - name: Debian
      versions:
        - bullseye
        - bookworm
  galaxy_tags:
    - proxmox
    - lxc
    - containers
    - virtualization
    - infrastructure

dependencies:
  - role: homelab.common.proxmox_api_validation
    when: validate_proxmox_api | default(true)
