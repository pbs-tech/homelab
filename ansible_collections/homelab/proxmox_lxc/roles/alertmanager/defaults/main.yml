---
# AlertManager default variables

# Version and installation
alertmanager_version: "0.27.0"
alertmanager_port: 9093
alertmanager_cluster_port: 9094

# User and group
alertmanager_user: alertmanager
alertmanager_group: alertmanager

# Directory configuration
alertmanager_config_dir: /etc/alertmanager
alertmanager_data_dir: /var/lib/alertmanager
alertmanager_templates_dir: /etc/alertmanager/templates
alertmanager_bin_dir: /usr/local/bin

# Network binding
alertmanager_listen_address: "0.0.0.0"
alertmanager_external_url: ""

# Retention settings
alertmanager_data_retention: "120h"

# Alert routing defaults
alertmanager_default_receiver: "default"
alertmanager_group_by:
  - alertname
  - cluster
  - service
alertmanager_group_wait: "30s"
alertmanager_group_interval: "5m"
alertmanager_repeat_interval: "4h"

# SMTP configuration (optional - set via vault)
alertmanager_smtp_enabled: false
alertmanager_smtp_smarthost: ""
alertmanager_smtp_from: ""
alertmanager_smtp_auth_username: ""
alertmanager_smtp_auth_password: ""
alertmanager_smtp_require_tls: true
alertmanager_smtp_hello: ""

# Slack configuration (optional - set via vault)
alertmanager_slack_enabled: false
alertmanager_slack_api_url: ""

# Default receivers (can be overridden)
alertmanager_receivers:
  - name: "default"
    webhook_configs: []

# Routes (can be overridden)
alertmanager_routes: []

# Inhibit rules (can be overridden)
alertmanager_inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - instance

# Templates (optional)
alertmanager_custom_templates: []

# Resource limits for systemd
alertmanager_memory_limit: "512M"

# Firewall configuration
alertmanager_configure_firewall: true
