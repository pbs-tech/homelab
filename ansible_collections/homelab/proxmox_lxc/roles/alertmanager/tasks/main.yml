---
# AlertManager deployment tasks
# TODO: Implement AlertManager configuration

- name: Display AlertManager role status
  ansible.builtin.debug:
    msg: "AlertManager role is a stub - implementation pending"

- name: Create alertmanager user
  ansible.builtin.user:
    name: alertmanager
    system: true
    shell: /bin/false
    home: /var/lib/alertmanager
    create_home: true

- name: Create alertmanager directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: alertmanager
    group: alertmanager
    mode: "0755"
  loop:
    - /etc/alertmanager
    - /var/lib/alertmanager
