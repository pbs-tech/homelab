---
- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: true

- name: Install required packages
  ansible.builtin.apt:
    name:
      - qemu-utils
      - wget
      - gzip
      - parted
      - kpartx
      - rsync
    state: present

- name: Create openwrt directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/openwrt
    - /opt/openwrt/config
    - /var/log/openwrt

- name: Download OpenWrt image
  ansible.builtin.get_url:
    url: "{{ openwrt_release_url }}"
    dest: /tmp/openwrt.img.gz
    mode: "0644"
  register: openwrt_download

- name: Extract OpenWrt image
  ansible.builtin.command: gunzip -f /tmp/openwrt.img.gz
  args:
    creates: /tmp/openwrt.img
  register: gunzip_result
  # rc=2 means warning (trailing garbage) but decompression succeeded
  failed_when: gunzip_result.rc not in [0, 2]
  when: openwrt_download.changed  # noqa: no-handler

- name: Convert OpenWrt image to VM disk
  ansible.builtin.command: qemu-img convert -f raw -O qcow2 /tmp/openwrt.img /opt/openwrt/openwrt.qcow2
  args:
    creates: /opt/openwrt/openwrt.qcow2
  when: openwrt_download.changed  # noqa: no-handler

- name: Resize OpenWrt disk
  ansible.builtin.command: qemu-img resize /opt/openwrt/openwrt.qcow2 1G
  when: openwrt_download.changed  # noqa: no-handler
  changed_when: true

- name: Generate UCI network configuration
  ansible.builtin.template:
    src: network.j2
    dest: /opt/openwrt/config/network
    mode: "0644"

- name: Generate UCI system configuration
  ansible.builtin.template:
    src: system.j2
    dest: /opt/openwrt/config/system
    mode: "0644"

- name: Generate UCI firewall configuration
  ansible.builtin.template:
    src: firewall.j2
    dest: /opt/openwrt/config/firewall
    mode: "0644"

- name: Generate UCI DHCP configuration
  ansible.builtin.template:
    src: dhcp.j2
    dest: /opt/openwrt/config/dhcp
    mode: "0644"

- name: Generate UCI wireless configuration (if applicable)
  ansible.builtin.template:
    src: wireless.j2
    dest: /opt/openwrt/config/wireless
    mode: "0644"
  when: openwrt_enable_wifi | default(false)

- name: Create OpenWrt management script
  ansible.builtin.template:
    src: manage-openwrt.sh.j2
    dest: /usr/local/bin/manage-openwrt
    mode: "0755"

- name: Create OpenWrt systemd service
  ansible.builtin.template:
    src: openwrt.service.j2
    dest: /etc/systemd/system/openwrt.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart openwrt

- name: Create rsyslog configuration for OpenWrt logs
  ansible.builtin.template:
    src: rsyslog-openwrt.conf.j2
    dest: /etc/rsyslog.d/30-openwrt.conf
    mode: "0644"
  notify: Restart rsyslog
  when: openwrt_remote_syslog_server is defined

- name: Enable and start OpenWrt service
  ansible.builtin.systemd:
    name: openwrt
    enabled: true
    state: started
    daemon_reload: true
