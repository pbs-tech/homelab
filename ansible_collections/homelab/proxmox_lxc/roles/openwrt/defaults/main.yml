---
openwrt_version: 23.05.4
openwrt_arch: x86_64
openwrt_release_url: https://downloads.openwrt.org/releases/{{ openwrt_version }}/targets/x86/64/openwrt-{{ openwrt_version
  }}-x86-64-generic-squashfs-combined.img.gz

# Network interface configuration
openwrt_wan_interface: eth0
openwrt_lan_interface: eth1
openwrt_lan_network: 192.168.1.0/24
openwrt_lan_ip: 192.168.1.1

# DHCP configuration
openwrt_dhcp_enabled: true
openwrt_dhcp_start: 100
openwrt_dhcp_limit: 150
openwrt_dhcp_lease: 24h

# DNS configuration
openwrt_dns_servers:
  - "192.168.0.202" # Unbound
  - "192.168.0.204" # AdGuard

# Firewall configuration
openwrt_ssh_port: 22
openwrt_luci_port: 80
openwrt_enable_vpn_passthrough: true

# Port forwards — reflection: true enables NAT hairpinning so internal clients
# can reach the same public IP:port and get looped back to the LAN destination.
openwrt_port_forwards:
  - name: WireGuard-VPN
    proto: udp
    src_dport: 51820
    dest_ip: 192.168.0.203
    dest_port: 51820
    reflection: true

# Package management
openwrt_packages:
  - luci
  - luci-ssl
  - luci-app-firewall
  - luci-app-ddns
  - luci-app-upnp
  - wireguard-tools
  - kmod-wireguard

# Management settings
openwrt_root_password_hash: "{{ vault_openwrt_root_password_hash | mandatory }}"
openwrt_timezone: UTC
openwrt_hostname: openwrt-router

# Logging configuration
openwrt_log_level: info
openwrt_remote_syslog_server: "192.168.0.211" # Logstash
openwrt_remote_syslog_port: 514
