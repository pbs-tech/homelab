---
# TrueNAS SCALE deployment defaults

truenas_version: "24.10.2"
truenas_iso_filename: "TrueNAS-SCALE-{{ truenas_version }}.iso"
truenas_iso_url: "https://download.truenas.com/TrueNAS-SCALE-ElectricEel/{{ truenas_version }}/{{ truenas_iso_filename }}"

# Whether to auto-download the ISO to the Proxmox host
truenas_download_iso: true

# Override vm_base defaults for TrueNAS
vm_resources:
  cores: 4
  memory: 8192
  disk_size: 32
  sockets: 1

vm_config:
  bios: seabios  # TrueNAS SCALE ISO will not boot on OVMF/UEFI in Proxmox
  machine: q35
  ostype: l26
  scsihw: virtio-scsi-single
  agent: "1"
  onboot: true
  storage: local-lvm

# Boot from ISO first so the TrueNAS installer runs on first power-on
vm_boot_order: "order=ide2;scsi0"

vm_firewall_groups:
  - basic-network
  - allow-ssh
  - allow-web     # TrueNAS WebUI on port 80/443

# Network configuration applied via TrueNAS API after first boot.
# vault_truenas_api_key must be set in vault.yml.
# Generate via shell: midclt call api_key.create '{"name": "ansible", "allowlist": []}'
truenas_network:
  netmask: 24
  gateway: "192.168.0.1"
  nameserver1: "192.168.0.204"   # AdGuard
  nameserver2: "8.8.8.8"        # Fallback
