---
# TrueNAS SCALE VM deployment tasks

- name: Download TrueNAS SCALE ISO to Proxmox host
  ansible.builtin.get_url:
    url: "{{ truenas_iso_url }}"
    dest: "/var/lib/vz/template/iso/{{ truenas_iso_filename }}"
    mode: "0644"
    timeout: 600
  delegate_to: "{{ proxmox_config[proxmox_node | default(proxmox_default_node)].host }}"
  become: true
  vars:
    ansible_user: ansible
  when: truenas_download_iso | bool
  tags:
    - truenas
    - iso

- name: Set ISO file for vm_base
  ansible.builtin.set_fact:
    vm_iso:
      storage: local
      file: "{{ truenas_iso_filename }}"
  tags:
    - truenas

- name: Create and start TrueNAS VM
  ansible.builtin.include_role:
    name: homelab.common.vm_base
  tags:
    - truenas
    - vm

# Enforce correct hardware settings idempotently.
# proxmox_kvm state=present skips existing VMs, so we explicitly update
# to catch cases where the VM was created with wrong settings (e.g. ovmf bios).
- name: Enforce TrueNAS VM hardware configuration
  community.proxmox.proxmox_kvm:
    api_host: "{{ _vm_api_host }}"
    api_user: "{{ _vm_api_user }}"
    api_token_id: "{{ _api_token_name }}"
    api_token_secret: "{{ _vm_api_token_secret }}"
    validate_certs: "{{ _vm_validate_certs }}"
    vmid: "{{ vm_id }}"
    node: "{{ _vm_node }}"
    bios: seabios
    memory: "{{ vm_resources.memory }}"
    cores: "{{ vm_resources.cores }}"
    update: true
  delegate_to: localhost
  become: false
  tags:
    - truenas
    - vm

- name: Read TrueNAS VM config
  ansible.builtin.command:
    cmd: qm config {{ vm_id }}
  delegate_to: "{{ _vm_api_host }}"
  become: true
  vars:
    ansible_user: ansible
  register: _truenas_qm_config
  changed_when: false
  tags:
    - truenas
    - vm

- name: Remove EFI disk if present (incompatible with SeaBIOS)
  ansible.builtin.command:
    cmd: qm set {{ vm_id }} --delete efidisk0
  delegate_to: "{{ _vm_api_host }}"
  become: true
  vars:
    ansible_user: ansible
  when: "'efidisk0' in _truenas_qm_config.stdout"
  changed_when: true
  tags:
    - truenas
    - vm

# =============================================================================
# Post-install: run once after completing the TrueNAS installer in VNC.
# Switches boot order to disk-only and detaches the ISO so the VM boots
# into the installed OS rather than looping back into the installer.
#
# Usage:
#   ansible-playbook playbooks/applications.yml --tags truenas-post-install
# =============================================================================

- name: Set Proxmox API facts for post-install tasks
  ansible.builtin.set_fact:
    _post_api_host: "{{ proxmox_config[proxmox_node | default(proxmox_default_node)].host }}"
    _post_api_user: "{{ proxmox_config[proxmox_node | default(proxmox_default_node)].user }}"
    _post_api_token_id: >-
      {{ proxmox_config[proxmox_node | default(proxmox_default_node)].api_token_id.split('!')[1] }}
    _post_api_token_secret: "{{ proxmox_config[proxmox_node | default(proxmox_default_node)].api_token_secret }}"
    _post_validate_certs: "{{ proxmox_config[proxmox_node | default(proxmox_default_node)].validate_certs }}"
    _post_node: "{{ proxmox_config[proxmox_node | default(proxmox_default_node)].node }}"
  tags:
    - truenas-post-install

- name: Switch boot order to disk-only after installation
  community.proxmox.proxmox_kvm:
    api_host: "{{ _post_api_host }}"
    api_user: "{{ _post_api_user }}"
    api_token_id: "{{ _post_api_token_id }}"
    api_token_secret: "{{ _post_api_token_secret }}"
    validate_certs: "{{ _post_validate_certs }}"
    vmid: "{{ vm_id }}"
    node: "{{ _post_node }}"
    boot: "order=scsi0"
    update: true
  delegate_to: localhost
  become: false
  tags:
    - truenas-post-install

- name: Detach ISO after installation
  ansible.builtin.command:
    cmd: qm set {{ vm_id }} --ide2 none,media=cdrom
  delegate_to: "{{ _post_api_host }}"
  become: true
  vars:
    ansible_user: ansible
  changed_when: true
  tags:
    - truenas-post-install

- name: Reboot TrueNAS VM into installed OS
  community.proxmox.proxmox_kvm:
    api_host: "{{ _post_api_host }}"
    api_user: "{{ _post_api_user }}"
    api_token_id: "{{ _post_api_token_id }}"
    api_token_secret: "{{ _post_api_token_secret }}"
    validate_certs: "{{ _post_validate_certs }}"
    vmid: "{{ vm_id }}"
    node: "{{ _post_node }}"
    state: restarted
  delegate_to: localhost
  become: false
  tags:
    - truenas-post-install

# =============================================================================
# Network configuration: applies static IP, gateway, and DNS via TrueNAS API.
# Run after truenas-post-install once TrueNAS has booted into the installed OS.
#
# Requires vault_truenas_root_password in vault.yml.
#
# Usage:
#   ansible-playbook playbooks/applications.yml --tags truenas-network
# =============================================================================

- name: Wait for TrueNAS WebUI to be reachable
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 80
    delay: 10
    timeout: 300
  delegate_to: localhost
  tags:
    - truenas-network

- name: Get TrueNAS network interfaces
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/interface"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    status_code: 200
  register: _truenas_interfaces
  delegate_to: localhost
  tags:
    - truenas-network

- name: Identify primary physical interface
  ansible.builtin.set_fact:
    _truenas_iface: >-
      {{ _truenas_interfaces.json
         | selectattr('type', 'eq', 'PHYSICAL')
         | map(attribute='name')
         | first }}
  delegate_to: localhost
  tags:
    - truenas-network

- name: Configure static IP on primary interface
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/interface/id/{{ _truenas_iface }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    body_format: json
    body:
      ipv4_dhcp: false
      aliases:
        - type: INET
          address: "{{ ansible_host }}"
          netmask: "{{ truenas_network.netmask }}"
    status_code: 200
  delegate_to: localhost
  tags:
    - truenas-network

- name: Configure gateway and DNS
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/network/configuration"
    method: PUT
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    body_format: json
    body:
      ipv4gateway: "{{ truenas_network.gateway }}"
      nameserver1: "{{ truenas_network.nameserver1 }}"
      nameserver2: "{{ truenas_network.nameserver2 }}"
    status_code: 200
  delegate_to: localhost
  tags:
    - truenas-network

- name: Commit network interface changes
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/interface/commit"
    method: POST
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    body_format: json
    body:
      rollback: true
      checkin_timeout: 60
    status_code: 200
  delegate_to: localhost
  tags:
    - truenas-network

# Checkin must succeed within checkin_timeout (60s) or TrueNAS rolls back.
# The middleware is briefly unavailable while the interface reconfigures,
# so retry until it responds rather than failing immediately.
- name: Check in network changes to prevent rollback
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/interface/checkin"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    status_code: 200
  register: _truenas_checkin
  retries: 10
  delay: 5
  until: _truenas_checkin is succeeded
  delegate_to: localhost
  tags:
    - truenas-network

- name: Display TrueNAS instructions
  ansible.builtin.debug:
    msg: |
      TrueNAS SCALE VM is running (VMID: {{ vm_id }}).

      DEPLOYMENT STEPS:
        1. Open https://{{ proxmox_config[proxmox_node | default(proxmox_default_node)].host }}:8006
        2. Open the console for VM {{ vm_id }}
        3. Complete the TrueNAS SCALE installer (select scsi0 as the boot disk)
        4. When the installer finishes and prompts to reboot, do NOT reboot yet
        5. Run: ansible-playbook playbooks/applications.yml --tags truenas-post-install
        6. Once TrueNAS boots, run: ansible-playbook playbooks/applications.yml --tags truenas-network
           (requires vault_truenas_root_password in vault.yml)
        7. TrueNAS WebUI: http://{{ ansible_host }}
  tags:
    - truenas

# =============================================================================
# Storage: ensure ZFS pool is imported and NFS shares exist.
# Runs on every deployment (tags: truenas, truenas-storage) so the media-stack
# can always mount before it starts. Safe to re-run — skips if already correct.
# =============================================================================

- name: Wait for TrueNAS API to be reachable
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 80
    delay: 5
    timeout: 120
  delegate_to: localhost
  tags:
    - truenas
    - truenas-storage

- name: Get imported pools
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/pool"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    status_code: 200
  register: _truenas_pools
  delegate_to: localhost
  tags:
    - truenas
    - truenas-storage

- name: Import pool if not already present — {{ truenas_pool_name }}
  when: truenas_pool_name not in (_truenas_pools.json | map(attribute='name') | list)
  delegate_to: localhost
  tags:
    - truenas
    - truenas-storage
  block:
    - name: Find importable pools
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}/api/v2.0/pool/import_find"
        method: POST
        headers:
          Authorization: "Bearer {{ vault_truenas_api_key }}"
        body_format: json
        body: {}
        status_code: 200
      register: _import_find_job

    - name: Wait for import_find job to complete
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}/api/v2.0/core/get_jobs?id={{ _import_find_job.json }}"
        method: GET
        headers:
          Authorization: "Bearer {{ vault_truenas_api_key }}"
        status_code: 200
      register: _import_find_result
      until: _import_find_result.json[0].state in ['SUCCESS', 'FAILED']
      retries: 20
      delay: 3

    - name: Assert pool is available to import — {{ truenas_pool_name }}
      ansible.builtin.assert:
        that:
          - _import_find_result.json[0].state == 'SUCCESS'
          - _import_find_result.json[0].result | selectattr('name', 'eq', truenas_pool_name) | list | length > 0
        fail_msg: >-
          Pool '{{ truenas_pool_name }}' not found in importable pools.
          Available: {{ _import_find_result.json[0].result | map(attribute='name') | list }}.
          Check that the disks are attached to the TrueNAS VM.

    - name: Import pool {{ truenas_pool_name }}
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}/api/v2.0/pool/import_pool"
        method: POST
        headers:
          Authorization: "Bearer {{ vault_truenas_api_key }}"
        body_format: json
        body:
          guid: >-
            {{ _import_find_result.json[0].result
               | selectattr('name', 'eq', truenas_pool_name)
               | map(attribute='guid')
               | first }}
        status_code: 200
      register: _import_pool_job

    - name: Wait for pool import to complete
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}/api/v2.0/core/get_jobs?id={{ _import_pool_job.json }}"
        method: GET
        headers:
          Authorization: "Bearer {{ vault_truenas_api_key }}"
        status_code: 200
      register: _import_pool_result
      until: _import_pool_result.json[0].state in ['SUCCESS', 'FAILED']
      retries: 30
      delay: 5

    - name: Assert pool import succeeded
      ansible.builtin.assert:
        that: _import_pool_result.json[0].state == 'SUCCESS'
        fail_msg: "Pool import failed: {{ _import_pool_result.json[0].error }}"

- name: Get NFS service status
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/service?service=nfs"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    status_code: 200
  register: _truenas_nfs_service
  delegate_to: localhost
  tags:
    - truenas
    - truenas-storage

- name: Enable NFS service auto-start
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/service/id/{{ _truenas_nfs_service.json[0].id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    body_format: json
    body:
      enable: true
    status_code: 200
  delegate_to: localhost
  when: not _truenas_nfs_service.json[0].enable | bool
  tags:
    - truenas
    - truenas-storage

- name: Start NFS service if not running
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/service/start"
    method: POST
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    body_format: json
    body:
      service: "nfs"
    status_code: 200
  delegate_to: localhost
  when: _truenas_nfs_service.json[0].state != 'RUNNING'
  tags:
    - truenas
    - truenas-storage

- name: Get existing NFS shares
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/sharing/nfs"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    status_code: 200
  register: _truenas_nfs_shares
  delegate_to: localhost
  tags:
    - truenas
    - truenas-storage

- name: Create missing NFS shares
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/sharing/nfs"
    method: POST
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    body_format: json
    body:
      path: "{{ item.path }}"
      comment: "{{ item.comment | default('') }}"
      networks: "{{ item.networks | default([]) }}"
      ro: "{{ item.ro | default(false) }}"
      maproot_user: "{{ item.maproot_user | default('root') }}"
      maproot_group: "{{ item.maproot_group | default('root') }}"
      enabled: true
    status_code: 200
  loop: "{{ truenas_nfs_shares }}"
  when: item.path not in (_truenas_nfs_shares.json | map(attribute='path') | list)
  delegate_to: localhost
  tags:
    - truenas
    - truenas-storage

- name: Get SMB service status
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/service?service=cifs"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    status_code: 200
  register: _truenas_smb_service
  delegate_to: localhost
  tags:
    - truenas
    - truenas-storage

- name: Enable SMB service auto-start
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/service/id/{{ _truenas_smb_service.json[0].id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    body_format: json
    body:
      enable: true
    status_code: 200
  delegate_to: localhost
  when: not _truenas_smb_service.json[0].enable | bool
  tags:
    - truenas
    - truenas-storage

- name: Start SMB service if not running
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/service/start"
    method: POST
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    body_format: json
    body:
      service: "cifs"
    status_code: 200
  delegate_to: localhost
  when: _truenas_smb_service.json[0].state != 'RUNNING'
  tags:
    - truenas
    - truenas-storage

- name: Get existing SMB shares
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/sharing/smb"
    method: GET
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    status_code: 200
  register: _truenas_smb_shares
  delegate_to: localhost
  tags:
    - truenas
    - truenas-storage

- name: Create missing SMB shares
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}/api/v2.0/sharing/smb"
    method: POST
    headers:
      Authorization: "Bearer {{ vault_truenas_api_key }}"
    body_format: json
    body:
      name: "{{ item.name }}"
      path: "{{ item.path }}"
      comment: "{{ item.comment | default('') }}"
      guestok: "{{ item.guestok | default(true) }}"
      ro: "{{ item.ro | default(false) }}"
      enabled: true
    status_code: 200
  loop: "{{ truenas_smb_shares }}"
  when: item.name not in (_truenas_smb_shares.json | map(attribute='name') | list)
  delegate_to: localhost
  tags:
    - truenas
    - truenas-storage
