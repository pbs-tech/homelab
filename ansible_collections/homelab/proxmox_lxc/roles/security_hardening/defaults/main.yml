---
# Security hardening defaults
security_hardening:
  # Firewall configuration
  ufw_enabled: true
  ufw_default_policy:
    incoming: deny
    outgoing: allow
    routed: deny
  
  # SSH hardening
  ssh_hardening:
    port: 22
    permit_root_login: false
    password_authentication: false
    pubkey_authentication: true
    max_auth_tries: 3
    client_alive_interval: 300
    client_alive_count_max: 2
  
  # Fail2ban configuration
  fail2ban:
    enabled: true
    bantime: 3600
    maxretry: 3
    findtime: 600
    ignoreip:
      - "127.0.0.1/8"
      - "192.168.0.0/24"
  
  # Automatic updates
  unattended_upgrades:
    enabled: true
    auto_reboot: false
    auto_reboot_time: "02:00"
    mail_on_error: false
  
  # System hardening
  system:
    disable_unused_services: true
    kernel_hardening: true
    network_hardening: true
    
  # Logging and monitoring
  logging:
    rsyslog_enabled: true
    log_rotation: true
    audit_enabled: false  # Enable for high-security environments
    
# Service-specific security settings
service_security:
  # Media services specific
  arr_stack:
    vpn_required: true
    api_key_rotation_days: 90
    download_permissions: "750"
    config_permissions: "600"
  
  # Storage security
  nfs_security:
    restrict_subnets: true
    allowed_networks:
      - "192.168.0.0/24"
      - "192.168.1.0/24"
    root_squash: true