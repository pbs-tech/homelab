---
- name: Configure Fail2ban default settings
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: '0644'
    owner: root
    group: root
  notify: restart fail2ban

- name: Create Fail2ban filter for arr-stack services
  template:
    src: arr-stack.conf.j2
    dest: /etc/fail2ban/filter.d/arr-stack.conf
    mode: '0644'
    owner: root
    group: root
  when: inventory_hostname in groups['nas_services']
  notify: restart fail2ban

- name: Configure Fail2ban jail for arr-stack
  blockinfile:
    path: /etc/fail2ban/jail.local
    marker: "# {mark} ANSIBLE MANAGED ARR-STACK JAIL"
    block: |
      [arr-stack]
      enabled = true
      port = {{ service_port }}
      filter = arr-stack
      logpath = /var/log/{{ inventory_hostname | regex_replace('-lxc$', '') }}/*.log
      maxretry = {{ security_hardening.fail2ban.maxretry }}
      bantime = {{ security_hardening.fail2ban.bantime }}
    insertafter: EOF
  when: inventory_hostname in groups['nas_services']
  notify: restart fail2ban

- name: Start and enable Fail2ban
  systemd:
    name: fail2ban
    state: started
    enabled: yes