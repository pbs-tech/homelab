---
# Configure iptables firewall (replaces UFW for LXC compatibility)

- name: Set default INPUT policy to DROP
  ansible.builtin.iptables:
    chain: INPUT
    policy: DROP
  when: security_hardening.firewall_default_policy.incoming | default('deny') == 'deny'

- name: Set default FORWARD policy
  ansible.builtin.iptables:
    chain: FORWARD
    policy: "{{ 'ACCEPT' if security_hardening.firewall_default_policy.routed | default('deny') == 'allow' else 'DROP' }}"

- name: Set default OUTPUT policy to ACCEPT
  ansible.builtin.iptables:
    chain: OUTPUT
    policy: ACCEPT
  when: security_hardening.firewall_default_policy.outgoing | default('allow') == 'allow'

- name: Allow established and related connections
  ansible.builtin.iptables:
    chain: INPUT
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "Allow established connections"

- name: Allow loopback interface
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: lo
    jump: ACCEPT
    comment: "Allow loopback"

- name: Allow SSH from management network
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    source: 192.168.0.0/24
    destination_port: "{{ security_hardening.ssh_hardening.port | default(22) }}"
    jump: ACCEPT
    comment: "SSH from management network"

- name: Allow service port
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ service_port }}"
    jump: ACCEPT
    comment: "Service port for {{ inventory_hostname }}"
  when: service_port is defined

- name: Allow NFS traffic from allowed networks
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    source: "{{ item }}"
    destination_port: 2049
    jump: ACCEPT
    comment: "NFS access from {{ item }}"
  loop: "{{ service_security.nfs_security.allowed_networks | default([]) }}"
  when:
    - inventory_hostname in groups.get('nas_storage', [])
    - service_security.nfs_security.restrict_subnets | default(false)

- name: Block direct internet for download clients
  ansible.builtin.iptables:
    chain: OUTPUT
    destination: 0.0.0.0/0
    jump: DROP
    comment: "Block direct internet for download client"
  when:
    - inventory_hostname == 'qbittorrent-lxc'
    - service_security.arr_stack.vpn_required | default(false)

- name: Create iptables rules directory
  ansible.builtin.file:
    path: /etc/iptables
    state: directory
    mode: "0755"

- name: Save iptables rules
  ansible.builtin.shell: iptables-save > /etc/iptables/rules.v4
  changed_when: true

- name: Create iptables restore service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Restore iptables rules
      Before=network-pre.target
      Wants=network-pre.target

      [Service]
      Type=oneshot
      ExecStart=/sbin/iptables-restore /etc/iptables/rules.v4
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/iptables-restore.service
    mode: "0644"

- name: Enable iptables restore service
  ansible.builtin.systemd:
    name: iptables-restore
    enabled: true
    daemon_reload: true
