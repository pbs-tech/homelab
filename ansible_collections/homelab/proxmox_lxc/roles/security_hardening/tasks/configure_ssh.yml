---
- name: Check if SSH config backup exists
  stat:
    path: /etc/ssh/sshd_config.backup
  register: ssh_backup_stat

- name: Backup original SSH config
  copy:
    src: /etc/ssh/sshd_config
    dest: /etc/ssh/sshd_config.backup
    remote_src: true
    mode: "0600"
    owner: root
    group: root
  when: not ssh_backup_stat.stat.exists

- name: Configure SSH hardening
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    backup: true
  loop:
    - { regexp: "^#?Port", line: "Port {{ security_hardening.ssh_hardening.port }}" }
    # yamllint disable-line rule:line-length
    - regexp: "^#?PermitRootLogin"
      line: "PermitRootLogin {{ 'yes' if security_hardening.ssh_hardening.permit_root_login else 'no' }}"
    # yamllint disable-line rule:line-length
    - regexp: "^#?PasswordAuthentication"
      line: "PasswordAuthentication {{ 'yes' if security_hardening.ssh_hardening.password_authentication else 'no' }}"
    # yamllint disable-line rule:line-length
    - regexp: "^#?PubkeyAuthentication"
      line: "PubkeyAuthentication {{ 'yes' if security_hardening.ssh_hardening.pubkey_authentication else 'no' }}"
    - { regexp: "^#?MaxAuthTries", line: "MaxAuthTries {{ security_hardening.ssh_hardening.max_auth_tries }}" }
    # yamllint disable-line rule:line-length
    - regexp: "^#?ClientAliveInterval"
      line: "ClientAliveInterval {{ security_hardening.ssh_hardening.client_alive_interval }}"
    # yamllint disable-line rule:line-length
    - regexp: "^#?ClientAliveCountMax"
      line: "ClientAliveCountMax {{ security_hardening.ssh_hardening.client_alive_count_max }}"
    - { regexp: "^#?Protocol", line: "Protocol 2" }
    - { regexp: "^#?X11Forwarding", line: "X11Forwarding no" }
    - { regexp: "^#?AllowAgentForwarding", line: "AllowAgentForwarding no" }
    - { regexp: "^#?AllowTcpForwarding", line: "AllowTcpForwarding no" }
    - { regexp: "^#?PermitEmptyPasswords", line: "PermitEmptyPasswords no" }
  notify: restart ssh

- name: Add additional SSH security settings
  blockinfile:
    path: /etc/ssh/sshd_config
    block: |
      # Additional security settings
      HostKeyAlgorithms ssh-ed25519,ssh-rsa
      KexAlgorithms curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
      # yamllint disable-line rule:line-length
      # yamllint disable-line rule:line-length
      Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
      MACs hmac-sha2-256-etm@openssh.com,hmac-sha2-512-etm@openssh.com,hmac-sha2-256,hmac-sha2-512
      LoginGraceTime 30
      MaxSessions 4
      MaxStartups 10:30:60
    marker: # {mark} ANSIBLE MANAGED SSH SECURITY
  notify: restart ssh

- name: Test SSH configuration
  command: sshd -t
  register: ssh_test
  failed_when: ssh_test.rc != 0
  changed_when: false
