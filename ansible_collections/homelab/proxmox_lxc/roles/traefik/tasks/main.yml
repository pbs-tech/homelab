---
- name: Validate required Traefik variables
  ansible.builtin.assert:
    that:
      - traefik_version is defined
      - traefik_ssl_email is defined
      - traefik_ssl_email != 'admin@homelab.local' or not traefik_ssl_enabled | default(false)
      - homelab_domain is defined
    fail_msg: |
      Required Traefik configuration variables are missing or using defaults.
      Please set in inventory or group_vars:
        - traefik_version: {{ traefik_version | default('undefined') }}
        - traefik_ssl_email: {{ traefik_ssl_email | default('undefined') }}
        - homelab_domain: {{ homelab_domain | default('undefined') }}
      Note: traefik_ssl_email must be set to a valid email for Let's Encrypt.
    success_msg: "Traefik configuration validated successfully"
  tags: validate

- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: true

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
    state: present

- name: Create traefik user
  ansible.builtin.user:
    name: traefik
    system: true
    shell: /bin/false
    home: /var/lib/traefik
    create_home: true

- name: Create traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: traefik
    group: traefik
    mode: "0755"
  loop:
    - /etc/traefik
    - /etc/traefik/dynamic
    - /var/lib/traefik
    - /var/log/traefik

- name: Download Traefik binary
  ansible.builtin.get_url:
    # yamllint disable-line rule:line-length
    url: https://github.com/traefik/traefik/releases/download/v{{ traefik_version }}/traefik_v{{ traefik_version }}_linux_amd64.tar.gz
    dest: /tmp/traefik.tar.gz
    mode: "0644"

- name: Extract Traefik binary
  ansible.builtin.unarchive:
    src: /tmp/traefik.tar.gz
    dest: /tmp
    remote_src: true

- name: Install Traefik binary
  ansible.builtin.copy:
    src: /tmp/traefik
    dest: /usr/local/bin/traefik
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Create Traefik static configuration
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: /etc/traefik/traefik.yml
    owner: traefik
    group: traefik
    mode: "0644"
  notify: Restart traefik

- name: Create Traefik dynamic configuration for services
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: /etc/traefik/dynamic/services.yml
    owner: traefik
    group: traefik
    mode: "0644"
  notify: Restart traefik

- name: Create Traefik systemd service
  ansible.builtin.template:
    src: traefik.service.j2
    dest: /etc/systemd/system/traefik.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart traefik

- name: Enable and start Traefik
  ansible.builtin.systemd:
    name: traefik
    enabled: true
    state: started
    daemon_reload: true
