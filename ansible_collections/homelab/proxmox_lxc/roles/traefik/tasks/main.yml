---
- name: Validate required Traefik variables
  ansible.builtin.assert:
    that:
      - traefik_version is defined
      - traefik_ssl_email is defined
      - traefik_ssl_email != 'admin@homelab.local' or not traefik_tls_enabled | default(false) or traefik_ssl_resolver != 'letsencrypt'
      - homelab_domain is defined
    fail_msg: |
      Required Traefik configuration variables are missing or using defaults.
      Please set in inventory or group_vars:
        - traefik_version: {{ traefik_version | default('undefined') }}
        - traefik_ssl_email: {{ traefik_ssl_email | default('undefined') }}
        - homelab_domain: {{ homelab_domain | default('undefined') }}
      Note: traefik_ssl_email must be set to a valid email for Let's Encrypt.
    success_msg: "Traefik configuration validated successfully"
  tags: validate

- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: true

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
    state: present

- name: Create traefik user
  ansible.builtin.user:
    name: traefik
    system: true
    shell: /bin/false
    home: /var/lib/traefik
    create_home: true

- name: Create traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: traefik
    group: traefik
    mode: "0755"
  loop:
    - /etc/traefik
    - /etc/traefik/dynamic
    - /var/lib/traefik
    - /var/log/traefik

- name: Download Traefik binary
  ansible.builtin.get_url:
    # yamllint disable-line rule:line-length
    url: https://github.com/traefik/traefik/releases/download/v{{ traefik_version }}/traefik_v{{ traefik_version }}_linux_amd64.tar.gz
    dest: /tmp/traefik.tar.gz
    mode: "0644"

- name: Extract Traefik binary
  ansible.builtin.unarchive:
    src: /tmp/traefik.tar.gz
    dest: /tmp
    remote_src: true

- name: Install Traefik binary
  ansible.builtin.copy:
    src: /tmp/traefik
    dest: /usr/local/bin/traefik
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Allow traefik to bind to privileged ports
  community.general.capabilities:
    path: /usr/local/bin/traefik
    capability: cap_net_bind_service=+ep
    state: present

- name: Fetch step-ca root certificate from CA host
  ansible.builtin.slurp:
    src: "{{ step_ca_config_dir }}/certs/root_ca.crt"
  delegate_to: step-ca
  register: step_ca_root_cert
  when: traefik_tls_enabled | default(false)

- name: Install step-ca root certificate on Traefik host
  ansible.builtin.copy:
    content: "{{ step_ca_root_cert.content | b64decode }}"
    dest: "{{ step_ca_root_cert_path }}"
    owner: traefik
    group: traefik
    mode: "0644"
  when: traefik_tls_enabled | default(false)
  notify: Restart traefik

- name: Create Traefik static configuration
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: /etc/traefik/traefik.yml
    owner: traefik
    group: traefik
    mode: "0644"
  notify: Restart traefik

- name: Create Traefik dynamic configuration for services
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: /etc/traefik/dynamic/services.yml
    owner: traefik
    group: traefik
    mode: "0644"
  notify: Restart traefik

- name: Create Traefik systemd service
  ansible.builtin.template:
    src: traefik.service.j2
    dest: /etc/systemd/system/traefik.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart traefik

- name: Enable and start Traefik
  ansible.builtin.systemd:
    name: traefik
    enabled: true
    state: started
    daemon_reload: true

- name: Allow HTTP traffic
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ traefik_http_port }}"
    jump: ACCEPT
    comment: "Traefik HTTP"
  tags: firewall

- name: Allow HTTPS traffic
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ traefik_https_port }}"
    jump: ACCEPT
    comment: "Traefik HTTPS"
  tags: firewall

- name: Allow Traefik dashboard
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ traefik_dashboard_port }}"
    jump: ACCEPT
    comment: "Traefik Dashboard"
  when: traefik_dashboard_enabled | default(true)
  tags: firewall

- name: Allow Traefik metrics
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ traefik_metrics_port }}"
    jump: ACCEPT
    comment: "Traefik Metrics"
  tags: firewall

- name: Create iptables rules directory
  ansible.builtin.file:
    path: /etc/iptables
    state: directory
    mode: "0755"
  tags: firewall

- name: Save iptables rules
  ansible.builtin.shell: iptables-save > /etc/iptables/rules.v4
  changed_when: true
  tags: firewall

- name: Create iptables restore service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Restore iptables rules
      Before=network-pre.target
      Wants=network-pre.target

      [Service]
      Type=oneshot
      ExecStart=/sbin/iptables-restore /etc/iptables/rules.v4
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/iptables-restore.service
    mode: "0644"
  tags: firewall

- name: Enable iptables restore service
  ansible.builtin.systemd:
    name: iptables-restore
    enabled: true
    daemon_reload: true
  tags: firewall
