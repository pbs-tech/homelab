---
- name: Update system packages
  apt:
    update_cache: true
    upgrade: true

- name: Install required packages
  apt:
    name:
      - curl
      - ca-certificates
    state: present

- name: Create traefik user
  user:
    name: traefik
    system: true
    shell: /bin/false
    home: /var/lib/traefik
    create_home: true

- name: Create traefik directories
  file:
    path: "{{ item }}"
    state: directory
    owner: traefik
    group: traefik
    mode: "0755"
  loop:
    - /etc/traefik
    - /etc/traefik/dynamic
    - /var/lib/traefik
    - /var/log/traefik

- name: Download Traefik binary
  get_url:
    # yamllint disable-line rule:line-length
    url: https://github.com/traefik/traefik/releases/download/v{{ traefik_version }}/traefik_v{{ traefik_version }}_linux_amd64.tar.gz
    dest: /tmp/traefik.tar.gz
    mode: "0644"

- name: Extract Traefik binary
  unarchive:
    src: /tmp/traefik.tar.gz
    dest: /tmp
    remote_src: true

- name: Install Traefik binary
  copy:
    src: /tmp/traefik
    dest: /usr/local/bin/traefik
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Create Traefik static configuration
  template:
    src: traefik.yml.j2
    dest: /etc/traefik/traefik.yml
    owner: traefik
    group: traefik
    mode: "0644"
  notify: Restart traefik

- name: Create Traefik dynamic configuration for services
  template:
    src: dynamic.yml.j2
    dest: /etc/traefik/dynamic/services.yml
    owner: traefik
    group: traefik
    mode: "0644"
  notify: Restart traefik

- name: Create Traefik systemd service
  template:
    src: traefik.service.j2
    dest: /etc/systemd/system/traefik.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart traefik

- name: Enable and start Traefik
  systemd:
    name: traefik
    enabled: true
    state: started
    daemon_reload: true
