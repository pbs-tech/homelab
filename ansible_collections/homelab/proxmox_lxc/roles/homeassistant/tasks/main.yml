---
# Home Assistant deployment tasks

- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - python3-pip
      - dbus
    state: present

# Install Docker using common role
- name: Install Docker
  ansible.builtin.include_role:
    name: homelab.common.docker
  vars:
    docker_ensure_group: true

- name: Create homeassistant group
  ansible.builtin.group:
    name: "{{ homeassistant_group }}"
    system: true
    state: present

- name: Create homeassistant user
  ansible.builtin.user:
    name: "{{ homeassistant_user }}"
    system: true
    shell: /usr/sbin/nologin
    group: "{{ homeassistant_group }}"
    groups: docker
    append: true
    home: "{{ homeassistant_data_dir }}"
    create_home: false

- name: Create homeassistant directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ homeassistant_user }}"
    group: "{{ homeassistant_group }}"
    mode: "0755"
  loop:
    - "{{ homeassistant_data_dir }}"
    - "{{ homeassistant_config_dir }}"
    - "{{ homeassistant_backup_dir }}"
    - "{{ homeassistant_config_dir }}/.storage"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ homeassistant_data_dir }}/docker-compose.yml"
    owner: "{{ homeassistant_user }}"
    group: docker
    mode: "0640"
  notify: Restart homeassistant

- name: Check if configuration.yaml exists
  ansible.builtin.stat:
    path: "{{ homeassistant_config_dir }}/configuration.yaml"
  register: ha_config_file

- name: Deploy initial configuration.yaml
  ansible.builtin.template:
    src: configuration.yaml.j2
    dest: "{{ homeassistant_config_dir }}/configuration.yaml"
    owner: "{{ homeassistant_user }}"
    group: "{{ homeassistant_group }}"
    mode: "0600"
  when: not ha_config_file.stat.exists
  notify: Restart homeassistant

- name: Ensure configuration.yaml has correct permissions
  ansible.builtin.file:
    path: "{{ homeassistant_config_dir }}/configuration.yaml"
    owner: "{{ homeassistant_user }}"
    group: "{{ homeassistant_group }}"
    mode: "0600"
  when: ha_config_file.stat.exists

- name: Create empty automations.yaml if not exists
  ansible.builtin.copy:
    content: "[]"
    dest: "{{ homeassistant_config_dir }}/automations.yaml"
    owner: "{{ homeassistant_user }}"
    group: "{{ homeassistant_group }}"
    mode: "0600"
    force: false

- name: Create empty scripts.yaml if not exists
  ansible.builtin.copy:
    content: ""
    dest: "{{ homeassistant_config_dir }}/scripts.yaml"
    owner: "{{ homeassistant_user }}"
    group: "{{ homeassistant_group }}"
    mode: "0600"
    force: false

- name: Create empty scenes.yaml if not exists
  ansible.builtin.copy:
    content: "[]"
    dest: "{{ homeassistant_config_dir }}/scenes.yaml"
    owner: "{{ homeassistant_user }}"
    group: "{{ homeassistant_group }}"
    mode: "0600"
    force: false

- name: Create Home Assistant systemd service
  ansible.builtin.template:
    src: homeassistant.service.j2
    dest: /etc/systemd/system/homeassistant.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart homeassistant

- name: Configure UFW firewall for Home Assistant
  community.general.ufw:
    rule: allow
    port: "{{ homeassistant_port }}"
    proto: tcp
    comment: "Home Assistant"
  when: homeassistant_configure_firewall

- name: Pull Home Assistant Docker image
  community.docker.docker_image:
    name: "{{ homeassistant_docker_image }}"
    tag: "{{ homeassistant_version }}"
    source: pull
  retries: 3
  delay: 10
  register: docker_pull_result
  until: docker_pull_result is succeeded

- name: Enable and start Home Assistant
  ansible.builtin.systemd:
    name: homeassistant
    enabled: true
    state: started
    daemon_reload: true
  register: homeassistant_service

- name: Wait for Home Assistant to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ homeassistant_port }}/api/"
    method: GET
    status_code:
      - 200
      - 401
  register: ha_health
  until: ha_health.status in [200, 401]
  retries: 30
  delay: 10
  ignore_errors: true

- name: Warn if Home Assistant health check failed
  ansible.builtin.debug:
    msg: "Warning: Home Assistant health check did not pass. Service may still be starting."
  when: ha_health is failed

- name: Display Home Assistant access information
  ansible.builtin.debug:
    msg: |
      Home Assistant is ready!
      Access URL: http://{{ ansible_host }}:{{ homeassistant_port }}
      Complete initial setup through the web interface.
