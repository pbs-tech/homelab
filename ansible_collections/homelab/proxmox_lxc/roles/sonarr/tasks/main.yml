---
# Sonarr deployment tasks

- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present

# Install Docker using common role
- name: Install Docker
  ansible.builtin.include_role:
    name: homelab.common.docker
  vars:
    docker_ensure_group: true

# Validate PUID/PGID - ensure user/group exist or will be created by container
- name: Validate PUID/PGID configuration
  ansible.builtin.assert:
    that:
      - sonarr_puid is defined
      - sonarr_pgid is defined
      - sonarr_puid | int > 0
      - sonarr_pgid | int > 0
    fail_msg: "sonarr_puid and sonarr_pgid must be defined and greater than 0"
    quiet: true

- name: Create sonarr directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ sonarr_puid }}"
    group: "{{ sonarr_pgid }}"
    mode: "0755"
  loop:
    - "{{ sonarr_data_dir }}"
    - "{{ sonarr_config_dir }}"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ sonarr_data_dir }}/docker-compose.yml"
    owner: root
    group: docker
    mode: "0640"
  notify: Restart sonarr

- name: Create Sonarr systemd service
  ansible.builtin.template:
    src: sonarr.service.j2
    dest: /etc/systemd/system/sonarr.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart sonarr

- name: Configure UFW firewall for Sonarr
  community.general.ufw:
    rule: allow
    port: "{{ sonarr_port }}"
    proto: tcp
    comment: "Sonarr"
  when: sonarr_configure_firewall

- name: Pull Sonarr Docker image
  community.docker.docker_image:
    name: "{{ sonarr_docker_image }}"
    tag: "{{ sonarr_version }}"
    source: pull
  retries: 3
  delay: 10
  register: docker_pull_result
  until: docker_pull_result is succeeded

- name: Enable and start Sonarr
  ansible.builtin.systemd:
    name: sonarr
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Sonarr to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ sonarr_port }}/ping"
    method: GET
    status_code: [200]
  register: sonarr_health
  until: sonarr_health.status == 200
  retries: 30
  delay: 5
  ignore_errors: true

- name: Warn if Sonarr health check failed
  ansible.builtin.debug:
    msg: "Warning: Sonarr health check did not pass. Service may still be starting."
  when: sonarr_health is failed

- name: Display Sonarr access information
  ansible.builtin.debug:
    msg: |
      Sonarr is ready!
      Access URL: http://{{ ansible_host }}:{{ sonarr_port }}
      Configure authentication and add indexers via Prowlarr.
