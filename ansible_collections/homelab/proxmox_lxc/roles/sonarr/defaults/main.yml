---
# Sonarr default variables

# Version
sonarr_version: "latest"
sonarr_port: 8989

# Container name
sonarr_container_name: "sonarr"

# User/Group IDs (should match NAS permissions)
sonarr_puid: 1000
sonarr_pgid: 1000

# Timezone
sonarr_timezone: "UTC"

# Directory configuration
sonarr_config_dir: /opt/sonarr/config
sonarr_data_dir: /opt/sonarr

# Media directories (mount points)
sonarr_media_dir: "/media/tv"
sonarr_download_dir: "/downloads"

# Docker configuration
sonarr_docker_image: "lscr.io/linuxserver/sonarr"
sonarr_docker_network: "bridge"
sonarr_docker_restart_policy: "unless-stopped"

# Memory limit
sonarr_memory_limit: "1g"

# Firewall
sonarr_configure_firewall: true

# Extra volumes (for NAS mounts)
sonarr_extra_volumes: []
