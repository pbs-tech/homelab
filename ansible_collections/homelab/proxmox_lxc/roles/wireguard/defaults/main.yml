---
# WireGuard secure access configuration
wireguard_port: 51820
wireguard_interface: wg0
wireguard_server_ip: 10.200.0.1/24
wireguard_server_network: 10.200.0.0/24

# Server private key - auto-generated on the LXC at /etc/wireguard/server_privatekey
# on first run and read back by the role. No vault variable required.
# Set wireguard_use_vault_key: true and provide vault_wireguard_server_private_key
# only if you want to pin a specific key (e.g. to survive container rebuilds).
wireguard_server_private_key: "{{ vault_wireguard_server_private_key | default('') }}"

# Security settings
wireguard_mtu: 1420
wireguard_keepalive: 25
wireguard_enable_preshared_keys: true

# Example client configurations (replace with actual keys)
wireguard_clients:
  - name: admin-laptop
    description: Primary admin laptop
    public_key: REPLACE_WITH_ACTUAL_PUBLIC_KEY
    allowed_ips: 10.200.0.2/32
    preshared_key: REPLACE_WITH_ACTUAL_PSK
    persistent_keepalive: 25
  - name: mobile-device
    description: Admin mobile device
    public_key: REPLACE_WITH_ACTUAL_PUBLIC_KEY
    allowed_ips: 10.200.0.3/32
    preshared_key: REPLACE_WITH_ACTUAL_PSK
    persistent_keepalive: 25

# Network access policies
wireguard_allowed_networks:
  - "192.168.0.0/24"  # Homelab network
  - "10.42.0.0/16"    # K3s cluster network
  - "10.43.0.0/16"    # K3s services network

# Security firewall rules
wireguard_firewall_rules:
  - "iptables -A INPUT -i {{ wireguard_interface }} -j ACCEPT"
  - "iptables -A FORWARD -i {{ wireguard_interface }} -j ACCEPT"
  - "iptables -A FORWARD -o {{ wireguard_interface }} -j ACCEPT"
  - "iptables -A INPUT -p udp --dport {{ wireguard_port }} -j ACCEPT"

# Logging and monitoring
wireguard_enable_logging: true
wireguard_log_level: info

# Firewall configuration
wireguard_enable_firewall: true

# DNS servers for clients
wireguard_dns_servers:
  - "192.168.0.202"  # AdGuard/Unbound DNS

# Client DNS integration method
# systemd-resolved: Uses resolvectl (works with NetworkManager)
# resolvconf: Uses resolvconf (legacy systems)
# none: No PostUp/PostDown DNS scripts
wireguard_client_dns_method: "systemd-resolved"

# Public endpoint (replace with your actual public IP or domain)
wireguard_public_endpoint: "vpn.homelab.example.com"

# QR code generation for mobile clients
wireguard_generate_qrcodes: false

# Local directory where client configs and server public key are written
# Defaults to ~/.wireguard/homelab/ on the control machine
wireguard_client_config_dir: "{{ lookup('env', 'HOME') }}/.wireguard/homelab"
