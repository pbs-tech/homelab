---
galaxy_info:
  role_name: wireguard
  namespace: homelab
  author: "Homelab Administrator"
  description: >
    WireGuard VPN server configuration management for secure remote access
    to homelab infrastructure with modern cryptography and high performance.
  company: Homelab
  license: Apache-2.0
  min_ansible_version: "2.14"

  platforms:
    - name: Ubuntu
      versions:
        - focal      # 20.04 LTS
        - jammy      # 22.04 LTS
    - name: Debian
      versions:
        - bullseye   # 11
        - bookworm   # 12

  galaxy_tags:
    - wireguard
    - vpn
    - security
    - networking
    - remote
    - access
    - encryption
    - homelab
    - lxc
    - proxmox
    - tunnel
    - gateway

dependencies:
  - role: homelab.common.container_base
    vars:
      container_unprivileged: true

allow_duplicates: false
