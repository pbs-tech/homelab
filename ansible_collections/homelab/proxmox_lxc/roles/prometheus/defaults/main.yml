---
prometheus_version: 2.48.0
prometheus_port: 9090
prometheus_retention_time: 15d
prometheus_retention_size: 4GB
prometheus_scrape_interval: 15s
prometheus_evaluation_interval: 15s

# K3s cluster nodes for scraping (pod_cidr from: kubectl get nodes -o jsonpath='{.spec.podCIDR}')
k3s_nodes:
  - { name: "k3s-1", ip: "192.168.0.111", pod_cidr: "10.42.0.0/24" }
  - { name: "k3s-2", ip: "192.168.0.112", pod_cidr: "10.42.1.0/24" }
  - { name: "k3s-3", ip: "192.168.0.113", pod_cidr: "10.42.2.0/24" }
  - { name: "k3s-4", ip: "192.168.0.114", pod_cidr: "10.42.3.0/24" }

# Firewall configuration
prometheus_configure_firewall: true

# K3s master IP (used for kubeconfig fetch and service discovery)
k3s_server_ip: "192.168.0.111"

# Bastion host for running ansible
k3s_bastion_ip: 192.168.0.110

# Service endpoint IPs (used in homelab-services scrape job)
alertmanager_ip: "192.168.0.206"
pve_exporter_ip: "192.168.0.207"
grafana_ip: "192.168.0.201"
adguard_ip: "192.168.0.204"
traefik_ip: "192.168.0.205"
homeassistant_ip: "192.168.0.208"

# Media stack VM (consolidated arr services)
media_stack_ip: "192.168.0.230"
