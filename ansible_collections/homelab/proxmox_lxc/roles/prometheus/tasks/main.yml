---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Create prometheus user
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: /bin/false
    home: /var/lib/prometheus
    create_home: true

- name: Create prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Set architecture for Prometheus download
  ansible.builtin.set_fact:
    _prometheus_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Download and extract Prometheus
  ansible.builtin.unarchive:
    # yamllint disable-line rule:line-length
    src: https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version
      }}.linux-{{ _prometheus_arch }}.tar.gz
    dest: /opt
    remote_src: true
    creates: /opt/prometheus-{{ prometheus_version }}.linux-{{ _prometheus_arch }}

- name: Copy Prometheus binaries
  ansible.builtin.copy:
    src: /opt/prometheus-{{ prometheus_version }}.linux-{{ _prometheus_arch }}/{{ item }}
    dest: /usr/local/bin/{{ item }}
    mode: "0755"
    owner: root
    group: root
    remote_src: true
  loop:
    - prometheus
    - promtool

- name: Create Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: "0644"
  notify: Restart prometheus

- name: Create Prometheus systemd service
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart prometheus

- name: Configure UFW firewall for Prometheus
  community.general.ufw:
    rule: allow
    port: "{{ prometheus_port }}"
    proto: tcp
    comment: "Prometheus"
  when: prometheus_configure_firewall

- name: Create Prometheus rules directory
  ansible.builtin.file:
    path: /etc/prometheus/rules
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"

- name: Deploy Prometheus alert rules
  ansible.builtin.copy:
    src: rules/
    dest: /etc/prometheus/rules/
    owner: prometheus
    group: prometheus
    mode: "0644"
  notify: Restart prometheus

- name: Fetch k3s kubeconfig from master node
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  delegate_to: "{{ k3s_server_ip }}"
  register: k3s_kubeconfig_raw

- name: Deploy kubeconfig for Prometheus k8s service discovery
  ansible.builtin.copy:
    content: "{{ k3s_kubeconfig_raw.content | b64decode | replace('127.0.0.1', k3s_server_ip) }}"
    dest: /etc/prometheus/kubeconfig
    owner: prometheus
    group: prometheus
    mode: "0600"
  notify: Restart prometheus

- name: Extract k3s client certificate from kubeconfig
  ansible.builtin.shell:
    cmd: "python3 -c \"import yaml,base64; d=yaml.safe_load(open('/etc/prometheus/kubeconfig')); open('/etc/prometheus/k3s-client.crt','wb').write(base64.b64decode(d['users'][0]['user']['client-certificate-data']))\""
  changed_when: false

- name: Extract k3s client key from kubeconfig
  ansible.builtin.shell:
    cmd: "python3 -c \"import yaml,base64; d=yaml.safe_load(open('/etc/prometheus/kubeconfig')); open('/etc/prometheus/k3s-client.key','wb').write(base64.b64decode(d['users'][0]['user']['client-key-data']))\""
  changed_when: false
  no_log: true

- name: Set ownership on k3s client cert and key
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: prometheus
    group: prometheus
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/prometheus/k3s-client.crt, mode: "0644" }
    - { path: /etc/prometheus/k3s-client.key, mode: "0600" }

- name: Deploy persistent pod network routes systemd service
  ansible.builtin.template:
    src: prometheus-pod-routes.service.j2
    dest: /etc/systemd/system/prometheus-pod-routes.service
    mode: "0644"
  notify: Reload systemd

- name: Enable and start pod routes service
  ansible.builtin.systemd:
    name: prometheus-pod-routes
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start Prometheus
  ansible.builtin.systemd:
    name: prometheus
    enabled: true
    state: started
    daemon_reload: true
