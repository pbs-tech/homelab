---
- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present

- name: Create jellyfin directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ jellyfin_puid }}"
    group: "{{ jellyfin_pgid }}"
    mode: "0755"
  loop:
    - "{{ jellyfin_data_dir }}"
    - "{{ jellyfin_config_dir }}"
    - "{{ jellyfin_cache_dir }}"

- name: Check if Docker is installed
  ansible.builtin.stat:
    path: /usr/bin/docker
  register: docker_binary

- name: Install Docker when not present
  when: not docker_binary.stat.exists
  block:
    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ jellyfin_data_dir }}/docker-compose.yml"
    owner: root
    group: docker
    mode: "0640"
  notify: Restart jellyfin

- name: Create Jellyfin systemd service
  ansible.builtin.template:
    src: jellyfin.service.j2
    dest: /etc/systemd/system/jellyfin.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart jellyfin

- name: Configure UFW firewall for Jellyfin
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    comment: "Jellyfin"
  loop:
    - "{{ jellyfin_port }}"
    - "{{ jellyfin_https_port }}"
  when: jellyfin_configure_firewall

- name: Pull Jellyfin Docker image
  community.docker.docker_image:
    name: "{{ jellyfin_docker_image }}"
    tag: "{{ jellyfin_version }}"
    source: pull

- name: Enable and start Jellyfin
  ansible.builtin.systemd:
    name: jellyfin
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Jellyfin to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ jellyfin_port }}/health"
    method: GET
    status_code: [200]
  register: jellyfin_health
  until: jellyfin_health.status == 200
  retries: 30
  delay: 10

- name: Display Jellyfin access information
  ansible.builtin.debug:
    msg: |
      Jellyfin is ready!
      Access URL: http://{{ ansible_host }}:{{ jellyfin_port }}
      Complete initial setup through the web interface.
