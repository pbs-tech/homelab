---
# Molecule test scenario for secure_enclave role
dependency:
  name: galaxy
  options:
    requirements-file: ../../../../../../requirements.yml

driver:
  name: docker

platforms:
  - name: enclave-test
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      callbacks_enabled: profile_tasks, timer, yaml
  inventory:
    host_vars:
      enclave-test:
        ansible_python_interpreter: /usr/bin/python3
        # Mock Proxmox configuration for testing
        proxmox_config:
          pve_mac:
            host: 192.168.0.56
            node: pve-mac
            api_token_id: test@pam!test
            api_token_secret: test-secret
            validate_certs: false
        homelab_network:
          gateway_ip: 192.168.0.1
          dns_servers:
            - 192.168.0.202
        homelab_domain: homelab.lan

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
