---
# Molecule verify playbook for secure_enclave role
# Comprehensive verification of role configuration and defaults

- name: Verify
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: Display verification header
      ansible.builtin.debug:
        msg:
          - "╔══════════════════════════════════════════════════════════════╗"
          - "║        SECURE ENCLAVE MOLECULE TEST - VERIFY PHASE          ║"
          - "╚══════════════════════════════════════════════════════════════╝"

    - name: Include role defaults for verification
      ansible.builtin.include_vars:
        file: ../../defaults/main.yml

    # ═══════════════════════════════════════════════════════════════════════════
    # NETWORK CONFIGURATION VERIFICATION
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Verify enclave network configuration
      ansible.builtin.assert:
        that:
          - enclave_network.isolated_subnet == "10.10.0.0/24"
          - enclave_network.management_subnet == "192.168.0.250/29"
          - enclave_network.bridge_name == "vmbr1"
          - enclave_network.vlan_id == 10
        success_msg: "✓ Network configuration is correct"
        fail_msg: "✗ Network configuration mismatch"

    # ═══════════════════════════════════════════════════════════════════════════
    # INFRASTRUCTURE COMPONENT VERIFICATION
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Verify bastion configuration
      ansible.builtin.assert:
        that:
          - enclave_bastion.container_id == 250
          - enclave_bastion.ip_address == "192.168.0.250"
          - enclave_bastion.hostname == "enclave-bastion"
          - enclave_bastion.cores == 2
          - enclave_bastion.memory == 2048
        success_msg: "✓ Bastion configuration is correct"
        fail_msg: "✗ Bastion configuration mismatch"

    - name: Verify router configuration
      ansible.builtin.assert:
        that:
          - enclave_router.container_id == 251
          - enclave_router.wan_ip == "192.168.0.251"
          - enclave_router.lan_ip == "10.10.0.1"
          - "'NET_ADMIN' in enclave_router.capabilities"
          - "'NET_RAW' in enclave_router.capabilities"
        success_msg: "✓ Router configuration is correct"
        fail_msg: "✗ Router configuration mismatch"

    - name: Verify attacker VM configuration
      ansible.builtin.assert:
        that:
          - enclave_attacker.vm_id == 252
          - enclave_attacker.management_ip == "192.168.0.252"
          - enclave_attacker.isolated_ip == "10.10.0.10"
          - enclave_attacker.cores == 4
          - enclave_attacker.memory == 4096
        success_msg: "✓ Attacker VM configuration is correct"
        fail_msg: "✗ Attacker VM configuration mismatch"

    # ═══════════════════════════════════════════════════════════════════════════
    # VULNERABLE TARGETS CATALOG VERIFICATION
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Verify vulnerable targets catalog has required entries
      ansible.builtin.assert:
        that:
          - "'dvwa' in enclave_vulnerable_vms_catalog"
          - "'juice_shop' in enclave_vulnerable_vms_catalog"
          - "'webgoat' in enclave_vulnerable_vms_catalog"
          - "'hackazon' in enclave_vulnerable_vms_catalog"
          - "'mutillidae' in enclave_vulnerable_vms_catalog"
          - "'metasploitable3' in enclave_vulnerable_vms_catalog"
        success_msg: "✓ Vulnerable targets catalog is complete"
        fail_msg: "✗ Missing entries in vulnerable targets catalog"

    - name: Verify DVWA target configuration
      ansible.builtin.assert:
        that:
          - enclave_vulnerable_vms_catalog.dvwa.vm_id == 253
          - enclave_vulnerable_vms_catalog.dvwa.ip_address == "10.10.0.100"
          - enclave_vulnerable_vms_catalog.dvwa.deployment_type == "docker"
          - enclave_vulnerable_vms_catalog.dvwa.docker_image == "vulnerables/web-dvwa"
          - enclave_vulnerable_vms_catalog.dvwa.credentials is defined
          - "'SQL Injection' in enclave_vulnerable_vms_catalog.dvwa.vulnerabilities"
        success_msg: "✓ DVWA target configuration is correct"
        fail_msg: "✗ DVWA target configuration mismatch"

    - name: Verify Juice Shop target configuration
      ansible.builtin.assert:
        that:
          - enclave_vulnerable_vms_catalog.juice_shop.vm_id == 255
          - enclave_vulnerable_vms_catalog.juice_shop.ip_address == "10.10.0.102"
          - enclave_vulnerable_vms_catalog.juice_shop.deployment_type == "docker"
          - enclave_vulnerable_vms_catalog.juice_shop.service_port == 3000
          - enclave_vulnerable_vms_catalog.juice_shop.ctf_mode is defined
        success_msg: "✓ Juice Shop target configuration is correct"
        fail_msg: "✗ Juice Shop target configuration mismatch"

    - name: Verify default enabled targets
      ansible.builtin.assert:
        that:
          - enclave_enabled_targets | length >= 2
          - "'dvwa' in enclave_enabled_targets"
          - "'juice_shop' in enclave_enabled_targets"
        success_msg: "✓ Default enabled targets are correct"
        fail_msg: "✗ Default enabled targets mismatch"

    # ═══════════════════════════════════════════════════════════════════════════
    # FIREWALL RULES VERIFICATION
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Verify firewall rules exist and protect production
      ansible.builtin.assert:
        that:
          - enclave_firewall_rules | length >= 5
          - enclave_firewall_rules | selectattr('name', 'search', 'production') | list | length > 0
          - enclave_firewall_rules | selectattr('name', 'search', 'K3s') | list | length > 0
        success_msg: "✓ Firewall rules are properly configured"
        fail_msg: "✗ Firewall rules configuration issue"

    # ═══════════════════════════════════════════════════════════════════════════
    # MONITORING & SAFETY VERIFICATION
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Verify monitoring is enabled by default
      ansible.builtin.assert:
        that:
          - enclave_monitoring.enabled | bool
          - enclave_monitoring.audit_logging | bool
          - enclave_monitoring.audit_log_path is defined
          - enclave_monitoring.metrics_enabled | bool
        success_msg: "✓ Monitoring configuration is correct"
        fail_msg: "✗ Monitoring should be enabled by default"

    - name: Verify auto-shutdown is enabled by default
      ansible.builtin.assert:
        that:
          - enclave_auto_shutdown.enabled | bool
          - enclave_auto_shutdown.idle_timeout_hours == 4
          - enclave_auto_shutdown.shutdown_schedule is defined
        success_msg: "✓ Auto-shutdown configuration is correct"
        fail_msg: "✗ Auto-shutdown should be enabled by default"

    # ═══════════════════════════════════════════════════════════════════════════
    # OPTIONAL FEATURES VERIFICATION
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Verify traffic capture is disabled by default
      ansible.builtin.assert:
        that:
          - not enclave_traffic_capture.enabled
          - enclave_traffic_capture.capture_dir is defined
          - enclave_traffic_capture.retention_days == 7
        success_msg: "✓ Traffic capture defaults are correct"
        fail_msg: "✗ Traffic capture should be disabled by default"

    - name: Verify CTF mode is disabled by default
      ansible.builtin.assert:
        that:
          - not enclave_ctf_mode.enabled
          - enclave_ctf_mode.flag_format == "FLAG{%s}"
          - enclave_ctf_mode.default_flags is mapping
        success_msg: "✓ CTF mode defaults are correct"
        fail_msg: "✗ CTF mode should be disabled by default"

    - name: Verify VPN is disabled by default
      ansible.builtin.assert:
        that:
          - not enclave_vpn.enabled
          - enclave_vpn.wireguard.listen_port == 51820
          - enclave_vpn.wireguard.max_clients == 10
        success_msg: "✓ VPN defaults are correct"
        fail_msg: "✗ VPN should be disabled by default"

    - name: Verify credential management configuration
      ansible.builtin.assert:
        that:
          - enclave_credentials.generate_report | bool
          - enclave_credentials.ssh_key_type == "ed25519"
          - not enclave_credentials.rotate_on_deploy
        success_msg: "✓ Credential management defaults are correct"
        fail_msg: "✗ Credential management configuration issue"

    # ═══════════════════════════════════════════════════════════════════════════
    # PENTESTING TOOLS VERIFICATION
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Verify pentesting tools list
      ansible.builtin.assert:
        that:
          - enclave_pentesting_tools | length > 15
          - "'nmap' in enclave_pentesting_tools"
          - "'metasploit-framework' in enclave_pentesting_tools"
          - "'burpsuite' in enclave_pentesting_tools"
          - "'sqlmap' in enclave_pentesting_tools"
          - "'hydra' in enclave_pentesting_tools"
          - "'gobuster' in enclave_pentesting_tools"
        success_msg: "✓ Pentesting tools list is complete"
        fail_msg: "✗ Missing essential pentesting tools"

    # ═══════════════════════════════════════════════════════════════════════════
    # RESOURCE LIMITS VERIFICATION
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Verify resource limits are reasonable
      ansible.builtin.assert:
        that:
          - enclave_resource_limits.max_total_cores == 16
          - enclave_resource_limits.max_total_memory_mb == 16384
          - enclave_resource_limits.max_total_disk_gb == 200
          - enclave_resource_limits.max_vm_cores == 8
          - enclave_resource_limits.max_vm_memory_mb == 8192
        success_msg: "✓ Resource limits are correct"
        fail_msg: "✗ Resource limits configuration issue"

    # ═══════════════════════════════════════════════════════════════════════════
    # SECURITY ACKNOWLEDGEMENT VERIFICATION
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Verify security acknowledgement is required by default
      ansible.builtin.assert:
        that:
          - not enclave_security_acknowledged
        success_msg: "✓ Security acknowledgement is required by default"
        fail_msg: "✗ Security acknowledgement should be false by default"

    # ═══════════════════════════════════════════════════════════════════════════
    # PATH CONFIGURATION VERIFICATION
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Verify path configuration
      ansible.builtin.assert:
        that:
          - enclave_paths.bin == "/usr/local/bin"
          - enclave_paths.log == "/var/log"
          - enclave_paths.etc == "/etc"
          - enclave_paths.iptables_rules == "/etc/iptables/rules.v4"
        success_msg: "✓ Path configuration is correct"
        fail_msg: "✗ Path configuration issue"

    # ═══════════════════════════════════════════════════════════════════════════
    # VERIFICATION SUMMARY
    # ═══════════════════════════════════════════════════════════════════════════

    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - ""
          - "╔══════════════════════════════════════════════════════════════╗"
          - "║        SECURE ENCLAVE ROLE VERIFICATION: PASSED             ║"
          - "╚══════════════════════════════════════════════════════════════╝"
          - ""
          - "Core Configuration:"
          - "  ✓ Network configuration validated"
          - "  ✓ Bastion host configuration validated"
          - "  ✓ Router configuration validated"
          - "  ✓ Attacker VM configuration validated"
          - ""
          - "Vulnerable Targets:"
          - "  ✓ Targets catalog complete ({{ enclave_vulnerable_vms_catalog | length }} targets)"
          - "  ✓ Default targets validated ({{ enclave_enabled_targets | join(', ') }})"
          - ""
          - "Security & Safety:"
          - "  ✓ Firewall rules validated"
          - "  ✓ Monitoring enabled by default"
          - "  ✓ Auto-shutdown enabled by default"
          - "  ✓ Security acknowledgement required"
          - ""
          - "Optional Features (disabled by default):"
          - "  ✓ Traffic capture configuration validated"
          - "  ✓ CTF mode configuration validated"
          - "  ✓ VPN access configuration validated"
          - "  ✓ Credential management validated"
          - ""
          - "Tools & Resources:"
          - "  ✓ Pentesting tools list validated ({{ enclave_pentesting_tools | length }} tools)"
          - "  ✓ Resource limits validated"
          - "  ✓ Path configuration validated"
          - ""
          - "═══════════════════════════════════════════════════════════════"
