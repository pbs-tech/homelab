---
# Secure Enclave Role Defaults
# This role creates an isolated network environment for pentesting and security research
#
# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                    SECURITY NOTICE - PRIVILEGED CONTAINERS               ║
# ╠══════════════════════════════════════════════════════════════════════════╣
# ║ This role deploys components that may require elevated privileges:       ║
# ║                                                                          ║
# ║ 1. Attacker VM (Kali): Runs as QEMU VM, not LXC - safer isolation        ║
# ║ 2. Enclave Router: Uses specific capabilities (NET_ADMIN, NET_RAW)       ║
# ║    instead of full privileged mode for minimal required access           ║
# ║                                                                          ║
# ║ RISKS OF PRIVILEGED CONTAINERS:                                          ║
# ║ - Container escape to host system                                        ║
# ║ - Access to host kernel features                                         ║
# ║ - Potential compromise of entire Proxmox node                            ║
# ║                                                                          ║
# ║ MITIGATIONS IN PLACE:                                                    ║
# ║ - Network isolation via dedicated bridge (vmbr1)                         ║
# ║ - Firewall rules blocking production access                              ║
# ║ - Auto-shutdown after idle timeout (4h default)                          ║
# ║ - Comprehensive audit logging                                            ║
# ║ - Resource limits preventing DoS                                         ║
# ║                                                                          ║
# ║ RECOMMENDATIONS:                                                         ║
# ║ - Review firewall rules before deployment                                ║
# ║ - Enable monitoring alerts                                               ║
# ║ - Regularly rotate enclave credentials                                   ║
# ║ - Consider VM-only deployment for highest security                       ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# Acknowledge security risks before deployment (must be set to true)
enclave_security_acknowledged: false

# Persistent mode - when true, enclave components:
# - Start automatically on Proxmox boot (lxc_onboot: true for all components)
# - Do not auto-shutdown on idle
# - Remain running like other infrastructure components
# Default: false (temporary mode for safety)
enclave_persistent_mode: false

# Override for onboot setting (derived from persistent_mode)
# When persistent_mode is true, all components auto-start on boot
enclave_persistent_onboot: "{{ enclave_persistent_mode | default(false) }}"

# Enclave network configuration
enclave_network:
  # Management network (accessible from production bastion)
  management_subnet: 192.168.0.250/29  # 192.168.0.250-254
  # Isolated pentesting network
  isolated_subnet: 10.10.0.0/24
  # Virtual network bridge for isolation
  bridge_name: vmbr1
  vlan_id: 10

# Enclave bastion host configuration
enclave_bastion:
  container_id: 250
  hostname: enclave-bastion
  ip_address: 192.168.0.250
  cores: 2
  memory: 2048
  disk_size: 16
  ssh_port: 22

# Enclave router/firewall configuration
enclave_router:
  container_id: 251
  hostname: enclave-router
  ip_address: 192.168.0.251
  cores: 2
  memory: 1024
  disk_size: 8
  # Network interfaces
  wan_ip: 192.168.0.251
  lan_ip: 10.10.0.1
  # Router capabilities (unprivileged container)
  capabilities:
    - NET_ADMIN
    - NET_RAW
    - NET_BIND_SERVICE

# Kali Linux version configuration
# Update quarterly when new Kali releases are available (Jan, Apr, Jul, Oct)
# See README.md Maintenance section for update procedures
#
# To get SHA256 checksum for a new release:
#   1. Visit https://www.kali.org/get-kali/#kali-installer-images
#   2. Download the SHA256SUMS file for your desired version
#   3. Find the checksum for kali-linux-<version>-installer-amd64.iso
#   4. Or use: curl -s https://cdimage.kali.org/kali-<version>/SHA256SUMS | grep installer-amd64.iso
#
enclave_kali_version: "2024.4"
enclave_kali_iso_checksums:
  "2024.3": "sha256:c5cf31f246fb34a5080e2be5827e8c6eb1f86c7c63ffea67fbcd9cad4b1a8fb0"
  # Kali 2024.4 released December 2024
  # Checksum from: https://cdimage.kali.org/kali-2024.4/SHA256SUMS
  "2024.4": "sha256:05096787bdfad22a027c72e945b6d16cee8f0a98d5ee9bd3f0a2827c0f7b5d0d"
  # Future versions - add checksums as they are released
  "2025.1": "sha256:PLACEHOLDER_UPDATE_WHEN_RELEASED"

# Attacker VM configuration (Kali Linux)
enclave_attacker:
  vm_id: 252
  hostname: kali-attacker
  # Dual-homed: management + isolated network
  management_ip: 192.168.0.252
  isolated_ip: 10.10.0.10
  cores: 4
  memory: 4096
  disk_size: 50
  # Dynamic ISO URL based on configured version
  iso_url: "https://cdimage.kali.org/kali-{{ enclave_kali_version }}/kali-linux-{{ enclave_kali_version }}-installer-amd64.iso"
  # Dynamic checksum lookup based on version
  iso_checksum: "{{ enclave_kali_iso_checksums[enclave_kali_version] }}"

# Vulnerable VM templates
# Each target can be enabled/disabled via enclave_enabled_targets list
