# Build the actual list from enabled targets
enclave_vulnerable_vms: >-
  {{
    enclave_enabled_targets | map('extract', enclave_vulnerable_vms_catalog) | list
  }}

# Firewall rules for network isolation
enclave_firewall_rules:
  # Allow SSH from production bastion to enclave bastion only
  - name: "Allow SSH from production bastion"
    chain: INPUT
    source: 192.168.0.110  # k3s-bastion
    destination: 192.168.0.250  # enclave-bastion
    protocol: tcp
    destination_port: 22
    action: ACCEPT

  # Block all traffic from enclave to production networks
  - name: "Block enclave to production services"
    chain: FORWARD
    source: "{{ enclave_network.isolated_subnet }}"
    destination: 192.168.0.0/24
    action: DROP
    comment: "Prevent lateral movement to production"

  # Block enclave to K3s cluster
  - name: "Block enclave to K3s cluster"
    chain: FORWARD
    source: "{{ enclave_network.isolated_subnet }}"
    destination: 192.168.0.111/32,192.168.0.112/32,192.168.0.113/32,192.168.0.114/32
    action: DROP

  # Allow enclave internal traffic
  - name: "Allow enclave internal traffic"
    chain: FORWARD
    source: "{{ enclave_network.isolated_subnet }}"
    destination: "{{ enclave_network.isolated_subnet }}"
    action: ACCEPT

  # Allow internet access for enclave (for updates/tools)
  - name: "Allow enclave internet access"
    chain: FORWARD
    source: "{{ enclave_network.isolated_subnet }}"
    out_interface: vmbr0
    action: ACCEPT

  # Allow established/related connections back
  - name: "Allow established connections"
    chain: FORWARD
    state: ESTABLISHED,RELATED
    action: ACCEPT

# Security monitoring configuration
enclave_monitoring:
  enabled: true
  # Log all enclave access attempts
  audit_logging: true
  audit_log_path: /var/log/enclave-audit.log
  # Alert on suspicious activity
  alerting_enabled: true
  # Prometheus metrics for monitoring
  metrics_enabled: true
  metrics_port: 9100

# Auto-shutdown configuration (safety feature)
# Disabled when enclave_persistent_mode is true
enclave_auto_shutdown:
  enabled: "{{ not (enclave_persistent_mode | default(false)) }}"
  # Automatically shutdown vulnerable VMs when not in use
  idle_timeout_hours: 4
  # Schedule for automatic shutdown (cron format)
  shutdown_schedule: "0 2 * * *"  # 2 AM daily

# Proxmox node for enclave deployment
enclave_proxmox_node: pve_mac

# Default template for LXC containers in enclave
enclave_lxc_template: "local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst"

# Storage configuration
enclave_storage:
  lxc_storage: local-lvm
  vm_storage: local-lvm
  iso_storage: local

# Path configuration (parameterized for flexibility)
enclave_paths:
  bin: /usr/local/bin
  log: /var/log
  audit_log: /var/log/enclave-audit.log
  auto_shutdown_log: /var/log/enclave-auto-shutdown.log
  etc: /etc
  iptables_rules: /etc/iptables/rules.v4
  proxmox_pve: /etc/pve
  network_interfaces: /etc/network/interfaces
  iso_storage: /var/lib/vz/template/iso
  opt: /opt
  root: /root

# Common pentesting tools to install on attacker VM
enclave_pentesting_tools:
  - nmap
  - metasploit-framework
  - burpsuite
  - sqlmap
  - nikto
  - wireshark
  - john
  - hashcat
  - hydra
  - gobuster
  - ffuf
  - enum4linux
  - smbclient
  - netcat
  - socat
  - proxychains
  - bloodhound
  - impacket-scripts

# Documentation and usage warnings
enclave_usage_banner: |
  ╔══════════════════════════════════════════════════════════════╗
  ║             SECURE ENCLAVE - PENTESTING ENVIRONMENT          ║
  ║                                                              ║
  ║  WARNING: This environment contains intentionally            ║
  ║  vulnerable systems for authorized security testing only.    ║
  ║                                                              ║
  ║  - All activity is logged and monitored                      ║
  ║  - Network is isolated from production systems               ║
  ║  - VMs auto-shutdown after idle timeout                      ║
  ║  - For authorized security research and training only        ║
  ║                                                              ║
  ║  Access: ssh pbs@192.168.0.250 (enclave-bastion)            ║
  ║  Attacker VM: 10.10.0.10 (Kali Linux)                       ║
  ║  Targets: 10.10.0.100+ (Vulnerable VMs)                     ║
  ╚══════════════════════════════════════════════════════════════╝

# Resource constraints (prevent overallocation)
enclave_resource_limits:
  # Maximum total resources for entire enclave
  max_total_cores: 16
  max_total_memory_mb: 16384  # 16GB
  max_total_disk_gb: 200      # 200GB
  # Individual VM/container limits
  max_vm_cores: 8
  max_vm_memory_mb: 8192      # 8GB
  max_vm_disk_gb: 100         # 100GB
  # Warning thresholds
  warn_memory_percent: 80
  warn_disk_percent: 80

# ═══════════════════════════════════════════════════════════════════════════════
# TRAFFIC CAPTURE & ANALYSIS CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

enclave_traffic_capture:
  enabled: false  # Enable for learning/forensics, disable for performance
  interface: "{{ enclave_network.bridge_name }}"
  # Storage for pcap files
  capture_dir: /var/log/enclave/captures
  # Maximum capture file size (MB)
  max_file_size_mb: 100
  # Rotation count
  file_rotation_count: 10
  # Capture filter (BPF syntax)
  capture_filter: "net {{ enclave_network.isolated_subnet }}"
  # Auto-start capture when enclave starts
  auto_start: false
  # Real-time analysis with zeek/suricata (requires additional resources)
  realtime_analysis: false
  # Retention period (days)
  retention_days: 7

# ═══════════════════════════════════════════════════════════════════════════════
# CTF CHALLENGE MODE CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

enclave_ctf_mode:
  enabled: false
  # Flag format for challenges
  flag_format: "FLAG{%s}"
  # Scoreboard configuration
  scoreboard:
    enabled: false
    port: 8888
    # CTFd Docker image for full scoreboard
    use_ctfd: false
    ctfd_image: ctfd/ctfd:latest
  # Pre-planted flags for challenges (override per-target)
  default_flags:
    easy: "FLAG{welcome_to_the_enclave}"
    medium: "FLAG{not_so_easy_now}"
    hard: "FLAG{you_are_getting_good}"
    expert: "FLAG{true_hacker_status}"
  # Challenge categories
  categories:
    - web
    - pwn
    - forensics
    - crypto
    - network
    - misc
  # Time limit for CTF sessions (hours, 0 = unlimited)
  time_limit_hours: 0
  # Hints system
  hints_enabled: true
  hint_penalty_percent: 10

# ═══════════════════════════════════════════════════════════════════════════════
# WIREGUARD VPN ACCESS CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

enclave_vpn:
  enabled: false
  # WireGuard configuration
  wireguard:
    # VPN server on bastion
    listen_port: 51820
    # VPN network (separate from enclave internal)
    vpn_subnet: 10.20.0.0/24
    server_ip: 10.20.0.1
    # DNS for VPN clients (use enclave router for isolated DNS)
    dns_servers:
      - "{{ enclave_router.lan_ip }}"
    # Allowed client IPs (CIDR notation)
    allowed_ips:
      - 10.20.0.0/24
      - "{{ enclave_network.isolated_subnet }}"
    # Persistent keepalive for NAT traversal
    persistent_keepalive: 25
    # Maximum clients
    max_clients: 10
  # Client configurations will be generated and stored here
  client_config_dir: /etc/wireguard/clients
  # QR code generation for mobile clients
  generate_qr_codes: true

# ═══════════════════════════════════════════════════════════════════════════════
# CREDENTIAL MANAGEMENT CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

enclave_credentials:
  # Store credentials in a central location for reference
  credential_file: /root/.enclave-credentials
  # Generate report of all target credentials
  generate_report: true
  report_file: /root/TARGET_CREDENTIALS.md
  # Rotate default credentials on deployment (recommended for shared environments)
  rotate_on_deploy: false
  # SSH key for enclave access (will be generated if not provided)
  ssh_key_path: /root/.ssh/enclave_id_ed25519
  ssh_key_type: ed25519
  # Vault integration (for production secrets)
  vault_integration:
    enabled: false
    vault_addr: ""
    vault_path: "secret/enclave"

# ═══════════════════════════════════════════════════════════════════════════════
# WEB DASHBOARD CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

enclave_dashboard:
  enabled: false
  # Dashboard container
  container_id: 262
  hostname: enclave-dashboard
  ip_address: 10.10.0.200
  port: 8080
  # Authentication
  auth_enabled: true
  # Features
  features:
    vm_status: true
    network_map: true
    traffic_monitor: true
    credential_viewer: true
    ctf_scoreboard: true
    audit_log_viewer: true
  # Dashboard refresh interval (seconds)
  refresh_interval: 30

# ═══════════════════════════════════════════════════════════════════════════════
# ADVANCED DEPLOYMENT OPTIONS
# ═══════════════════════════════════════════════════════════════════════════════

enclave_advanced:
  # Deploy targets in parallel for faster setup
  parallel_deployment: true
  max_parallel_jobs: 3
  # Health check configuration
  health_check:
    enabled: true
    interval_seconds: 60
    timeout_seconds: 10
    unhealthy_threshold: 3
  # Snapshot configuration for quick reset
  snapshots:
    enabled: true
    # Create snapshot after initial deployment
    create_on_deploy: true
    snapshot_name: "enclave-pristine"
    # Auto-restore to snapshot on scheduled shutdown
    restore_on_shutdown: false
  # Network segmentation (advanced)
  network_segments:
    # Separate networks for different difficulty levels
    enabled: false
    easy_subnet: 10.10.1.0/24
    medium_subnet: 10.10.2.0/24
    hard_subnet: 10.10.3.0/24
