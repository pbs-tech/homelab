---
# Attacker VM Deployment (Kali Linux)
# Pentesting workstation with common security tools

- name: Create directory for Kali ISO
  ansible.builtin.file:
    path: "/var/lib/vz/template/iso"
    state: directory
    mode: '0755'
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  tags:
    - attacker
    - iso

- name: Check if Kali ISO already exists
  ansible.builtin.stat:
    path: "/var/lib/vz/template/iso/kali-linux-2024.3-installer-amd64.iso"
  register: kali_iso_stat
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  tags:
    - attacker
    - iso

- name: Display Kali ISO download message
  ansible.builtin.debug:
    msg:
      - "Kali ISO not found. You can:"
      - "  1. Download manually: {{ enclave_attacker.iso_url }}"
      - "  2. Upload to Proxmox: /var/lib/vz/template/iso/"
      - "  3. Use alternative: Deploy Kali in LXC with Docker"
      - ""
      - "For automated deployment, we'll create a Kali LXC container instead."
  when: not kali_iso_stat.stat.exists
  tags:
    - attacker
    - iso

# Alternative: Deploy Kali in LXC container (faster, less resource intensive)
- name: Create Kali LXC container (alternative to VM)
  community.general.proxmox:
    api_host: "{{ proxmox_config[enclave_proxmox_node].host }}"
    api_token_id: "{{ proxmox_config[enclave_proxmox_node].api_token_id }}"
    api_token_secret: "{{ proxmox_config[enclave_proxmox_node].api_token_secret }}"
    validate_certs: "{{ proxmox_config[enclave_proxmox_node].validate_certs }}"

    vmid: "{{ enclave_attacker.vm_id }}"
    node: "{{ proxmox_config[enclave_proxmox_node].node }}"
    hostname: "{{ enclave_attacker.hostname }}"
    ostemplate: "{{ enclave_lxc_template }}"

    cores: "{{ enclave_attacker.cores }}"
    memory: "{{ enclave_attacker.memory }}"
    disk: "{{ enclave_attacker.disk_size }}"
    swap: 2048

    # Dual-homed: management + isolated network
    netif: |
      {
        "net0": "name=eth0,bridge=vmbr0,ip={{ enclave_attacker.management_ip }}/24,gw={{ homelab_network.gateway_ip }}",
        "net1": "name=eth1,bridge={{ enclave_network.bridge_name }},ip={{ enclave_attacker.isolated_ip }}/24"
      }

    nameserver: "{{ homelab_network.dns_servers | join(' ') }}"
    searchdomain: "{{ homelab_domain }}"
    onboot: false  # Manual start for security
    unprivileged: false  # Need privileged for some pentesting tools

    features:
      - nesting=1
      - keyctl=1

    state: present
  delegate_to: localhost
  register: attacker_result
  tags:
    - attacker
    - lxc

- name: Start attacker container
  community.general.proxmox:
    api_host: "{{ proxmox_config[enclave_proxmox_node].host }}"
    api_token_id: "{{ proxmox_config[enclave_proxmox_node].api_token_id }}"
    api_token_secret: "{{ proxmox_config[enclave_proxmox_node].api_token_secret }}"
    validate_certs: "{{ proxmox_config[enclave_proxmox_node].validate_certs }}"

    vmid: "{{ enclave_attacker.vm_id }}"
    node: "{{ proxmox_config[enclave_proxmox_node].node }}"
    state: started
  delegate_to: localhost
  when: attacker_result is changed
  tags:
    - attacker

- name: Wait for attacker container to be reachable
  ansible.builtin.wait_for:
    host: "{{ enclave_attacker.management_ip }}"
    port: 22
    delay: 15
    timeout: 180
  when: attacker_result is changed
  tags:
    - attacker

- name: Add attacker to inventory
  ansible.builtin.add_host:
    name: "{{ enclave_attacker.hostname }}"
    ansible_host: "{{ enclave_attacker.management_ip }}"
    ansible_user: root
    groups:
      - enclave_attackers
  tags:
    - attacker
    - inventory

- name: Update system packages on attacker
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
  delegate_to: "{{ enclave_attacker.hostname }}"
  tags:
    - attacker
    - packages

- name: Install pentesting tools on attacker
  ansible.builtin.apt:
    name: "{{ enclave_pentesting_tools }}"
    state: present
  delegate_to: "{{ enclave_attacker.hostname }}"
  tags:
    - attacker
    - tools

- name: Install additional security tools via pip
  ansible.builtin.pip:
    name:
      - impacket
      - crackmapexec
      - bloodhound
      - mitm6
    state: present
  delegate_to: "{{ enclave_attacker.hostname }}"
  tags:
    - attacker
    - tools

- name: Clone useful pentesting repositories
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "/opt/{{ item.name }}"
    version: main
  loop:
    - name: SecLists
      repo: https://github.com/danielmiessler/SecLists
    - name: PayloadsAllTheThings
      repo: https://github.com/swisskyrepo/PayloadsAllTheThings
    - name: privilege-escalation-awesome-scripts-suite
      repo: https://github.com/carlospolop/PEASS-ng
  delegate_to: "{{ enclave_attacker.hostname }}"
  tags:
    - attacker
    - tools
    - wordlists

- name: Configure attacker environment
  ansible.builtin.copy:
    dest: /root/.bashrc
    content: |
      # Pentesting environment configuration
      export PS1='\[\033[01;31m\]\u@\h\[\033[00m\]:\[\033[01;34m\]\w\[\033[00m\]\$ '
      export PATH="$PATH:/opt/metasploit-framework/bin"

      # Useful aliases
      alias ll='ls -lah'
      alias nse='ls /usr/share/nmap/scripts/'
      alias www='python3 -m http.server 8000'
      alias shells='msfvenom -l payloads | grep shell'

      # Tool shortcuts
      alias msfconsole='msfconsole -q'
      alias sqlmap='sqlmap --batch'

      echo ""
      echo "=== Kali Attacker VM ==="
      echo "Management IP: {{ enclave_attacker.management_ip }}"
      echo "Isolated IP: {{ enclave_attacker.isolated_ip }}"
      echo "Target Network: {{ enclave_network.isolated_subnet }}"
      echo ""
      echo "Quick commands:"
      echo "  nmap -sn {{ enclave_network.isolated_subnet }}  # Discover targets"
      echo "  msfconsole                                       # Start Metasploit"
      echo "  burpsuite &                                      # Start Burp Suite"
      echo ""
    mode: '0644'
  delegate_to: "{{ enclave_attacker.hostname }}"
  tags:
    - attacker
    - configuration

- name: Create pentesting helper scripts
  ansible.builtin.copy:
    dest: "/usr/local/bin/{{ item.name }}"
    content: "{{ item.content }}"
    mode: '0755'
  loop:
    - name: scan-targets
      content: |
        #!/bin/bash
        # Quick network scan of vulnerable targets
        echo "Scanning enclave targets..."
        nmap -sV -sC -oN /tmp/scan-results.txt {{ enclave_network.isolated_subnet }}
        cat /tmp/scan-results.txt

    - name: setup-listener
      content: |
        #!/bin/bash
        # Setup reverse shell listener
        PORT=${1:-4444}
        echo "Setting up listener on port $PORT..."
        nc -lvnp $PORT
  delegate_to: "{{ enclave_attacker.hostname }}"
  tags:
    - attacker
    - scripts
