---
# Traffic Capture and Analysis Configuration
# Enables packet capture for learning, forensics, and attack analysis

- name: Install traffic capture tools
  ansible.builtin.apt:
    name:
      - tcpdump
      - tshark
      - wireshark-common
      - net-tools
      - iftop
      - nethogs
    state: present
    update_cache: true
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - traffic-capture
    - packages

- name: Create capture directory
  ansible.builtin.file:
    path: "{{ enclave_traffic_capture.capture_dir }}"
    state: directory
    mode: '0750'
    owner: root
    group: root
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - traffic-capture
    - setup

- name: Create traffic capture script
  ansible.builtin.copy:
    dest: "{{ enclave_paths.bin }}/enclave-capture"
    content: |
      #!/bin/bash
      # Enclave Traffic Capture Script
      # Captures network traffic on the isolated enclave network

      set -euo pipefail

      # Configuration
      CAPTURE_DIR="{{ enclave_traffic_capture.capture_dir }}"
      INTERFACE="{{ enclave_traffic_capture.interface }}"
      MAX_FILE_SIZE="{{ enclave_traffic_capture.max_file_size_mb }}"
      ROTATION_COUNT="{{ enclave_traffic_capture.file_rotation_count }}"
      CAPTURE_FILTER="{{ enclave_traffic_capture.capture_filter }}"

      # Generate timestamp for filename
      TIMESTAMP=$(date +%Y%m%d_%H%M%S)
      CAPTURE_FILE="${CAPTURE_DIR}/enclave_capture_${TIMESTAMP}.pcap"

      # Ensure capture directory exists
      mkdir -p "$CAPTURE_DIR"

      usage() {
        echo "Usage: $0 [start|stop|status|rotate|live]"
        echo ""
        echo "Commands:"
        echo "  start   - Start background packet capture"
        echo "  stop    - Stop background packet capture"
        echo "  status  - Show capture status"
        echo "  rotate  - Rotate capture files"
        echo "  live    - Start live capture (foreground, Ctrl+C to stop)"
        echo "  analyze - Analyze recent captures"
        echo ""
        echo "Capture files are stored in: $CAPTURE_DIR"
      }

      start_capture() {
        if pgrep -f "tcpdump.*${INTERFACE}.*enclave" > /dev/null; then
          echo "Capture already running. Use 'stop' first."
          exit 1
        fi

        echo "Starting background capture on $INTERFACE..."
        echo "Filter: $CAPTURE_FILTER"
        echo "Output: $CAPTURE_FILE"

        nohup tcpdump -i "$INTERFACE" \
          -w "$CAPTURE_FILE" \
          -C "$MAX_FILE_SIZE" \
          -W "$ROTATION_COUNT" \
          "$CAPTURE_FILTER" \
          > /var/log/enclave-capture.log 2>&1 &

        echo $! > /var/run/enclave-capture.pid
        echo "Capture started with PID $(cat /var/run/enclave-capture.pid)"
      }

      stop_capture() {
        if [ -f /var/run/enclave-capture.pid ]; then
          PID=$(cat /var/run/enclave-capture.pid)
          if kill -0 "$PID" 2>/dev/null; then
            echo "Stopping capture (PID: $PID)..."
            kill "$PID"
            rm -f /var/run/enclave-capture.pid
            echo "Capture stopped."
          else
            echo "Capture process not found."
            rm -f /var/run/enclave-capture.pid
          fi
        else
          # Try to find and kill any running captures
          pkill -f "tcpdump.*${INTERFACE}.*enclave" || true
          echo "Capture stopped."
        fi
      }

      show_status() {
        echo "=== Enclave Traffic Capture Status ==="
        echo ""

        if [ -f /var/run/enclave-capture.pid ] && kill -0 "$(cat /var/run/enclave-capture.pid)" 2>/dev/null; then
          echo "Status: RUNNING (PID: $(cat /var/run/enclave-capture.pid))"
        else
          echo "Status: STOPPED"
        fi

        echo ""
        echo "Capture Files:"
        if ls -la "$CAPTURE_DIR"/*.pcap 2>/dev/null; then
          echo ""
          echo "Total size: $(du -sh "$CAPTURE_DIR" | cut -f1)"
        else
          echo "  No capture files found."
        fi
      }

      rotate_captures() {
        echo "Rotating capture files..."
        # Keep only the most recent files based on rotation count
        cd "$CAPTURE_DIR"
        ls -t *.pcap 2>/dev/null | tail -n +$((ROTATION_COUNT + 1)) | xargs -r rm -f
        echo "Rotation complete. Remaining files:"
        ls -la "$CAPTURE_DIR"/*.pcap 2>/dev/null || echo "  None"
      }

      live_capture() {
        echo "Starting live capture on $INTERFACE..."
        echo "Filter: $CAPTURE_FILTER"
        echo "Press Ctrl+C to stop"
        echo ""
        tcpdump -i "$INTERFACE" -n -v "$CAPTURE_FILTER"
      }

      analyze_captures() {
        echo "=== Recent Capture Analysis ==="
        echo ""

        LATEST_CAPTURE=$(ls -t "$CAPTURE_DIR"/*.pcap 2>/dev/null | head -1)
        if [ -z "$LATEST_CAPTURE" ]; then
          echo "No capture files found."
          exit 0
        fi

        echo "Analyzing: $LATEST_CAPTURE"
        echo ""

        echo "Top 10 Source IPs:"
        tshark -r "$LATEST_CAPTURE" -T fields -e ip.src 2>/dev/null | sort | uniq -c | sort -rn | head -10
        echo ""

        echo "Top 10 Destination IPs:"
        tshark -r "$LATEST_CAPTURE" -T fields -e ip.dst 2>/dev/null | sort | uniq -c | sort -rn | head -10
        echo ""

        echo "Protocol Distribution:"
        tshark -r "$LATEST_CAPTURE" -T fields -e _ws.col.Protocol 2>/dev/null | sort | uniq -c | sort -rn | head -10
        echo ""

        echo "Top 10 Destination Ports:"
        tshark -r "$LATEST_CAPTURE" -T fields -e tcp.dstport -e udp.dstport 2>/dev/null | tr '\t' '\n' | grep -v '^$' | sort | uniq -c | sort -rn | head -10
      }

      case "${1:-}" in
        start)
          start_capture
          ;;
        stop)
          stop_capture
          ;;
        status)
          show_status
          ;;
        rotate)
          rotate_captures
          ;;
        live)
          live_capture
          ;;
        analyze)
          analyze_captures
          ;;
        *)
          usage
          ;;
      esac
    mode: '0755'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - traffic-capture
    - scripts

- name: Create capture cleanup cron job
  ansible.builtin.cron:
    name: "Enclave capture cleanup"
    minute: "0"
    hour: "4"
    job: >
      find {{ enclave_traffic_capture.capture_dir }} -name '*.pcap' -mtime +{{ enclave_traffic_capture.retention_days }} -delete
      >> /var/log/enclave-capture-cleanup.log 2>&1
    user: root
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - traffic-capture
    - cron

- name: Create systemd service for auto-start capture
  ansible.builtin.copy:
    dest: /etc/systemd/system/enclave-capture.service
    content: |
      [Unit]
      Description=Enclave Traffic Capture Service
      After=network.target

      [Service]
      Type=forking
      ExecStart={{ enclave_paths.bin }}/enclave-capture start
      ExecStop={{ enclave_paths.bin }}/enclave-capture stop
      PIDFile=/var/run/enclave-capture.pid
      Restart=on-failure
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  delegate_to: "{{ enclave_bastion.hostname }}"
  when: enclave_traffic_capture.auto_start | default(false)
  tags:
    - traffic-capture
    - systemd

- name: Enable capture service if auto-start is configured
  ansible.builtin.systemd:
    name: enclave-capture
    enabled: true
    daemon_reload: true
  delegate_to: "{{ enclave_bastion.hostname }}"
  when: enclave_traffic_capture.auto_start | default(false)
  tags:
    - traffic-capture
    - systemd

- name: Create quick analysis script for common attacks
  ansible.builtin.copy:
    dest: "{{ enclave_paths.bin }}/enclave-attack-analysis"
    content: |
      #!/bin/bash
      # Quick attack pattern analysis for enclave captures

      CAPTURE_DIR="{{ enclave_traffic_capture.capture_dir }}"
      LATEST_CAPTURE=$(ls -t "$CAPTURE_DIR"/*.pcap 2>/dev/null | head -1)

      if [ -z "$LATEST_CAPTURE" ]; then
        echo "No capture files found in $CAPTURE_DIR"
        exit 1
      fi

      echo "╔══════════════════════════════════════════════════════════════╗"
      echo "║            ENCLAVE ATTACK PATTERN ANALYSIS                   ║"
      echo "╚══════════════════════════════════════════════════════════════╝"
      echo ""
      echo "Analyzing: $LATEST_CAPTURE"
      echo ""

      echo "=== Port Scan Detection ==="
      echo "Looking for hosts with many SYN packets to different ports..."
      tshark -r "$LATEST_CAPTURE" -Y "tcp.flags.syn == 1 and tcp.flags.ack == 0" \
        -T fields -e ip.src -e tcp.dstport 2>/dev/null | \
        awk '{ports[$1]++} END {for (ip in ports) if (ports[ip] > 50) print ip ": " ports[ip] " unique ports"}' | sort -t: -k2 -rn | head -5
      echo ""

      echo "=== SQL Injection Attempts ==="
      echo "Looking for common SQLi patterns in HTTP..."
      tshark -r "$LATEST_CAPTURE" -Y "http" -T fields -e http.request.uri 2>/dev/null | \
        grep -iE "(union|select|insert|delete|drop|update|exec|execute|xp_|0x|char\(|concat|load_file|into\s+outfile)" | head -10
      echo ""

      echo "=== XSS Attempts ==="
      echo "Looking for script injection patterns..."
      tshark -r "$LATEST_CAPTURE" -Y "http" -T fields -e http.request.uri 2>/dev/null | \
        grep -iE "(<script|javascript:|onerror=|onload=|onclick=|alert\(|document\.)" | head -10
      echo ""

      echo "=== Brute Force Detection ==="
      echo "Looking for rapid authentication attempts..."
      tshark -r "$LATEST_CAPTURE" -Y "tcp.dstport == 22 or tcp.dstport == 21 or tcp.dstport == 3389" \
        -T fields -e ip.src 2>/dev/null | sort | uniq -c | sort -rn | head -5
      echo ""

      echo "=== Suspicious HTTP Methods ==="
      tshark -r "$LATEST_CAPTURE" -Y "http.request.method" -T fields -e ip.src -e http.request.method 2>/dev/null | \
        grep -vE "^(GET|POST|HEAD)" | sort | uniq -c | sort -rn | head -5
      echo ""

      echo "=== Command Injection Patterns ==="
      tshark -r "$LATEST_CAPTURE" -Y "http" -T fields -e http.request.uri 2>/dev/null | \
        grep -iE "(\||;|&&|\$\(|`|%0a|%0d|\n|\r)" | head -10
      echo ""

      echo "Analysis complete."
    mode: '0755'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - traffic-capture
    - scripts

- name: Display traffic capture information
  ansible.builtin.debug:
    msg:
      - "Traffic capture configured on {{ enclave_bastion.hostname }}"
      - ""
      - "Commands available:"
      - "  enclave-capture start   - Start background capture"
      - "  enclave-capture stop    - Stop capture"
      - "  enclave-capture status  - Show status"
      - "  enclave-capture live    - Live capture (foreground)"
      - "  enclave-capture analyze - Analyze recent captures"
      - ""
      - "  enclave-attack-analysis - Analyze for common attack patterns"
      - ""
      - "Capture directory: {{ enclave_traffic_capture.capture_dir }}"
  tags:
    - traffic-capture
    - info
