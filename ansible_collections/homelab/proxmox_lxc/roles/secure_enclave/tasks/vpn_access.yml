---
# WireGuard VPN Access for Secure Enclave
# Enables secure remote access to the pentesting environment

- name: Install WireGuard packages
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
      - qrencode
    state: present
    update_cache: true
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - vpn
    - packages

- name: Create WireGuard configuration directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0700'
    owner: root
    group: root
  loop:
    - /etc/wireguard
    - "{{ enclave_vpn.client_config_dir }}"
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - vpn
    - setup

- name: Generate WireGuard server private key
  ansible.builtin.shell: |
    if [ ! -f /etc/wireguard/server_private.key ]; then
      wg genkey > /etc/wireguard/server_private.key
      chmod 600 /etc/wireguard/server_private.key
    fi
    cat /etc/wireguard/server_private.key
  args:
    executable: /bin/bash
  register: server_private_key
  changed_when: false
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - vpn
    - keys

- name: Generate WireGuard server public key
  ansible.builtin.shell: |
    set -o pipefail
    cat /etc/wireguard/server_private.key | wg pubkey
  args:
    executable: /bin/bash
  register: server_public_key
  changed_when: false
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - vpn
    - keys

- name: Create WireGuard server configuration
  ansible.builtin.copy:
    dest: /etc/wireguard/wg-enclave.conf
    content: |
      # WireGuard Server Configuration for Secure Enclave
      # Auto-generated by Ansible

      [Interface]
      # Server private key (keep secret!)
      PrivateKey = {{ server_private_key.stdout }}
      Address = {{ enclave_vpn.wireguard.server_ip }}/24
      ListenPort = {{ enclave_vpn.wireguard.listen_port }}

      # Enable IP forwarding
      PostUp = sysctl -w net.ipv4.ip_forward=1
      PostUp = iptables -A FORWARD -i %i -j ACCEPT
      PostUp = iptables -A FORWARD -o %i -j ACCEPT
      PostUp = iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE

      PostDown = iptables -D FORWARD -i %i -j ACCEPT
      PostDown = iptables -D FORWARD -o %i -j ACCEPT
      PostDown = iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

      # Save rules for persistence
      PostUp = echo "$(date) - WireGuard VPN started" >> /var/log/enclave-vpn.log
      PostDown = echo "$(date) - WireGuard VPN stopped" >> /var/log/enclave-vpn.log

      # Client peers will be added below by the client management script
      # DO NOT EDIT MANUALLY - Use enclave-vpn-client to manage clients
    mode: '0600'
  delegate_to: "{{ enclave_bastion.hostname }}"
  notify: restart wireguard enclave
  tags:
    - vpn
    - configuration

- name: Create VPN client management script
  ansible.builtin.copy:
    dest: "{{ enclave_paths.bin }}/enclave-vpn-client"
    content: |
      #!/bin/bash
      # Enclave VPN Client Management Script

      set -euo pipefail

      WG_CONFIG="/etc/wireguard/wg-enclave.conf"
      CLIENT_DIR="{{ enclave_vpn.client_config_dir }}"
      SERVER_PUBLIC_KEY="{{ server_public_key.stdout }}"
      SERVER_ENDPOINT="{{ enclave_bastion.ip_address }}:{{ enclave_vpn.wireguard.listen_port }}"
      VPN_SUBNET="{{ enclave_vpn.wireguard.vpn_subnet }}"
      DNS_SERVERS="{{ enclave_vpn.wireguard.dns_servers | join(', ') }}"
      ALLOWED_IPS="{{ enclave_vpn.wireguard.allowed_ips | join(', ') }}"
      MAX_CLIENTS="{{ enclave_vpn.wireguard.max_clients }}"

      usage() {
        echo "Enclave VPN Client Management"
        echo ""
        echo "Usage: $0 <command> [options]"
        echo ""
        echo "Commands:"
        echo "  add <name>     - Add a new VPN client"
        echo "  remove <name>  - Remove a VPN client"
        echo "  list           - List all clients"
        echo "  show <name>    - Show client configuration"
        echo "  qr <name>      - Display QR code for mobile client"
        echo "  status         - Show VPN status"
        echo ""
        echo "Examples:"
        echo "  $0 add my-laptop"
        echo "  $0 qr my-phone"
        echo "  $0 remove old-device"
      }

      get_next_ip() {
        # Find next available IP in VPN subnet
        local base_ip=$(echo "$VPN_SUBNET" | cut -d'/' -f1 | cut -d'.' -f1-3)
        local used_ips=$(grep -oP 'AllowedIPs = \K[0-9.]+' "$WG_CONFIG" 2>/dev/null | cut -d'.' -f4 | sort -n)

        for i in $(seq 2 254); do
          if ! echo "$used_ips" | grep -q "^$i$"; then
            echo "${base_ip}.${i}"
            return
          fi
        done

        echo "ERROR: No available IPs in VPN subnet" >&2
        exit 1
      }

      count_clients() {
        grep -c '^\[Peer\]' "$WG_CONFIG" 2>/dev/null || echo 0
      }

      add_client() {
        local name="$1"
        local client_dir="$CLIENT_DIR/$name"

        # Check if max clients reached
        local current_count=$(count_clients)
        if [ "$current_count" -ge "$MAX_CLIENTS" ]; then
          echo "ERROR: Maximum number of clients ($MAX_CLIENTS) reached."
          exit 1
        fi

        # Check if client already exists
        if [ -d "$client_dir" ]; then
          echo "ERROR: Client '$name' already exists."
          exit 1
        fi

        echo "Creating VPN client: $name"

        # Create client directory
        mkdir -p "$client_dir"

        # Generate client keys
        wg genkey > "$client_dir/private.key"
        chmod 600 "$client_dir/private.key"
        cat "$client_dir/private.key" | wg pubkey > "$client_dir/public.key"

        local client_private_key=$(cat "$client_dir/private.key")
        local client_public_key=$(cat "$client_dir/public.key")
        local client_ip=$(get_next_ip)

        # Create client configuration
        cat > "$client_dir/wg-enclave.conf" << EOF
      # WireGuard Client Configuration for Secure Enclave
      # Client: $name
      # Generated: $(date -Iseconds)

      [Interface]
      PrivateKey = $client_private_key
      Address = $client_ip/24
      DNS = $DNS_SERVERS

      [Peer]
      PublicKey = $SERVER_PUBLIC_KEY
      Endpoint = $SERVER_ENDPOINT
      AllowedIPs = $ALLOWED_IPS
      PersistentKeepalive = {{ enclave_vpn.wireguard.persistent_keepalive }}
      EOF

        chmod 600 "$client_dir/wg-enclave.conf"

        # Add peer to server configuration
        cat >> "$WG_CONFIG" << EOF

      # Client: $name
      # Added: $(date -Iseconds)
      [Peer]
      PublicKey = $client_public_key
      AllowedIPs = $client_ip/32
      EOF

        # Reload WireGuard
        if systemctl is-active --quiet wg-quick@wg-enclave; then
          wg syncconf wg-enclave <(wg-quick strip wg-enclave)
        fi

        echo ""
        echo "Client '$name' created successfully!"
        echo "Client IP: $client_ip"
        echo ""
        echo "Configuration file: $client_dir/wg-enclave.conf"
        echo ""
        echo "To get the configuration:"
        echo "  $0 show $name"
        echo ""
        echo "For mobile devices, display QR code:"
        echo "  $0 qr $name"
      }

      remove_client() {
        local name="$1"
        local client_dir="$CLIENT_DIR/$name"

        if [ ! -d "$client_dir" ]; then
          echo "ERROR: Client '$name' not found."
          exit 1
        fi

        local client_public_key=$(cat "$client_dir/public.key")

        echo "Removing VPN client: $name"

        # Remove from server config
        # Find the peer block and remove it
        awk -v key="$client_public_key" '
          /^# Client:/ { block=""; next_is_peer=1 }
          next_is_peer && /^\[Peer\]/ { in_peer=1; next_is_peer=0 }
          in_peer && /^PublicKey = / && $0 ~ key { skip_block=1 }
          in_peer && /^$/ { in_peer=0; if(skip_block) { skip_block=0; next } }
          !skip_block { print }
        ' "$WG_CONFIG" > "$WG_CONFIG.tmp"
        mv "$WG_CONFIG.tmp" "$WG_CONFIG"

        # Remove client directory
        rm -rf "$client_dir"

        # Reload WireGuard
        if systemctl is-active --quiet wg-quick@wg-enclave; then
          wg syncconf wg-enclave <(wg-quick strip wg-enclave)
        fi

        echo "Client '$name' removed."
      }

      list_clients() {
        echo "╔══════════════════════════════════════════════════════════════╗"
        echo "║                    VPN CLIENTS                               ║"
        echo "╚══════════════════════════════════════════════════════════════╝"
        echo ""

        if [ -d "$CLIENT_DIR" ]; then
          for client in "$CLIENT_DIR"/*/; do
            if [ -d "$client" ]; then
              local name=$(basename "$client")
              local ip=$(grep "Address" "$client/wg-enclave.conf" 2>/dev/null | cut -d'=' -f2 | tr -d ' ')
              echo "  $name: $ip"
            fi
          done
        else
          echo "  No clients configured."
        fi

        echo ""
        echo "Total: $(count_clients) / $MAX_CLIENTS"
      }

      show_client() {
        local name="$1"
        local client_dir="$CLIENT_DIR/$name"

        if [ ! -d "$client_dir" ]; then
          echo "ERROR: Client '$name' not found."
          exit 1
        fi

        echo "╔══════════════════════════════════════════════════════════════╗"
        echo "║              CLIENT CONFIGURATION: $name"
        echo "╚══════════════════════════════════════════════════════════════╝"
        echo ""
        cat "$client_dir/wg-enclave.conf"
        echo ""
      }

      show_qr() {
        local name="$1"
        local client_dir="$CLIENT_DIR/$name"

        if [ ! -d "$client_dir" ]; then
          echo "ERROR: Client '$name' not found."
          exit 1
        fi

        echo "╔══════════════════════════════════════════════════════════════╗"
        echo "║              QR CODE FOR: $name"
        echo "╚══════════════════════════════════════════════════════════════╝"
        echo ""
        qrencode -t ansiutf8 < "$client_dir/wg-enclave.conf"
        echo ""
        echo "Scan this QR code with the WireGuard mobile app."
      }

      show_status() {
        echo "╔══════════════════════════════════════════════════════════════╗"
        echo "║                    VPN STATUS                                ║"
        echo "╚══════════════════════════════════════════════════════════════╝"
        echo ""

        if systemctl is-active --quiet wg-quick@wg-enclave; then
          echo "Service: RUNNING"
          echo ""
          wg show wg-enclave
        else
          echo "Service: STOPPED"
          echo ""
          echo "Start with: systemctl start wg-quick@wg-enclave"
        fi
      }

      case "${1:-}" in
        add)
          [ -z "${2:-}" ] && { echo "ERROR: Client name required"; usage; exit 1; }
          add_client "$2"
          ;;
        remove)
          [ -z "${2:-}" ] && { echo "ERROR: Client name required"; usage; exit 1; }
          remove_client "$2"
          ;;
        list)
          list_clients
          ;;
        show)
          [ -z "${2:-}" ] && { echo "ERROR: Client name required"; usage; exit 1; }
          show_client "$2"
          ;;
        qr)
          [ -z "${2:-}" ] && { echo "ERROR: Client name required"; usage; exit 1; }
          show_qr "$2"
          ;;
        status)
          show_status
          ;;
        *)
          usage
          ;;
      esac
    mode: '0755'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - vpn
    - scripts

- name: Configure firewall for WireGuard
  ansible.builtin.iptables:
    chain: INPUT
    protocol: udp
    destination_port: "{{ enclave_vpn.wireguard.listen_port }}"
    jump: ACCEPT
    comment: "Allow WireGuard VPN for enclave"
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - vpn
    - firewall

- name: Enable and start WireGuard service
  ansible.builtin.systemd:
    name: wg-quick@wg-enclave
    state: started
    enabled: true
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - vpn
    - service

- name: Display VPN access information
  ansible.builtin.debug:
    msg:
      - "WireGuard VPN configured on {{ enclave_bastion.hostname }}"
      - ""
      - "Server endpoint: {{ enclave_bastion.ip_address }}:{{ enclave_vpn.wireguard.listen_port }}"
      - "VPN subnet: {{ enclave_vpn.wireguard.vpn_subnet }}"
      - ""
      - "Client management commands:"
      - "  enclave-vpn-client add <name>    - Add new client"
      - "  enclave-vpn-client list          - List all clients"
      - "  enclave-vpn-client qr <name>     - Show QR code for mobile"
      - "  enclave-vpn-client status        - Show VPN status"
      - ""
      - "After adding a client, copy the configuration or scan the QR code"
      - "with the WireGuard app on your device."
  tags:
    - vpn
    - info
