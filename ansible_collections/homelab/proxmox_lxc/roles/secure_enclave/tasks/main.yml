---
# Secure Enclave Deployment Tasks
# Creates an isolated pentesting environment with network segmentation

- name: Display enclave deployment banner
  ansible.builtin.debug:
    msg: "{{ enclave_usage_banner.split('\n') }}"
  tags:
    - always

- name: Validate security risks acknowledgement
  ansible.builtin.assert:
    that:
      - enclave_security_acknowledged | default(false) | bool
    fail_msg: |
      ╔══════════════════════════════════════════════════════════════════════════╗
      ║                    SECURITY ACKNOWLEDGEMENT REQUIRED                     ║
      ╠══════════════════════════════════════════════════════════════════════════╣
      ║ The Secure Enclave deploys components with elevated privileges.          ║
      ║ Before proceeding, you must acknowledge the security risks by setting:   ║
      ║                                                                          ║
      ║   enclave_security_acknowledged: true                                    ║
      ║                                                                          ║
      ║ This can be set via:                                                     ║
      ║   - Extra vars: -e enclave_security_acknowledged=true                    ║
      ║   - Inventory: group_vars/all.yml                                        ║
      ║   - Host vars: host_vars/proxmox.yml                                     ║
      ║                                                                          ║
      ║ Please review the security notice in defaults/main.yml before deploying.║
      ╚══════════════════════════════════════════════════════════════════════════╝
    success_msg: "Security risks acknowledged - proceeding with enclave deployment"
  tags:
    - always
    - security
    - validation

- name: Validate Proxmox API connectivity
  ansible.builtin.include_tasks:
    file: "{{ lookup('ansible.builtin.first_found', params) }}"
  vars:
    params:
      files:
        - proxmox_api_validation.yml
      paths:
        - "{{ role_path }}/../../common/tasks"
  tags:
    - validation
    - proxmox

- name: Validate resource allocation
  ansible.builtin.include_tasks: resource_validation.yml
  tags:
    - validation
    - resources

- name: Include network isolation setup tasks
  ansible.builtin.include_tasks: network_isolation.yml
  tags:
    - network
    - isolation

- name: Include bastion host deployment tasks
  ansible.builtin.include_tasks: bastion.yml
  tags:
    - bastion
    - infrastructure

- name: Include router/firewall deployment tasks
  ansible.builtin.include_tasks: router.yml
  tags:
    - router
    - firewall

- name: Include attacker VM deployment tasks
  ansible.builtin.include_tasks: attacker_vm.yml
  tags:
    - attacker
    - kali

- name: Include vulnerable VMs deployment tasks
  ansible.builtin.include_tasks: vulnerable_vms.yml
  tags:
    - vulnerable
    - targets

- name: Include monitoring and audit setup tasks
  ansible.builtin.include_tasks: monitoring.yml
  when: enclave_monitoring.enabled | default(true)
  tags:
    - monitoring
    - audit

- name: Include auto-shutdown configuration tasks
  ansible.builtin.include_tasks: auto_shutdown.yml
  when: enclave_auto_shutdown.enabled | default(true)
  tags:
    - safety
    - auto-shutdown

- name: Include credential management tasks
  ansible.builtin.include_tasks: credential_management.yml
  tags:
    - credentials
    - management

- name: Include traffic capture configuration tasks
  ansible.builtin.include_tasks: traffic_capture.yml
  when: enclave_traffic_capture.enabled | default(false)
  tags:
    - traffic-capture
    - forensics

- name: Include CTF challenge mode tasks
  ansible.builtin.include_tasks: ctf_mode.yml
  when: enclave_ctf_mode.enabled | default(false)
  tags:
    - ctf
    - challenges

- name: Include WireGuard VPN access tasks
  ansible.builtin.include_tasks: vpn_access.yml
  when: enclave_vpn.enabled | default(false)
  tags:
    - vpn
    - wireguard

- name: Include dashboard deployment tasks
  ansible.builtin.include_tasks: dashboard.yml
  when: enclave_dashboard.enabled | default(false)
  tags:
    - dashboard
    - web

- name: Display enclave access information
  ansible.builtin.debug:
    msg:
      - "Secure Enclave deployment completed successfully!"
      - ""
      - "Access Information:"
      - "  Bastion Host: ssh pbs@{{ enclave_bastion.ip_address }}"
      - "  Attacker VM: {{ enclave_attacker.isolated_ip }} (from bastion)"
      - "  Vulnerable Targets:"
      - "{% for vm in enclave_vulnerable_vms %}    - {{ vm.hostname }}: {{ vm.ip_address }} - {{ vm.description }}\n{% endfor %}"
      - ""
      - "Network Isolation:"
      - "  Management Network: {{ enclave_network.management_subnet }}"
      - "  Isolated Network: {{ enclave_network.isolated_subnet }}"
      - "  Firewall: All traffic to production networks is blocked"
      - ""
      - "Safety Features:"
      - "  - Auto-shutdown after {{ enclave_auto_shutdown.idle_timeout_hours }}h idle"
      - "  - Audit logging enabled: {{ enclave_monitoring.audit_log_path }}"
      - "  - Network traffic monitoring enabled"
  tags:
    - always
