---
# CTF Challenge Mode Configuration
# Enables capture-the-flag style challenges with flags, scoring, and hints

- name: Create CTF directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0750'
    owner: root
    group: root
  loop:
    - /opt/ctf
    - /opt/ctf/flags
    - /opt/ctf/challenges
    - /opt/ctf/scoreboard
    - /opt/ctf/hints
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - ctf
    - setup

- name: Generate CTF flags for each difficulty level
  ansible.builtin.copy:
    dest: "/opt/ctf/flags/{{ item.key }}.flag"
    content: |
      {{ enclave_ctf_mode.default_flags[item.key] }}
    mode: '0600'
  loop: "{{ enclave_ctf_mode.default_flags | dict2items }}"
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - ctf
    - flags

- name: Create challenge definition file
  ansible.builtin.copy:
    dest: /opt/ctf/challenges/challenges.yml
    content: |
      ---
      # CTF Challenge Definitions
      # Auto-generated based on deployed vulnerable targets

      challenges:
      {% for target_name in enclave_enabled_targets %}
      {% set target = enclave_vulnerable_vms_catalog[target_name] %}
        - name: "{{ target_name | title }} - Initial Access"
          category: web
          difficulty: easy
          points: 100
          target: "{{ target.hostname }}"
          target_ip: "{{ target.ip_address }}"
          description: "Find a way to access the {{ target.description }}"
          flag: "{{ enclave_ctf_mode.flag_format | replace('%s', target_name + '_access') }}"
          hints:
            - "Check the application documentation for default credentials"
            - "Try common username/password combinations"
          enabled: true

        - name: "{{ target_name | title }} - SQL Injection"
          category: web
          difficulty: medium
          points: 200
          target: "{{ target.hostname }}"
          target_ip: "{{ target.ip_address }}"
          description: "Extract sensitive data using SQL injection"
          flag: "{{ enclave_ctf_mode.flag_format | replace('%s', target_name + '_sqli') }}"
          hints:
            - "Look for user input that interacts with a database"
            - "Try single quotes to test for injection points"
          enabled: {{ 'SQL Injection' in (target.vulnerabilities | default([])) | lower }}

        - name: "{{ target_name | title }} - XSS Attack"
          category: web
          difficulty: medium
          points: 200
          target: "{{ target.hostname }}"
          target_ip: "{{ target.ip_address }}"
          description: "Execute a successful XSS attack"
          flag: "{{ enclave_ctf_mode.flag_format | replace('%s', target_name + '_xss') }}"
          hints:
            - "Find input fields that reflect user data"
            - "Try basic script tags first"
          enabled: {{ ('XSS' in (target.vulnerabilities | default([]) | join(' '))) | lower }}

      {% endfor %}
      # Add custom challenges below
      custom_challenges: []
    mode: '0640'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - ctf
    - challenges

- name: Create flag submission script
  ansible.builtin.copy:
    dest: "{{ enclave_paths.bin }}/ctf-submit"
    content: |
      #!/bin/bash
      # CTF Flag Submission Script

      set -euo pipefail

      SCOREBOARD_FILE="/opt/ctf/scoreboard/scores.json"
      SUBMISSION_LOG="/opt/ctf/scoreboard/submissions.log"
      CHALLENGES_FILE="/opt/ctf/challenges/challenges.yml"

      # Initialize scoreboard if not exists
      if [ ! -f "$SCOREBOARD_FILE" ]; then
        echo '{"players": {}, "submissions": []}' > "$SCOREBOARD_FILE"
      fi

      usage() {
        echo "Usage: ctf-submit <player_name> <flag>"
        echo ""
        echo "Submit a flag for scoring."
        echo ""
        echo "Example:"
        echo "  ctf-submit hacker1 'FLAG{found_the_secret}'"
      }

      if [ $# -lt 2 ]; then
        usage
        exit 1
      fi

      PLAYER="$1"
      FLAG="$2"
      TIMESTAMP=$(date -Iseconds)

      # Validate flag format
      if [[ ! "$FLAG" =~ ^FLAG\{.*\}$ ]]; then
        echo "Invalid flag format. Flags should match: FLAG{...}"
        exit 1
      fi

      # Log submission
      echo "$TIMESTAMP | $PLAYER | $FLAG" >> "$SUBMISSION_LOG"

      # Check if flag is valid (simple file-based check)
      FOUND=false
      POINTS=0
      CHALLENGE_NAME=""

      for flag_file in /opt/ctf/flags/*.flag; do
        if [ -f "$flag_file" ]; then
          STORED_FLAG=$(cat "$flag_file" | tr -d '\n')
          if [ "$FLAG" = "$STORED_FLAG" ]; then
            FOUND=true
            # Extract points from filename or default to 100
            CHALLENGE_NAME=$(basename "$flag_file" .flag)
            POINTS=100
            break
          fi
        fi
      done

      # Also check challenge definitions for inline flags
      if [ "$FOUND" = "false" ] && command -v python3 &> /dev/null; then
        FOUND=$(python3 -c "
      import yaml
      import sys
      with open('$CHALLENGES_FILE', 'r') as f:
        data = yaml.safe_load(f)
      for c in data.get('challenges', []):
        if c.get('flag') == '$FLAG':
          print('true')
          print(c.get('points', 100))
          print(c.get('name', 'Unknown'))
          sys.exit(0)
      print('false')
      print(0)
      print('')
      " 2>/dev/null | head -1 || echo "false")

        if [ "$FOUND" = "true" ]; then
          POINTS=$(python3 -c "
      import yaml
      with open('$CHALLENGES_FILE', 'r') as f:
        data = yaml.safe_load(f)
      for c in data.get('challenges', []):
        if c.get('flag') == '$FLAG':
          print(c.get('points', 100))
          break
      " 2>/dev/null || echo "100")
          CHALLENGE_NAME=$(python3 -c "
      import yaml
      with open('$CHALLENGES_FILE', 'r') as f:
        data = yaml.safe_load(f)
      for c in data.get('challenges', []):
        if c.get('flag') == '$FLAG':
          print(c.get('name', 'Unknown'))
          break
      " 2>/dev/null || echo "Unknown")
        fi
      fi

      if [ "$FOUND" = "true" ]; then
        echo ""
        echo "╔══════════════════════════════════════════════════════════════╗"
        echo "║                    FLAG ACCEPTED!                            ║"
        echo "╚══════════════════════════════════════════════════════════════╝"
        echo ""
        echo "Player: $PLAYER"
        echo "Challenge: $CHALLENGE_NAME"
        echo "Points: +$POINTS"
        echo ""

        # Update scoreboard
        if command -v jq &> /dev/null; then
          jq --arg player "$PLAYER" \
             --arg flag "$FLAG" \
             --arg challenge "$CHALLENGE_NAME" \
             --arg timestamp "$TIMESTAMP" \
             --argjson points "$POINTS" \
             '.players[$player] = ((.players[$player] // 0) + $points) |
              .submissions += [{"player": $player, "flag": $flag, "challenge": $challenge, "points": $points, "timestamp": $timestamp}]' \
             "$SCOREBOARD_FILE" > "$SCOREBOARD_FILE.tmp" && \
          mv "$SCOREBOARD_FILE.tmp" "$SCOREBOARD_FILE"
        fi

        echo "Current scoreboard:"
        ctf-scoreboard
      else
        echo ""
        echo "╔══════════════════════════════════════════════════════════════╗"
        echo "║                    INCORRECT FLAG                            ║"
        echo "╚══════════════════════════════════════════════════════════════╝"
        echo ""
        echo "The flag you submitted is not valid."
        echo "Keep trying!"
      fi
    mode: '0755'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - ctf
    - scripts

- name: Create scoreboard display script
  ansible.builtin.copy:
    dest: "{{ enclave_paths.bin }}/ctf-scoreboard"
    content: |
      #!/bin/bash
      # CTF Scoreboard Display

      SCOREBOARD_FILE="/opt/ctf/scoreboard/scores.json"

      if [ ! -f "$SCOREBOARD_FILE" ]; then
        echo "No submissions yet."
        exit 0
      fi

      echo ""
      echo "╔══════════════════════════════════════════════════════════════╗"
      echo "║                    CTF SCOREBOARD                            ║"
      echo "╚══════════════════════════════════════════════════════════════╝"
      echo ""

      if command -v jq &> /dev/null; then
        echo "Rank | Player              | Points"
        echo "-----|---------------------|--------"
        jq -r '.players | to_entries | sort_by(-.value) | to_entries | .[] | "\(.key + 1)    | \(.value.key | .[0:19] | . + (" " * (19 - length))) | \(.value.value)"' \
          "$SCOREBOARD_FILE" 2>/dev/null || echo "No scores yet."
      else
        cat "$SCOREBOARD_FILE"
      fi

      echo ""
    mode: '0755'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - ctf
    - scripts

- name: Create challenge listing script
  ansible.builtin.copy:
    dest: "{{ enclave_paths.bin }}/ctf-challenges"
    content: |
      #!/bin/bash
      # List available CTF challenges

      CHALLENGES_FILE="/opt/ctf/challenges/challenges.yml"

      echo ""
      echo "╔══════════════════════════════════════════════════════════════╗"
      echo "║                 AVAILABLE CHALLENGES                         ║"
      echo "╚══════════════════════════════════════════════════════════════╝"
      echo ""

      if command -v python3 &> /dev/null && [ -f "$CHALLENGES_FILE" ]; then
        python3 << 'PYTHON_SCRIPT'
      import yaml

      with open('/opt/ctf/challenges/challenges.yml', 'r') as f:
        data = yaml.safe_load(f)

      for challenge in data.get('challenges', []):
        if challenge.get('enabled', True):
          print(f"[{challenge.get('difficulty', 'unknown').upper()}] {challenge.get('name', 'Unknown')}")
          print(f"  Category: {challenge.get('category', 'misc')}")
          print(f"  Points: {challenge.get('points', 0)}")
          print(f"  Target: {challenge.get('target_ip', 'N/A')}")
          print(f"  Description: {challenge.get('description', 'No description')}")
          print()
      PYTHON_SCRIPT
      else
        echo "Challenge file not found or Python not available."
        echo "Check: $CHALLENGES_FILE"
      fi
    mode: '0755'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - ctf
    - scripts

- name: Create hint system script
  ansible.builtin.copy:
    dest: "{{ enclave_paths.bin }}/ctf-hint"
    content: |
      #!/bin/bash
      # CTF Hint System

      CHALLENGES_FILE="/opt/ctf/challenges/challenges.yml"
      HINTS_DIR="/opt/ctf/hints"

      usage() {
        echo "Usage: ctf-hint <challenge_name> [hint_number]"
        echo ""
        echo "Get hints for a challenge. Each hint costs {{ enclave_ctf_mode.hint_penalty_percent }}% of the challenge points."
        echo ""
        echo "Example:"
        echo "  ctf-hint 'Dvwa - Initial Access'      # Get first hint"
        echo "  ctf-hint 'Dvwa - Initial Access' 2    # Get second hint"
      }

      if [ $# -lt 1 ]; then
        usage
        exit 1
      fi

      CHALLENGE_NAME="$1"
      HINT_NUM="${2:-1}"

      # Get hint from challenges file
      if command -v python3 &> /dev/null && [ -f "$CHALLENGES_FILE" ]; then
        python3 << PYTHON_SCRIPT
      import yaml
      import sys

      with open('$CHALLENGES_FILE', 'r') as f:
        data = yaml.safe_load(f)

      challenge_name = "$CHALLENGE_NAME".lower()
      hint_num = int("$HINT_NUM") - 1

      for challenge in data.get('challenges', []):
        if challenge.get('name', '').lower() == challenge_name:
          hints = challenge.get('hints', [])
          if hint_num < len(hints):
            print()
            print("╔══════════════════════════════════════════════════════════════╗")
            print("║                        HINT                                  ║")
            print("╚══════════════════════════════════════════════════════════════╝")
            print()
            print(f"Challenge: {challenge.get('name')}")
            print(f"Hint #{hint_num + 1}: {hints[hint_num]}")
            print()
            print("Note: Using hints reduces your score for this challenge.")
            sys.exit(0)
          else:
            print(f"No hint #{hint_num + 1} available for this challenge.")
            print(f"Available hints: {len(hints)}")
            sys.exit(1)

      print(f"Challenge not found: {challenge_name}")
      print("Use 'ctf-challenges' to list available challenges.")
      PYTHON_SCRIPT
      else
        echo "Hint system requires Python3 and challenge definitions."
      fi
    mode: '0755'
  delegate_to: "{{ enclave_bastion.hostname }}"
  when: enclave_ctf_mode.hints_enabled | default(true)
  tags:
    - ctf
    - scripts

- name: Deploy CTFd scoreboard container
  when: enclave_ctf_mode.scoreboard.use_ctfd | default(false)
  block:
    - name: Install Docker for CTFd
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
        state: present
      delegate_to: "{{ enclave_bastion.hostname }}"

    - name: Create CTFd docker-compose file
      ansible.builtin.copy:
        dest: /opt/ctf/scoreboard/docker-compose.yml
        content: |
          version: '3'
          services:
            ctfd:
              image: {{ enclave_ctf_mode.scoreboard.ctfd_image }}
              ports:
                - "{{ enclave_ctf_mode.scoreboard.port }}:8000"
              volumes:
                - ctfd_data:/var/lib/ctfd
              environment:
                - SECRET_KEY=changeme_{{ ansible_date_time.epoch }}
                - DATABASE_URL=sqlite:////var/lib/ctfd/ctfd.db
              restart: unless-stopped
          volumes:
            ctfd_data:
        mode: '0644'
      delegate_to: "{{ enclave_bastion.hostname }}"

    - name: Start CTFd container
      ansible.builtin.shell: |
        cd /opt/ctf/scoreboard && docker-compose up -d
      args:
        executable: /bin/bash
      delegate_to: "{{ enclave_bastion.hostname }}"
      changed_when: true
  tags:
    - ctf
    - ctfd
    - docker

- name: Display CTF mode information
  ansible.builtin.debug:
    msg:
      - "CTF Challenge Mode enabled on {{ enclave_bastion.hostname }}"
      - ""
      - "Commands available:"
      - "  ctf-challenges  - List available challenges"
      - "  ctf-submit      - Submit a flag"
      - "  ctf-scoreboard  - View the scoreboard"
      - "  ctf-hint        - Get hints (costs points)"
      - ""
      - "Flag format: {{ enclave_ctf_mode.flag_format }}"
  tags:
    - ctf
    - info
