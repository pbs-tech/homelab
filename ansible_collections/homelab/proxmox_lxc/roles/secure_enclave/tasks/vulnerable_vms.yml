---
# Vulnerable VMs Deployment
# Intentionally vulnerable targets for pentesting practice

- name: Deploy vulnerable VMs/containers
  ansible.builtin.include_tasks: deploy_vulnerable_target.yml
  loop: "{{ enclave_vulnerable_vms }}"
  loop_control:
    loop_var: target_vm
  tags:
    - vulnerable
    - targets

- name: Display deployed vulnerable targets
  ansible.builtin.debug:
    msg:
      - "Vulnerable targets deployed:"
      - "{% for vm in enclave_vulnerable_vms %}  - {{ vm.hostname }} ({{ vm.ip_address }}): {{ vm.description }}\n{% endfor %}"
  tags:
    - vulnerable
    - info
