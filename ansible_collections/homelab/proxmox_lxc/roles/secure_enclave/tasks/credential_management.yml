---
# Credential Management for Secure Enclave
# Centralizes and documents credentials for all vulnerable targets

- name: Create credential management directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0700'
    owner: root
    group: root
  loop:
    - /root/.enclave
    - /root/.enclave/credentials
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - credentials
    - setup

- name: Generate credential report for all targets
  ansible.builtin.copy:
    dest: "{{ enclave_credentials.report_file }}"
    content: |
      # Secure Enclave - Target Credentials Reference

      Generated: {{ ansible_date_time.iso8601 }}

      ---

      ## Security Notice

      This document contains credentials for **intentionally vulnerable** systems.
      These credentials are for authorized security testing only.

      **DO NOT** use these credentials outside the enclave environment.
      **DO NOT** share this document with unauthorized individuals.

      ---

      ## Enclave Infrastructure

      ### Bastion Host ({{ enclave_bastion.ip_address }})
      - **SSH Access**: `ssh pbs@{{ enclave_bastion.ip_address }}`
      - **Authentication**: SSH key-based only
      - **Notes**: Primary entry point for enclave access

      ### Attacker VM ({{ enclave_attacker.isolated_ip }})
      - **SSH Access**: `ssh root@{{ enclave_attacker.isolated_ip }}` (from bastion)
      - **Authentication**: SSH key-based or root password
      - **Kali Tools**: Metasploit, Burp Suite, nmap, sqlmap, etc.

      ---

      ## Vulnerable Targets

      {% for target_name in enclave_enabled_targets %}
      {% set target = enclave_vulnerable_vms_catalog[target_name] %}
      ### {{ target.hostname }} ({{ target.ip_address }})

      **Description**: {{ target.description }}

      **Access URL**: `http://{{ target.ip_address }}:{{ target.service_port | default(80) }}`

      **Known Credentials**:
      {% if target.credentials is defined %}
      {% for user, password in target.credentials.items() %}
      - `{{ user }}` / `{{ password if password else '(empty password)' }}`
      {% endfor %}
      {% else %}
      - See application documentation
      {% endif %}

      **Known Vulnerabilities**:
      {% if target.vulnerabilities is defined %}
      {% for vuln in target.vulnerabilities %}
      - {{ vuln }}
      {% endfor %}
      {% else %}
      - See application documentation
      {% endif %}

      **Difficulty Levels**: {{ target.difficulty_levels | default(['N/A']) | join(', ') }}

      **Documentation**: {{ target.documentation_url | default('N/A') }}

      {% endfor %}
      ---

      ## Quick Reference

      | Target | IP | Port | Default User | Default Pass |
      |--------|-----|------|--------------|--------------|
      {% for target_name in enclave_enabled_targets %}
      {% set target = enclave_vulnerable_vms_catalog[target_name] %}
      {% set first_cred = (target.credentials | default({})).items() | list | first | default(['N/A', 'N/A']) %}
      | {{ target.hostname }} | {{ target.ip_address }} | {{ target.service_port | default(80) }} | {{ first_cred[0] }} | {{ first_cred[1] if first_cred[1] else '(empty)' }} |
      {% endfor %}

      ---

      ## Useful Commands

      ```bash
      # Scan all targets
      nmap -sV -sC {{ enclave_network.isolated_subnet }}

      # Test web application
      nikto -h http://TARGET_IP

      # SQL injection testing
      sqlmap -u "http://TARGET_IP/vulnerable.php?id=1" --batch

      # Directory brute forcing
      gobuster dir -u http://TARGET_IP -w /opt/SecLists/Discovery/Web-Content/common.txt

      # Password cracking
      hydra -l admin -P /opt/SecLists/Passwords/Common-Credentials/10k-most-common.txt TARGET_IP http-post-form
      ```

      ---

      *This document is auto-generated. Do not edit manually.*
    mode: '0600'
  delegate_to: "{{ enclave_bastion.hostname }}"
  when: enclave_credentials.generate_report | default(true)
  tags:
    - credentials
    - documentation

- name: Create secure credential file (JSON)
  ansible.builtin.copy:
    dest: "{{ enclave_credentials.credential_file }}"
    content: |
      {
        "generated": "{{ ansible_date_time.iso8601 }}",
        "enclave_version": "1.0",
        "targets": {
      {% for target_name in enclave_enabled_targets %}
      {% set target = enclave_vulnerable_vms_catalog[target_name] %}
          "{{ target_name }}": {
            "hostname": "{{ target.hostname }}",
            "ip_address": "{{ target.ip_address }}",
            "service_port": {{ target.service_port | default(80) }},
            "credentials": {{ target.credentials | default({}) | to_json }},
            "vulnerabilities": {{ target.vulnerabilities | default([]) | to_json }}
          }{{ '' if loop.last else ',' }}
      {% endfor %}
        }
      }
    mode: '0600'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - credentials
    - json

- name: Create credential lookup script
  ansible.builtin.copy:
    dest: "{{ enclave_paths.bin }}/enclave-creds"
    content: |
      #!/bin/bash
      # Quick credential lookup for enclave targets

      CRED_FILE="{{ enclave_credentials.credential_file }}"
      REPORT_FILE="{{ enclave_credentials.report_file }}"

      usage() {
        echo "Enclave Credential Lookup"
        echo ""
        echo "Usage: $0 [target_name|all|report]"
        echo ""
        echo "Commands:"
        echo "  <target_name>  - Show credentials for specific target"
        echo "  all            - Show all credentials (JSON)"
        echo "  report         - Display the full credential report"
        echo "  list           - List available targets"
        echo ""
        echo "Examples:"
        echo "  $0 dvwa"
        echo "  $0 juice_shop"
        echo "  $0 list"
      }

      list_targets() {
        echo "╔══════════════════════════════════════════════════════════════╗"
        echo "║                 AVAILABLE TARGETS                            ║"
        echo "╚══════════════════════════════════════════════════════════════╝"
        echo ""

        if command -v jq &> /dev/null && [ -f "$CRED_FILE" ]; then
          jq -r '.targets | to_entries[] | "  \(.key): \(.value.ip_address):\(.value.service_port)"' "$CRED_FILE"
        else
          echo "  Credential file not found or jq not installed."
        fi
      }

      show_target() {
        local target="$1"

        if ! command -v jq &> /dev/null; then
          echo "ERROR: jq is required for credential lookup"
          exit 1
        fi

        if [ ! -f "$CRED_FILE" ]; then
          echo "ERROR: Credential file not found: $CRED_FILE"
          exit 1
        fi

        local result=$(jq -r ".targets[\"$target\"]" "$CRED_FILE" 2>/dev/null)

        if [ "$result" = "null" ] || [ -z "$result" ]; then
          echo "ERROR: Target '$target' not found."
          echo ""
          list_targets
          exit 1
        fi

        echo "╔══════════════════════════════════════════════════════════════╗"
        echo "║              CREDENTIALS: $target"
        echo "╚══════════════════════════════════════════════════════════════╝"
        echo ""

        local hostname=$(echo "$result" | jq -r '.hostname')
        local ip=$(echo "$result" | jq -r '.ip_address')
        local port=$(echo "$result" | jq -r '.service_port')

        echo "Hostname: $hostname"
        echo "IP Address: $ip"
        echo "Service Port: $port"
        echo "Access URL: http://${ip}:${port}"
        echo ""
        echo "Credentials:"
        echo "$result" | jq -r '.credentials | to_entries[] | "  \(.key): \(.value // "(empty)")"'
        echo ""
        echo "Vulnerabilities:"
        echo "$result" | jq -r '.vulnerabilities[]' | sed 's/^/  - /'
      }

      case "${1:-}" in
        "")
          usage
          ;;
        all)
          if [ -f "$CRED_FILE" ]; then
            cat "$CRED_FILE" | jq .
          else
            echo "Credential file not found."
          fi
          ;;
        report)
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
          else
            echo "Report file not found: $REPORT_FILE"
          fi
          ;;
        list)
          list_targets
          ;;
        -h|--help)
          usage
          ;;
        *)
          show_target "$1"
          ;;
      esac
    mode: '0755'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - credentials
    - scripts

- name: Generate SSH key for enclave access
  ansible.builtin.openssh_keypair:
    path: "{{ enclave_credentials.ssh_key_path }}"
    type: "{{ enclave_credentials.ssh_key_type }}"
    comment: "enclave-access-{{ ansible_date_time.date }}"
    mode: '0600'
  delegate_to: "{{ enclave_bastion.hostname }}"
  register: enclave_ssh_key
  tags:
    - credentials
    - ssh

- name: Save SSH public key to credential directory
  ansible.builtin.copy:
    content: "{{ enclave_ssh_key.public_key }}"
    dest: /root/.enclave/credentials/enclave_id_ed25519.pub
    mode: '0644'
  delegate_to: "{{ enclave_bastion.hostname }}"
  when: enclave_ssh_key.public_key is defined
  tags:
    - credentials
    - ssh

- name: Create credential rotation script
  ansible.builtin.copy:
    dest: "{{ enclave_paths.bin }}/enclave-rotate-creds"
    content: |
      #!/bin/bash
      # Credential Rotation Script for Enclave
      # Use this when resetting the environment or for multi-user scenarios

      set -euo pipefail

      echo "╔══════════════════════════════════════════════════════════════╗"
      echo "║              CREDENTIAL ROTATION                             ║"
      echo "╚══════════════════════════════════════════════════════════════╝"
      echo ""
      echo "This script will rotate credentials for all enclave targets."
      echo ""
      echo "NOTE: This feature is currently informational only."
      echo "Most vulnerable applications don't support credential rotation."
      echo ""
      echo "To reset targets to default credentials, re-deploy them:"
      echo "  ansible-playbook playbooks/enclave.yml --tags vulnerable"
      echo ""
      echo "For applications that support it, manual credential changes:"
      echo ""
      echo "DVWA:"
      echo "  1. Access http://{{ enclave_vulnerable_vms_catalog.dvwa.ip_address }}/setup.php"
      echo "  2. Click 'Create / Reset Database'"
      echo ""
      echo "Juice Shop:"
      echo "  1. Stop and recreate the container with fresh database"
      echo "  2. docker stop juice_shop && docker rm juice_shop"
      echo "  3. Re-run deployment"
      echo ""
      echo "For clean reset, use snapshots if enabled:"
      echo "  ansible-playbook playbooks/enclave.yml --tags snapshots"
    mode: '0755'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - credentials
    - scripts

- name: Display credential management information
  ansible.builtin.debug:
    msg:
      - "Credential management configured on {{ enclave_bastion.hostname }}"
      - ""
      - "Commands available:"
      - "  enclave-creds <target>  - Show credentials for target"
      - "  enclave-creds list      - List all targets"
      - "  enclave-creds report    - Show full credential report"
      - ""
      - "Credential files:"
      - "  JSON: {{ enclave_credentials.credential_file }}"
      - "  Report: {{ enclave_credentials.report_file }}"
      - ""
      - "SSH key for enclave access:"
      - "  {{ enclave_credentials.ssh_key_path }}"
  tags:
    - credentials
    - info
