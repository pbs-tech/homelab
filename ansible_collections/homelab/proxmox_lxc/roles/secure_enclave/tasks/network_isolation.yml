---
# Network Isolation Setup
# Creates isolated network bridge and VLAN for secure enclave

- name: Check if enclave network bridge exists
  ansible.builtin.command:
    cmd: "pvesh get /nodes/{{ proxmox_config[enclave_proxmox_node].node }}/network"
  register: network_check
  changed_when: false
  failed_when: false
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  tags:
    - network
    - validation

- name: Create isolated network bridge configuration (idempotent)
  ansible.builtin.blockinfile:
    path: "{{ enclave_paths.network_interfaces }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Secure Enclave Network"
    block: |
      # Secure Enclave Isolated Network
      auto {{ enclave_network.bridge_name }}
      iface {{ enclave_network.bridge_name }} inet static
          address {{ enclave_router.lan_ip }}
          netmask 255.255.255.0
          bridge-ports none
          bridge-stp off
          bridge-fd 0
          # Enclave network isolation
          post-up echo 1 > /proc/sys/net/ipv4/ip_forward
          post-up iptables -t nat -A POSTROUTING -s {{ enclave_network.isolated_subnet }} -o vmbr0 -j MASQUERADE
    create: false
    mode: '0644'
  when: enclave_network.bridge_name not in network_check.stdout
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  register: network_config_result
  tags:
    - network
    - bridge

- name: Reload network interfaces if changed
  ansible.builtin.command:
    cmd: ifreload -a
  when:
    - network_config_result is changed
    - enclave_network.bridge_name not in network_check.stdout
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  changed_when: true
  failed_when: false
  tags:
    - network
    - bridge

- name: Install iptables-persistent for rule persistence
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
    update_cache: true
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  tags:
    - firewall
    - packages

- name: Create enclave firewall initialization script
  ansible.builtin.copy:
    dest: "{{ enclave_paths.bin }}/enclave-firewall-init"
    content: |
      #!/bin/bash
      # Enclave Firewall Initialization Script
      # Uses dedicated chain for better maintainability and eliminates race conditions
      # This script is idempotent and can be run multiple times

      set -e

      ENCLAVE_SUBNET="{{ enclave_network.isolated_subnet }}"
      CHAIN_NAME="ENCLAVE_FORWARD"

      # Function to add rule if it doesn't exist (atomic, no TOCTOU race condition)
      # Uses shell short-circuit evaluation: command will fail if rule exists
      add_rule_if_missing() {
        iptables -C "$@" 2>/dev/null || iptables "$@"
      }

      echo "Initializing enclave firewall rules..."

      # Create dedicated chain for enclave rules (idempotent)
      if ! iptables -n -L "$CHAIN_NAME" &>/dev/null; then
        echo "Creating $CHAIN_NAME chain..."
        iptables -N "$CHAIN_NAME"
      else
        echo "$CHAIN_NAME chain already exists"
      fi

      # Jump to enclave chain from FORWARD (only add if not already present)
      add_rule_if_missing FORWARD -s "$ENCLAVE_SUBNET" -j "$CHAIN_NAME" -m comment --comment "Jump to enclave rules"

      # Flush enclave chain to ensure clean state (idempotent)
      iptables -F "$CHAIN_NAME"

      echo "Adding enclave firewall rules to $CHAIN_NAME chain..."

      # Rule order is critical for security:
      # 1. Allow DNS first (before any blocks)
      # 2. Block specific production services
      # 3. Block all production network
      # 4. Allow enclave internal
      # 5. Allow internet (non-RFC1918)
      # 6. Drop everything else (implicit)

      # 1. Allow DNS queries to Unbound (must come before block rules)
      iptables -A "$CHAIN_NAME" -d {{ homelab_network.dns_servers[0] }}/32 -p udp --dport 53 -j ACCEPT -m comment --comment "Allow DNS to Unbound"

      # 2. Block enclave to K3s cluster nodes (parameterized from k3s_config)
      {% for node_ip in k3s_config.node_ips %}
      iptables -A "$CHAIN_NAME" -d {{ node_ip }}/32 -j DROP -m comment --comment "Block K3s node {{ node_ip }}"
      {% endfor %}

      # 3. Block enclave to production services (parameterized from group_vars)
      iptables -A "$CHAIN_NAME" -d {{ services_config.prometheus.host }}/32 -j DROP -m comment --comment "Block Prometheus"
      iptables -A "$CHAIN_NAME" -d {{ services_config.grafana.host }}/32 -j DROP -m comment --comment "Block Grafana"
      iptables -A "$CHAIN_NAME" -d {{ services_config.traefik.host }}/32 -j DROP -m comment --comment "Block Traefik"
      iptables -A "$CHAIN_NAME" -d 192.168.0.230/29 -j DROP -m comment --comment "Block NAS services"

      # 4. Block all other production traffic (catch-all for production network)
      iptables -A "$CHAIN_NAME" -d 192.168.0.0/24 -j DROP -m comment --comment "Block production network"

      # 5. Allow enclave internal traffic (VM to VM communication)
      iptables -A "$CHAIN_NAME" -d "$ENCLAVE_SUBNET" -j ACCEPT -m comment --comment "Allow enclave internal"

      # 6. Allow internet access (non-RFC1918 addresses only) for updates/tools
      iptables -A "$CHAIN_NAME" -o vmbr0 ! -d 192.168.0.0/16 ! -d 10.0.0.0/8 ! -d 172.16.0.0/12 -j ACCEPT -m comment --comment "Allow internet access"

      # 7. Explicit DROP for anything not matched (good practice, explicit deny)
      iptables -A "$CHAIN_NAME" -j DROP -m comment --comment "Drop all other enclave traffic"

      # Note: Established/related connections are allowed in main FORWARD chain
      add_rule_if_missing FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT -m comment --comment "Allow established"

      echo "Enclave firewall rules initialized successfully in $CHAIN_NAME chain."
      echo "Use 'iptables -n -L $CHAIN_NAME -v' to view rules."
    mode: '0755'
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  tags:
    - firewall
    - scripts

- name: Execute enclave firewall initialization
  ansible.builtin.command:
    cmd: "{{ enclave_paths.bin }}/enclave-firewall-init"
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  changed_when: true
  register: firewall_init_result
  failed_when:
    - firewall_init_result.rc != 0
    - '"already exists" not in firewall_init_result.stderr'
  tags:
    - firewall
    - security

- name: Save iptables rules for persistence
  ansible.builtin.shell: |
    set -e
    iptables-save > {{ enclave_paths.iptables_rules }}
  args:
    executable: /bin/bash
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  changed_when: true
  when: firewall_init_result is changed
  tags:
    - firewall
    - persistence

- name: Create systemd service for enclave firewall
  ansible.builtin.copy:
    dest: /etc/systemd/system/enclave-firewall.service
    content: |
      [Unit]
      Description=Secure Enclave Firewall Rules
      After=network.target

      [Service]
      Type=oneshot
      ExecStart={{ enclave_paths.bin }}/enclave-firewall-init
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  tags:
    - firewall
    - systemd

- name: Enable enclave firewall service
  ansible.builtin.systemd:
    name: enclave-firewall
    enabled: true
    daemon_reload: true
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  tags:
    - firewall
    - systemd

- name: Create enclave network documentation
  ansible.builtin.copy:
    dest: "{{ enclave_paths.proxmox_pve }}/enclave-network-config.txt"
    content: |
      Secure Enclave Network Configuration
      =====================================

      Management Network: {{ enclave_network.management_subnet }}
      Isolated Network: {{ enclave_network.isolated_subnet }}
      Bridge: {{ enclave_network.bridge_name }}
      VLAN: {{ enclave_network.vlan_id }}

      Network Isolation:
      - All traffic from {{ enclave_network.isolated_subnet }} to 192.168.0.0/24 is BLOCKED
      - Exception: DNS queries to 192.168.0.202 (Unbound) are allowed
      - Internet access for enclave is allowed (for updates/tools)
      - Enclave internal traffic is allowed

      Firewall Rules (in order of precedence):
      1. ALLOW: DNS to 192.168.0.202 (UDP 53 only)
      2. BLOCK: K3s cluster (192.168.0.111-114)
      3. BLOCK: Production services (Prometheus, Grafana, Traefik, NAS)
      4. BLOCK: All other production network (192.168.0.0/24)
      5. ALLOW: Enclave internal ({{ enclave_network.isolated_subnet }})
      6. ALLOW: Internet (non-RFC1918)
      7. ALLOW: Established/Related connections

      Deployed: {{ ansible_date_time.iso8601 }}

      Firewall Management:
      - Initialize: {{ enclave_paths.bin }}/enclave-firewall-init
      - Service: systemctl status enclave-firewall
      - Reload: systemctl restart enclave-firewall
    mode: '0644'
  delegate_to: "{{ proxmox_config[enclave_proxmox_node].host }}"
  tags:
    - documentation
