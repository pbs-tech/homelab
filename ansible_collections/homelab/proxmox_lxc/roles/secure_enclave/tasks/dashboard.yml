---
# Enclave Dashboard Deployment
# Provides a web-based dashboard for enclave monitoring and management

- name: Install dashboard dependencies
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - nginx-light
    state: present
    update_cache: true
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - dashboard
    - packages

- name: Create dashboard directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /opt/enclave-dashboard
    - /opt/enclave-dashboard/static
    - /opt/enclave-dashboard/templates
    - /opt/enclave-dashboard/api
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - dashboard
    - setup

- name: Create dashboard HTML template
  ansible.builtin.copy:
    dest: /opt/enclave-dashboard/templates/index.html
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Secure Enclave Dashboard</title>
        <style>
          :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --accent: #e94560;
            --text: #eee;
            --text-muted: #888;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
          }
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
          }
          .header {
            background: var(--bg-card);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
          }
          .header h1 { color: var(--accent); }
          .header .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
          }
          .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
          }
          .status-dot.online { background: var(--success); }
          .status-dot.offline { background: var(--danger); }
          @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
          }
          .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
          }
          .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
          }
          .card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid #333;
          }
          .card h2 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
          }
          .target-list { list-style: none; }
          .target-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #333;
          }
          .target-list li:last-child { border-bottom: none; }
          .target-info h3 { font-size: 1rem; }
          .target-info p { font-size: 0.85rem; color: var(--text-muted); }
          .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
          }
          .badge.running { background: var(--success); }
          .badge.stopped { background: var(--danger); }
          .badge.unknown { background: var(--text-muted); }
          .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
          }
          .stat {
            text-align: center;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
          }
          .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
          }
          .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
          }
          .log-output {
            background: #0d1117;
            border-radius: 4px;
            padding: 1rem;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
          }
          .log-line { margin: 0.25rem 0; }
          .log-line.info { color: #58a6ff; }
          .log-line.warn { color: #d29922; }
          .log-line.error { color: #f85149; }
          .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
          .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
          }
          .btn:hover { opacity: 0.8; }
          .btn-primary { background: var(--accent); color: white; }
          .btn-danger { background: var(--danger); color: white; }
          .btn-secondary { background: #444; color: white; }
          .network-map {
            background: #0d1117;
            border-radius: 4px;
            padding: 1rem;
            text-align: center;
          }
          .network-map pre {
            font-family: 'Consolas', monospace;
            font-size: 0.75rem;
            white-space: pre;
            overflow-x: auto;
          }
          .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
          }
        </style>
      </head>
      <body>
        <div class="header">
          <h1>Secure Enclave Dashboard</h1>
          <div class="status">
            <span class="status-dot online" id="status-dot"></span>
            <span id="status-text">Online</span>
            <span style="color: var(--text-muted); margin-left: 1rem;" id="last-update">
              Last update: --:--:--
            </span>
          </div>
        </div>

        <div class="container">
          <div class="grid">
            <!-- Infrastructure Status -->
            <div class="card">
              <h2>Infrastructure</h2>
              <ul class="target-list" id="infrastructure-list">
                <li>
                  <div class="target-info">
                    <h3>enclave-bastion</h3>
                    <p>192.168.0.250</p>
                  </div>
                  <span class="badge running">Running</span>
                </li>
                <li>
                  <div class="target-info">
                    <h3>enclave-router</h3>
                    <p>192.168.0.251 / 10.10.0.1</p>
                  </div>
                  <span class="badge running">Running</span>
                </li>
                <li>
                  <div class="target-info">
                    <h3>kali-attacker</h3>
                    <p>10.10.0.10</p>
                  </div>
                  <span class="badge unknown" id="attacker-status">Unknown</span>
                </li>
              </ul>
            </div>

            <!-- Vulnerable Targets -->
            <div class="card">
              <h2>Vulnerable Targets</h2>
              <ul class="target-list" id="targets-list">
      {% for target_name in enclave_enabled_targets %}
      {% set target = enclave_vulnerable_vms_catalog[target_name] %}
                <li>
                  <div class="target-info">
                    <h3>{{ target.hostname }}</h3>
                    <p>{{ target.ip_address }}:{{ target.service_port | default(80) }}</p>
                  </div>
                  <span class="badge unknown">Unknown</span>
                </li>
      {% endfor %}
              </ul>
            </div>

            <!-- Quick Stats -->
            <div class="card">
              <h2>Statistics</h2>
              <div class="stats-grid">
                <div class="stat">
                  <div class="stat-value" id="stat-targets">{{ enclave_enabled_targets | length }}</div>
                  <div class="stat-label">Active Targets</div>
                </div>
                <div class="stat">
                  <div class="stat-value" id="stat-uptime">--</div>
                  <div class="stat-label">Uptime (hrs)</div>
                </div>
                <div class="stat">
                  <div class="stat-value" id="stat-connections">--</div>
                  <div class="stat-label">Connections</div>
                </div>
                <div class="stat">
                  <div class="stat-value" id="stat-sessions">--</div>
                  <div class="stat-label">SSH Sessions</div>
                </div>
              </div>
            </div>

            <!-- Quick Actions -->
            <div class="card">
              <h2>Quick Actions</h2>
              <div class="actions">
                <button class="btn btn-primary" onclick="refreshStatus()">Refresh Status</button>
                <button class="btn btn-secondary" onclick="startAllTargets()">Start All Targets</button>
                <button class="btn btn-danger" onclick="emergencyShutdown()">Emergency Shutdown</button>
              </div>
              <br>
              <div class="actions">
                <a href="/api/credentials" class="btn btn-secondary">View Credentials</a>
                <a href="/api/logs" class="btn btn-secondary">View Logs</a>
              </div>
            </div>

            <!-- Network Map -->
            <div class="card" style="grid-column: span 2;">
              <h2>Network Topology</h2>
              <div class="network-map">
                <pre>
      ┌─────────────────────────────────────────────────────────────────┐
      │                    PRODUCTION NETWORK                          │
      │                     192.168.0.0/24                             │
      │                           │                                    │
      │                    [FIREWALL RULES]                            │
      │                    ↓ BLOCKED ↓                                 │
      └─────────────────────────────────────────────────────────────────┘
                                 │
                    ┌────────────┴────────────┐
                    │   MANAGEMENT NETWORK    │
                    │   192.168.0.248/29      │
                    │                         │
                    │  ┌─────────────────┐   │
                    │  │ enclave-bastion │   │
                    │  │  192.168.0.250  │   │
                    │  └────────┬────────┘   │
                    │           │            │
                    │  ┌────────┴────────┐   │
                    │  │ enclave-router  │   │
                    │  │  192.168.0.251  │   │
                    │  └────────┬────────┘   │
                    └───────────┼────────────┘
                                │
      ┌─────────────────────────┴─────────────────────────────────────────┐
      │                    ISOLATED ENCLAVE NETWORK                       │
      │                        10.10.0.0/24                               │
      │                                                                   │
      │   ┌─────────────┐    ┌─────────────┐    ┌─────────────┐          │
      │   │kali-attacker│    │   dvwa      │    │ juice-shop  │          │
      │   │ 10.10.0.10  │    │ 10.10.0.100 │    │ 10.10.0.102 │          │
      │   └─────────────┘    └─────────────┘    └─────────────┘          │
      │                                                                   │
      │   ┌─────────────┐    ┌─────────────┐    ┌─────────────┐          │
      │   │  webgoat    │    │  hackazon   │    │ metasploit3 │          │
      │   │ 10.10.0.103 │    │ 10.10.0.104 │    │ 10.10.0.101 │          │
      │   └─────────────┘    └─────────────┘    └─────────────┘          │
      └───────────────────────────────────────────────────────────────────┘
                </pre>
              </div>
            </div>

            <!-- Recent Activity Log -->
            <div class="card" style="grid-column: span 2;">
              <h2>Recent Activity</h2>
              <div class="log-output" id="activity-log">
                <div class="log-line info">[INFO] Dashboard started</div>
                <div class="log-line info">[INFO] Waiting for status updates...</div>
              </div>
            </div>
          </div>
        </div>

        <div class="footer">
          <p>Secure Enclave Dashboard v1.0 | Auto-refresh: {{ enclave_dashboard.refresh_interval | default(30) }}s</p>
          <p>For authorized security testing only. All activity is logged and monitored.</p>
        </div>

        <script>
          function updateTime() {
            const now = new Date();
            document.getElementById('last-update').textContent =
              'Last update: ' + now.toLocaleTimeString();
          }

          function addLogLine(message, level = 'info') {
            const log = document.getElementById('activity-log');
            const line = document.createElement('div');
            line.className = 'log-line ' + level;
            line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + message;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
          }

          function refreshStatus() {
            addLogLine('Refreshing status...', 'info');
            updateTime();
            // In a real implementation, this would fetch from the API
            setTimeout(() => addLogLine('Status refresh complete', 'info'), 500);
          }

          function startAllTargets() {
            if (confirm('Start all vulnerable targets?')) {
              addLogLine('Starting all targets...', 'warn');
              // Would trigger actual start command
            }
          }

          function emergencyShutdown() {
            if (confirm('EMERGENCY SHUTDOWN: This will stop all enclave VMs. Continue?')) {
              addLogLine('EMERGENCY SHUTDOWN INITIATED', 'error');
              // Would trigger actual shutdown
            }
          }

          // Auto-refresh
          setInterval(refreshStatus, {{ enclave_dashboard.refresh_interval | default(30) }}000);
          updateTime();
        </script>
      </body>
      </html>
    mode: '0644'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - dashboard
    - html

- name: Create simple API script
  ansible.builtin.copy:
    dest: /opt/enclave-dashboard/api/status.py
    content: |
      #!/usr/bin/env python3
      """Simple status API for Enclave Dashboard"""

      import json
      import subprocess
      import http.server
      import socketserver
      from datetime import datetime

      PORT = {{ enclave_dashboard.port | default(8080) }}

      def get_vm_status():
          """Get status of enclave VMs"""
          status = {
              'timestamp': datetime.now().isoformat(),
              'infrastructure': [],
              'targets': [],
              'stats': {}
          }

          # Infrastructure
          status['infrastructure'] = [
              {'name': 'enclave-bastion', 'ip': '192.168.0.250', 'status': 'running'},
              {'name': 'enclave-router', 'ip': '192.168.0.251', 'status': 'running'},
              {'name': 'kali-attacker', 'ip': '10.10.0.10', 'status': 'unknown'},
          ]

          # Targets - check if reachable
          targets = [
      {% for target_name in enclave_enabled_targets %}
      {% set target = enclave_vulnerable_vms_catalog[target_name] %}
              {'name': '{{ target.hostname }}', 'ip': '{{ target.ip_address }}', 'port': {{ target.service_port | default(80) }}},
      {% endfor %}
          ]

          for target in targets:
              try:
                  result = subprocess.run(
                      ['nc', '-z', '-w', '1', target['ip'], str(target['port'])],
                      capture_output=True
                  )
                  target['status'] = 'running' if result.returncode == 0 else 'stopped'
              except Exception:
                  target['status'] = 'unknown'
              status['targets'].append(target)

          # Stats
          try:
              uptime = subprocess.check_output(['uptime', '-p']).decode().strip()
              status['stats']['uptime'] = uptime
          except Exception:
              status['stats']['uptime'] = 'unknown'

          try:
              sessions = subprocess.check_output(['who', '-q']).decode().split('\n')[1]
              status['stats']['sessions'] = sessions.split('=')[1] if '=' in sessions else '0'
          except Exception:
              status['stats']['sessions'] = '0'

          return status

      class StatusHandler(http.server.SimpleHTTPRequestHandler):
          def do_GET(self):
              if self.path == '/api/status':
                  self.send_response(200)
                  self.send_header('Content-type', 'application/json')
                  self.send_header('Access-Control-Allow-Origin', '*')
                  self.end_headers()
                  self.wfile.write(json.dumps(get_vm_status()).encode())
              elif self.path == '/api/credentials':
                  self.send_response(200)
                  self.send_header('Content-type', 'text/markdown')
                  self.end_headers()
                  try:
                      with open('/root/TARGET_CREDENTIALS.md', 'r') as f:
                          self.wfile.write(f.read().encode())
                  except FileNotFoundError:
                      self.wfile.write(b'Credentials file not found')
              elif self.path == '/api/logs':
                  self.send_response(200)
                  self.send_header('Content-type', 'text/plain')
                  self.end_headers()
                  try:
                      result = subprocess.check_output(['tail', '-100', '/var/log/enclave-audit.log'])
                      self.wfile.write(result)
                  except Exception as e:
                      self.wfile.write(f'Error reading logs: {e}'.encode())
              else:
                  super().do_GET()

      if __name__ == '__main__':
          import os
          os.chdir('/opt/enclave-dashboard/templates')
          with socketserver.TCPServer(("", PORT), StatusHandler) as httpd:
              print(f"Serving dashboard on port {PORT}")
              httpd.serve_forever()
    mode: '0755'
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - dashboard
    - api

- name: Create dashboard systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/enclave-dashboard.service
    content: |
      [Unit]
      Description=Secure Enclave Dashboard
      After=network.target

      [Service]
      Type=simple
      WorkingDirectory=/opt/enclave-dashboard
      ExecStart=/usr/bin/python3 /opt/enclave-dashboard/api/status.py
      Restart=always
      RestartSec=5
      User=root

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  delegate_to: "{{ enclave_bastion.hostname }}"
  notify: restart enclave dashboard
  tags:
    - dashboard
    - systemd

- name: Enable and start dashboard service
  ansible.builtin.systemd:
    name: enclave-dashboard
    state: started
    enabled: true
    daemon_reload: true
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - dashboard
    - service

- name: Configure firewall for dashboard
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ enclave_dashboard.port | default(8080) }}"
    source: 192.168.0.0/24
    jump: ACCEPT
    comment: "Allow dashboard access from management network"
  delegate_to: "{{ enclave_bastion.hostname }}"
  tags:
    - dashboard
    - firewall

- name: Display dashboard access information
  ansible.builtin.debug:
    msg:
      - "Enclave Dashboard deployed on {{ enclave_bastion.hostname }}"
      - ""
      - "Access URL: http://{{ enclave_bastion.ip_address }}:{{ enclave_dashboard.port | default(8080) }}"
      - ""
      - "API Endpoints:"
      - "  /api/status      - Get enclave status (JSON)"
      - "  /api/credentials - View target credentials"
      - "  /api/logs        - View audit logs"
      - ""
      - "The dashboard auto-refreshes every {{ enclave_dashboard.refresh_interval | default(30) }} seconds."
  tags:
    - dashboard
    - info
