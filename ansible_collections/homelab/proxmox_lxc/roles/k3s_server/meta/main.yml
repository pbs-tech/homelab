---
galaxy_info:
  author: "Homelab Administrator"
  description: "Installs and configures K3s server nodes with HA and external database support"
  company: "Homelab"
  license:
    - "Apache-2.0"
  min_ansible_version: "2.14"
  platforms:
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble
    - name: Debian
      versions:
        - bullseye
        - bookworm
    - name: EL
      versions:
        - 8
        - 9
        - 10
    - name: Archlinux
      versions:
        - all
  galaxy_tags:
    - k3s
    - kubernetes
    - server
    - controlplane
    - ha
    - cluster

dependencies:
  - role: homelab.proxmox_lxc.prereq
    when: run_prereq | default(true)
