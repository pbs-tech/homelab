---
- name: Update system packages
  apt:
    update_cache: true
    upgrade: true

- name: Install required packages
  apt:
    name:
      - curl
      - unzip
      - ca-certificates
    state: present

- name: Create promtail user
  user:
    name: "{{ promtail_user }}"
    system: true
    shell: /bin/false
    home: "{{ promtail_data_dir }}"
    create_home: false
    groups: "adm,systemd-journal"
    group: "{{ promtail_group }}"

- name: Create promtail group
  group:
    name: "{{ promtail_group }}"
    system: true

- name: Create promtail directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    mode: "0755"
  loop:
    - "{{ promtail_config_dir }}"
    - "{{ promtail_data_dir }}"
    - "{{ promtail_log_dir }}"

- name: Download Promtail binary
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
    dest: /tmp/promtail.zip
    mode: "0644"
  register: promtail_download

- name: Extract Promtail binary
  unarchive:
    src: /tmp/promtail.zip
    dest: /tmp
    remote_src: true
  when: promtail_download.changed

- name: Install Promtail binary
  copy:
    src: /tmp/promtail-linux-amd64
    dest: "{{ promtail_bin_dir }}/promtail"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: promtail_download.changed
  notify: restart promtail

- name: Create Promtail configuration file
  template:
    src: promtail.yml.j2
    dest: "{{ promtail_config_dir }}/promtail.yml"
    owner: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    mode: "0644"
    backup: true
  notify: restart promtail

- name: Create Promtail systemd service
  template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: "0644"
  notify:
    - reload systemd
    - restart promtail

- name: Enable and start Promtail
  systemd:
    name: promtail
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Promtail to start
  wait_for:
    host: "{{ promtail_listen_address }}"
    port: "{{ promtail_listen_port }}"
    delay: 5
    timeout: 30

- name: Check Promtail readiness
  uri:
    url: "http://{{ ansible_default_ipv4.address }}:{{ promtail_listen_port }}/ready"
    method: GET
    return_content: true
  register: promtail_health
  retries: 3
  delay: 5
  ignore_errors: true

- name: Display Promtail status
  debug:
    msg: "Promtail is running and shipping logs to {{ loki_endpoint }}"
