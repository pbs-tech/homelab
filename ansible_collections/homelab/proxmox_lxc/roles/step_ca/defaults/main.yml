---
# step-ca version to install
step_ca_version: "0.27.4"
step_cli_version: "0.27.4"

# Service user/group
step_ca_user: step
step_ca_group: step

# Directories
step_ca_config_dir: /etc/step-ca
step_ca_data_dir: /var/lib/step-ca

# CA settings
step_ca_port: 8443
step_ca_name: "Homelab CA"
step_ca_dns_names:
  - "step-ca.homelab.local"
  - "192.168.0.211"

# Admin provisioner (JWK, used for CA management only)
step_ca_admin_provisioner: "admin"

# ACME provisioner name (used by Traefik)
step_ca_acme_provisioner: "acme"

# Max TLS cert duration issued via ACME (90 days)
step_ca_acme_max_tls_duration: "2160h"
step_ca_acme_default_tls_duration: "2160h"

# DNS resolver for this container (must resolve homelab.local)
step_ca_dns_resolver: "192.168.0.202"  # Unbound

# Firewall
step_ca_enable_firewall: true
