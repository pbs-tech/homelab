---
# Bastion host security configuration
# Prerequisites: Container must already exist and be accessible via SSH
# Container provisioning is handled by homelab.common.container_base

# --- Package installation ---

- name: Install bastion security packages
  ansible.builtin.apt:
    name: "{{ bastion_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install Python pip packages for automation
  ansible.builtin.pip:
    name: "{{ bastion_pip_packages }}"
    state: present

# --- SSH hardening (bastion-specific) ---

- name: Configure SSH for bastion security
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    backup: true
    mode: "0600"
    owner: root
    group: root
    validate: sshd -t -f %s
  notify: Restart ssh

# --- Fail2ban ---

- name: Configure fail2ban for bastion
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started

# --- Iptables firewall ---

- name: Create iptables rules directory
  ansible.builtin.file:
    path: /etc/iptables
    state: directory
    mode: "0755"

- name: Allow established connections
  ansible.builtin.iptables:
    chain: INPUT
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "Allow established connections"

- name: Allow loopback traffic
  ansible.builtin.iptables:
    chain: INPUT
    in_interface: lo
    jump: ACCEPT
    comment: "Allow loopback"

- name: Allow bastion ports
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ item }}"
    jump: ACCEPT
    comment: "Bastion allowed port {{ item }}"
  loop: "{{ bastion_security.allowed_ports }}"

- name: Set default INPUT policy to DROP
  ansible.builtin.iptables:
    chain: INPUT
    policy: DROP

- name: Save iptables rules
  ansible.builtin.shell: iptables-save > /etc/iptables/rules.v4
  changed_when: true

- name: Create iptables restore service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Restore iptables rules
      Before=network-pre.target
      Wants=network-pre.target

      [Service]
      Type=oneshot
      ExecStart=/sbin/iptables-restore /etc/iptables/rules.v4
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/iptables-restore.service
    mode: "0644"

- name: Enable iptables restore service
  ansible.builtin.systemd:
    name: iptables-restore
    enabled: true
    daemon_reload: true

# --- User management ---

- name: Create pbs user for bastion access
  ansible.builtin.user:
    name: pbs
    shell: /bin/bash
    create_home: true
    groups: sudo
    append: true

- name: Configure passwordless sudo for pbs user
  ansible.builtin.copy:
    content: "pbs ALL=(ALL) NOPASSWD: ALL\n"
    dest: /etc/sudoers.d/pbs
    owner: root
    group: root
    mode: "0440"
    validate: 'visudo -cf %s'

- name: Set up SSH directory for pbs user
  ansible.builtin.file:
    path: /home/pbs/.ssh
    state: directory
    owner: pbs
    group: pbs
    mode: "0700"

- name: Set up SSH keys for pbs user
  ansible.posix.authorized_key:
    user: pbs
    key: "{{ lookup('file', '~/.ssh/homelab_ed25519.pub') }}"
    state: present

# --- Optional: Sync Ansible collections to bastion ---

- name: Copy ansible collections to bastion  # noqa: no-same-owner
  ansible.posix.synchronize:
    src: "{{ bastion_sync_source_base }}/ansible_collections/"
    dest: "{{ bastion_sync_dest_base }}/ansible_collections/"
    delete: true
    recursive: true
  become: true
  become_user: pbs
  when: bastion_sync_collections | default(false)

- name: Copy main site.yml to bastion
  ansible.builtin.copy:
    src: "{{ bastion_sync_source_base }}/site.yml"
    dest: "{{ bastion_sync_dest_base }}/site.yml"
    mode: "0644"
  become: true
  become_user: pbs
  when: bastion_sync_collections | default(false)
