---
- name: Create k3s-bastion LXC container
  community.general.proxmox:
    vmid: "{{ bastion_container.vmid }}"
    node: "{{ ansible_hostname }}"
    api_user: "{{ proxmox_user }}"
    api_password: "{{ proxmox_password }}"
    api_host: "{{ proxmox_host }}"
    hostname: "{{ bastion_container.hostname }}"
    ostemplate: "{{ bastion_container.template }}"
    cores: "{{ bastion_container.cores }}"
    memory: "{{ bastion_container.memory }}"
    disk: "{{ bastion_container.disk_size }}"
    netif: '{"net0":"name=eth0,bridge=vmbr0,gw={{ bastion_container.gateway }},ip={{ bastion_container.ip }},type=veth"}'
    nameserver: "{{ bastion_container.nameservers }}"
    features: "{{ bastion_container.features | join(',') }}"
    unprivileged: "{{ bastion_container.unprivileged }}"
    state: present
    timeout: 300
  register: bastion_create_result

- name: Start bastion container
  community.general.proxmox:
    vmid: "{{ bastion_container.vmid }}"
    node: "{{ ansible_hostname }}"
    api_user: "{{ proxmox_user }}"
    api_password: "{{ proxmox_password }}"
    api_host: "{{ proxmox_host }}"
    state: started
    timeout: 60

- name: Wait for bastion container to be available
  wait_for:
    host: "{{ bastion_container.ip.split('/')[0] }}"
    port: 22
    delay: 30
    timeout: 300

- name: Update package cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes

- name: Install required packages
  apt:
    name: "{{ bastion_packages }}"
    state: present
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes

- name: Install Python pip packages
  pip:
    name: "{{ bastion_pip_packages }}"
    state: present
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes

- name: Configure SSH for security
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    backup: yes
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes
  notify: restart ssh

- name: Configure fail2ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes
  notify: restart fail2ban

- name: Configure UFW firewall
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ bastion_security.allowed_ports }}"
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
    direction: incoming
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes

- name: Create ansible user
  user:
    name: pbs
    shell: /bin/bash
    create_home: yes
    groups: sudo
    append: yes
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes

- name: Set up SSH keys for ansible user
  authorized_key:
    user: pbs
    key: "{{ ansible_ssh_public_key_content }}"
    state: present
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes
  when: ansible_ssh_public_key_content is defined

- name: Copy ansible collections to bastion
  synchronize:
    src: /home/pbs/ansible/k3s-bastion/ansible_collections/
    dest: /home/pbs/ansible_collections/
    delete: yes
    recursive: yes
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes
  become_user: pbs

- name: Copy main site.yml to bastion
  copy:
    src: /home/pbs/ansible/k3s-bastion/site.yml
    dest: /home/pbs/site.yml
  delegate_to: "{{ bastion_container.ip.split('/')[0] }}"
  become: yes
  become_user: pbs