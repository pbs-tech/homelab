---
# Bastion container configuration
bastion_container:
  vmid: 999
  hostname: k3s-bastion
  ip: 192.168.0.110/24
  gateway: 192.168.0.1
  nameservers: 192.168.0.202
  template: local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst
  cores: 2
  memory: 2048
  disk_size: 20G
  features:
    - nesting=1
    - keyctl=1
  unprivileged: true

# Security configurations
bastion_security:
  ssh_port: 22
  fail2ban_enabled: true
  firewall_enabled: true
  allowed_ports:
    - 22 # SSH
    - 53 # DNS (for local resolution)
  fail2ban_bantime: 3600
  fail2ban_maxretry: 3

# Ansible/automation tools
bastion_packages:
    - ansible
  - ansible-core
  - python3-pip
  - git
  - curl
  - wget
  - unzip
  - jq
  - fail2ban
  - ufw
  - htop
  - net-tools
  - openssh-client
  - sshpass

# Python packages for Ansible collections
bastion_pip_packages:
    - kubernetes
  - proxmoxer
  - requests
