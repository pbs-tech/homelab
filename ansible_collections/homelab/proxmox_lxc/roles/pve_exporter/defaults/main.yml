---
# Proxmox VE Exporter default variables

# Version (pip package version)
pve_exporter_version: "3.0.2"
pve_exporter_port: 9221

# Directory configuration
pve_exporter_config_dir: /etc/pve-exporter
pve_exporter_data_dir: /var/lib/pve-exporter

# User and group
pve_exporter_user: pve-exporter
pve_exporter_group: pve-exporter

# Proxmox API configuration
pve_exporter_pve_host: "localhost"
pve_exporter_pve_port: 8006
pve_exporter_pve_user: "prometheus@pve"
pve_exporter_pve_password: ""
pve_exporter_pve_token_name: ""
pve_exporter_pve_token_value: ""
pve_exporter_verify_ssl: false

# Metrics configuration
pve_exporter_collect_pve_version: true
pve_exporter_collect_node: true
pve_exporter_collect_qemu: true
pve_exporter_collect_lxc: true
pve_exporter_collect_storage: true
pve_exporter_collect_cluster: true

# Firewall configuration
pve_exporter_configure_firewall: true
