---
# Proxmox VE Exporter deployment tasks

- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present

- name: Create pve-exporter group
  ansible.builtin.group:
    name: "{{ pve_exporter_group }}"
    system: true
    state: present

- name: Create pve-exporter user
  ansible.builtin.user:
    name: "{{ pve_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    group: "{{ pve_exporter_group }}"
    home: "{{ pve_exporter_data_dir }}"
    create_home: false

- name: Create pve-exporter directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ pve_exporter_user }}"
    group: "{{ pve_exporter_group }}"
    mode: "0755"
  loop:
    - "{{ pve_exporter_config_dir }}"
    - "{{ pve_exporter_data_dir }}"
    - /opt/pve-exporter

- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv /opt/pve-exporter/venv
    creates: /opt/pve-exporter/venv/bin/python

- name: Install prometheus-pve-exporter
  ansible.builtin.pip:
    name: "prometheus-pve-exporter=={{ pve_exporter_version }}"
    virtualenv: /opt/pve-exporter/venv
    state: present
  notify: Restart pve-exporter

- name: Create PVE exporter configuration
  ansible.builtin.template:
    src: pve.yml.j2
    dest: "{{ pve_exporter_config_dir }}/pve.yml"
    owner: "{{ pve_exporter_user }}"
    group: "{{ pve_exporter_group }}"
    mode: "0600"
  notify: Restart pve-exporter

- name: Create PVE exporter systemd service
  ansible.builtin.template:
    src: pve-exporter.service.j2
    dest: /etc/systemd/system/pve-exporter.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart pve-exporter

- name: Configure UFW firewall for PVE exporter
  community.general.ufw:
    rule: allow
    port: "{{ pve_exporter_port }}"
    proto: tcp
    comment: "PVE Exporter"
  when: pve_exporter_configure_firewall

- name: Enable and start PVE exporter
  ansible.builtin.systemd:
    name: pve-exporter
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for PVE exporter to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ pve_exporter_port }}/metrics"
    method: GET
    status_code: [200]
  register: pve_exporter_health
  until: pve_exporter_health.status == 200
  retries: 12
  delay: 5
