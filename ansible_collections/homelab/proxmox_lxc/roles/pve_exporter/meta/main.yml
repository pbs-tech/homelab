---
galaxy_info:
  role_name: pve_exporter
  namespace: homelab.proxmox_lxc
  author: Homelab Administrator
  description: Deploy and configure Proxmox VE Exporter for Prometheus metrics collection from Proxmox infrastructure
  company: Homelab
  license: MIT

  min_ansible_version: "2.13"

  platforms:
    - name: Ubuntu
      versions:
        - jammy
        - focal

  galaxy_tags:
    - proxmox
    - pve
    - exporter
    - prometheus
    - monitoring
    - metrics
    - virtualization
    - containers
    - homelab
    - lxc

dependencies:
  - role: homelab.common.container_base
    when: use_container_base | default(true)
  - role: homelab.common.security_hardening
    when: use_security_hardening | default(true)
