---
# qBittorrent deployment tasks

- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present

# Install Docker using common role
- name: Install Docker
  ansible.builtin.include_role:
    name: homelab.common.docker
  vars:
    docker_ensure_group: true

# Validate PUID/PGID - ensure user/group exist or will be created by container
- name: Validate PUID/PGID configuration
  ansible.builtin.assert:
    that:
      - qbittorrent_puid is defined
      - qbittorrent_pgid is defined
      - qbittorrent_puid | int > 0
      - qbittorrent_pgid | int > 0
    fail_msg: "qbittorrent_puid and qbittorrent_pgid must be defined and greater than 0"
    quiet: true

- name: Create qbittorrent directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ qbittorrent_puid }}"
    group: "{{ qbittorrent_pgid }}"
    mode: "0755"
  loop:
    - "{{ qbittorrent_data_dir }}"
    - "{{ qbittorrent_config_dir }}"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ qbittorrent_data_dir }}/docker-compose.yml"
    owner: root
    group: docker
    mode: "0640"
  notify: Restart qbittorrent

- name: Create qBittorrent systemd service
  ansible.builtin.template:
    src: qbittorrent.service.j2
    dest: /etc/systemd/system/qbittorrent.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart qbittorrent

- name: Configure UFW firewall for qBittorrent
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "qBittorrent"
  loop:
    - { port: "{{ qbittorrent_webui_port }}", proto: "tcp" }
    - { port: "{{ qbittorrent_torrent_port }}", proto: "tcp" }
    - { port: "{{ qbittorrent_torrent_port }}", proto: "udp" }
  when: qbittorrent_configure_firewall

- name: Pull qBittorrent Docker image
  community.docker.docker_image:
    name: "{{ qbittorrent_docker_image }}"
    tag: "{{ qbittorrent_version }}"
    source: pull
  retries: 3
  delay: 10
  register: docker_pull_result
  until: docker_pull_result is succeeded

- name: Enable and start qBittorrent
  ansible.builtin.systemd:
    name: qbittorrent
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for qBittorrent to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ qbittorrent_webui_port }}"
    method: GET
    status_code: [200, 401]
  register: qbittorrent_health
  until: qbittorrent_health.status in [200, 401]
  retries: 18
  delay: 5
  ignore_errors: true

- name: Warn if qBittorrent health check failed
  ansible.builtin.debug:
    msg: "Warning: qBittorrent health check did not pass. Service may still be starting."
  when: qbittorrent_health is failed

- name: Display qBittorrent access information
  ansible.builtin.debug:
    msg: |
      qBittorrent is ready!
      Access URL: http://{{ ansible_host }}:{{ qbittorrent_webui_port }}
      Default credentials: admin / adminadmin
      IMPORTANT: Change the default password immediately!
