---
# qBittorrent deployment tasks

- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present

# Install Docker using common role
- name: Install Docker
  ansible.builtin.include_role:
    name: homelab.common.docker
  vars:
    docker_ensure_group: true

- name: Mount NAS NFS shares
  ansible.builtin.include_role:
    name: homelab.common.nas_mounts
  vars:
    nas_subdirs:
      - /mnt/nas/downloads/complete
      - /mnt/nas/downloads/complete/tv
      - /mnt/nas/downloads/complete/movies
      - /mnt/nas/downloads/incomplete

# Validate PUID/PGID - ensure user/group exist or will be created by container
- name: Validate PUID/PGID configuration
  ansible.builtin.assert:
    that:
      - qbittorrent_puid is defined
      - qbittorrent_pgid is defined
      - qbittorrent_puid | int > 0
      - qbittorrent_pgid | int > 0
    fail_msg: "qbittorrent_puid and qbittorrent_pgid must be defined and greater than 0"
    quiet: true

# Ensure group exists for PGID (required for directory ownership)
# GID may already be in use by the default container user — tolerate that gracefully.
- name: Ensure media group exists for qBittorrent
  ansible.builtin.group:
    name: "{{ qbittorrent_group_name | default('media') }}"
    gid: "{{ qbittorrent_pgid }}"
    state: present
  when: qbittorrent_ensure_user | default(true)
  register: group_result
  failed_when: >
    group_result is failed and
    'already exists' not in (group_result.msg | default(''))

# Ensure user exists for PUID (required for directory ownership)
- name: Ensure media user exists for qBittorrent
  ansible.builtin.user:
    name: "{{ qbittorrent_user_name | default('media') }}"
    uid: "{{ qbittorrent_puid }}"
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  when: qbittorrent_ensure_user | default(true)
  register: user_result
  failed_when: >
    user_result is failed and
    'already exists' not in (user_result.msg | default('')) and
    'not unique' not in (user_result.msg | default(''))

- name: Validate qBittorrent admin password is configured
  ansible.builtin.assert:
    that:
      - qbittorrent_admin_password is defined
      - qbittorrent_admin_password | length >= 8
      - qbittorrent_admin_password != 'adminadmin'
    fail_msg: >
      qBittorrent admin password must be set in vault (vault_qbittorrent_admin_password),
      be at least 8 characters, and not be the default 'adminadmin'.
    success_msg: "qBittorrent admin password is properly configured"

- name: Create qbittorrent directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ qbittorrent_puid }}"
    group: "{{ qbittorrent_pgid }}"
    mode: "0755"
  loop:
    - "{{ qbittorrent_data_dir }}"
    - "{{ qbittorrent_config_dir }}"

- name: Create qBittorrent config subdirectory
  ansible.builtin.file:
    path: "{{ qbittorrent_config_dir }}/qBittorrent"
    state: directory
    owner: "{{ qbittorrent_puid }}"
    group: "{{ qbittorrent_pgid }}"
    mode: "0755"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ qbittorrent_data_dir }}/docker-compose.yml"
    owner: root
    group: docker
    mode: "0640"
  notify: Restart qbittorrent

- name: Create qBittorrent systemd service
  ansible.builtin.template:
    src: qbittorrent.service.j2
    dest: /etc/systemd/system/qbittorrent.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart qbittorrent

- name: Configure UFW firewall for qBittorrent WebUI (restricted access)
  community.general.ufw:
    rule: allow
    port: "{{ qbittorrent_webui_port }}"
    proto: tcp
    src: "{{ item }}"
    comment: "qBittorrent WebUI ({{ item }})"
  loop: "{{ qbittorrent_allowed_sources | default([traefik_ip | default('192.168.0.205'), '127.0.0.1']) }}"
  when: qbittorrent_configure_firewall

- name: Configure UFW firewall for qBittorrent torrent ports (open for BitTorrent)
  community.general.ufw:
    rule: allow
    port: "{{ qbittorrent_torrent_port }}"
    proto: "{{ item }}"
    comment: "qBittorrent torrent traffic"
  loop:
    - tcp
    - udp
  when: qbittorrent_configure_firewall and not (qbittorrent_vpn_enabled | default(true))

- name: Pull Gluetun Docker image
  community.docker.docker_image:
    name: qmcgaw/gluetun
    tag: latest
    source: pull
  retries: 3
  delay: 10
  register: gluetun_pull_result
  until: gluetun_pull_result is succeeded
  when: qbittorrent_vpn_enabled | default(true)

- name: Pull qBittorrent Docker image
  community.docker.docker_image:
    name: "{{ qbittorrent_docker_image }}"
    tag: "{{ qbittorrent_version }}"
    source: pull
  retries: 3
  delay: 10
  register: docker_pull_result
  until: docker_pull_result is succeeded

- name: Enable and start qBittorrent
  ansible.builtin.systemd:
    name: qbittorrent
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for qBittorrent to be ready
  block:
    - name: Check qBittorrent health endpoint
      ansible.builtin.uri:
        url: "http://localhost:{{ qbittorrent_webui_port }}"
        method: GET
        status_code: [200, 401]
      register: qbittorrent_health
      until: qbittorrent_health.status in [200, 401]
      retries: 24
      delay: 5

  rescue:
    - name: Warn about qBittorrent health check failure
      ansible.builtin.debug:
        msg: |
          WARNING: qBittorrent health check did not pass after 120 seconds.
          The service may still be starting or there may be a configuration issue.
          Please verify manually: http://{{ ansible_host }}:{{ qbittorrent_webui_port }}

    - name: Fail if strict health checks are enabled
      ansible.builtin.fail:
        msg: "qBittorrent health check failed and strict mode is enabled"
      when: qbittorrent_strict_health_check | default(false)

- name: Configure qBittorrent WebUI password via API
  block:
    - name: Try login with vault password
      ansible.builtin.uri:
        url: "http://localhost:{{ qbittorrent_webui_port }}/api/v2/auth/login"
        method: POST
        body: "username={{ qbittorrent_admin_username }}&password={{ qbittorrent_admin_password | urlencode }}"
        headers:
          Content-Type: "application/x-www-form-urlencoded"
        status_code: 200
        return_content: true
      register: qbt_login_vault
      no_log: true
      failed_when: false

    - name: Extract temporary password from logs (qBittorrent 5.x first-run)
      ansible.builtin.command:
        argv:
          - docker
          - logs
          - "{{ qbittorrent_container_name }}"
      register: qbt_logs
      changed_when: false
      no_log: true
      when: qbt_login_vault.content | default('') != 'Ok.'

    - name: Parse temporary password from logs
      ansible.builtin.set_fact:
        _qbt_temp_password: "{{ qbt_logs.stderr | regex_search('temporary password is provided for this session: (\\S+)', '\\1') | first }}"
      no_log: true
      when:
        - qbt_login_vault.content | default('') != 'Ok.'
        - "'temporary password' in (qbt_logs.stderr | default(''))"

    - name: Login with temporary password
      ansible.builtin.uri:
        url: "http://localhost:{{ qbittorrent_webui_port }}/api/v2/auth/login"
        method: POST
        body: "username={{ qbittorrent_admin_username }}&password={{ _qbt_temp_password | urlencode }}"
        headers:
          Content-Type: "application/x-www-form-urlencoded"
        status_code: 200
        return_content: true
      register: qbt_login_temp
      no_log: true
      when:
        - qbt_login_vault.content | default('') != 'Ok.'
        - _qbt_temp_password is defined

    - name: Set vault password via API
      ansible.builtin.uri:
        url: "http://localhost:{{ qbittorrent_webui_port }}/api/v2/app/setPreferences"
        method: POST
        body: "json={\"web_ui_password\":\"{{ qbittorrent_admin_password }}\"}"
        headers:
          Content-Type: "application/x-www-form-urlencoded"
          Cookie: "{{ qbt_login_temp.set_cookie | default(qbt_login_vault.set_cookie) }}"
        status_code: 200
      no_log: true
      when: >
        qbt_login_vault.content | default('') != 'Ok.' and
        qbt_login_temp is defined and
        qbt_login_temp.content | default('') == 'Ok.'
      changed_when: true

- name: Display qBittorrent access information
  ansible.builtin.debug:
    msg: |
      qBittorrent is ready!
      Access URL: http://{{ ansible_host }}:{{ qbittorrent_webui_port }}
      Username: {{ qbittorrent_admin_username }}
      Password: configured via vault_qbittorrent_admin_password
