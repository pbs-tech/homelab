---
# Bazarr deployment tasks

- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present

# Install Docker using common role
- name: Install Docker
  ansible.builtin.include_role:
    name: homelab.common.docker
  vars:
    docker_ensure_group: true

# Validate PUID/PGID - ensure user/group exist or will be created by container
- name: Validate PUID/PGID configuration
  ansible.builtin.assert:
    that:
      - bazarr_puid is defined
      - bazarr_pgid is defined
      - bazarr_puid | int > 0
      - bazarr_pgid | int > 0
    fail_msg: "bazarr_puid and bazarr_pgid must be defined and greater than 0"
    quiet: true

# Ensure group exists for PGID (required for directory ownership)
- name: Ensure media group exists for Bazarr
  ansible.builtin.group:
    name: "{{ bazarr_group_name | default('media') }}"
    gid: "{{ bazarr_pgid }}"
    system: true
    state: present
  when: bazarr_ensure_user | default(true)

# Ensure user exists for PUID (required for directory ownership)
- name: Ensure media user exists for Bazarr
  ansible.builtin.user:
    name: "{{ bazarr_user_name | default('media') }}"
    uid: "{{ bazarr_puid }}"
    group: "{{ bazarr_group_name | default('media') }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  when: bazarr_ensure_user | default(true)

- name: Create bazarr directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ bazarr_puid }}"
    group: "{{ bazarr_pgid }}"
    mode: "0755"
  loop:
    - "{{ bazarr_data_dir }}"
    - "{{ bazarr_config_dir }}"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ bazarr_data_dir }}/docker-compose.yml"
    owner: root
    group: docker
    mode: "0640"
  notify: Restart bazarr

- name: Create Bazarr systemd service
  ansible.builtin.template:
    src: bazarr.service.j2
    dest: /etc/systemd/system/bazarr.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart bazarr

- name: Configure UFW firewall for Bazarr (restricted access)
  community.general.ufw:
    rule: allow
    port: "{{ bazarr_port }}"
    proto: tcp
    src: "{{ item }}"
    comment: "Bazarr ({{ item }})"
  loop: "{{ bazarr_allowed_sources | default([traefik_ip | default('192.168.0.205'), '127.0.0.1']) }}"
  when: bazarr_configure_firewall

- name: Pull Bazarr Docker image
  community.docker.docker_image:
    name: "{{ bazarr_docker_image }}"
    tag: "{{ bazarr_version }}"
    source: pull
  retries: 3
  delay: 10
  register: docker_pull_result
  until: docker_pull_result is succeeded

- name: Enable and start Bazarr
  ansible.builtin.systemd:
    name: bazarr
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Bazarr to be ready
  block:
    - name: Check Bazarr health endpoint
      ansible.builtin.uri:
        url: "http://localhost:{{ bazarr_port }}/api/system/status"
        method: GET
        status_code: [200, 401]
      register: bazarr_health
      until: bazarr_health.status in [200, 401]
      retries: 30
      delay: 5

  rescue:
    - name: Warn about Bazarr health check failure
      ansible.builtin.debug:
        msg: |
          WARNING: Bazarr health check did not pass after 150 seconds.
          The service may still be starting or there may be a configuration issue.
          Please verify manually: http://{{ ansible_host }}:{{ bazarr_port }}

    - name: Fail if strict health checks are enabled
      ansible.builtin.fail:
        msg: "Bazarr health check failed and strict mode is enabled"
      when: bazarr_strict_health_check | default(false)

- name: Display Bazarr access information
  ansible.builtin.debug:
    msg: |
      Bazarr is ready!
      Access URL: http://{{ ansible_host }}:{{ bazarr_port }}
      Configure Sonarr/Radarr connections and subtitle providers.
