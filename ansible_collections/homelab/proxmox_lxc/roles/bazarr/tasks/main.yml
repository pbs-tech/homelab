---
# Bazarr deployment tasks

- name: Update system packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present

# Install Docker using common role
- name: Install Docker
  ansible.builtin.include_role:
    name: homelab.common.docker
  vars:
    docker_ensure_group: true

# Validate PUID/PGID - ensure user/group exist or will be created by container
- name: Validate PUID/PGID configuration
  ansible.builtin.assert:
    that:
      - bazarr_puid is defined
      - bazarr_pgid is defined
      - bazarr_puid | int > 0
      - bazarr_pgid | int > 0
    fail_msg: "bazarr_puid and bazarr_pgid must be defined and greater than 0"
    quiet: true

- name: Create bazarr directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ bazarr_puid }}"
    group: "{{ bazarr_pgid }}"
    mode: "0755"
  loop:
    - "{{ bazarr_data_dir }}"
    - "{{ bazarr_config_dir }}"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ bazarr_data_dir }}/docker-compose.yml"
    owner: root
    group: docker
    mode: "0640"
  notify: Restart bazarr

- name: Create Bazarr systemd service
  ansible.builtin.template:
    src: bazarr.service.j2
    dest: /etc/systemd/system/bazarr.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart bazarr

- name: Configure UFW firewall for Bazarr
  community.general.ufw:
    rule: allow
    port: "{{ bazarr_port }}"
    proto: tcp
    comment: "Bazarr"
  when: bazarr_configure_firewall

- name: Pull Bazarr Docker image
  community.docker.docker_image:
    name: "{{ bazarr_docker_image }}"
    tag: "{{ bazarr_version }}"
    source: pull
  retries: 3
  delay: 10
  register: docker_pull_result
  until: docker_pull_result is succeeded

- name: Enable and start Bazarr
  ansible.builtin.systemd:
    name: bazarr
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Bazarr to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ bazarr_port }}/api/system/status"
    method: GET
    status_code: [200, 401]
  register: bazarr_health
  until: bazarr_health.status in [200, 401]
  retries: 30
  delay: 5
  ignore_errors: true

- name: Warn if Bazarr health check failed
  ansible.builtin.debug:
    msg: "Warning: Bazarr health check did not pass. Service may still be starting."
  when: bazarr_health is failed

- name: Display Bazarr access information
  ansible.builtin.debug:
    msg: |
      Bazarr is ready!
      Access URL: http://{{ ansible_host }}:{{ bazarr_port }}
      Configure Sonarr/Radarr connections and subtitle providers.
