---
# PVE-NAS specific configuration - override shared configuration for this host
proxmox_override:
  host: 192.168.0.57
  user: root@pam
  node: pve-nas
  # Use NAS-specific API tokens
  api_token_id: "{{ proxmox_config['pve-nas'].api_token_id }}"
  api_token_secret: "{{ proxmox_config['pve-nas'].api_token_secret }}"

# NAS-specific network settings
nas_storage_network: 192.168.1.0/24
nas_storage_gateway: 192.168.1.1

# TrueNAS VM configuration
truenas_vm_config:
  vm_id: 220
  name: truenas
  memory: 16384
  cores: 4
  sockets: 1
  boot: order=scsi0
  ostype: other
  machine: q35
  bios: ovmf
  efidisk0: local:1,efitype=4m,pre-enrolled-keys=1
  scsi0: local:32,cache=writethrough,iothread=1
  net0: virtio,bridge=vmbr0

# PCI passthrough configuration
pci_passthrough:
  enable_iommu: true
  storage_controllers:
    - "0000:00:1f.2" # Example SATA controller
    - "0000:02:00.0" # Example NVMe controller

# Security settings for NAS services
nas_security:
  vpn_interface: wg-nas
  allowed_subnets:
    - "192.168.0.0/24"
    - "10.0.0.0/8"
  blocked_ports:
    - 22 # SSH (use bastion only)
    - 445 # SMB (internal only)
    - 2049 # NFS (internal only)

# Storage mount points for arr-stack
nfs_mounts:
  media_root: /mnt/nas/media
  downloads: /mnt/nas/downloads
  config: /mnt/nas/config
  truenas_host: 192.168.0.220
