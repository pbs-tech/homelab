---
# Verification for media server roles molecule test

- name: Verify media server configuration
  hosts: all
  gather_facts: true
  tasks:
    - name: Verify Docker is running
      ansible.builtin.systemd:
        name: docker
        state: started
      check_mode: true
      register: docker_service

    - name: Assert Docker service is running
      ansible.builtin.assert:
        that:
          - docker_service is succeeded
        fail_msg: "Docker service is not running"

    - name: Verify docker group exists
      ansible.builtin.command: getent group docker
      register: docker_group_check
      changed_when: false

    - name: Verify Sonarr directories exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: sonarr_dirs
      loop:
        - /opt/sonarr
        - /opt/sonarr/config

    - name: Assert Sonarr directories exist
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isdir
        fail_msg: "Sonarr directory does not exist: {{ item.item }}"
      loop: "{{ sonarr_dirs.results }}"

    - name: Verify docker-compose file has correct permissions
      ansible.builtin.stat:
        path: /opt/sonarr/docker-compose.yml
      register: compose_stat

    - name: Assert docker-compose permissions
      ansible.builtin.assert:
        that:
          - compose_stat.stat.exists
          - compose_stat.stat.mode == '0640'
        fail_msg: "Docker compose file has incorrect permissions"

    - name: Verify systemd service file exists
      ansible.builtin.stat:
        path: /etc/systemd/system/sonarr.service
      register: service_stat

    - name: Assert systemd service file exists
      ansible.builtin.assert:
        that:
          - service_stat.stat.exists
        fail_msg: "Systemd service file does not exist"

    - name: Display test results
      ansible.builtin.debug:
        msg: |
          Media services molecule test completed successfully!
          - Docker installed and running
          - Docker group exists
          - Sonarr directories created
          - Docker compose template rendered with security options
          - Systemd service template rendered with correct Type
