---
# Molecule test for media server roles
# Tests Docker installation and basic role structure validation

- name: Test media server role structure
  hosts: all
  gather_facts: true
  vars:
    # Common test variables
    homelab_domain: test.local

    # Sonarr test variables
    sonarr_puid: 1000
    sonarr_pgid: 1000
    sonarr_timezone: UTC
    sonarr_data_dir: /opt/sonarr
    sonarr_config_dir: /opt/sonarr/config
    sonarr_media_dir: /media/tv
    sonarr_download_dir: /downloads
    sonarr_port: 8989
    sonarr_version: latest
    sonarr_container_name: sonarr
    sonarr_docker_image: lscr.io/linuxserver/sonarr
    sonarr_docker_restart_policy: unless-stopped
    sonarr_configure_firewall: false
    sonarr_extra_volumes: []
    sonarr_memory_limit: ""

  tasks:
    - name: Install Docker using common role
      ansible.builtin.include_role:
        name: homelab.common.docker
      vars:
        docker_ensure_group: true

    - name: Verify Docker is installed
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      ansible.builtin.debug:
        msg: "Docker version: {{ docker_version.stdout }}"

    - name: Verify docker group exists
      ansible.builtin.getent:
        database: group
        key: docker
      register: docker_group

    - name: Assert docker group exists
      ansible.builtin.assert:
        that:
          - docker_group is succeeded
        fail_msg: "Docker group does not exist"

    # Test Sonarr role structure without actually running Docker containers
    - name: Create Sonarr data directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ sonarr_puid }}"
        group: "{{ sonarr_pgid }}"
        mode: "0755"
      loop:
        - "{{ sonarr_data_dir }}"
        - "{{ sonarr_config_dir }}"
        - "{{ sonarr_media_dir }}"
        - "{{ sonarr_download_dir }}"

    - name: Test Sonarr docker-compose template rendering
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../roles/sonarr/templates/docker-compose.yml.j2"
        dest: "{{ sonarr_data_dir }}/docker-compose.yml"
        owner: root
        group: docker
        mode: "0640"

    - name: Test Sonarr systemd service template rendering
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../roles/sonarr/templates/sonarr.service.j2"
        dest: /etc/systemd/system/sonarr.service
        mode: "0644"

    - name: Verify docker-compose.yml was created
      ansible.builtin.stat:
        path: "{{ sonarr_data_dir }}/docker-compose.yml"
      register: compose_file

    - name: Assert docker-compose.yml exists
      ansible.builtin.assert:
        that:
          - compose_file.stat.exists
        fail_msg: "Docker compose file was not created"

    - name: Read docker-compose.yml content
      ansible.builtin.slurp:
        src: "{{ sonarr_data_dir }}/docker-compose.yml"
      register: compose_content

    - name: Verify security options in docker-compose
      ansible.builtin.assert:
        that:
          - "'no-new-privileges:true' in (compose_content.content | b64decode)"
        fail_msg: "Security options not found in docker-compose.yml"

    - name: Read systemd service file
      ansible.builtin.slurp:
        src: /etc/systemd/system/sonarr.service
      register: service_content

    - name: Verify systemd service uses Type=simple
      ansible.builtin.assert:
        that:
          - "'Type=simple' in (service_content.content | b64decode)"
          - "'Type=oneshot' not in (service_content.content | b64decode)"
        fail_msg: "Systemd service should use Type=simple, not Type=oneshot"
