---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: docker

platforms:
  - name: media-test
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    # SECURITY NOTE: Docker test container runs privileged to support systemd
    # This is ONLY for testing infrastructure.
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /tmp:exec,mode=1777
      - /run
      - /run/lock
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN
    groups:
      - media_services_test

provisioner:
  env:
    ANSIBLE_REMOTE_TMP: /tmp/ansible-tmp
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: profile_tasks,timer
      stdout_callback: default
      result_format: yaml
      host_key_checking: false
      remote_tmp: /tmp/ansible-tmp
  inventory:
    host_vars:
      media-test:
        ansible_user: root
        ansible_connection: docker
        ansible_default_ipv4:
          address: 127.0.0.1

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
