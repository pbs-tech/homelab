---
- name: Prepare test environment
  hosts: all
  gather_facts: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Podman for container-based services
      ansible.builtin.apt:
        name:
          - podman
          - podman-compose
        state: present

    - name: Enable Podman socket
      ansible.builtin.systemd:
        name: podman.socket
        state: started
        enabled: true

    - name: Create test directories
      ansible.builtin.file:
        path: {{ item }}
        state: directory
        mode: 0755
      loop:
        - /opt/test
        - /var/log/test
        - /etc/test

    - name: Ensure SSH directory exists
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        mode: 0700

    - name: Generate SSH keypair for testing
      community.crypto.openssh_keypair:
        path: /root/.ssh/id_rsa
        type: rsa
        size: 2048
        comment: molecule-test-key
        force: false

    - name: Set proper permissions on SSH keys
      ansible.builtin.file:
        path: {{ item.path }}
        mode: {{ item.mode }}
      loop:
        - { path: "/root/.ssh/id_rsa", mode: "0600" }
        - { path: "/root/.ssh/id_rsa.pub", mode: "0644" }
