---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: podman

platforms:
    - name: ubuntu-test
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    # cgroupns_mode not needed for podman
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN
    published_ports:
      - "8080:8080"  # Traefik dashboard
      - "3000:3000"  # Grafana
      - "9090:9090"  # Prometheus
      - "3100:3100"  # Loki

provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: profile_tasks,timer,yaml
      stdout_callback: yaml
      bin_ansible_callbacks: true
      host_key_checking: false
  inventory:
    host_vars:
      ubuntu-test:
        ansible_user: root
        ansible_connection: podman
        # Override network settings for Podman testing
        ansible_default_ipv4:
          address: 127.0.0.1
        # Mock Proxmox settings for testing
        proxmox_host: 127.0.0.1
        proxmox_user: root@pam
        container_ssh_key: ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC... mock-key

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
