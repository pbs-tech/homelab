---
- name: Verify deployed services
  hosts: all
  gather_facts: true
  tasks:
    - name: Check if Prometheus is running
      uri:
        url: http://127.0.0.1:9090/api/v1/status/config
        method: GET
        status_code: 200
      register: prometheus_status
      retries: 5
      delay: 10
      tags: [prometheus]

    - name: Verify Prometheus configuration
      assert:
        that:
          - prometheus_status.status == 200
        fail_msg: Prometheus is not responding correctly
      tags: [prometheus]

    - name: Check if Grafana is running
      uri:
        url: http://127.0.0.1:3000/api/health
        method: GET
        status_code: 200
      register: grafana_health
      retries: 5
      delay: 10
      tags: [grafana]

    - name: Verify Grafana health
      assert:
        that:
          - grafana_health.status == 200
        fail_msg: Grafana is not healthy
      tags: [grafana]

    - name: Check if Loki is running
      uri:
        url: http://127.0.0.1:3100/ready
        method: GET
        status_code: 200
      register: loki_ready
      retries: 5
      delay: 10
      tags: [loki]

    - name: Verify Loki readiness
      assert:
        that:
          - loki_ready.status == 200
        fail_msg: Loki is not ready
      tags: [loki]

    - name: Check if Promtail is running
      systemd:
        name: promtail
        state: started
      register: promtail_service
      tags: [promtail]

    - name: Verify Promtail service status
      assert:
        that:
          - promtail_service.status.ActiveState == "active"
        fail_msg: Promtail service is not active
      tags: [promtail]

    - name: Test log ingestion pipeline
      block:
        - name: Generate test log entry
          shell: echo "MOLECULE_TEST_LOG_$(date +%s): Testing log pipeline" | systemd-cat -t molecule-test

        - name: Wait for log ingestion
          pause:
            seconds: 10

        - name: Query Loki for test log
          uri:
            url: http://127.0.0.1:3100/loki/api/v1/query_range
            method: GET
            body_format: form-urlencoded
            body:
              query: {job="systemd-journal"} |= "MOLECULE_TEST_LOG"
              start: {{ (ansible_date_time.epoch | int - 300) }}000000000
              end: {{ ansible_date_time.epoch }}000000000
          register: loki_query
          retries: 3
          delay: 5

        - name: Verify log was ingested
          assert:
            that:
              - loki_query.json.status == "success"
              - loki_query.json.data.result | length > 0
            fail_msg: Test log was not found in Loki
      tags: [integration]
