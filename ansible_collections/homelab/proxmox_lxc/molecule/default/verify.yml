---
# Simplified verification for proxmox_lxc collection testing
# Verifies Prometheus is running and responding

- name: Verify Prometheus deployment
  hosts: all
  gather_facts: true
  tasks:
    - name: Wait for Prometheus to be ready
      uri:
        url: http://127.0.0.1:9090/-/ready
        method: GET
        status_code: 200
      register: prometheus_ready
      retries: 10
      delay: 10
      until: prometheus_ready.status == 200

    - name: Check Prometheus API is accessible
      uri:
        url: http://127.0.0.1:9090/api/v1/status/config
        method: GET
        status_code: 200
      register: prometheus_config

    - name: Verify Prometheus configuration
      assert:
        that:
          - prometheus_config.status == 200
        fail_msg: Prometheus API is not responding correctly

    - name: Test Prometheus can scrape itself
      uri:
        url: http://127.0.0.1:9090/api/v1/query
        method: GET
        body_format: form-urlencoded
        body:
          query: up{job='prometheus'}
      register: prometheus_self_scrape
      retries: 5
      delay: 10
      until: prometheus_self_scrape.json.status == "success"

    - name: Verify Prometheus self-monitoring
      assert:
        that:
          - prometheus_self_scrape.json.status == "success"
          - prometheus_self_scrape.json.data.result | length > 0
        fail_msg: Prometheus cannot scrape itself
