---
- name: Verify monitoring stack integration
  hosts: monitoring
  gather_facts: true

  tasks:
    - name: Test Prometheus is accessible
      uri:
        url: http://127.0.0.1:9090/api/v1/status/config
        method: GET
        status_code: 200
      retries: 10
      delay: 15

    - name: Test Prometheus can scrape itself
      uri:
        url: http://127.0.0.1:9090/api/v1/query
        method: GET
        body_format: form-urlencoded
        body:
          query: up{job='prometheus'}
      register: prometheus_self_scrape
      retries: 5
      delay: 10

    - name: Verify Prometheus self-monitoring
      assert:
        that:
          - prometheus_self_scrape.json.status == "success"
          - prometheus_self_scrape.json.data.result | length > 0
        fail_msg: Prometheus cannot scrape itself

    - name: Test Loki is ready
      uri:
        url: http://127.0.0.1:3100/ready
        method: GET
        status_code: 200
      retries: 10
      delay: 15

    - name: Test Grafana health
      uri:
        url: http://127.0.0.1:3000/api/health
        method: GET
        status_code: 200
      retries: 10
      delay: 15

    - name: Test Grafana datasources
      uri:
        url: http://admin:molecule123@127.0.0.1:3000/api/datasources
        method: GET
        status_code: 200
        return_content: yes
      register: grafana_datasources

    - name: Verify Grafana has both datasources
      assert:
        that:
          - grafana_datasources.json | selectattr('name', 'equalto', 'Prometheus') | list | length == 1
          - grafana_datasources.json | selectattr('name', 'equalto', 'Loki') | list | length == 1
        fail_msg: Grafana datasources not configured correctly

    - name: Generate test logs for integration test
      shell: 'set -o pipefail && echo "MOLECULE_STACK_TEST_$(date +%s): Testing monitoring stack integration" | systemd-cat -t molecule-stack-test'
      changed_when: true
      args:
        executable: /bin/bash

    - name: Wait for log ingestion
      pause:
        seconds: 15

    - name: Test log query in Loki
      uri:
        url: http://127.0.0.1:3100/loki/api/v1/query_range
        method: GET
        body_format: form-urlencoded
        body:
          query: '{job="systemd-journal"} |= "MOLECULE_STACK_TEST"'
          start: "{{ (ansible_date_time.epoch | int - 60) }}000000000"
          end: "{{ ansible_date_time.epoch }}000000000"
      register: loki_integration_test

    - name: Verify log integration
      assert:
        that:
          - loki_integration_test.json.status == "success"
        fail_msg: Log integration test failed

- name: Verify networking stack
  hosts: networking
  gather_facts: true

  tasks:
    - name: Test Traefik dashboard
      uri:
        url: http://127.0.0.1:8080/api/overview
        method: GET
        status_code: 200
      retries: 10
      delay: 15

    - name: Test Unbound DNS resolution
      command: dig @127.0.0.1 prometheus.molecule.test A +short
      changed_when: false
      register: dns_resolution
      retries: 5
      delay: 5

    - name: Verify DNS resolution
      assert:
        that:
          - "'172.17.0.3' in dns_resolution.stdout"
        fail_msg: DNS resolution not working

- name: Test cross-container connectivity
  hosts: networking
  gather_facts: true

  tasks:
    - name: Test connectivity to monitoring stack
      uri:
        url: http://172.17.0.2:9090/api/v1/status/config
        method: GET
        status_code: 200
        timeout: 10
      register: cross_container_test

    - name: Verify cross-container communication
      assert:
        that:
          - cross_container_test.status == 200
        fail_msg: Cross-container communication failed

    - name: Test Traefik routing to Prometheus
      uri:
        url: http://127.0.0.1:8080/
        method: GET
        headers:
          Host: prometheus.molecule.test
        follow_redirects: false
        status_code: [200, 301, 302, 404]  # Various expected responses
      register: traefik_routing
      ignore_errors: true

    - name: Report integration test results
      debug:
        msg:
          - "Monitoring Stack: ✓ Prometheus, Loki, Grafana, Promtail"
          - "Networking Stack: ✓ Traefik, Unbound DNS"
          - "Cross-container connectivity: ✓ Working"
          - "Service integration test: ✓ Complete"
