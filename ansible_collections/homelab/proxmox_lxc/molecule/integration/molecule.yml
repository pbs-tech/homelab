---
# Integration test scenario for proxmox_lxc collection
# Tests multiple services working together in a realistic environment

dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: docker

platforms:
  # Prometheus monitoring node
  - name: prometheus-integration
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    # SECURITY NOTE: Docker test container runs privileged to support systemd
    # This is ONLY for testing infrastructure. Actual LXC containers deployed
    # by these roles use container_unprivileged=true by default.
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /tmp:exec,mode=1777
      - /run
      - /run/lock
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN
    groups:
      - monitoring
      - lxc_containers
    published_ports:
      - "9090:9090"  # Prometheus

  # Grafana visualization node
  - name: grafana-integration
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /tmp:exec,mode=1777
      - /run
      - /run/lock
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN
    groups:
      - monitoring
      - lxc_containers
    published_ports:
      - "3000:3000"  # Grafana

  # Traefik reverse proxy
  - name: traefik-integration
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /tmp:exec,mode=1777
      - /run
      - /run/lock
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN
      - NET_ADMIN
    groups:
      - networking
      - lxc_containers
    published_ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS
      - "8080:8080"  # Traefik dashboard

provisioner:
  env:
    ANSIBLE_REMOTE_TMP: /tmp/ansible-tmp
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: profile_tasks,timer,yaml
      stdout_callback: yaml
      host_key_checking: false
      remote_tmp: /tmp/ansible-tmp
  inventory:
    host_vars:
      prometheus-integration:
        ansible_user: root
        ansible_connection: docker
        container_id: 200
        inventory_hostname: prometheus-lxc
        prometheus_retention: "15d"
        prometheus_port: 9090
      grafana-integration:
        ansible_user: root
        ansible_connection: docker
        container_id: 201
        inventory_hostname: grafana-lxc
        grafana_admin_password: integration_test_password
        grafana_port: 3000
        grafana_prometheus_url: "http://prometheus-integration:9090"
      traefik-integration:
        ansible_user: root
        ansible_connection: docker
        container_id: 205
        inventory_hostname: traefik-lxc
        traefik_dashboard_enabled: true
        traefik_entrypoints:
          web:
            address: ":80"
          websecure:
            address: ":443"
    group_vars:
      all:
        homelab_domain: integration.test
        homelab_network:
          gateway_ip: 172.17.0.1
          dns_servers: ["8.8.8.8", "1.1.1.1"]
          cluster_cidr: 10.42.0.0/16
          service_cidr: 10.43.0.0/16

        proxmox_config:
          pve_mac:
            host: 127.0.0.1
            user: root@pam
            node: pve-mac
          pve_nas:
            host: 127.0.0.1
            user: root@pam
            node: pve-nas

        container_defaults:
          template: ubuntu-22.04-standard_22.04-1_amd64.tar.zst
          disk_size: 8
          cores: 2
          memory: 1024
          swap: 0
          onboot: true
          unprivileged: true

        security_config:
          hardening_enabled: true
          ssh_key_path: /tmp/integration_key

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
  # Note: Integration tests focus on service interaction, not idempotence
