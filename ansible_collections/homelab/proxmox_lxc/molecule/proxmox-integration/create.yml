---
- name: Create test LXC container on Proxmox
  hosts: localhost
  gather_facts: false
  vars:
    proxmox_host: "192.168.0.56"
    proxmox_user: "root@pam"
    proxmox_node: "pve-mac"
    
  tasks:
    - name: Create LXC container for testing
      community.general.proxmox:
        vmid: 250
        node: "{{ proxmox_node }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ lookup('env', 'PROXMOX_PASSWORD') }}"
        api_host: "{{ proxmox_host }}"
        password: "{{ lookup('env', 'CONTAINER_PASSWORD') | default('molecule123', true) }}"
        hostname: "molecule-test-lxc"
        ostemplate: "local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
        cores: 2
        memory: 1024
        disk: "8"
        netif: '{"net0":"name=eth0,bridge=vmbr0,ip=192.168.0.250/24,gw=192.168.0.1"}'
        onboot: false
        unprivileged: true
        state: present
      register: container_create

    - name: Start the test container
      community.general.proxmox:
        vmid: 250
        node: "{{ proxmox_node }}"
        api_user: "{{ proxmox_user }}"
        api_password: "{{ lookup('env', 'PROXMOX_PASSWORD') }}"
        api_host: "{{ proxmox_host }}"
        state: started
      when: container_create is changed

    - name: Wait for container to be accessible
      wait_for:
        host: "192.168.0.250"
        port: 22
        delay: 30
        timeout: 300

    - name: Add container to runtime inventory
      add_host:
        name: molecule-test-lxc
        ansible_host: "192.168.0.250"
        ansible_user: root
        ansible_ssh_pass: "{{ lookup('env', 'CONTAINER_PASSWORD') | default('molecule123', true) }}"
        groups: proxmox_test_containers