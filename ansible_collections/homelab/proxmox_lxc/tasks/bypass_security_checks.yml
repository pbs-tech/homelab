---
# Bypass file for emergency/maintenance situations
# Create this file to skip security checks:
# touch /tmp/bypass_security_checks

- name: Check for security bypass flag
  stat:
    path: /tmp/bypass_security_checks
  register: bypass_flag
  delegate_to: localhost

- name: Display security bypass warning
  debug:
    msg: |
      WARNING: Security checks are being bypassed!
      This should only be used for emergency maintenance.
      Remove /tmp/bypass_security_checks when finished.
  when: bypass_flag.stat.exists

- name: Run security checks unless bypassed
  include_tasks: security_checks.yml
  when: not bypass_flag.stat.exists