---
- name: Configure Traefik for K3s integration
  hosts: traefik-lxc
  become: true
  tasks:
    - name: Copy K3s kubeconfig from bastion
      copy:
        src: "{{ k3s_kubeconfig_path }}"
        dest: /etc/traefik/kubeconfig
        owner: traefik
        group: traefik
        mode: "0600"
      delegate_to: "{{ groups['bastion'][0] }}"

    - name: Extract K3s CA certificate
      shell:
        cmd: |
          set -o pipefail
          # yamllint disable-line rule:line-length
          # yamllint disable-line rule:line-length
          kubectl config view --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}' | base64 -d > /etc/traefik/k3s-ca.crt
        executable: /bin/bash
        creates: /etc/traefik/k3s-ca.crt
      environment:
        KUBECONFIG: /etc/traefik/kubeconfig
      become: true
      become_user: traefik
      changed_when: false

    - name: Create K3s service account for Traefik
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: traefik
            namespace: kube-system
      delegate_to: "{{ groups['bastion'][0] }}"

    - name: Create ClusterRole for Traefik
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: traefik-ingress-controller
          rules:
            - apiGroups: [""]
              resources: [services, endpoints, "secrets"]
              verbs: [get, list, "watch"]
            - apiGroups: [extensions, networking.k8s.io]
              resources: [ingresses, ingressclasses]
              verbs: [get, list, "watch"]
            - apiGroups: [extensions, networking.k8s.io]
              resources: ["ingresses/status"]
              verbs: ["update"]
      delegate_to: "{{ groups['bastion'][0] }}"

    - name: Create ClusterRoleBinding for Traefik
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: traefik-ingress-controller
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: traefik-ingress-controller
          subjects:
            - kind: ServiceAccount
              name: traefik
              namespace: kube-system
      delegate_to: "{{ groups['bastion'][0] }}"

    - name: Get service account token
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        namespace: kube-system
        label_selectors:
          - "kubernetes.io/service-account.name=traefik"
      register: traefik_secret
      delegate_to: "{{ groups['bastion'][0] }}"
      no_log: true  # Protect service token from logs

    - name: Update Traefik configuration with service token
      ansible.builtin.lineinfile:
        path: /etc/traefik/traefik.yml
        regexp: "^\\s*token:"
        line: "    token: {{ traefik_secret.resources[0].data.token | b64decode }}"
        insertafter: "endpoints:"
      notify: Restart traefik
      no_log: true  # Protect service token from logs

  handlers:
    - name: Restart traefik
      systemd:
        name: traefik
        state: restarted
