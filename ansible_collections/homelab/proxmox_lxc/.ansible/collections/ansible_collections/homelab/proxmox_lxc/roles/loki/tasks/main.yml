---
- name: Update system packages
  apt:
    update_cache: true
    upgrade: true

- name: Install required packages
  apt:
    name:
      - curl
      - unzip
      - ca-certificates
    state: present

- name: Create loki user
  user:
    name: "{{ loki_user }}"
    system: true
    shell: /bin/false
    home: "{{ loki_data_dir }}"
    create_home: false
    group: "{{ loki_group }}"

- name: Create loki group
  group:
    name: "{{ loki_group }}"
    system: true

- name: Create loki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ loki_user }}"
    group: "{{ loki_group }}"
    mode: "0755"
  loop:
    - "{{ loki_config_dir }}"
    - "{{ loki_data_dir }}"
    - "{{ loki_data_dir }}/chunks"
    - "{{ loki_data_dir }}/boltdb-compactor"
    - "{{ loki_log_dir }}"

- name: Download Loki binary
  get_url:
    url: https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip
    dest: /tmp/loki.zip
    mode: "0644"
  register: loki_download

- name: Extract Loki binary  # noqa: no-handler - Sequential installation step, must run in order during task flow
  unarchive:
    src: /tmp/loki.zip
    dest: /tmp
    remote_src: true
  when: loki_download.changed

- name: Install Loki binary  # noqa: no-handler - Sequential installation step, must run in order during task flow
  copy:
    src: /tmp/loki-linux-amd64
    dest: "{{ loki_bin_dir }}/loki"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: loki_download.changed
  notify: restart loki

- name: Create Loki configuration file
  template:
    src: loki.yml.j2
    dest: "{{ loki_config_dir }}/loki.yml"
    owner: "{{ loki_user }}"
    group: "{{ loki_group }}"
    mode: "0644"
    backup: true
  notify: restart loki

- name: Create Loki systemd service
  template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    mode: "0644"
  notify:
    - reload systemd
    - restart loki

- name: Enable and start Loki
  systemd:
    name: loki
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Loki to start
  wait_for:
    host: "{{ loki_listen_address }}"
    port: "{{ loki_listen_port }}"
    delay: 5
    timeout: 30

- name: Check Loki readiness
  uri:
    url: "http://{{ ansible_default_ipv4.address }}:{{ loki_port }}/ready"
    method: GET
    return_content: true
  register: loki_health
  retries: 5
  delay: 5

- name: Display Loki status
  debug:
    msg: "Loki is ready and running on port {{ loki_port }}"
