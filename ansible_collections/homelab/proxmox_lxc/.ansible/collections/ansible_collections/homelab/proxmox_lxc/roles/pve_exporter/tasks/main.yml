---
# Proxmox VE Exporter deployment tasks
# Exports Proxmox metrics for Prometheus

- name: Display PVE Exporter role status
  ansible.builtin.debug:
    msg: "PVE Exporter role is a stub - implementation pending"

- name: Create pve-exporter user
  ansible.builtin.user:
    name: pve-exporter
    system: true
    shell: /bin/false
    home: /var/lib/pve-exporter
    create_home: true

- name: Create pve-exporter directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: pve-exporter
    group: pve-exporter
    mode: "0755"
  loop:
    - /etc/pve-exporter
    - /var/lib/pve-exporter
