---
# Comprehensive monitoring agent setup for infrastructure observability

- name: Install monitoring dependencies
  ansible.builtin.package:
    name:
      - curl
      - wget
      - jq
      - python3-pip
    state: present

- name: Install Python monitoring libraries
  ansible.builtin.pip:
    name:
      - psutil
      - requests
      - prometheus_client
    state: present

- name: Create monitoring user
  ansible.builtin.user:
    name: "{{ monitoring_user }}"
    system: true
    shell: /bin/false
    home: "{{ monitoring_home }}"
    create_home: true

- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_user }}"
    mode: "0755"
  loop:
    - "{{ monitoring_config_dir }}"
    - "{{ monitoring_data_dir }}"
    - "{{ monitoring_log_dir }}"
    - "{{ monitoring_scripts_dir }}"

- name: Install Node Exporter
  ansible.builtin.unarchive:
    src: >-
      https://github.com/prometheus/node_exporter/releases/download/v{{
      node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
    dest: /opt
    remote_src: true
    creates: /opt/node_exporter-{{ node_exporter_version }}.linux-amd64
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_user }}"

- name: Link Node Exporter binary
  ansible.builtin.file:
    src: /opt/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    state: link
    owner: root
    group: root
    mode: "0755"

- name: Create Node Exporter systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify:
    - reload systemd
    - restart node_exporter

- name: Install custom monitoring scripts
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ monitoring_scripts_dir }}/{{ item }}"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_user }}"
    mode: "0755"
  loop:
    - infrastructure_health_check.py
    - service_discovery.py
    - performance_metrics.py
    - log_analyzer.py

- name: Create monitoring configuration
  ansible.builtin.template:
    src: monitoring_config.yml.j2
    dest: "{{ monitoring_config_dir }}/config.yml"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_user }}"
    mode: "0644"
  notify: restart monitoring_agent

- name: Install Promtail for log collection
  ansible.builtin.unarchive:
    src: >-
      https://github.com/grafana/loki/releases/download/v{{
      promtail_version }}/promtail-linux-amd64.zip
    dest: /usr/local/bin
    remote_src: true
    creates: /usr/local/bin/promtail-linux-amd64
    mode: "0755"
    owner: root
    group: root

- name: Create Promtail symlink
  ansible.builtin.file:
    src: /usr/local/bin/promtail-linux-amd64
    dest: /usr/local/bin/promtail
    state: link

- name: Configure Promtail
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: "{{ monitoring_config_dir }}/promtail.yml"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_user }}"
    mode: "0644"
  notify: restart promtail

- name: Create Promtail systemd service
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: "0644"
  notify:
    - reload systemd
    - restart promtail

- name: Configure log rotation
  ansible.builtin.template:
    src: monitoring_logrotate.j2
    dest: /etc/logrotate.d/monitoring
    mode: "0644"

- name: Create monitoring cron jobs
  ansible.builtin.cron:
    name: "{{ item.name }}"
    minute: "{{ item.minute }}"
    hour: "{{ item.hour }}"
    job: "{{ item.job }}"
    user: "{{ monitoring_user }}"
  loop:
    - name: Infrastructure health check
      minute: "*/5"
      hour: "*"
      job: "{{ monitoring_scripts_dir }}/infrastructure_health_check.py"
    - name: Service discovery update
      minute: "*/10"
      hour: "*"
      job: "{{ monitoring_scripts_dir }}/service_discovery.py"
    - name: Performance metrics collection
      minute: "*/1"
      hour: "*"
      job: "{{ monitoring_scripts_dir }}/performance_metrics.py"
    - name: Log analysis
      minute: "0"
      hour: "*/4"
      job: "{{ monitoring_scripts_dir }}/log_analyzer.py"

- name: Configure monitoring alerting
  ansible.builtin.template:
    src: alert_rules.yml.j2
    dest: "{{ monitoring_config_dir }}/alert_rules.yml"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_user }}"
    mode: "0644"

- name: Enable and start monitoring services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - node_exporter
    - promtail

- name: Configure firewall for monitoring
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    comment: Monitoring - {{ item }}
  loop:
    - "{{ node_exporter_port }}"
    - "{{ promtail_port }}"
  when: firewall_enabled | default(true)

- name: Verify monitoring services
  ansible.builtin.uri:
    url: http://localhost:{{ item.port }}/{{ item.path }}
    method: GET
    return_content: true
  register: monitoring_check
  failed_when: monitoring_check.status != 200
  loop:
    - port: "{{ node_exporter_port }}"
      path: metrics
    - port: "{{ promtail_port }}"
      path: ready
  retries: 3
  delay: 10
