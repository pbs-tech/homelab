---
- name: Configure rsyslog for security logging
  blockinfile:
    path: /etc/rsyslog.conf
    marker: # {mark} ANSIBLE MANAGED SECURITY LOGGING
    block: |
      # Security and authentication logs
      auth,authpriv.*                 /var/log/auth.log
      kern.*                         /var/log/kern.log

      # Separate log files for different services
      {% if inventory_hostname in groups['nas_services'] %}
      local0.*                       /var/log/{{ inventory_hostname | regex_replace('-lxc$', '') }}/app.log
      {% endif %}

      # Log rotation and remote logging settings
      $WorkDirectory /var/spool/rsyslog
      $ActionFileDefaultTemplate RSYSLOG_TraditionalFileFormat
      $ActionFileEnableSync on
      $IncludeConfig /etc/rsyslog.d/*.conf
    insertafter: ^#.*facilities.*
  notify: restart rsyslog

- name: Create application log directories
  file:
    path: /var/log/{{ inventory_hostname | regex_replace('-lxc$', '') }}"
    state: directory
    mode: "0755"
    owner: syslog
    group: adm
  when: inventory_hostname in groups['nas_services']

- name: Configure log rotation for application logs
  template:
    src: app-logrotate.j2
    dest: /etc/logrotate.d/{{ inventory_hostname | regex_replace('-lxc$', '') }}"
    mode: "0644"
    owner: root
    group: root
  when: inventory_hostname in groups['nas_services']

- name: Configure system log rotation
  replace:
    path: /etc/logrotate.d/rsyslog
    regexp: "^(\\s*)(weekly|daily|monthly)$"
    replace: "\\1daily"

- name: Set log retention policy
  replace:
    path: /etc/logrotate.d/rsyslog
    regexp: "^(\\s*)rotate\\s+\\d+"
    replace: "\\1rotate 30"

- name: Enable log compression
  lineinfile:
    path: /etc/logrotate.d/rsyslog
    line: compress
    insertafter: ^\s*missingok
    state: present

- name: Start and enable rsyslog
  systemd:
    name: rsyslog
    state: started
    enabled: true
