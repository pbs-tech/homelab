---
# Home Assistant deployment tasks
# TODO: Implement Home Assistant configuration

- name: Display Home Assistant role status
  ansible.builtin.debug:
    msg: "Home Assistant role is a stub - implementation pending"

- name: Create homeassistant user
  ansible.builtin.user:
    name: homeassistant
    system: true
    shell: /bin/false
    home: /var/lib/homeassistant
    create_home: true

- name: Create homeassistant directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: homeassistant
    group: homeassistant
    mode: "0755"
  loop:
    - /etc/homeassistant
    - /var/lib/homeassistant
    - /var/lib/homeassistant/config
