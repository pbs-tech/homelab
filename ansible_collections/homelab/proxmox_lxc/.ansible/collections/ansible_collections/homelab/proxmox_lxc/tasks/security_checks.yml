---
# Shared security prerequisite checks
- name: Check if bastion host is accessible
  ansible.builtin.wait_for:
    host: 192.168.0.110
    port: 22
    timeout: 10
  delegate_to: localhost
  failed_when: false
  register: bastion_check

- name: Check if DNS security stack is deployed
  ansible.builtin.wait_for:
    host: 192.168.0.202
    port: 53
    timeout: 10
  delegate_to: localhost
  failed_when: false
  register: unbound_check

- name: Check if AdGuard is deployed
  ansible.builtin.wait_for:
    host: 192.168.0.204
    port: 80
    timeout: 10
  delegate_to: localhost
  failed_when: false
  register: adguard_check

- name: Check if WireGuard is deployed
  ansible.builtin.wait_for:
    host: 192.168.0.203
    port: 51820
    timeout: 10
  delegate_to: localhost
  failed_when: false
  register: wireguard_check

- name: Check if Traefik reverse proxy is deployed
  ansible.builtin.wait_for:
    host: 192.168.0.205
    port: 80
    timeout: 10
  delegate_to: localhost
  failed_when: false
  register: traefik_check

- name: Fail if security prerequisites are not met
  ansible.builtin.fail:
    msg: |
      SECURITY PREREQUISITE FAILURE:

      Before deploying monitoring/automation services, you must first deploy the security infrastructure:

      Phase 1: Create bastion host
        ansible-playbook security-deploy.yml --tags "phase1,bastion"

      Phase 2: Deploy security services (run FROM bastion: ssh pbs@192.168.0.110)
        ansible-playbook phase2-security.yml

      Current status:
      # yamllint disable-line rule:line-length
      # yamllint disable-line rule:line-length
      - Bastion (192.168.0.110:22): {{ 'OK' if bastion_check.state is defined and bastion_check.state == 'started' else 'FAILED' }}
      # yamllint disable-line rule:line-length
      # yamllint disable-line rule:line-length
      - Unbound DNS (192.168.0.202:53): {{ 'OK' if unbound_check.state is defined and unbound_check.state == 'started' else 'FAILED' }}
      # yamllint disable-line rule:line-length
      # yamllint disable-line rule:line-length
      - AdGuard (192.168.0.204:80): {{ 'OK' if adguard_check.state is defined and adguard_check.state == 'started' else 'FAILED' }}
      # yamllint disable-line rule:line-length
      # yamllint disable-line rule:line-length
      - WireGuard (192.168.0.203:51820): {{ 'OK' if wireguard_check.state is defined and wireguard_check.state == 'started' else 'FAILED' }}
      # yamllint disable-line rule:line-length
      # yamllint disable-line rule:line-length
      - Traefik (192.168.0.205:80): {{ 'OK' if traefik_check.state is defined and traefik_check.state == 'started' else 'FAILED' }}

      All security services must be running before deploying application services.
  when: >-
    bastion_check.state is not defined or bastion_check.state != 'started' or
    unbound_check.state is not defined or unbound_check.state != 'started' or
    adguard_check.state is not defined or adguard_check.state != 'started' or
    wireguard_check.state is not defined or wireguard_check.state != 'started' or
    traefik_check.state is not defined or traefik_check.state != 'started'
