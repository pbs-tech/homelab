---
- name: Pre-deployment security checks for K3s
  hosts: localhost
  gather_facts: false
  become: false
  tasks:
    - name: Check for security bypass flag
      ansible.builtin.stat:
        path: /tmp/bypass_security_checks
      register: bypass_flag

    - name: Display security bypass warning for K3s
      ansible.builtin.debug:
        msg: |
          WARNING: K3s security checks are being bypassed!
          This should only be used for emergency maintenance.
          Remove /tmp/bypass_security_checks when finished.
      when: bypass_flag.stat.exists | default(false)

    - name: Run K3s security checks unless bypassed
      when: not (bypass_flag.stat.exists | default(false))
      block:
        - name: Check if bastion host is accessible
          ansible.builtin.wait_for:
            host: 192.168.0.110
            port: 22
            timeout: 10
          failed_when: false
          register: bastion_check

        - name: Check if DNS security stack is deployed
          ansible.builtin.wait_for:
            host: 192.168.0.202
            port: 53
            timeout: 10
          failed_when: false
          register: unbound_check

        - name: Check if AdGuard DNS is deployed
          ansible.builtin.wait_for:
            host: 192.168.0.204
            port: 53
            timeout: 10
          failed_when: false
          register: adguard_check

        - name: Display security prerequisite status
          ansible.builtin.debug:
            msg: |
              K3s Security Prerequisites:
              - Bastion (192.168.0.110:22): {{ 'OK' if bastion_check.state is defined and bastion_check.state == 'started' else 'MISSING' }}
              - Unbound DNS (192.168.0.202:53): {{ 'OK' if unbound_check.state is defined and unbound_check.state == 'started' else 'MISSING' }}
              - AdGuard DNS (192.168.0.204:53): {{ 'OK' if adguard_check.state is defined and adguard_check.state == 'started' else 'MISSING' }}

        - name: Fail if security prerequisites are not met
          ansible.builtin.fail:
            msg: |
              SECURITY PREREQUISITE FAILURE:

              Before deploying K3s cluster, deploy the foundation and networking phases:

              Option 1 - Phased deployment (recommended):
                ansible-playbook playbooks/infrastructure.yml --tags "foundation,phase1"
                ansible-playbook playbooks/infrastructure.yml --tags "networking,phase2"

              Option 2 - Deploy networking services directly:
                ansible-playbook playbooks/networking.yml

              To bypass checks for emergency maintenance:
                touch /tmp/bypass_security_checks
          when: >-
            bastion_check.state is not defined or bastion_check.state != 'started' or
            unbound_check.state is not defined or unbound_check.state != 'started' or
            adguard_check.state is not defined or adguard_check.state != 'started'

- name: Apply security hardening to K3s nodes
  hosts: k3s_cluster
  gather_facts: true
  become: true
  roles:
    - role: homelab.k3s.security_hardening
      when: security_hardening_enabled | default(true)
  tags: [security, hardening]

- name: Cluster prep
  hosts: k3s_cluster
  gather_facts: true
  become: true
  roles:
    - role: homelab.k3s.prereq
    - role: homelab.k3s.airgap
    - role: homelab.k3s.raspberrypi

- name: Setup K3S server
  hosts: server
  become: true
  roles:
    - role: homelab.k3s.k3s_server

- name: Setup K3S agent
  hosts: agent
  become: true
  roles:
    - role: homelab.k3s.k3s_agent

- name: Deploy kubeconfig to k3s-bastion
  hosts: k3s-bastion
  become: true
  vars:
    k3s_server_host: "{{ hostvars[groups['server'][0]]['ansible_host'] }}"
    k3s_api_port: "6443"
  tasks:
    - name: Install kubectl
      ansible.builtin.shell: |
        set -e
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/{{ ansible_facts['architecture'] | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }}/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
        rm -f kubectl
      args:
        creates: /usr/local/bin/kubectl

    - name: Create .kube directory for pbs user
      ansible.builtin.file:
        path: /home/pbs/.kube
        state: directory
        owner: pbs
        group: pbs
        mode: "0700"

    - name: Fetch kubeconfig from K3s server
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      delegate_to: "{{ groups['server'][0] }}"
      register: _k3s_kubeconfig

    - name: Write kubeconfig to bastion
      ansible.builtin.copy:
        content: "{{ _k3s_kubeconfig.content | b64decode | regex_replace('https://127.0.0.1:6443', 'https://' + k3s_server_host + ':' + k3s_api_port) }}"
        dest: /home/pbs/.kube/config
        owner: pbs
        group: pbs
        mode: "0600"

    - name: Verify kubectl connectivity
      ansible.builtin.command: kubectl get nodes
      become: true
      become_user: pbs
      register: _kubectl_verify
      changed_when: false
      failed_when: false

    - name: Display kubectl status
      ansible.builtin.debug:
        msg: >-
          {{ 'kubectl working on bastion - nodes: ' + _kubectl_verify.stdout_lines | join(', ')
             if _kubectl_verify.rc == 0
             else 'kubectl not yet able to reach cluster (rc=' + _kubectl_verify.rc | string + ')' }}

- name: Post-deployment security verification
  hosts: k3s_cluster
  gather_facts: true
  become: true
  tasks:
    - name: Verify security services are running
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
      loop:
        - ufw
        - fail2ban
        - avahi-daemon
        - rsyslog
      register: security_services_check

    - name: Check .local domain resolution
      ansible.builtin.command: nslookup {{ inventory_hostname }}.local
      register: local_domain_check
      failed_when: false
      changed_when: false

    - name: Display security status summary
      ansible.builtin.debug:
        msg: |
          Security Status for {{ inventory_hostname }}:
          - UFW Firewall: >-
            {{ 'Running' if security_services_check.results[0].state == 'started' else 'Failed' }}
          - Fail2ban: >-
            {{ 'Running' if security_services_check.results[1].state == 'started' else 'Failed' }}
          - Avahi (.local domains): >-
            {{ 'Running' if security_services_check.results[2].state == 'started' else 'Failed' }}
          - Rsyslog: >-
            {{ 'Running' if security_services_check.results[3].state == 'started' else 'Failed' }}
          - .local domain resolution: {{ 'Working' if local_domain_check.rc == 0 else 'Failed' }}
  tags: [security, verify]
