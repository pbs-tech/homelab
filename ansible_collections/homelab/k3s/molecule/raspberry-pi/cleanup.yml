---
- name: Cleanup test resources
  hosts: raspberry_pi_test
  become: true

  tasks:
    - name: Remove test namespace and workloads
      ansible.builtin.shell: |
        k3s kubectl delete namespace molecule-test-{{ molecule_test_id | default(ansible_date_time.epoch) }} --ignore-not-found=true
      delegate_to: {{ groups['k3s_servers'][0] }}
      run_once: true
      ignore_errors: true

    - name: Remove test marker file
      ansible.builtin.file:
        path: /tmp/molecule-k3s-test
        state: absent

    - name: Reset K3s cluster (optional - uncomment if desired)
      block:
        # Uncomment these tasks if you want to fully reset after testing
        # - name: Stop K3s services
        #   systemd:
        #     name: {{ item }}
        #     state: stopped
        #   loop:
        #     - k3s
        #     - k3s-agent
        #   ignore_errors: true

        # - name: Run K3s uninstall script
        #   shell: /usr/local/bin/k3s-uninstall.sh
        #   ignore_errors: true
        #   when: inventory_hostname in groups['k3s_servers']

        # - name: Run K3s agent uninstall script
        #   shell: /usr/local/bin/k3s-agent-uninstall.sh
        #   ignore_errors: true
        #   when: inventory_hostname in groups['k3s_agents']

        - name: Log cleanup completion
          ansible.builtin.debug:
            msg: Molecule K3s test cleanup completed. Cluster left running for further use.
