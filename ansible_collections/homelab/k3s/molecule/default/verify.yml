---
# Verify playbook for K3s collection molecule testing
# This playbook validates K3s installation and basic cluster functionality

- name: Verify K3s server installation
  hosts: k3s_server
  become: true
  gather_facts: false

  tasks:
    - name: Check K3s binary is installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Assert K3s binary exists
      ansible.builtin.assert:
        that:
          - k3s_binary.stat.exists
          - k3s_binary.stat.executable
        fail_msg: "K3s binary not found or not executable"
        success_msg: "K3s binary is installed and executable"

    - name: Check K3s service exists
      ansible.builtin.systemd:
        name: k3s
      register: k3s_service

    - name: Assert K3s service is configured
      ansible.builtin.assert:
        that:
          - k3s_service.status is defined
          - k3s_service.status.LoadState == "loaded"
        fail_msg: "K3s service is not properly configured"
        success_msg: "K3s service is loaded"

    - name: Get K3s version
      ansible.builtin.command: k3s --version
      register: k3s_version_check
      changed_when: false
      failed_when: false

    - name: Display K3s version
      ansible.builtin.debug:
        msg: "K3s version: {{ k3s_version_check.stdout_lines[0] if k3s_version_check.rc == 0 else 'Unable to determine' }}"

    - name: Check K3s service is running
      ansible.builtin.systemd:
        name: k3s
      register: k3s_service_status

    - name: Assert K3s service is active
      ansible.builtin.assert:
        that:
          - k3s_service_status.status.ActiveState == "active"
          - k3s_service_status.status.SubState == "running"
        fail_msg: "K3s service is not running (State: {{ k3s_service_status.status.ActiveState }})"
        success_msg: "K3s service is active and running"

    - name: Check K3s API is responding
      ansible.builtin.command: k3s kubectl version --short
      register: kubectl_version
      changed_when: false
      failed_when: false
      retries: 5
      delay: 10
      until: kubectl_version.rc == 0

    - name: Display kubectl version
      ansible.builtin.debug:
        var: kubectl_version.stdout_lines
      when: kubectl_version.rc == 0

    - name: Get cluster info
      ansible.builtin.command: k3s kubectl cluster-info
      register: cluster_info
      changed_when: false
      failed_when: false

    - name: Assert cluster is accessible
      ansible.builtin.assert:
        that:
          - cluster_info.rc == 0
          - "'Kubernetes control plane is running' in cluster_info.stdout"
        fail_msg: "Kubernetes control plane is not accessible"
        success_msg: "Kubernetes control plane is running and accessible"

    - name: Check K3s configuration file
      ansible.builtin.stat:
        path: /etc/rancher/k3s/k3s.yaml
      register: k3s_config

    - name: Assert kubeconfig exists
      ansible.builtin.assert:
        that:
          - k3s_config.stat.exists
        fail_msg: "K3s kubeconfig not found"
        success_msg: "K3s kubeconfig exists"

- name: Verify K3s agent installation
  hosts: k3s_agent
  become: true
  gather_facts: false

  tasks:
    - name: Check K3s binary is installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary_agent

    - name: Assert K3s binary exists on agent
      ansible.builtin.assert:
        that:
          - k3s_binary_agent.stat.exists
          - k3s_binary_agent.stat.executable
        fail_msg: "K3s binary not found on agent"
        success_msg: "K3s binary is installed on agent"

    - name: Check K3s agent service exists
      ansible.builtin.systemd:
        name: k3s-agent
      register: k3s_agent_service

    - name: Assert K3s agent service is configured
      ansible.builtin.assert:
        that:
          - k3s_agent_service.status is defined
          - k3s_agent_service.status.LoadState == "loaded"
        fail_msg: "K3s agent service is not properly configured"
        success_msg: "K3s agent service is loaded"

    - name: Get K3s agent service status
      ansible.builtin.systemd:
        name: k3s-agent
      register: k3s_agent_status

    - name: Assert K3s agent is active
      ansible.builtin.assert:
        that:
          - k3s_agent_status.status.ActiveState == "active"
          - k3s_agent_status.status.SubState == "running"
        fail_msg: "K3s agent service is not running (State: {{ k3s_agent_status.status.ActiveState }})"
        success_msg: "K3s agent service is active and running"

- name: Verify cluster functionality
  hosts: k3s_server[0]
  become: true
  gather_facts: false

  tasks:
    - name: Get all nodes in cluster
      ansible.builtin.command: k3s kubectl get nodes -o json
      register: cluster_nodes
      changed_when: false
      failed_when: false
      retries: 10
      delay: 10
      until: cluster_nodes.rc == 0

    - name: Parse node information
      ansible.builtin.set_fact:
        nodes_info: "{{ cluster_nodes.stdout | from_json }}"
      when: cluster_nodes.rc == 0

    - name: Display cluster nodes
      ansible.builtin.debug:
        msg: "Cluster has {{ nodes_info.items | length }} node(s)"
      when: cluster_nodes.rc == 0

    - name: Assert expected number of nodes
      ansible.builtin.assert:
        that:
          - nodes_info.items | length >= 1
        fail_msg: "Cluster has fewer than expected nodes"
        success_msg: "Cluster has {{ nodes_info.items | length }} registered node(s)"
      when: cluster_nodes.rc == 0

    - name: Get detailed node status
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: nodes_detailed
      changed_when: false
      failed_when: false

    - name: Display node details
      ansible.builtin.debug:
        var: nodes_detailed.stdout_lines
      when: nodes_detailed.rc == 0

    - name: Check all nodes are Ready
      ansible.builtin.shell: |
        set -o pipefail
        k3s kubectl get nodes --no-headers | awk '{print $2}' | grep -v "Ready" | wc -l
      args:
        executable: /bin/bash
      register: not_ready_nodes
      changed_when: false
      failed_when: false

    - name: Display node readiness
      ansible.builtin.debug:
        msg: "Not ready nodes: {{ not_ready_nodes.stdout | default('unknown') }}"
      when: not_ready_nodes.rc == 0

    - name: Get system pods status
      ansible.builtin.command: k3s kubectl get pods --all-namespaces
      register: all_pods
      changed_when: false
      failed_when: false

    - name: Display system pods
      ansible.builtin.debug:
        var: all_pods.stdout_lines
      when: all_pods.rc == 0

    - name: Check kube-system namespace exists
      ansible.builtin.command: k3s kubectl get namespace kube-system
      register: kube_system_ns
      changed_when: false
      failed_when: false

    - name: Assert kube-system namespace exists
      ansible.builtin.assert:
        that:
          - kube_system_ns.rc == 0
        fail_msg: "kube-system namespace not found"
        success_msg: "kube-system namespace exists"

    - name: Deploy test workload
      ansible.builtin.command: >
        k3s kubectl run molecule-test-pod
        --image=busybox:latest
        --restart=Never
        --command -- sleep 3600
      register: test_pod_deploy
      changed_when: "'created' in test_pod_deploy.stdout or 'already exists' in test_pod_deploy.stderr"
      failed_when: false

    - name: Wait for test pod to be created
      ansible.builtin.command: k3s kubectl get pod molecule-test-pod -o json
      register: test_pod_status
      until: test_pod_status.rc == 0
      retries: 12
      delay: 5
      changed_when: false
      failed_when: false

    - name: Parse test pod status
      ansible.builtin.set_fact:
        pod_info: "{{ test_pod_status.stdout | from_json }}"
      when: test_pod_status.rc == 0

    - name: Display test pod status
      ansible.builtin.debug:
        msg: "Test pod phase: {{ pod_info.status.phase | default('Unknown') }}"
      when: test_pod_status.rc == 0

    - name: Assert test pod was created
      ansible.builtin.assert:
        that:
          - test_pod_status.rc == 0
        fail_msg: "Test pod creation failed"
        success_msg: "Test pod was created successfully"
      when: test_pod_status.rc is defined

    - name: Clean up test pod
      ansible.builtin.command: k3s kubectl delete pod molecule-test-pod --ignore-not-found=true
      register: cleanup_result
      changed_when: "'deleted' in cleanup_result.stdout"
      failed_when: false

- name: Final verification summary
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Display test summary
      ansible.builtin.debug:
        msg:
          - "===== K3s Molecule Test Verification Complete ====="
          - "Server nodes tested: {{ groups['k3s_server'] | length }}"
          - "Agent nodes tested: {{ groups['k3s_agent'] | length }}"
          - "All verification checks completed successfully!"
