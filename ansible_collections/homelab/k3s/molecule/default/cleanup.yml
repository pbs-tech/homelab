---
# Cleanup playbook for K3s molecule testing
# This ensures proper cleanup between test runs

- name: Cleanup K3s agents
  hosts: k3s_agent
  become: true
  gather_facts: false
  ignore_errors: true

  tasks:
    - name: Stop K3s agent service
      ansible.builtin.systemd:
        name: k3s-agent
        state: stopped
      failed_when: false

    - name: Disable K3s agent service
      ansible.builtin.systemd:
        name: k3s-agent
        enabled: false
      failed_when: false

    - name: Remove K3s agent service files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/k3s-agent.service
        - /etc/systemd/system/k3s-agent.service.env
      failed_when: false

- name: Cleanup K3s server
  hosts: k3s_server
  become: true
  gather_facts: false
  ignore_errors: true

  tasks:
    - name: Stop K3s server service
      ansible.builtin.systemd:
        name: k3s
        state: stopped
      failed_when: false

    - name: Disable K3s server service
      ansible.builtin.systemd:
        name: k3s
        enabled: false
      failed_when: false

    - name: Remove K3s server service files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/k3s.service
        - /etc/systemd/system/k3s.service.env
      failed_when: false

- name: Cleanup all K3s nodes
  hosts: k3s_cluster
  become: true
  gather_facts: false
  ignore_errors: true

  tasks:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
      failed_when: false

    - name: Kill all K3s processes
      ansible.builtin.shell: |
        set -o pipefail
        pkill -9 k3s || true
        pkill -9 containerd || true
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Unmount K3s filesystems
      ansible.builtin.shell: |
        set -o pipefail
        umount $(cat /proc/mounts | awk '{print $2}' | grep '/run/k3s\|/var/lib/rancher/k3s' || true) || true
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Remove K3s binary
      ansible.builtin.file:
        path: /usr/local/bin/k3s
        state: absent
      failed_when: false

    - name: Remove K3s installation script
      ansible.builtin.file:
        path: /usr/local/bin/k3s-install.sh
        state: absent
      failed_when: false

    - name: Remove K3s directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/rancher/k3s
        - /var/lib/rancher/k3s
        - /var/lib/kubelet
        - /var/lib/cni
        - /run/k3s
        - /run/flannel
      failed_when: false

    - name: Remove CNI configuration
      ansible.builtin.file:
        path: /etc/cni
        state: absent
      failed_when: false

    - name: Remove kubectl symlinks
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/kubectl
        - /usr/local/bin/crictl
        - /usr/local/bin/ctr
      failed_when: false

    - name: Display cleanup status
      ansible.builtin.debug:
        msg: "K3s cleanup completed on {{ inventory_hostname }}"
