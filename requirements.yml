---

# Consolidated requirements for homelab infrastructure

# Install with: ansible-galaxy install -r requirements.yml

collections:
# Local homelab collections (common, k3s, proxmox_lxc) are discovered
# automatically via collections_path = . in ansible.cfg.
# Do NOT add type:dir entries here - they cause self-destructive installs
# when the install destination matches the source directory.

# External collections

  - name: community.general
    version: ">=7.0.0"

  - name: ansible.posix
    version: ">=1.5.0"

  - name: community.proxmox
    version: ">=1.3.0"

  - name: kubernetes.core
    version: ">=2.4.0"

  - name: containers.podman
    version: ">=1.10.0"

  - name: community.crypto
    version: ">=2.0.0"

  - name: community.grafana
    version: ">=2.3.0"

  - name: community.docker
    version: ">=4.7.0"
# Optional: Include external roles if needed

roles: []
