# Ansible Vault Variables Template
# This file contains examples of all vault variables needed for secure operation
#
# To create encrypted vault files:
# 1. Copy this template: cp vault_variables_template.yml group_vars/all/vault.yml
# 2. Replace all example values with your actual credentials
# 3. Encrypt the file: ansible-vault encrypt group_vars/all/vault.yml
#
# To edit encrypted vault files:
# ansible-vault edit group_vars/all/vault.yml

---
# ===========================================
# PROXMOX API TOKEN AUTHENTICATION (Preferred)
# ===========================================
# Create API tokens in Proxmox Web UI:
# Datacenter > Permissions > API Tokens > Add
#
# Recommended token configuration:
# - User: Create dedicated service account (e.g., ansible@pve)
# - Token ID: descriptive name (e.g., homelab-automation)
# - Privilege Separation: false (inherits user permissions)
# - Comment: "Ansible homelab automation token"

vault_proxmox_api_tokens:
  pve_mac:
    # Format: username@realm!token_name
    token_id: ansible@pve!homelab-automation
    # 32-character hexadecimal secret generated by Proxmox
    token_secret: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx

  pve_nas:
    # Format: username@realm!token_name
    token_id: ansible@pve!homelab-automation
    # 32-character hexadecimal secret generated by Proxmox
    token_secret: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx

# ===========================================
# LEGACY PROXMOX PASSWORD AUTHENTICATION (Deprecated)
# ===========================================
# Only use if API tokens cannot be configured
# Will be removed in future versions

vault_proxmox_passwords:
  pve_mac: legacy_password_if_needed
  pve_nas: legacy_password_if_needed

# ===========================================
# SERVICE-SPECIFIC CREDENTIALS
# ===========================================

# Grafana Configuration
vault_grafana_admin_password: secure_grafana_admin_password_here

# SSL Certificate Management
vault_ssl_email: your-email@domain.com

# OpenWrt Router Management
vault_openwrt_root_password_hash: $2y$10$xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# Media Management API Keys
vault_sonarr_api_key: 32_character_sonarr_api_key_here
vault_radarr_api_key: 32_character_radarr_api_key_here
vault_prowlarr_api_key: 32_character_prowlarr_api_key_here
vault_bazarr_api_key: 32_character_bazarr_api_key_here

# Home Assistant Configuration
vault_homeassistant_admin_password: secure_homeassistant_password

# Database Credentials
vault_database_passwords:
  prometheus: secure_prometheus_db_password
  grafana: secure_grafana_db_password
  homeassistant: secure_homeassistant_db_password

# ===========================================
# SSH KEY MANAGEMENT
# ===========================================
# SSH private keys for automation (if not using ssh-agent)

vault_ssh_private_keys:
  # Base64 encoded SSH private key for container access
  homelab_automation: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    # Your base64 encoded private key content here
    # Generate with: ssh-keygen -t ed25519 -C "homelab-automation"
    -----END OPENSSH PRIVATE KEY-----

# ===========================================
# MONITORING AND ALERTING
# ===========================================

# Slack/Discord webhooks for alerting
vault_alert_webhooks:
  slack_critical: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
  discord_general: https://discord.com/api/webhooks/YOUR/DISCORD/WEBHOOK

# SMTP credentials for email alerts
vault_smtp_config:
  server: smtp.gmail.com
  port: 587
  username: alerts@yourdomain.com
  password: smtp_app_password_here

# ===========================================
# SECURITY TOKENS AND KEYS
# ===========================================

# TLS Certificate private keys (if not using Let's Encrypt)
vault_tls_private_keys:
  wildcard_homelab_local: |
    -----BEGIN PRIVATE KEY-----
    # Your TLS private key content here
    -----END PRIVATE KEY-----

# ===========================================
# EXAMPLE ENCRYPTION COMMANDS
# ===========================================
#
# To encrypt individual strings for insertion into this file:
#
# ansible-vault encrypt_string 'your_actual_token_secret' --name 'token_secret'
# ansible-vault encrypt_string 'your_grafana_password' --name 'vault_grafana_admin_password'
# ansible-vault encrypt_string 'your_api_key' --name 'vault_sonarr_api_key'
#
# To encrypt this entire file:
# ansible-vault encrypt vault_variables_template.yml
#
# To decrypt for editing:
# ansible-vault edit vault_variables_template.yml
#
# To change vault password:
# ansible-vault rekey vault_variables_template.yml
