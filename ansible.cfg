[defaults]
# Use /tmp for remote temporary files to avoid permission issues in CI/CD
# This is especially important for Docker-based molecule tests
# Static path avoids variable expansion issues in Docker containers
remote_tmp = /tmp/ansible-tmp

# Ansible behavior settings
host_key_checking = False
retry_files_enabled = False
deprecation_warnings = False
callbacks_enabled = profile_tasks, timer
stdout_callback = default
# Use YAML format for output (ansible-core 2.15+)
result_format = yaml

# Collection paths
collections_paths = ./ansible_collections:~/.ansible/collections:/usr/share/ansible/collections

# Inventory settings
inventory = ./inventory

# Timeout settings
timeout = 30
gather_timeout = 30

# SSH settings
[ssh_connection]
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

# Privilege escalation
[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
