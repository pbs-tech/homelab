name: 'Wait for Galaxy Collection'
description: 'Polls Ansible Galaxy for collection availability with retry logic'
inputs:
  collection:
    description: 'Collection name (e.g., homelab.common)'
    required: true
  version:
    description: 'Collection version to wait for'
    required: true
  max_attempts:
    description: 'Maximum polling attempts'
    required: false
    default: '18'
  wait_time:
    description: 'Wait time between attempts in seconds'
    required: false
    default: '10'
  fallback_path:
    description: 'Path to local collection for fallback installation'
    required: false
    default: ''
  is_release:
    description: 'Whether this is a release event (enables polling)'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Install collection with polling
      shell: bash
      run: |
        COLLECTION="${{ inputs.collection }}"
        VERSION="${{ inputs.version }}"
        MAX_ATTEMPTS="${{ inputs.max_attempts }}"
        WAIT_TIME="${{ inputs.wait_time }}"
        FALLBACK_PATH="${{ inputs.fallback_path }}"
        IS_RELEASE="${{ inputs.is_release }}"

        # Function to check if specific version exists on Galaxy via API
        check_galaxy_version() {
          local namespace="${1%%.*}"
          local name="${1#*.}"
          local version="$2"

          echo "Checking Galaxy API for $namespace.$name version $version..."

          # Query Galaxy API for collection versions with HTTP status validation
          local http_code
          local response
          local api_url="https://galaxy.ansible.com/api/v3/plugin/ansible/content"
          api_url="$api_url/published/collections/index/$namespace/$name/versions/?limit=100"
          response=$(curl -s -w "\n%{http_code}" "$api_url")
          http_code=$(echo "$response" | tail -n1)
          response=$(echo "$response" | sed '$d')

          # Validate HTTP response
          if [ "$http_code" != "200" ]; then
            echo "  API request failed with HTTP status: $http_code"
            return 1
          fi

          # Validate response is not empty
          if [ -z "$response" ]; then
            echo "  API returned empty response"
            return 1
          fi

          # Check if the specific version exists in the response
          if echo "$response" | grep -q "\"version\":\"$version\""; then
            echo "✓ Version $version found on Galaxy API"
            return 0
          else
            echo "  Version $version not yet available on Galaxy API"
            return 1
          fi
        }

        # For release events, poll Galaxy for the collection
        if [ "$IS_RELEASE" = "true" ]; then
          echo "=================================================="
          echo "Polling Galaxy for $COLLECTION version $VERSION"
          echo "=================================================="

          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo ""
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS:"

            # First check if version exists via API
            if check_galaxy_version "$COLLECTION" "$VERSION"; then
              echo "Attempting to install $COLLECTION:$VERSION from Galaxy..."

              # Try to install the specific version
              if ansible-galaxy collection install "$COLLECTION:$VERSION" --force \
                 2>&1 | tee /tmp/galaxy-install.log; then
                # Verify the installed version matches
                INSTALLED_VERSION=$(ansible-galaxy collection list "$COLLECTION" \
                  2>/dev/null | grep "$COLLECTION" | awk '{print $2}')

                # Validate version extraction succeeded
                if [ -z "$INSTALLED_VERSION" ]; then
                  echo "⚠ Failed to extract installed version"
                elif [ "$INSTALLED_VERSION" = "$VERSION" ]; then
                  echo "✓ Successfully installed $COLLECTION:$VERSION from Galaxy"
                  exit 0
                else
                  echo "⚠ Version mismatch: expected $VERSION, got $INSTALLED_VERSION"
                fi
              else
                echo "  Installation attempt failed"
              fi
            fi

            # Wait before next attempt (except on last attempt)
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "  Waiting ${WAIT_TIME}s before retry..."
              sleep $WAIT_TIME
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

          echo ""
          echo "=================================================="
          echo "⚠ Galaxy polling timed out after $((MAX_ATTEMPTS * WAIT_TIME))s"
          echo "=================================================="

          # Fallback to local installation if path provided
          if [ -n "$FALLBACK_PATH" ]; then
            echo "Falling back to local collection installation from: $FALLBACK_PATH"
            if ansible-galaxy collection install "$FALLBACK_PATH" --force; then
              echo "✓ Successfully installed from local path"
              exit 0
            else
              echo "❌ Local installation failed"
              exit 1
            fi
          else
            echo "❌ No fallback path provided, cannot continue"
            exit 1
          fi
        else
          # Manual workflow dispatch - try Galaxy first, then local fallback
          echo "Manual workflow dispatch - trying Galaxy first..."

          if ansible-galaxy collection install "$COLLECTION:$VERSION" --force 2>&1; then
            # Verify version
            INSTALLED_VERSION=$(ansible-galaxy collection list "$COLLECTION" \
              2>/dev/null | grep "$COLLECTION" | awk '{print $2}')
            # Validate version extraction succeeded
            if [ -z "$INSTALLED_VERSION" ]; then
              echo "⚠ Failed to extract installed version"
            elif [ "$INSTALLED_VERSION" = "$VERSION" ]; then
              echo "✓ Installed $COLLECTION:$VERSION from Galaxy"
              exit 0
            else
              echo "⚠ Version mismatch: expected $VERSION, got $INSTALLED_VERSION"
            fi
          fi

          # Try without version constraint
          if ansible-galaxy collection install "$COLLECTION" --force 2>&1; then
            echo "✓ Installed $COLLECTION from Galaxy (latest version)"
            exit 0
          fi

          # Fallback to local if Galaxy fails
          if [ -n "$FALLBACK_PATH" ]; then
            echo "⚠ Galaxy installation failed, using local collection from: $FALLBACK_PATH"
            if ansible-galaxy collection install "$FALLBACK_PATH" --force; then
              echo "✓ Successfully installed from local path"
              exit 0
            else
              echo "❌ Local installation failed"
              exit 1
            fi
          else
            echo "❌ No fallback path provided and Galaxy installation failed"
            exit 1
          fi
        fi
