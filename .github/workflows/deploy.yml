---
name: Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      deployment_phase:
        description: 'Deployment phase'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - phase1
          - phase2
          - phase3
          - phase4
          - phase5
      dry_run:
        description: 'Run in check mode'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false  # Don't cancel deployments

env:
  ANSIBLE_FORCE_COLOR: '1'
  ANSIBLE_HOST_KEY_CHECKING: 'false'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      deployment-matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.15 ansible-lint

      - name: Install collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: Validate deployment readiness
        run: |
          ansible-playbook --syntax-check playbooks/infrastructure.yml
          ansible-lint --nocolor

      - name: Generate deployment matrix
        id: matrix
        run: |
          if [ "${{ inputs.deployment_phase }}" = "all" ]; then
            echo 'matrix={"phase":["phase1","phase2","phase3","phase4","phase5"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"phase":["${{ inputs.deployment_phase }}"]}' >> $GITHUB_OUTPUT
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: success()
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate.outputs.deployment-matrix) }}
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.15

      - name: Install collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: Configure deployment environment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Create ansible vault password file
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ~/.ansible_vault_pass
          chmod 600 ~/.ansible_vault_pass

      - name: Pre-deployment health check
        run: |
          ansible all -i inventory/hosts.yml -m ping --private-key ~/.ssh/id_rsa

      - name: Deploy phase ${{ matrix.phase }}
        run: |
          deployment_args="--tags ${{ matrix.phase }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            deployment_args="$deployment_args --check --diff"
          fi

          ansible-playbook playbooks/infrastructure.yml \
            -i inventory/hosts.yml \
            --private-key ~/.ssh/id_rsa \
            --vault-password-file ~/.ansible_vault_pass \
            $deployment_args

      - name: Post-deployment verification
        if: inputs.dry_run != true
        run: |
          # Run basic verification tests
          ansible-playbook tests/test_suite.yml -e "test_types=['unit']" --tags quick

      - name: Generate deployment report
        if: always()
        run: |
          echo "## Deployment Report - ${{ matrix.phase }}" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Phase: ${{ matrix.phase }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ansible_vault_pass

  rollback:
    runs-on: ubuntu-latest
    if: failure() && inputs.dry_run != true
    needs: [validate, deploy]
    environment: ${{ inputs.environment || 'staging' }}-rollback
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.15

      - name: Install collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: Execute rollback procedures
        run: |
          echo "Deployment failed, executing rollback procedures..."
          # Add rollback logic here based on your infrastructure needs
          echo "Rollback completed"

  notify:
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: always() && inputs.dry_run != true
    steps:
      - name: Notify deployment status
        run: |
          status="SUCCESS"
          if [ "${{ needs.deploy.result }}" != "success" ]; then
            status="FAILED"
          fi

          echo "Deployment $status for environment: ${{ inputs.environment || 'staging' }}"
          # Add your notification logic (Slack, Teams, email, etc.)
