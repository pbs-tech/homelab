---
name: Release Management

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: true
        type: string
      release_type:
        description: 'Type of release'
        required: true
        default: 'minor'
        type: choice
        options:
          - major
          - minor
          - patch
          - hotfix

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF#refs/tags/}"
          fi

          # Validate version format
          if [[ ! $version =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $version"
            exit 1
          fi

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.15 semantic-version

      - name: Validate collections before release
        run: |
          for collection in ansible_collections/homelab/*/; do
            if [ -f "$collection/galaxy.yml" ]; then
              echo "Validating collection: $collection"
              cd "$collection"

              # Update version in galaxy.yml
              version_without_v="${steps.version.outputs.version#v}"
              sed -i "s/^version:.*/version: $version_without_v/" galaxy.yml

              # Build and validate collection
              ansible-galaxy collection build
              ansible-galaxy collection install *.tar.gz --force

              cd "$GITHUB_WORKSPACE"
            fi
          done

      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog from git history
          previous_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$previous_tag" ]; then
            echo "Generating changelog from $previous_tag to HEAD"
            changelog=$(git log --oneline --pretty=format:"- %s" $previous_tag..HEAD)
          else
            echo "No previous tag found, using all commits"
            changelog=$(git log --oneline --pretty=format:"- %s")
          fi

          # Save changelog to file and output
          echo "$changelog" > CHANGELOG_TEMP.md
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run full test suite
        run: |
          ansible-galaxy collection install -r requirements.yml --force

          # Run linting
          make lint

          # Run molecule tests
          cd ansible_collections/homelab/common && molecule test

  build-artifacts:
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.15

      - name: Update versions
        run: |
          version_without_v="${{ needs.validate-release.outputs.version }}"
          version_without_v="${version_without_v#v}"

          # Update all galaxy.yml files
          find ansible_collections/homelab -name "galaxy.yml" -exec sed -i "s/^version:.*/version: $version_without_v/" {} \;

      - name: Build collection artifacts
        run: |
          mkdir -p release-artifacts

          for collection_dir in ansible_collections/homelab/*/; do
            if [ -f "$collection_dir/galaxy.yml" ]; then
              collection_name=$(basename "$collection_dir")
              echo "Building homelab.$collection_name collection..."

              cd "$collection_dir"
              ansible-galaxy collection build --output-path "$GITHUB_WORKSPACE/release-artifacts/"
              cd "$GITHUB_WORKSPACE"
            fi
          done

      - name: Generate release documentation
        run: |
          cat > release-artifacts/RELEASE_NOTES.md << EOF
          # Release ${{ needs.validate-release.outputs.version }}

          ## Changes
          ${{ needs.validate-release.outputs.changelog }}

          ## Installation

          Install all collections:
          \`\`\`bash
          ansible-galaxy collection install -r requirements.yml
          \`\`\`

          Install individual collections:
          \`\`\`bash
          ansible-galaxy collection install homelab-common-${{ needs.validate-release.outputs.version }}.tar.gz
          ansible-galaxy collection install homelab-k3s-${{ needs.validate-release.outputs.version }}.tar.gz
          ansible-galaxy collection install homelab-proxmox_lxc-${{ needs.validate-release.outputs.version }}.tar.gz
          \`\`\`

          ## Verification

          Verify installation:
          \`\`\`bash
          ansible-galaxy collection list | grep homelab
          \`\`\`

          ## Compatibility

          - Ansible Core: >= 2.15
          - Python: >= 3.9
          - Tested on: Ubuntu 22.04, Debian 12
          EOF

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ needs.validate-release.outputs.version }}
          path: release-artifacts/
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    needs: [validate-release, build-artifacts]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ needs.validate-release.outputs.version }}
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate-release.outputs.version }}
          name: Release ${{ needs.validate-release.outputs.version }}
          body_path: release-artifacts/RELEASE_NOTES.md
          files: |
            release-artifacts/*.tar.gz
          draft: false
          prerelease: ${{ contains(needs.validate-release.outputs.version, 'rc') || contains(needs.validate-release.outputs.version, 'beta') || contains(needs.validate-release.outputs.version, 'alpha') }}
          generate_release_notes: true

  deploy-to-staging:
    runs-on: ubuntu-latest
    needs: [validate-release, create-release]
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying ${{ needs.validate-release.outputs.version }} to staging environment"
          # Add your staging deployment logic here
          # This could trigger your existing deployment workflow

  promote-to-production:
    runs-on: ubuntu-latest
    needs: [validate-release, create-release, deploy-to-staging]
    if: success() && !contains(needs.validate-release.outputs.version, 'rc') && !contains(needs.validate-release.outputs.version, 'beta')
    environment: production
    steps:
      - name: Manual approval gate
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: homelab-admins
          minimum-approvals: 1
          issue-title: "Production deployment approval for ${{ needs.validate-release.outputs.version }}"
          issue-body: |
            Please review and approve the production deployment of version ${{ needs.validate-release.outputs.version }}.

            **Changes:**
            ${{ needs.validate-release.outputs.changelog }}

            **Staging Deployment:** Successful
            **Tests:** All passed

            Type "approve" to approve this deployment.

      - name: Deploy to production
        run: |
          echo "Deploying ${{ needs.validate-release.outputs.version }} to production environment"
          # Add your production deployment logic here

  post-release:
    runs-on: ubuntu-latest
    needs: [validate-release, create-release]
    if: always()
    steps:
      - name: Update project documentation
        run: |
          # Update version references in documentation
          echo "Updating documentation for ${{ needs.validate-release.outputs.version }}"

      - name: Notify stakeholders
        run: |
          echo "Release ${{ needs.validate-release.outputs.version }} completed successfully"
          # Add notification logic (Slack, Teams, email, etc.)

      - name: Create next development branch
        if: inputs.release_type == 'major' || inputs.release_type == 'minor'
        run: |
          # Logic to create next development branch
          echo "Creating development branch for next version"
