---
name: CI
permissions:
  contents: read
  packages: write

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  ANSIBLE_VERSION: '>=2.17'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/homelab

jobs:
  build-docker-images:
    name: Build Docker CI Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists for current commit
        id: check_image
        continue-on-error: true
        run: |
          # Try to pull the image with the current SHA
          IMAGE_TAG="sha-${{ github.sha }}"
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci:${IMAGE_TAG}"

          echo "Checking for existing image: ${IMAGE_NAME}"

          if docker manifest inspect "${IMAGE_NAME}" > /dev/null 2>&1; then
            echo "Image exists for commit ${{ github.sha }}"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Image does not exist for commit ${{ github.sha }}"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata for CI image
        id: meta
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=v1.0.0
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push CI image
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/docker/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip build (image already exists)
        if: steps.check_image.outputs.exists == 'true'
        run: |
          echo "✅ Skipping build - image already exists for commit ${{ github.sha }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci:sha-${{ github.sha }}"

  lint:
    needs: build-docker-images
    name: Lint (YAML, Ansible, Markdown)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/homelab-ci:${{ github.ref_name }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: YAML lint
        run: |
          yamllint . --format github || {
            echo "ERROR: YAML linting failed"
            exit 1
          }

      - name: Markdown lint
        run: |
          pymarkdown --config .markdownlint.yaml scan . || {
            echo "ERROR: Markdown linting failed"
            exit 1
          }

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('**/requirements.yml') }}
          restore-keys: ansible-collections-

      - name: Install Ansible collections
        run: |
          set -e
          echo "Installing main requirements..."
          ansible-galaxy collection install -r requirements.yml --force || {
            echo "ERROR: Failed to install main requirements.yml"
            exit 1
          }

          echo "Installing collection-specific requirements..."
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \; || {
            echo "ERROR: Failed to install collection-specific requirements"
            exit 1
          }

          echo "Building and installing local collections..."
          # Build and install common collection (required by others)
          cd ansible_collections/homelab/common
          ansible-galaxy collection build --force || {
            echo "ERROR: Failed to build homelab.common collection"
            exit 1
          }
          ansible-galaxy collection install *.tar.gz --force || {
            echo "ERROR: Failed to install homelab.common collection"
            exit 1
          }
          cd ../../..

          # Build and install k3s collection
          cd ansible_collections/homelab/k3s
          ansible-galaxy collection build --force || {
            echo "ERROR: Failed to build homelab.k3s collection"
            exit 1
          }
          ansible-galaxy collection install *.tar.gz --force || {
            echo "ERROR: Failed to install homelab.k3s collection"
            exit 1
          }
          cd ../../..

          # Build and install proxmox_lxc collection
          cd ansible_collections/homelab/proxmox_lxc
          ansible-galaxy collection build --force || {
            echo "ERROR: Failed to build homelab.proxmox_lxc collection"
            exit 1
          }
          ansible-galaxy collection install *.tar.gz --force || {
            echo "ERROR: Failed to install homelab.proxmox_lxc collection"
            exit 1
          }
          cd ../../..

          echo "All collections installed successfully"

      - name: Ansible lint
        run: |
          ansible-lint --format quiet --nocolor || {
            echo "ERROR: Ansible linting failed"
            exit 1
          }

      - name: Ansible syntax check
        run: |
          set -e
          echo "Checking root playbooks..."
          for playbook in site.yml security-deploy.yml phase2-security.yml; do
            echo "Checking $playbook..."
            ansible-playbook --syntax-check $playbook || {
              echo "ERROR: Syntax check failed for $playbook"
              exit 1
            }
          done

          echo "Checking test playbooks..."
          for playbook in tests/*.yml; do
            echo "Checking $playbook..."
            ansible-playbook --syntax-check $playbook || {
              echo "ERROR: Syntax check failed for $playbook"
              exit 1
            }
          done

          echo "Checking orchestration playbooks..."
          for playbook in playbooks/*.yml; do
            echo "Checking $playbook..."
            ansible-playbook --syntax-check $playbook || {
              echo "ERROR: Syntax check failed for $playbook"
              exit 1
            }
          done

          echo "Checking collection playbooks..."
          ansible-playbook --syntax-check ansible_collections/homelab/k3s/playbooks/site.yml || {
            echo "ERROR: Syntax check failed for k3s/playbooks/site.yml"
            exit 1
          }
          ansible-playbook --syntax-check ansible_collections/homelab/proxmox_lxc/site.yml || {
            echo "ERROR: Syntax check failed for proxmox_lxc/site.yml"
            exit 1
          }
          echo "All syntax checks passed"


      - name: TruffleHog secrets scan
        if: github.ref != 'refs/heads/main'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified


  collections:
    name: Validate Collections
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/homelab-ci:${{ github.ref_name }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    needs: lint
    strategy:
      fail-fast: false  # Allow all collections to be tested even if one fails
      matrix:
        collection: [common, k3s, proxmox_lxc]
    steps:
      - uses: actions/checkout@v4

      - name: Install external dependencies
        run: |
          set -e
          ansible-galaxy collection install -r requirements.yml --force || {
            echo "ERROR: Failed to install external dependencies"
            exit 1
          }

      - name: Install homelab.common collection (dependency)
        if: matrix.collection != 'common'
        run: |
          set -e
          cd ansible_collections/homelab/common
          ansible-galaxy collection build --force || {
            echo "ERROR: Failed to build homelab.common collection"
            exit 1
          }
          ansible-galaxy collection install *.tar.gz --force || {
            echo "ERROR: Failed to install homelab.common collection dependency"
            exit 1
          }
          cd ../../..

      - name: Clean build artifacts
        run: rm -f ansible_collections/homelab/${{ matrix.collection }}/*.tar.gz

      - name: Build and validate
        run: |
          set -e
          cd ansible_collections/homelab/${{ matrix.collection }}

          echo "Building homelab.${{ matrix.collection }} collection..."
          ansible-galaxy collection build || {
            echo "ERROR: Failed to build homelab.${{ matrix.collection }} collection"
            exit 1
          }

          echo "Validating collection with galaxy-importer..."
          python -m galaxy_importer.main *.tar.gz || {
            echo "ERROR: Collection validation failed for homelab.${{ matrix.collection }}"
            exit 1
          }

          echo "Collection homelab.${{ matrix.collection }} built and validated successfully"

