---
name: CI
permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  ANSIBLE_VERSION: '>=2.17'

jobs:
  lint:
    name: Lint (YAML, Ansible, Markdown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: |
          set -e
          pip install "yamllint>=1.35" "ansible-core${{ env.ANSIBLE_VERSION }}" "ansible-lint>=24.0" pymarkdownlnt || {
            echo "ERROR: Failed to install linting tools"
            exit 1
          }

      - name: YAML lint
        run: |
          yamllint . --format github || {
            echo "ERROR: YAML linting failed"
            exit 1
          }

      - name: Markdown lint
        run: |
          pymarkdown --config .markdownlint.yaml scan . || {
            echo "ERROR: Markdown linting failed"
            exit 1
          }

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('**/requirements.yml') }}
          restore-keys: ansible-collections-

      - name: Install Ansible collections
        run: |
          set -e
          echo "Installing main requirements..."
          ansible-galaxy collection install -r requirements.yml --force || {
            echo "ERROR: Failed to install main requirements.yml"
            exit 1
          }

          echo "Installing collection-specific requirements..."
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \; || {
            echo "ERROR: Failed to install collection-specific requirements"
            exit 1
          }

          echo "Building and installing local collections..."
          for collection in common k3s proxmox_lxc; do
            ansible-galaxy collection install ansible_collections/homelab/$collection/ --force || {
              echo "ERROR: Failed to install homelab.$collection collection"
              exit 1
            }
          done
          echo "All collections installed successfully"

      - name: Ansible lint
        run: |
          ansible-lint --format quiet --nocolor || {
            echo "ERROR: Ansible linting failed"
            exit 1
          }

      - name: Ansible syntax check
        run: |
          set -e
          echo "Checking root playbooks..."
          for playbook in site.yml security-deploy.yml phase2-security.yml test-security-hardening.yml; do
            echo "Checking $playbook..."
            ansible-playbook --syntax-check $playbook || {
              echo "ERROR: Syntax check failed for $playbook"
              exit 1
            }
          done

          echo "Checking collection playbooks..."
          ansible-playbook --syntax-check ansible_collections/homelab/k3s/playbooks/site.yml || {
            echo "ERROR: Syntax check failed for k3s/playbooks/site.yml"
            exit 1
          }
          ansible-playbook --syntax-check ansible_collections/homelab/proxmox_lxc/site.yml || {
            echo "ERROR: Syntax check failed for proxmox_lxc/site.yml"
            exit 1
          }
          echo "All syntax checks passed"


      - name: TruffleHog secrets scan
        if: github.ref != 'refs/heads/main'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified


  collections:
    name: Validate Collections
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false  # Allow all collections to be tested even if one fails
      matrix:
        collection: [common, k3s, proxmox_lxc]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install tools
        run: |
          set -e
          pip install "ansible-core${{ env.ANSIBLE_VERSION }}" galaxy-importer || {
            echo "ERROR: Failed to install tools for collection validation"
            exit 1
          }

      - name: Install external dependencies
        run: |
          set -e
          ansible-galaxy collection install -r requirements.yml --force || {
            echo "ERROR: Failed to install external dependencies"
            exit 1
          }

      - name: Install homelab.common collection (dependency)
        if: matrix.collection != 'common'
        run: |
          set -e
          ansible-galaxy collection install ansible_collections/homelab/common/ --force || {
            echo "ERROR: Failed to install homelab.common collection dependency"
            exit 1
          }

      - name: Clean build artifacts
        run: rm -f ansible_collections/homelab/${{ matrix.collection }}/*.tar.gz

      - name: Build and validate
        run: |
          set -e
          cd ansible_collections/homelab/${{ matrix.collection }}

          echo "Building homelab.${{ matrix.collection }} collection..."
          ansible-galaxy collection build || {
            echo "ERROR: Failed to build homelab.${{ matrix.collection }} collection"
            exit 1
          }

          echo "Validating collection with galaxy-importer..."
          python -m galaxy_importer.main *.tar.gz || {
            echo "ERROR: Collection validation failed for homelab.${{ matrix.collection }}"
            exit 1
          }

          echo "Collection homelab.${{ matrix.collection }} built and validated successfully"

  molecule-integration:
    name: Molecule Tests (${{ matrix.collection }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    strategy:
      fail-fast: false  # Allow all collections to be tested even if one fails
      matrix:
        collection: [common, k3s, proxmox_lxc]
        scenario: [default]
        include:
          - collection: common
            scenario: common-roles
          - collection: proxmox_lxc
            scenario: integration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('**/requirements.yml') }}
          restore-keys: ansible-collections-

      - name: Install Molecule and dependencies
        run: |
          set -e
          pip install "ansible-core${{ env.ANSIBLE_VERSION }}" || {
            echo "ERROR: Failed to install ansible-core"
            exit 1
          }
          pip install "molecule>=6.0" "molecule-plugins[docker]>=23.5.0" docker || {
            echo "ERROR: Failed to install molecule and plugins"
            exit 1
          }

      - name: Install Ansible collections
        run: |
          set -e
          ansible-galaxy collection install -r requirements.yml --force || {
            echo "ERROR: Failed to install main requirements"
            exit 1
          }
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \; || {
            echo "ERROR: Failed to install collection requirements"
            exit 1
          }

      - name: Build and install homelab collections
        run: |
          set -e
          for col in common k3s proxmox_lxc; do
            echo "Building homelab.$col..."
            cd ansible_collections/homelab/$col
            ansible-galaxy collection build --force || {
              echo "ERROR: Failed to build homelab.$col"
              exit 1
            }
            ansible-galaxy collection install *.tar.gz --force || {
              echo "ERROR: Failed to install homelab.$col"
              exit 1
            }
            cd ../../..
          done

      - name: Start Docker service
        run: |
          set -e
          sudo systemctl start docker
          timeout 30 sh -c 'until docker info > /dev/null 2>&1; do sleep 1; done'
          docker info

      - name: Run Molecule test
        run: |
          set -e
          cd ansible_collections/homelab/${{ matrix.collection }}
          echo "Running Molecule scenario: ${{ matrix.scenario }}"
          molecule test -s ${{ matrix.scenario }} || {
            echo "ERROR: Molecule test failed for ${{ matrix.collection }}/${{ matrix.scenario }}"
            exit 1
          }
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_NO_LOG: 'false'

      - name: Show logs on failure
        if: failure()
        run: |
          cd ansible_collections/homelab/${{ matrix.collection }}
          echo "=== Molecule logs ==="
          if [ -d .molecule/${{ matrix.scenario }} ]; then
            find .molecule/${{ matrix.scenario }} -type f -name "*.log" -exec echo "--- {} ---" \; -exec cat {} \; || true
          fi
          echo "=== Docker containers ==="
          docker ps -a || true

      - name: Cleanup
        if: always()
        run: |
          cd ansible_collections/homelab/${{ matrix.collection }}
          molecule destroy -s ${{ matrix.scenario }} || true
          docker system prune -f --volumes || true
