---
name: CI
permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  ANSIBLE_VERSION: '>=2.17,<2.19'

jobs:
  version-sync:
    name: Verify Collection Version Sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify galaxy.yml versions match
        run: |
          if [ ! -d ansible_collections/homelab ]; then
            echo "ERROR: ansible_collections/homelab not found — homelab collections must be committed to the repo"
            exit 1
          fi
          versions=$(grep '^version:' ansible_collections/homelab/*/galaxy.yml | awk '{print $2}' | sort -u | wc -l)
          if [ "$versions" -ne 1 ]; then
            echo "ERROR: galaxy.yml version mismatch across collections"
            grep '^version:' ansible_collections/homelab/*/galaxy.yml
            exit 1
          fi
          echo "All collections at version: $(grep '^version:' ansible_collections/homelab/common/galaxy.yml | awk '{print $2}')"

  validate-collections:
    name: Validate Collections
    runs-on: ubuntu-latest
    needs: version-sync
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        collection: [common, k3s, proxmox_lxc]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install tools
        run: pip install "ansible-core${{ env.ANSIBLE_VERSION }}" galaxy-importer

      - name: Install external dependencies
        run: ansible-galaxy collection install -r requirements.yml -p ~/.ansible/collections --force

      - name: Install homelab.common (dependency for k3s and proxmox_lxc)
        if: matrix.collection != 'common'
        run: |
          cd ansible_collections/homelab/common
          ansible-galaxy collection build --force
          ansible-galaxy collection install *.tar.gz -p ~/.ansible/collections --force
          rm -f *.tar.gz

      - name: Build and validate homelab.${{ matrix.collection }}
        run: |
          cd ansible_collections/homelab/${{ matrix.collection }}
          rm -f *.tar.gz
          ansible-galaxy collection build
          python -m galaxy_importer.main *.tar.gz

  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@v3.88.24
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
