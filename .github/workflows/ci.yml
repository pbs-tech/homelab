---
name: CI
permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  ANSIBLE_VERSION: '>=2.15'

jobs:
  lint:
    name: Lint (YAML, Ansible, Markdown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install yamllint ansible-core${{ env.ANSIBLE_VERSION }} ansible-lint pymarkdownlnt

      - name: YAML lint
        run: yamllint . --format github

      - name: Markdown lint
        run: pymarkdown --config .markdownlint.yaml scan .

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('**/requirements.yml') }}
          restore-keys: ansible-collections-

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \;
          for collection in common k3s proxmox_lxc; do
            ansible-galaxy collection install ansible_collections/homelab/$collection/ --force
          done

      - name: Ansible lint
        run: ansible-lint --format quiet --nocolor

      - name: Ansible syntax check
        run: |
          for playbook in site.yml security-deploy.yml phase2-security.yml test-security-hardening.yml; do
            ansible-playbook --syntax-check $playbook
          done
          ansible-playbook --syntax-check ansible_collections/homelab/k3s/playbooks/site.yml
          ansible-playbook --syntax-check ansible_collections/homelab/proxmox_lxc/site.yml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install ansible-core${{ env.ANSIBLE_VERSION }} ansible-lint

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('**/requirements.yml') }}
          restore-keys: ansible-collections-

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \;
          for collection in common k3s proxmox_lxc; do
            ansible-galaxy collection install ansible_collections/homelab/$collection/ --force
          done

      - name: TruffleHog secrets scan
        if: github.ref != 'refs/heads/main'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified


  collections:
    name: Validate Collections
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        collection: [common, k3s, proxmox_lxc]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install tools
        run: pip install ansible-core${{ env.ANSIBLE_VERSION }} galaxy-importer

      - name: Install external dependencies
        run: ansible-galaxy collection install -r requirements.yml --force

      - name: Install homelab.common collection (dependency)
        if: matrix.collection != 'common'
        run: ansible-galaxy collection install ansible_collections/homelab/common/ --force

      - name: Clean build artifacts
        run: rm -f ansible_collections/homelab/${{ matrix.collection }}/*.tar.gz

      - name: Build and validate
        run: |
          cd ansible_collections/homelab/${{ matrix.collection }}
          ansible-galaxy collection build
          python -m galaxy_importer.main *.tar.gz
