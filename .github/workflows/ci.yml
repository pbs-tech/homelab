---
name: CI

on:
  push:
    branches: [main, develop, update-actions]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  ANSIBLE_CORE_VERSION: '>=2.15'

jobs:
  # Detect which files changed to skip unnecessary jobs
  changes:
    runs-on: ubuntu-latest
    outputs:
      ansible: ${{ steps.changes.outputs.ansible }}
      yaml: ${{ steps.changes.outputs.yaml }}
      markdown: ${{ steps.changes.outputs.markdown }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            ansible:
              - '**/*.yml'
              - '**/*.yaml'
              - 'ansible_collections/**'
              - 'playbooks/**'
              - 'roles/**'
              - 'inventory/**'
              - 'requirements.yml'
              - '.ansible-lint'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
              - '.yamllint'
            markdown:
              - '**/*.md'
              - '.markdownlint.yaml'

  # YAML linting
  yamllint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.yaml == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint . --format github

  # Ansible linting and syntax validation
  ansible-lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ansible == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('**/requirements.yml'') }}"
          restore-keys: ansible-collections-

      - name: Install Ansible and ansible-lint
        run: pip install ansible-core${{ env.ANSIBLE_CORE_VERSION }} ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \;
          ansible-galaxy collection install ansible_collections/homelab/common/ --force
          ansible-galaxy collection install ansible_collections/homelab/k3s/ --force
          ansible-galaxy collection install ansible_collections/homelab/proxmox_lxc/ --force

      - name: Run ansible-lint
        run: ansible-lint --format github --nocolor

      - name: Ansible syntax check - Root playbooks
        run: |
          ansible-playbook --syntax-check site.yml
          ansible-playbook --syntax-check security-deploy.yml
          ansible-playbook --syntax-check phase2-security.yml
          ansible-playbook --syntax-check test-security-hardening.yml

      - name: Ansible syntax check - Collections
        run: |
          cd ansible_collections/homelab/k3s && ansible-playbook --syntax-check playbooks/site.yml
          cd $GITHUB_WORKSPACE/ansible_collections/homelab/proxmox_lxc && ansible-playbook --syntax-check site.yml

  # Markdown linting
  markdownlint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pymarkdownlnt
        run: pip install pymarkdownlnt

      - name: Run pymarkdownlnt
        run: pymarkdown --config .markdownlint.yaml scan .

  # Secrets scanning (lightweight check in CI)
  secrets-scan:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ansible == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # Galaxy collection validation
  galaxy-validation:
    runs-on: ubuntu-latest
    needs: [changes, ansible-lint]
    if: needs.changes.outputs.ansible == 'true'
    strategy:
      matrix:
        collection: [homelab.k3s, homelab.proxmox_lxc, homelab.common]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install tools
        run: pip install ansible-core${{ env.ANSIBLE_CORE_VERSION }} galaxy-importer

      - name: Build and validate collection
        run: |
          cd ansible_collections/${{ matrix.collection }}
          ansible-galaxy collection build
          python -m galaxy_importer.main *.tar.gz

  # Final status check - fail fast if any critical job fails
  ci-status:
    runs-on: ubuntu-latest
    needs: [yamllint, ansible-lint, markdownlint, secrets-scan, galaxy-validation]
    if: always()
    steps:
      - name: Check CI results
        run: |
          echo "CI Status Summary"
          echo "================="
          echo "yamllint: ${{ needs.yamllint.result }}"
          echo "ansible-lint: ${{ needs.ansible-lint.result }}"
          echo "markdownlint: ${{ needs.markdownlint.result }}"
          echo "secrets-scan: ${{ needs.secrets-scan.result }}"
          echo "galaxy-validation: ${{ needs.galaxy-validation.result }}"

          if [[ "${{ needs.yamllint.result }}" == "failure" ]] || \
             [[ "${{ needs.ansible-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.markdownlint.result }}" == "failure" ]] || \
             [[ "${{ needs.secrets-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.galaxy-validation.result }}" == "failure" ]]; then
            echo "CI failed - one or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed or were skipped"
