---
name: CI
permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  ANSIBLE_VERSION: '>=2.17'

jobs:
  lint:
    name: Lint (YAML, Ansible, Markdown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install "yamllint>=1.35" "ansible-core${{ env.ANSIBLE_VERSION }}" "ansible-lint>=24.0" pymarkdownlnt

      - name: YAML lint
        run: yamllint . --format github

      - name: Markdown lint
        run: pymarkdown --config .markdownlint.yaml scan .

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('**/requirements.yml') }}
          restore-keys: ansible-collections-

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \;
          for collection in common k3s proxmox_lxc; do
            ansible-galaxy collection install ansible_collections/homelab/$collection/ --force
          done

      - name: Ansible lint
        run: ansible-lint --format quiet --nocolor

      - name: Ansible syntax check
        run: |
          for playbook in site.yml security-deploy.yml phase2-security.yml test-security-hardening.yml; do
            ansible-playbook --syntax-check $playbook
          done
          ansible-playbook --syntax-check ansible_collections/homelab/k3s/playbooks/site.yml
          ansible-playbook --syntax-check ansible_collections/homelab/proxmox_lxc/site.yml


      - name: TruffleHog secrets scan
        if: github.ref != 'refs/heads/main'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified


  collections:
    name: Validate Collections
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        collection: [common, k3s, proxmox_lxc]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install tools
        run: pip install "ansible-core${{ env.ANSIBLE_VERSION }}" galaxy-importer

      - name: Install external dependencies
        run: ansible-galaxy collection install -r requirements.yml --force

      - name: Install homelab.common collection (dependency)
        if: matrix.collection != 'common'
        run: ansible-galaxy collection install ansible_collections/homelab/common/ --force

      - name: Clean build artifacts
        run: rm -f ansible_collections/homelab/${{ matrix.collection }}/*.tar.gz

      - name: Build and validate
        run: |
          cd ansible_collections/homelab/${{ matrix.collection }}
          ansible-galaxy collection build
          python -m galaxy_importer.main *.tar.gz


  molecule:
    name: Molecule Test - ${{ matrix.collection }}
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - collection: common
            scenario: default
          - collection: k3s
            scenario: default
          - collection: proxmox_lxc
            scenario: default
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('**/requirements.yml') }}
          restore-keys: ansible-collections-

      - name: Install Molecule and dependencies
        run: |
          pip install "ansible-core${{ env.ANSIBLE_VERSION }}"
          pip install "molecule>=6.0" "molecule-plugins[docker]>=23.5.0"
          pip install docker

      - name: Install external Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \;

      - name: Build and install homelab.common collection
        run: |
          cd ansible_collections/homelab/common
          ansible-galaxy collection build --force
          ansible-galaxy collection install *.tar.gz --force

      - name: Build and install homelab.k3s collection
        if: matrix.collection == 'k3s' || matrix.collection == 'proxmox_lxc'
        run: |
          cd ansible_collections/homelab/k3s
          ansible-galaxy collection build --force
          ansible-galaxy collection install *.tar.gz --force

      - name: Build and install homelab.proxmox_lxc collection
        if: matrix.collection == 'proxmox_lxc'
        run: |
          cd ansible_collections/homelab/proxmox_lxc
          ansible-galaxy collection build --force
          ansible-galaxy collection install *.tar.gz --force

      - name: Verify collection installation
        run: |
          ansible-galaxy collection list homelab.common
          if [ "${{ matrix.collection }}" != "common" ]; then
            ansible-galaxy collection list homelab.${{ matrix.collection }}
          fi

      - name: Display Molecule version and configuration
        run: |
          molecule --version
          ansible --version
          docker --version

      - name: Start Docker service
        run: |
          sudo systemctl start docker
          sudo systemctl status docker

      - name: List available scenarios
        run: |
          cd ansible_collections/homelab/${{ matrix.collection }}
          molecule list

      - name: Run Molecule tests
        run: |
          cd ansible_collections/homelab/${{ matrix.collection }}
          molecule test -s ${{ matrix.scenario }}
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_NO_LOG: 'false'

      - name: Show Molecule logs on failure
        if: failure()
        run: |
          cd ansible_collections/homelab/${{ matrix.collection }}
          if [ -d .molecule ]; then
            echo "=== Molecule logs ==="
            find .molecule -type f -name "*.log" -exec echo "--- {} ---" \; -exec cat {} \;
          fi
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Docker images ==="
          docker images

      - name: Cleanup Molecule environment
        if: always()
        run: |
          cd ansible_collections/homelab/${{ matrix.collection }}
          molecule destroy -s ${{ matrix.scenario }} || true
          docker system prune -f --volumes || true
