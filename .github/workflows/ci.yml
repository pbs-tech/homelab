---
name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.12

      - name: Install collections
        run: |
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} \;
          ansible-galaxy collection install ansible_collections/homelab/k3s/
          ansible-galaxy collection install ansible_collections/homelab/proxmox_lxc/

      - name: Syntax check - Main playbooks
        run: |
          ansible-playbook --syntax-check site.yml
          ansible-playbook --syntax-check security-deploy.yml
          ansible-playbook --syntax-check phase2-security.yml
          ansible-playbook --syntax-check test-security-hardening.yml

      - name: Syntax check - K3s collection
        run: |
          cd ansible_collections/homelab/k3s
          ansible-playbook --syntax-check playbooks/site.yml

      - name: Syntax check - Proxmox LXC collection
        run: |
          cd ansible_collections/homelab/proxmox_lxc
          ansible-playbook --syntax-check site.yml

  galaxy-importer:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        collection:
          - homelab.k3s
          - homelab.proxmox_lxc
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install galaxy-importer
        run: |
          python -m pip install --upgrade pip
          pip install galaxy-importer

      - name: Build collection
        run: |
          cd ansible_collections/${{ matrix.collection }}
          ansible-galaxy collection build

      - name: Test collection with galaxy-importer
        run: |
          cd ansible_collections/${{ matrix.collection }}
          python -m galaxy_importer.main *.tar.gz

  collection-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        collection:
          - homelab.k3s
          - homelab.proxmox_lxc
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.12

      - name: Install collection dependencies
        run: |
          cd ansible_collections/${{ matrix.collection }}
          if [ -f requirements.yml ]; then
            ansible-galaxy collection install -r requirements.yml
          fi

      - name: Install collection
        run: |
          ansible-galaxy collection install ansible_collections/${{ matrix.collection }}/

      - name: Test collection installation
        run: |
          ansible-doc ${{ matrix.collection }}.* --list
          ansible-galaxy collection list ${{ matrix.collection }}
