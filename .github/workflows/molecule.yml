---
name: Molecule Tests

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  ANSIBLE_VERSION: '>=2.15'

jobs:
  molecule:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: common/default
            collection: homelab/common
            scenario: default
          - name: common/common-roles
            collection: homelab/common
            scenario: common-roles
          - name: k3s/raspberry-pi
            collection: homelab/k3s
            scenario: raspberry-pi
          - name: proxmox_lxc/default
            collection: homelab/proxmox_lxc
            scenario: default
          - name: proxmox_lxc/service-stack
            collection: homelab/proxmox_lxc
            scenario: service-stack
          - name: proxmox_lxc/proxmox-integration
            collection: homelab/proxmox_lxc
            scenario: proxmox-integration

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install molecule[docker] molecule-plugins[docker]
          pip install ansible-core${{ env.ANSIBLE_VERSION }} yamllint ansible-lint

      - name: Install collections
        run: |
          ansible-galaxy collection install -r ansible_collections/${{ matrix.collection }}/requirements.yml --force
          ansible-galaxy collection install ansible_collections/${{ matrix.collection }}/ --force

      - name: Run tests
        run: molecule test -s ${{ matrix.scenario }}
        working-directory: ansible_collections/${{ matrix.collection }}
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'

  full-stack:
    name: Full Stack Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install molecule[docker] molecule-plugins[docker] ansible-core${{ env.ANSIBLE_VERSION }}

      - name: Install collections
        run: ansible-galaxy install -r requirements.yml --force

      - name: Run full-stack test
        run: molecule test
        working-directory: molecule/full-stack
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'
