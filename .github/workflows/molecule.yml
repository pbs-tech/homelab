---
name: Molecule

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: 0 2 * * 0  # Weekly on Sunday at 2 AM
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  molecule:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        collection:
          - homelab.common
          - homelab.k3s
          - homelab.proxmox_lxc
        scenario:
          - default
          - common-roles
          - raspberry-pi
          - proxmox-integration
          - service-stack
        exclude:
          # Exclude scenarios that don't exist for each collection
          - collection: homelab.common
            scenario: raspberry-pi
          - collection: homelab.common
            scenario: proxmox-integration
          - collection: homelab.common
            scenario: service-stack
          - collection: homelab.k3s
            scenario: default
          - collection: homelab.k3s
            scenario: common-roles
          - collection: homelab.k3s
            scenario: proxmox-integration
          - collection: homelab.k3s
            scenario: service-stack
          - collection: homelab.proxmox_lxc
            scenario: common-roles
          - collection: homelab.proxmox_lxc
            scenario: raspberry-pi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install molecule[docker] molecule-plugins[docker] ansible-core>=2.12
          pip install yamllint ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r ansible_collections/${{ matrix.collection }}/requirements.yml --force
          ansible-galaxy collection install ansible_collections/${{ matrix.collection }}/ --force

      - name: Run Molecule tests
        run: |
          cd ansible_collections/${{ matrix.collection }}
          molecule test -s ${{ matrix.scenario }}
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: molecule-results-${{ matrix.collection }}-${{ matrix.scenario }}
          path: |
            ansible_collections/${{ matrix.collection }}/molecule/${{ matrix.scenario }}/
          retention-days: 30

  # Full-stack integration test
  full-stack-test:
    runs-on: ubuntu-latest
    needs: molecule
    if: needs.molecule.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install molecule[docker] molecule-plugins[docker] ansible-core>=2.12
          pip install containers.podman

      - name: Install collections
        run: |
          ansible-galaxy install -r requirements.yml --force

      - name: Run full-stack molecule test
        run: |
          cd molecule/full-stack
          molecule test
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'

  # Production workflow tests (unit tests only - no hardware required)
  production-tests:
    runs-on: ubuntu-latest
    needs: molecule
    if: needs.molecule.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.12 containers.podman

      - name: Install collections
        run: |
          ansible-galaxy install -r requirements.yml --force

      - name: Run production unit tests
        run: |
          cd tests/
          ansible-playbook test_suite.yml -e "test_types=['unit']" --tags quick

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-test-results
          path: tests/results/
          retention-days: 30

  test-summary:
    needs: [molecule, full-stack-test, production-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all test results
        run: |
          molecule_result="${{ needs.molecule.result }}"
          fullstack_result="${{ needs.full-stack-test.result }}"
          production_result="${{ needs.production-tests.result }}"

          echo "Test Results Summary:"
          echo "===================="
          echo "Molecule Tests: $molecule_result"
          echo "Full-Stack Test: $fullstack_result"
          echo "Production Tests: $production_result"

          # Check for failures
          if [[ "$molecule_result" == "failure" || \
                "$fullstack_result" == "failure" || \
                "$production_result" == "failure" ]]; then
            echo "❌ Some tests failed"
            exit 1
          # Check for all success
          elif [[ "$molecule_result" == "success" && \
                  "$fullstack_result" == "success" && \
                  "$production_result" == "success" ]]; then
            echo "✅ All tests passed"
          else
            echo "⚠️ Tests completed with mixed results"
            echo "Check individual job results for details"
          fi
