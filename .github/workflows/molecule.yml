---
name: Molecule Tests

permissions:
  contents: read

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM
  push:
    branches: [main]
    paths:
      - 'ansible_collections/**'
      - 'molecule/**'
      - '.github/workflows/molecule.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'ansible_collections/**'
      - 'molecule/**'
      - '.github/workflows/molecule.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  ANSIBLE_VERSION: '>=2.17'

jobs:
  molecule:
    name: Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: common/default
            collection: homelab/common
            scenario: default
          - name: proxmox_lxc/default
            collection: homelab/proxmox_lxc
            scenario: default
          - name: proxmox_lxc/service-stack
            collection: homelab/proxmox_lxc
            scenario: service-stack
          # Scenarios below require real infrastructure - run manually only
          # - name: common/common-roles
          #   collection: homelab/common
          #   scenario: common-roles
          # - name: k3s/raspberry-pi
          #   collection: homelab/k3s
          #   scenario: raspberry-pi
          # - name: proxmox_lxc/proxmox-integration
          #   collection: homelab/proxmox_lxc
          #   scenario: proxmox-integration

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install "molecule>=6.0" "molecule-plugins[docker]>=23.5.0"
          pip install "ansible-core${{ env.ANSIBLE_VERSION }}" "yamllint>=1.35" "ansible-lint>=24.0" docker

      - name: Setup Docker Buildx
        if: env.ACT != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Install base collections
        run: ansible-galaxy collection install -r requirements.yml --force

      - name: Install collection dependencies
        run: |
          if [ -f "ansible_collections/${{ matrix.collection }}/requirements.yml" ]; then
            ansible-galaxy collection install -r ansible_collections/${{ matrix.collection }}/requirements.yml --force
          fi
          # Install homelab.common first if testing other collections
          if [ "${{ matrix.collection }}" != "homelab/common" ]; then
            ansible-galaxy collection install ansible_collections/homelab/common/ --force
          fi

      - name: Build and install test collection
        run: |
          cd ansible_collections/${{ matrix.collection }}
          ansible-galaxy collection build --force
          ansible-galaxy collection install *.tar.gz --force

      - name: Run molecule tests
        run: molecule test -s ${{ matrix.scenario }}
        working-directory: ansible_collections/${{ matrix.collection }}
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'
          MOLECULE_NO_LOG: 'false'

  full-stack:
    name: Full Stack Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install "molecule>=6.0" "molecule-plugins[docker]>=23.5.0"
          pip install "ansible-core${{ env.ANSIBLE_VERSION }}" "yamllint>=1.35" "ansible-lint>=24.0" docker

      - name: Setup Docker Buildx
        if: env.ACT != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Install all collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force
          # Install homelab collections in order
          for collection in common k3s proxmox_lxc; do
            ansible-galaxy collection install ansible_collections/homelab/$collection/ --force
          done

      - name: Run full-stack test
        run: molecule test
        working-directory: molecule/full-stack
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'
          MOLECULE_NO_LOG: 'false'
