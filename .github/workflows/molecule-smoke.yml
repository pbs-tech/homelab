---
name: Molecule Smoke Test

permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop, molecule]
    paths:
      - 'ansible_collections/**'
      - 'molecule/smoke/**'
      - 'requirements.yml'
      - '.github/workflows/molecule-smoke.yml'
  push:
    branches: [main, molecule]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  ANSIBLE_VERSION: '>=2.17,<2.19'

jobs:
  smoke-test:
    name: Smoke Test - All Collections
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Verify homelab collections are present
        run: |
          if [ ! -d ansible_collections/homelab ]; then
            echo "ERROR: ansible_collections/homelab not found — homelab collections must be committed to the repo"
            exit 1
          fi

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ${{ runner.os }}-ansible-collections-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements.yml') }}
          restore-keys: |
            ${{ runner.os }}-ansible-collections-${{ env.PYTHON_VERSION }}-

      - name: Install Molecule and dependencies
        run: pip install "ansible-core${{ env.ANSIBLE_VERSION }}" "molecule>=6.0" "molecule-plugins[docker]>=23.5.0" docker

      - name: Install external Ansible collections
        run: ansible-galaxy collection install -r requirements.yml -p ~/.ansible/collections --force

      - name: Build and install homelab collections
        run: |
          for collection in common k3s proxmox_lxc; do
            cd ansible_collections/homelab/${collection}
            ansible-galaxy collection build --force
            ansible-galaxy collection install *.tar.gz -p ~/.ansible/collections --force
            rm -f *.tar.gz
            cd ../../..
          done

      - name: Verify collection installation
        run: |
          ansible-galaxy collection list homelab.common
          ansible-galaxy collection list homelab.k3s
          ansible-galaxy collection list homelab.proxmox_lxc

      - name: Start Docker service
        run: |
          sudo systemctl start docker
          until docker info > /dev/null 2>&1; do sleep 1; done

      - name: Run smoke test
        run: molecule test -s smoke
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_NO_LOG: 'false'
          ANSIBLE_REMOTE_TMP: /tmp/ansible-tmp
          ANSIBLE_LOCAL_TMP: /tmp/ansible-tmp

      - name: Show logs on failure
        if: failure()
        run: |
          if [ -d .molecule/smoke ]; then
            find .molecule/smoke -type f -name "*.log" -exec echo "--- {} ---" \; -exec cat {} \;
          fi
          docker ps -a
          docker ps -a --format "{{.Names}}" | while read container; do
            echo "--- $container ---"
            docker logs --tail 50 "$container" 2>&1 || true
          done

      - name: Cleanup
        if: always()
        timeout-minutes: 5
        run: |
          molecule destroy -s smoke || true
          docker system prune -f --volumes || true
