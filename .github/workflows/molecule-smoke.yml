---
name: Molecule Smoke Test

permissions:
  contents: read
  packages: write

on:
  pull_request:
    branches: [main, develop, molecule]
    paths:
      - 'ansible_collections/**'
      - 'molecule/smoke/**'
      - 'requirements.yml'
      - '.github/workflows/molecule-smoke.yml'
      - '.github/docker/**'
  push:
    branches: [main, molecule]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  ANSIBLE_VERSION: '>=2.17'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/homelab

jobs:
  build-docker-image:
    name: Build Docker CI Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists for current commit
        id: check_image
        continue-on-error: true
        run: |
          # Try to pull the image with the current SHA
          IMAGE_TAG="sha-${{ github.sha }}"
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci:${IMAGE_TAG}"

          echo "Checking for existing image: ${IMAGE_NAME}"

          if docker manifest inspect "${IMAGE_NAME}" > /dev/null 2>&1; then
            echo "Image exists for commit ${{ github.sha }}"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Image does not exist for commit ${{ github.sha }}"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata for CI image
        id: meta
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=v1.0.0
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push CI image
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/docker/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip build (image already exists)
        if: steps.check_image.outputs.exists == 'true'
        run: |
          echo "✅ Skipping build - image already exists for commit ${{ github.sha }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci:sha-${{ github.sha }}"

  smoke-test:
    needs: build-docker-image
    name: Smoke Test - All Collections
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/homelab-ci:${{ github.ref_name }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged -v /var/run/docker.sock:/var/run/docker.sock
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('**/requirements.yml') }}
          restore-keys: ansible-collections-

      - name: Install external Ansible collections
        run: |
          set -e
          echo "Installing main requirements..."
          ansible-galaxy collection install -r requirements.yml --force || {
            echo "ERROR: Failed to install main requirements.yml"
            exit 1
          }

          echo "Installing collection-specific requirements..."
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \; || {
            echo "ERROR: Failed to install collection-specific requirements"
            exit 1
          }

      - name: Build and install homelab collections
        run: |
          set -e

          # Build and install common collection (required by others)
          echo "Building homelab.common collection..."
          cd ansible_collections/homelab/common
          ansible-galaxy collection build --force || {
            echo "ERROR: Failed to build homelab.common collection"
            exit 1
          }
          ansible-galaxy collection install *.tar.gz --force || {
            echo "ERROR: Failed to install homelab.common collection"
            exit 1
          }
          cd ../../..

          # Build and install k3s collection
          echo "Building homelab.k3s collection..."
          cd ansible_collections/homelab/k3s
          ansible-galaxy collection build --force || {
            echo "ERROR: Failed to build homelab.k3s collection"
            exit 1
          }
          ansible-galaxy collection install *.tar.gz --force || {
            echo "ERROR: Failed to install homelab.k3s collection"
            exit 1
          }
          cd ../../..

          # Build and install proxmox_lxc collection
          echo "Building homelab.proxmox_lxc collection..."
          cd ansible_collections/homelab/proxmox_lxc
          ansible-galaxy collection build --force || {
            echo "ERROR: Failed to build homelab.proxmox_lxc collection"
            exit 1
          }
          ansible-galaxy collection install *.tar.gz --force || {
            echo "ERROR: Failed to install homelab.proxmox_lxc collection"
            exit 1
          }
          cd ../../..

      - name: Verify collection installation
        run: |
          echo "=== Installed homelab collections ==="
          ansible-galaxy collection list homelab.common
          ansible-galaxy collection list homelab.k3s
          ansible-galaxy collection list homelab.proxmox_lxc

      - name: Display tool versions
        run: |
          echo "=== Tool versions ==="
          molecule --version
          ansible --version
          docker --version
          python --version

      - name: Verify Docker access
        run: |
          set -e
          echo "Verifying Docker access via socket..."
          docker info || {
            echo "ERROR: Docker info command failed"
            exit 1
          }
          docker ps -a || {
            echo "ERROR: Docker ps command failed"
            exit 1
          }
          echo "Docker is accessible and operational"

      - name: List smoke test scenario
        run: |
          echo "=== Available Molecule scenarios ==="
          molecule list -s smoke

      - name: Run smoke test
        run: |
          set -e
          echo "Starting Molecule smoke test..."
          molecule test -s smoke || {
            echo "ERROR: Molecule smoke test failed"
            echo "Collecting diagnostic information..."
            docker ps -a || true
            exit 1
          }
          echo "Smoke test completed successfully"
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_NO_LOG: 'false'
          ANSIBLE_REMOTE_TMP: /tmp/ansible-tmp
          ANSIBLE_LOCAL_TMP: /tmp/ansible-tmp

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Molecule logs ==="
          if [ -d .molecule/smoke ]; then
            find .molecule/smoke -type f -name "*.log" -exec echo "--- {} ---" \; -exec cat {} \;
          fi
          echo ""
          echo "=== Docker containers ==="
          docker ps -a
          echo ""
          echo "=== Docker images ==="
          docker images
          echo ""
          echo "=== Recent Docker logs ==="
          docker ps -a --format "{{.Names}}" | while read container; do
            echo "--- Logs for $container ---"
            docker logs --tail 50 "$container" 2>&1 || true
          done

      - name: Cleanup
        if: always()
        timeout-minutes: 5
        run: |
          molecule destroy -s smoke || true
          docker system prune -f --volumes || true
