---
name: Build CI Docker Image

on:
  workflow_call:
    outputs:
      image-tag:
        description: 'The Docker image tag to use in subsequent jobs'
        value: ${{ jobs.build.outputs.image-tag }}
      image-name:
        description: 'The full Docker image name with tag'
        value: ${{ jobs.build.outputs.image-name }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/homelab

jobs:
  build:
    name: Build Docker CI Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.determine-tag.outputs.tag }}
      image-name: ${{ steps.determine-tag.outputs.full-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag to use
        id: determine-tag
        run: |
          # Use SHA-based tag for reproducibility and caching
          IMAGE_TAG="sha-${{ github.sha }}"
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci:${IMAGE_TAG}"

          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full-name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "Using image tag: ${IMAGE_TAG}"
          echo "Full image name: ${IMAGE_NAME}"

      - name: Check if image exists for current commit
        id: check_image
        continue-on-error: true
        run: |
          IMAGE_NAME="${{ steps.determine-tag.outputs.full-name }}"
          echo "Checking for existing image: ${IMAGE_NAME}"

          if docker manifest inspect "${IMAGE_NAME}" > /dev/null 2>&1; then
            echo "Image exists for commit ${{ github.sha }}"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Image does not exist for commit ${{ github.sha }}"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata for CI image
        id: meta
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=v1.0.0
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push CI image
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/docker/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip build (image already exists)
        if: steps.check_image.outputs.exists == 'true'
        run: |
          echo "✅ Skipping build - image already exists for commit ${{ github.sha }}"
          echo "Image: ${{ steps.determine-tag.outputs.full-name }}"
