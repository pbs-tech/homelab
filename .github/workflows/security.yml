---
name: Security Audit

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 3 AM
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'
  ANSIBLE_VERSION: '>=2.15'

jobs:
  deep-scan:
    name: Deep Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install tools
        run: pip install ansible-core${{ env.ANSIBLE_VERSION }} ansible-lint

      - name: Install collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \;

      - name: Deep secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

      - name: Security-focused lint
        run: ansible-lint --profile security

      - name: Check for hardcoded credentials
        run: |
          pattern="(password|secret|key|token|credential):\s*['\"][^'\"]{8,}"
          if grep -ri --include="*.yml" --include="*.yaml" -E "${pattern}" .; then
            echo "⚠️ Potential hardcoded secrets found"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"
