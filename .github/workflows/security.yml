---
name: Security

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 3 AM
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better detection

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  ansible-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.12 ansible-lint

      - name: Install Ansible collections
        run: |
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} \;
          ansible-galaxy collection install ansible_collections/homelab/k3s/
          ansible-galaxy collection install ansible_collections/homelab/proxmox_lxc/

      - name: Run ansible-lint with security profile
        run: |
          ansible-lint --profile security

      - name: Check for hardcoded secrets in Ansible files
        run: |
          echo "Checking for potential hardcoded secrets in Ansible files..."
          # Check for common secret patterns in YAML files
          if grep -r -i --include="*.yml" --include="*.yaml" -E "(password|secret|key|token|credential):\s*['\"][^'\"]{8,}" . ; then
            echo "❌ Potential hardcoded secrets found"
            exit 1
          else
            echo "✅ No obvious hardcoded secrets detected"
          fi

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:python"

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'ansible-homelab'
          path: '.'
          format: 'ALL'
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS 7

      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: dependency-check-report
          path: reports/