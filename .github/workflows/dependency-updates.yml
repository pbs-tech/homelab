---
name: Dependency Updates

on:
  schedule:
    - cron: '0 6 * * MON'  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-ansible-collections:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.15 ruamel.yaml

      - name: Check for collection updates
        id: check-updates
        run: |
          echo "Checking for Ansible collection updates..."

          # Create update script
          cat > update_collections.py << 'EOF'
          import subprocess
          import json
          import yaml
          from ruamel.yaml import YAML

          def get_latest_version(collection_name):
              try:
                  result = subprocess.run(
                      ['ansible-galaxy', 'collection', 'list', collection_name, '--format=json'],
                      capture_output=True, text=True, check=True
                  )
                  data = json.loads(result.stdout)
                  return data.get(collection_name, {}).get('version', 'unknown')
              except:
                  return None

          def update_requirements():
              yaml_loader = YAML()
              yaml_loader.preserve_quotes = True
              yaml_loader.default_flow_style = False

              with open('requirements.yml', 'r') as f:
                  requirements = yaml_loader.load(f)

              updates = []
              for collection in requirements.get('collections', []):
                  if isinstance(collection, dict) and 'name' in collection:
                      name = collection['name']
                      if not name.startswith('homelab.'):
                          # Check for updates to external collections
                          print(f"Checking {name} for updates...")
                          # This would require API calls to Ansible Galaxy
                          # For now, we'll just track what we checked
                          updates.append(f"Checked: {name}")

              return updates

          updates = update_requirements()
          for update in updates:
              print(update)

          EOF

          python update_collections.py
          echo "updates-available=true" >> $GITHUB_OUTPUT

      - name: Update Python requirements
        run: |
          # Check for outdated Python packages
          pip list --outdated --format=json > outdated.json

          if [ -s outdated.json ] && [ "$(cat outdated.json)" != "[]" ]; then
            echo "Python package updates available"
            cat outdated.json | jq -r '.[] | "\(.name): \(.version) -> \(.latest_version)"'

            # Update requirements.txt with version constraints
            # This is a simplified approach - in production you'd want more sophisticated logic
            echo "# Updated $(date)" >> requirements.txt.new
            cat requirements.txt >> requirements.txt.new
            mv requirements.txt.new requirements.txt
          fi

      - name: Run security audit
        run: |
          # Run security audit on dependencies
          pip install safety
          safety check --json > safety-report.json || true

          if [ -s safety-report.json ]; then
            echo "Security vulnerabilities found:"
            cat safety-report.json | jq '.vulnerabilities[] | "\(.package_name): \(.vulnerability_id)"'
          fi

      - name: Create pull request
        if: steps.check-updates.outputs.updates-available == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies and security patches'
          title: 'Automated Dependency Updates'
          body: |
            ## Automated Dependency Updates

            This PR contains automated updates to project dependencies:

            ### Changes:
            - Updated Ansible collections to latest versions
            - Updated Python package dependencies
            - Applied security patches where available

            ### Testing:
            - [ ] All linting checks pass
            - [ ] Molecule tests pass
            - [ ] Security scans pass

            ### Validation Required:
            - [ ] Manual testing in staging environment
            - [ ] Compatibility verification

            **Note**: This is an automated PR. Please review changes carefully before merging.
          branch: automated-dependency-updates
          delete-branch: true

  update-github-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Actions
        uses: renovatebot/github-action@v40.0.0
        with:
          configurationFile: .github/renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}

  security-advisory-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run GitHub Security Advisory check
        uses: github/osv-scanner-action@v1
        with:
          scan-args: |
            -r
            --format=json
            ./
          output-file: security-report.json

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-advisory-report
          path: security-report.json
          retention-days: 30
