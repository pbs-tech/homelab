---
name: Configuration Drift Detection

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Environment to check'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - all

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  ANSIBLE_FORCE_COLOR: '1'
  ANSIBLE_HOST_KEY_CHECKING: 'false'

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [production, staging]
    if: inputs.target_environment == 'all' || inputs.target_environment == matrix.environment || (inputs.target_environment == '' && matrix.environment == 'production')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core>=2.15

      - name: Install collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: Configure environment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ~/.ansible_vault_pass
          chmod 600 ~/.ansible_vault_pass

      - name: Run drift detection
        id: drift-check
        run: |
          echo "Running configuration drift detection for ${{ matrix.environment }}..."

          # Create drift detection report directory
          mkdir -p drift-reports

          # Run Ansible in check mode to detect drift
          ansible-playbook playbooks/infrastructure.yml \
            -i inventory/${{ matrix.environment }}_hosts.yml \
            --private-key ~/.ssh/id_rsa \
            --vault-password-file ~/.ansible_vault_pass \
            --check --diff \
            > drift-reports/${{ matrix.environment }}-drift.log 2>&1 || echo "drift-detected=true" >> $GITHUB_OUTPUT

          # Analyze drift report
          if grep -q "changed:" drift-reports/${{ matrix.environment }}-drift.log; then
            echo "drift-detected=true" >> $GITHUB_OUTPUT
            echo "Configuration drift detected in ${{ matrix.environment }}"

            # Count changes
            changed_tasks=$(grep -c "changed:" drift-reports/${{ matrix.environment }}-drift.log || echo 0)
            echo "changed-tasks=$changed_tasks" >> $GITHUB_OUTPUT

            # Extract summary
            echo "## Drift Detection Report - ${{ matrix.environment }}" > drift-reports/${{ matrix.environment }}-summary.md
            echo "Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> drift-reports/${{ matrix.environment }}-summary.md
            echo "Changed tasks: $changed_tasks" >> drift-reports/${{ matrix.environment }}-summary.md
            echo "" >> drift-reports/${{ matrix.environment }}-summary.md
            echo "### Changes Detected:" >> drift-reports/${{ matrix.environment }}-summary.md
            grep -A 5 -B 1 "changed:" drift-reports/${{ matrix.environment }}-drift.log | head -50 >> drift-reports/${{ matrix.environment }}-summary.md
          else
            echo "drift-detected=false" >> $GITHUB_OUTPUT
            echo "No configuration drift detected in ${{ matrix.environment }}"
          fi

      - name: Generate detailed drift report
        if: steps.drift-check.outputs.drift-detected == 'true'
        run: |
          # Create detailed analysis
          cat > analyze_drift.py << 'EOF'
          import re
          import json
          import sys

          def parse_ansible_output(log_file):
              with open(log_file, 'r') as f:
                  content = f.read()

              # Extract task changes
              changes = []
              lines = content.split('\n')

              for i, line in enumerate(lines):
                  if 'changed:' in line:
                      # Get context around the change
                      context_start = max(0, i-3)
                      context_end = min(len(lines), i+3)
                      context = '\n'.join(lines[context_start:context_end])

                      changes.append({
                          'line_number': i+1,
                          'change_line': line.strip(),
                          'context': context
                      })

              return changes

          def categorize_changes(changes):
              categories = {
                  'configuration': [],
                  'packages': [],
                  'services': [],
                  'files': [],
                  'other': []
              }

              for change in changes:
                  line = change['change_line'].lower()
                  if any(word in line for word in ['config', 'template', 'copy']):
                      categories['configuration'].append(change)
                  elif any(word in line for word in ['package', 'apt', 'yum', 'pip']):
                      categories['packages'].append(change)
                  elif any(word in line for word in ['service', 'systemd', 'daemon']):
                      categories['services'].append(change)
                  elif any(word in line for word in ['file', 'directory', 'mode']):
                      categories['files'].append(change)
                  else:
                      categories['other'].append(change)

              return categories

          # Parse drift report
          changes = parse_ansible_output('drift-reports/${{ matrix.environment }}-drift.log')
          categories = categorize_changes(changes)

          # Generate structured report
          report = {
              'environment': '${{ matrix.environment }}',
              'timestamp': '$(date -u -Iseconds)',
              'total_changes': len(changes),
              'categories': {k: len(v) for k, v in categories.items()},
              'changes': changes
          }

          with open('drift-reports/${{ matrix.environment }}-analysis.json', 'w') as f:
              json.dump(report, f, indent=2)

          print(f"Analysis complete: {len(changes)} changes detected")
          EOF

          python analyze_drift.py

      - name: Upload drift reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-report-${{ matrix.environment }}
          path: drift-reports/
          retention-days: 30

      - name: Create issue for significant drift
        if: steps.drift-check.outputs.drift-detected == 'true' && steps.drift-check.outputs.changed-tasks > 5
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let summary = '';
            try {
              summary = fs.readFileSync('drift-reports/${{ matrix.environment }}-summary.md', 'utf8');
            } catch (e) {
              summary = 'Drift report not available';
            }

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Configuration Drift Detected - ${{ matrix.environment }}`,
              body: `## Configuration Drift Alert\n\nSignificant configuration drift detected in **${{ matrix.environment }}** environment.\n\n**Changed Tasks**: ${{ steps.drift-check.outputs.changed-tasks }}\n\n${summary}\n\n### Action Required:\n- [ ] Review drift report\n- [ ] Investigate root cause\n- [ ] Apply corrections if needed\n- [ ] Update runbooks if necessary\n\n**Workflow Run**: ${context.runId}`,
              labels: ['infrastructure', 'drift-detection', 'urgent']
            });

            console.log(`Created issue #${issue.data.number}`);

      - name: Comment on existing drift issues
        if: steps.drift-check.outputs.drift-detected == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'drift-detection',
              state: 'open'
            });

            for (const issue of issues.data) {
              if (issue.title.includes('${{ matrix.environment }}')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ Configuration drift resolved in **${{ matrix.environment }}** environment.\n\nNo changes detected in latest run: ${context.runId}\n\nConsider closing this issue if the drift has been properly addressed.`
                });
              }
            }

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ansible_vault_pass

  drift-summary:
    runs-on: ubuntu-latest
    needs: detect-drift
    if: always()
    steps:
      - name: Generate drift summary
        run: |
          echo "## Configuration Drift Detection Summary" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results:" >> $GITHUB_STEP_SUMMARY
          echo "- Production: ${{ needs.detect-drift.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "- Review drift reports in workflow artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Address any identified configuration drift" >> $GITHUB_STEP_SUMMARY
          echo "- Update infrastructure documentation as needed" >> $GITHUB_STEP_SUMMARY
