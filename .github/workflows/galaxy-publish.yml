---
name: Publish to Ansible Galaxy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      collection:
        description: 'Collection to publish (common, k3s, proxmox_lxc, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - common
          - k3s
          - proxmox_lxc

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  ANSIBLE_VERSION: '>=2.17'

jobs:
  publish-common:
    name: Publish homelab.common
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch' && (inputs.collection == 'all' || inputs.collection == 'common'))
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Ansible
        run: |
          pip install "ansible-core${{ env.ANSIBLE_VERSION }}"

      - name: Get collection version
        id: get-version
        run: |
          VERSION=$(grep "^version:" ansible_collections/homelab/common/galaxy.yml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Collection version: $VERSION"

      - name: Install external dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: Clean build artifacts
        run: rm -f ansible_collections/homelab/common/*.tar.gz

      - name: Build collection
        run: |
          cd ansible_collections/homelab/common
          ansible-galaxy collection build

      - name: Publish to Galaxy
        env:
          ANSIBLE_GALAXY_TOKEN: ${{ secrets.GALAXY_API_KEY }}
        run: |
          cd ansible_collections/homelab/common
          ansible-galaxy collection publish *.tar.gz

  publish-k3s:
    name: Publish homelab.k3s
    runs-on: ubuntu-latest
    needs: publish-common
    if: |
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch' && (inputs.collection == 'all' || inputs.collection == 'k3s'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Ansible
        run: |
          pip install "ansible-core${{ env.ANSIBLE_VERSION }}"

      - name: Get collection version
        id: get-version
        run: |
          VERSION=$(grep "^version:" ansible_collections/homelab/k3s/galaxy.yml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Collection version: $VERSION"

      - name: Install external dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: Install homelab.common (dependency)
        uses: ./.github/actions/wait-for-galaxy-collection
        with:
          collection: 'homelab.common'
          version: ${{ needs.publish-common.outputs.version }}
          fallback_path: 'ansible_collections/homelab/common/'
          is_release: ${{ github.event_name == 'release' }}

      - name: Clean build artifacts
        run: rm -f ansible_collections/homelab/k3s/*.tar.gz

      - name: Build collection
        run: |
          cd ansible_collections/homelab/k3s
          ansible-galaxy collection build

      - name: Publish to Galaxy
        env:
          ANSIBLE_GALAXY_TOKEN: ${{ secrets.GALAXY_API_KEY }}
        run: |
          cd ansible_collections/homelab/k3s
          ansible-galaxy collection publish *.tar.gz

  publish-proxmox-lxc:
    name: Publish homelab.proxmox_lxc
    runs-on: ubuntu-latest
    needs: publish-common
    if: |
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch' && (inputs.collection == 'all' || inputs.collection == 'proxmox_lxc'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Ansible
        run: |
          pip install "ansible-core${{ env.ANSIBLE_VERSION }}"

      - name: Get collection version
        id: get-version
        run: |
          VERSION=$(grep "^version:" ansible_collections/homelab/proxmox_lxc/galaxy.yml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Collection version: $VERSION"

      - name: Install external dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: Install homelab.common (dependency)
        uses: ./.github/actions/wait-for-galaxy-collection
        with:
          collection: 'homelab.common'
          version: ${{ needs.publish-common.outputs.version }}
          fallback_path: 'ansible_collections/homelab/common/'
          is_release: ${{ github.event_name == 'release' }}

      - name: Clean build artifacts
        run: rm -f ansible_collections/homelab/proxmox_lxc/*.tar.gz

      - name: Build collection
        run: |
          cd ansible_collections/homelab/proxmox_lxc
          ansible-galaxy collection build

      - name: Publish to Galaxy
        env:
          ANSIBLE_GALAXY_TOKEN: ${{ secrets.GALAXY_API_KEY }}
        run: |
          cd ansible_collections/homelab/proxmox_lxc
          ansible-galaxy collection publish *.tar.gz

  summary:
    name: Publishing Summary
    runs-on: ubuntu-latest
    needs: [publish-common, publish-k3s, publish-proxmox-lxc]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Publishing workflow completed"
          echo "================================"
          echo "Results:"
          echo "  Common: ${{ needs.publish-common.result }}"
          echo "  K3s: ${{ needs.publish-k3s.result }}"
          echo "  Proxmox LXC: ${{ needs.publish-proxmox-lxc.result }}"
          echo "================================"

          # Check if any job failed or was cancelled
          if [[ "${{ needs.publish-common.result }}" == "failure" ]] || \
             [[ "${{ needs.publish-k3s.result }}" == "failure" ]] || \
             [[ "${{ needs.publish-proxmox-lxc.result }}" == "failure" ]]; then
            echo "❌ One or more collections failed to publish"
            exit 1
          fi

          if [[ "${{ needs.publish-common.result }}" == "cancelled" ]] || \
             [[ "${{ needs.publish-k3s.result }}" == "cancelled" ]] || \
             [[ "${{ needs.publish-proxmox-lxc.result }}" == "cancelled" ]]; then
            echo "⚠ One or more collections were cancelled"
            exit 1
          fi

          # Check if any job was skipped unexpectedly during release
          if [[ "${{ github.event_name }}" == "release" ]]; then
            if [[ "${{ needs.publish-common.result }}" == "skipped" ]]; then
              echo "⚠ Warning: Common collection was skipped during release"
            fi
            if [[ "${{ needs.publish-k3s.result }}" == "skipped" ]]; then
              echo "⚠ Warning: K3s collection was skipped during release"
            fi
            if [[ "${{ needs.publish-proxmox-lxc.result }}" == "skipped" ]]; then
              echo "⚠ Warning: Proxmox LXC collection was skipped during release"
            fi
          fi

          echo "✓ All scheduled collections published successfully"
