---
name: Lint

on:
  push:
    branches: [ "main", "develop", "update-actions" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  ANSIBLE_CORE_VERSION: '>=2.15'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ansible: ${{ steps.changes.outputs.ansible }}
      yaml: ${{ steps.changes.outputs.yaml }}
      markdown: ${{ steps.changes.outputs.markdown }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for file changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            ansible:
              - '**/*.yml'
              - '**/*.yaml'
              - 'ansible_collections/**'
              - 'playbooks/**'
              - 'roles/**'
              - 'inventory/**'
              - 'site.yml'
              - 'requirements.yml'
              - '.ansible-lint'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
              - '.yamllint'
            markdown:
              - '**/*.md'
              - '.markdownlint.yaml'
              - '.markdownlintignore'

  yamllint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.yaml == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run yamllint
        run: yamllint . --format github

  ansible-lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ansible == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core${{ env.ANSIBLE_CORE_VERSION }} ansible-lint

      - name: Install Ansible collections
        run: |
          # Install main requirements
          ansible-galaxy collection install -r requirements.yml --force

          # Install collection-specific requirements
          find ansible_collections/ -name "requirements.yml" -exec ansible-galaxy collection install -r {} --force \;

          # Install local collections in dependency order
          ansible-galaxy collection install ansible_collections/homelab/common/ --force
          ansible-galaxy collection install ansible_collections/homelab/k3s/ --force
          ansible-galaxy collection install ansible_collections/homelab/proxmox_lxc/ --force

      - name: Run ansible-lint
        run: ansible-lint --format github --nocolor --force-color

  markdownlint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install pymarkdownlnt
        run: |
          python -m pip install --upgrade pip
          pip install pymarkdownlnt

      - name: Run pymarkdownlnt
        run: pymarkdown --config .markdownlint.yaml scan .

  # Summary job that depends on all linting jobs
  lint-summary:
    runs-on: ubuntu-latest
    needs: [changes, yamllint, ansible-lint, markdownlint]
    if: always()
    steps:
      - name: Check lint results
        run: |
          echo "Lint Summary:"
          echo "============="
          echo "Changes detected:"
          echo "- YAML: ${{ needs.changes.outputs.yaml }}"
          echo "- Ansible: ${{ needs.changes.outputs.ansible }}"
          echo "- Markdown: ${{ needs.changes.outputs.markdown }}"
          echo ""
          echo "Job results:"
          echo "- yamllint: ${{ needs.yamllint.result }}"
          echo "- ansible-lint: ${{ needs.ansible-lint.result }}"
          echo "- markdownlint: ${{ needs.markdownlint.result }}"

          # Check if any required job failed
          if [[ "${{ needs.yamllint.result }}" == "failure" ]] || \
             [[ "${{ needs.ansible-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.markdownlint.result }}" == "failure" ]]; then
            echo "❌ One or more linting jobs failed"
            exit 1
          else
            echo "✅ All linting jobs passed or were skipped"
          fi
