---
# Security validation test
# Validates security hardening across all infrastructure
# Expected runtime: < 3 minutes

- name: Security validation initialization
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display security test banner
      debug:
        msg: |
          ====================================
          Security Validation Test
          ====================================
          Tests: UFW, SSH, fail2ban, SSL certificates
          Runtime: < 3 minutes

- name: Validate K3s cluster security
  hosts: k3s_cluster
  gather_facts: true
  become: true
  tasks:
    - name: Check UFW is active
      command: ufw status
      register: ufw_status
      changed_when: false
      failed_when: false

    - name: Verify UFW is enabled
      assert:
        that:
          - "'Status: active' in ufw_status.stdout"
        fail_msg: UFW is not active on {{ inventory_hostname }}
        success_msg: UFW is active on {{ inventory_hostname }}
      when: ufw_status is succeeded

    - name: Check SSH hardening settings
      shell: |
        set -o pipefail
        grep -E "^(PermitRootLogin no|PasswordAuthentication no)" /etc/ssh/sshd_config | wc -l
      args:
        executable: /bin/bash
      register: ssh_hardening
      changed_when: false

    - name: Verify SSH is hardened
      assert:
        that:
          - ssh_hardening.stdout | int >= 2
        fail_msg: SSH not properly hardened on {{ inventory_hostname }}
        success_msg: SSH hardened on {{ inventory_hostname }}

    - name: Check fail2ban status
      ansible.builtin.systemd_service:
        name: fail2ban
      register: fail2ban_status
      check_mode: true
      failed_when: false

    - name: Verify fail2ban is running
      assert:
        that:
          - fail2ban_status.status.ActiveState == "active"
        fail_msg: fail2ban not running on {{ inventory_hostname }}
        success_msg: fail2ban running on {{ inventory_hostname }}
      when: fail2ban_status.status is defined

    - name: Check SSH jail is active
      command: fail2ban-client status sshd
      register: ssh_jail
      changed_when: false
      failed_when: false

    - name: Verify SSH jail protecting SSH
      assert:
        that:
          - "'active' in ssh_jail.stdout.lower()"
        fail_msg: SSH jail not active on {{ inventory_hostname }}
        success_msg: SSH jail active on {{ inventory_hostname }}
      when: ssh_jail is succeeded

    - name: Check unattended-upgrades service
      ansible.builtin.systemd_service:
        name: unattended-upgrades
      register: unattended_upgrades
      check_mode: true
      failed_when: false

    - name: Generate node security report
      set_fact:
        security_status:
          ufw: "{{ 'PASS' if 'Status: active' in ufw_status.stdout else 'FAIL' }}"
          ssh_hardening: "{{ 'PASS' if ssh_hardening.stdout | int >= 2 else 'FAIL' }}"
          fail2ban: "{{ 'PASS' if (fail2ban_status.status is defined and fail2ban_status.status.ActiveState == 'active') else 'FAIL' }}"
          ssh_jail: "{{ 'PASS' if 'active' in ssh_jail.stdout.lower() else 'FAIL' }}"
          auto_updates: "{{ 'PASS' if (unattended_upgrades.status is defined and unattended_upgrades.status.UnitFileState == 'enabled') else 'WARN' }}"

    - name: Display node security status
      debug:
        msg: |
          Security Status - {{ inventory_hostname }}:
          - UFW Firewall: {{ security_status.ufw }}
          - SSH Hardening: {{ security_status.ssh_hardening }}
          - fail2ban Service: {{ security_status.fail2ban }}
          - SSH Jail: {{ security_status.ssh_jail }}
          - Auto Updates: {{ security_status.auto_updates }}

- name: Validate bastion host security
  hosts: bastion_hosts
  gather_facts: true
  become: true
  tasks:
    - name: Check additional security on bastion
      block:
        - name: Verify UFW is active on bastion
          command: ufw status verbose
          register: bastion_ufw
          changed_when: false

        - name: Check SSH port configuration
          shell: grep -E "^Port " /etc/ssh/sshd_config || echo "Port 22"
          register: ssh_port
          changed_when: false

        - name: Display bastion security info
          debug:
            msg: |
              Bastion {{ inventory_hostname }} Security:
              - UFW Status: {{ 'Active' if 'Status: active' in bastion_ufw.stdout else 'Inactive' }}
              - SSH Port: {{ ssh_port.stdout }}
              - Role: Jump host security validated

- name: Validate SSL certificates
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check Traefik SSL certificate
      uri:
        url: https://traefik.homelab.local
        method: GET
        validate_certs: false
        return_content: false
        timeout: 5
      register: traefik_ssl
      ignore_errors: true

    - name: Check Grafana SSL certificate
      uri:
        url: https://grafana.homelab.local
        method: GET
        validate_certs: false
        return_content: false
        timeout: 5
      register: grafana_ssl
      ignore_errors: true

    - name: Check Prometheus SSL certificate
      uri:
        url: https://prometheus.homelab.local
        method: GET
        validate_certs: false
        return_content: false
        timeout: 5
      register: prometheus_ssl
      ignore_errors: true

    - name: Display SSL status
      debug:
        msg: |
          SSL Certificate Status:
          - Traefik: {{ 'ACCESSIBLE' if traefik_ssl is succeeded else 'CHECK FAILED' }}
          - Grafana: {{ 'ACCESSIBLE' if grafana_ssl is succeeded else 'CHECK FAILED' }}
          - Prometheus: {{ 'ACCESSIBLE' if prometheus_ssl is succeeded else 'CHECK FAILED' }}

          Note: Certificate validation disabled for self-signed certs

- name: Security validation summary
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display security summary
      debug:
        msg: |
          ====================================
          Security Validation Complete
          ====================================

          Validated:
          - UFW firewall on all nodes
          - SSH hardening configurations
          - fail2ban protecting SSH
          - SSL certificates accessible
          - Auto-updates configured

          Review output above for failures
          All critical security controls checked
