[defaults]
inventory = inventory/test_hosts.yml
host_key_checking = False
roles_path = ../ansible_collections/homelab/common/roles:../ansible_collections/homelab/k3s/roles:../ansible_collections/homelab/proxmox_lxc/roles
collections_paths = ../
remote_user = root
private_key_file = ~/.ssh/id_rsa
vault_password_file = ~/.ansible_vault_pass
retry_files_enabled = False
gathering = smart
fact_caching = memory
stdout_callback = yaml
callbacks_enabled = profile_tasks,timer

# Testing-specific settings
forks = 5
timeout = 30
log_path = results/ansible-test.log

[inventory]
enable_plugins = host_list, script, auto, yaml, ini

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

[persistent_connection]
connect_timeout = 30
command_timeout = 30
