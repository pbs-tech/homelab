---
# Infrastructure validation test
# Validates all infrastructure components are deployed and running
# Expected runtime: < 3 minutes

- name: Infrastructure validation initialization
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display validation banner
      debug:
        msg: |
          ====================================
          Infrastructure Validation Test
          ====================================
          Tests: LXC containers, services, K3s cluster
          Runtime: < 3 minutes

- name: Validate LXC containers on pve-mac
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    pve_mac_containers:
      - { vmid: 200, name: prometheus, ip: 192.168.0.200, port: 9090 }
      - { vmid: 201, name: grafana, ip: 192.168.0.201, port: 3000 }
      - { vmid: 202, name: unbound, ip: 192.168.0.202, port: 53 }
      - { vmid: 203, name: wireguard, ip: 192.168.0.203, port: 51820 }
      - { vmid: 204, name: adguard, ip: 192.168.0.204, port: 3000 }
      - { vmid: 205, name: traefik, ip: 192.168.0.205, port: 8080 }
      - { vmid: 206, name: alertmanager, ip: 192.168.0.206, port: 9093 }
      - { vmid: 207, name: pve-exporter, ip: 192.168.0.207, port: 9221 }
      - { vmid: 208, name: homeassistant, ip: 192.168.0.208, port: 8123 }
      - { vmid: 209, name: openwrt, ip: 192.168.0.209, port: 80 }
      - { vmid: 210, name: loki, ip: 192.168.0.210, port: 3100 }
    proxmox_host: "{{ proxmox_config.pve_mac.host }}"
    proxmox_user: "{{ proxmox_config.pve_mac.user }}"
  tasks:
    - name: Check LXC container status
      uri:
        # yamllint disable-line rule:line-length
        url: https://{{ proxmox_host }}:8006/api2/json/nodes/{{ proxmox_config.pve_mac.node }}/lxc/{{ item.vmid }}/status/current
        method: GET
        headers:
          # yamllint disable-line rule:line-length
          Authorization: PVEAPIToken={{ proxmox_config.pve_mac.api_token_id }}={{ proxmox_config.pve_mac.api_token_secret }}
        validate_certs: false
        timeout: 10
      loop: "{{ pve_mac_containers }}"
      register: container_status
      ignore_errors: true

    - name: Verify containers are running
      assert:
        that:
          - item.json.data.status == "running"
        fail_msg: Container {{ item.item.name }} ({{ item.item.vmid }}) is not running
        success_msg: Container {{ item.item.name }} is running
      loop: "{{ container_status.results }}"
      when: item is succeeded
      failed_when: false  # Allow validation to continue if containers are not running

    - name: Check service ports are listening
      wait_for:
        host: "{{ item.ip }}"
        port: "{{ item.port }}"
        timeout: 5
        state: started
      loop: "{{ pve_mac_containers }}"
      register: port_checks
      ignore_errors: true

- name: Validate NAS LXC containers on pve-nas
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    pve_nas_containers:
      - { vmid: 230, name: sonarr, ip: 192.168.0.230, port: 8989 }
      - { vmid: 231, name: radarr, ip: 192.168.0.231, port: 7878 }
      - { vmid: 232, name: bazarr, ip: 192.168.0.232, port: 6767 }
      - { vmid: 233, name: prowlarr, ip: 192.168.0.233, port: 9696 }
      - { vmid: 234, name: qbittorrent, ip: 192.168.0.234, port: 8080 }
      - { vmid: 235, name: jellyfin, ip: 192.168.0.235, port: 8096 }
      - { vmid: 240, name: pve-exporter-nas, ip: 192.168.0.240, port: 9221 }
    proxmox_host: "{{ proxmox_config.pve_nas.host }}"
  tasks:
    - name: Check NAS container status
      uri:
        # yamllint disable-line rule:line-length
        url: https://{{ proxmox_host }}:8006/api2/json/nodes/{{ proxmox_config.pve_nas.node }}/lxc/{{ item.vmid }}/status/current
        method: GET
        headers:
          # yamllint disable-line rule:line-length
          Authorization: PVEAPIToken={{ proxmox_config.pve_nas.api_token_id }}={{ proxmox_config.pve_nas.api_token_secret }}
        validate_certs: false
        timeout: 10
      loop: "{{ pve_nas_containers }}"
      register: nas_container_status
      ignore_errors: true

    - name: Check NAS service ports
      wait_for:
        host: "{{ item.ip }}"
        port: "{{ item.port }}"
        timeout: 5
        state: started
      loop: "{{ pve_nas_containers }}"
      register: nas_port_checks
      ignore_errors: true

- name: Validate K3s cluster nodes
  hosts: k3s_cluster
  gather_facts: true
  become: true
  tasks:
    - name: Check K3s service status
      systemd:
        name: "{{ 'k3s' if inventory_hostname in groups['server'] else 'k3s-agent' }}"
      register: k3s_service
      ignore_errors: true

    - name: Verify K3s service is running
      assert:
        that:
          - k3s_service.status.ActiveState == "active"
        fail_msg: K3s service not running on {{ inventory_hostname }}
        success_msg: K3s service running on {{ inventory_hostname }}

- name: Validate K3s cluster health
  hosts: server[0]
  gather_facts: false
  become: true
  tasks:
    - name: Get K3s nodes
      command: kubectl get nodes -o json
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: k3s_nodes
      changed_when: false
      ignore_errors: true

    - name: Check all nodes are Ready
      assert:
        that:
          - (k3s_nodes.stdout | from_json).items | length >= 4
        fail_msg: Expected at least 4 K3s nodes
        success_msg: K3s cluster has correct node count
      when: k3s_nodes is succeeded

- name: Infrastructure validation summary
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Display validation summary
      debug:
        msg: |
          ====================================
          Infrastructure Validation Complete
          ====================================

          LXC Containers: Checked on both Proxmox hosts
          Service Ports: Verified listening
          K3s Cluster: Nodes verified

          Review output above for any failures
          Status: Tests completed
