---
# System tests for Proxmox LXC integration
# Based on the molecule proxmox-integration scenario but as regular playbooks
# This tests against actual Proxmox infrastructure

- name: Proxmox integration test prerequisites
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    test_container_id: 999
    test_container_name: "ansible-test-lxc"
    test_container_ip: "192.168.0.250"
  tasks:
    - name: Verify Proxmox hosts are accessible
      uri:
        url: "https://{{ item }}:8006/api2/json/version"
        method: GET
        validate_certs: false
        timeout: 30
      loop: "{{ groups['proxmox_hosts'] }}"
      delegate_to: localhost

    - name: Check if test container already exists
      community.general.proxmox:
        api_host: "{{ hostvars[groups['proxmox_hosts'][0]]['ansible_host'] }}"
        api_user: "{{ hostvars[groups['proxmox_hosts'][0]]['proxmox_user'] }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ hostvars[groups['proxmox_hosts'][0]]['proxmox_node'] }}"
        vmid: "{{ test_container_id }}"
        state: current
      register: existing_container
      ignore_errors: true

    - name: Remove existing test container if present
      community.general.proxmox:
        api_host: "{{ hostvars[groups['proxmox_hosts'][0]]['ansible_host'] }}"
        api_user: "{{ hostvars[groups['proxmox_hosts'][0]]['proxmox_user'] }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ hostvars[groups['proxmox_hosts'][0]]['proxmox_node'] }}"
        vmid: "{{ test_container_id }}"
        state: absent
        force: true
      when: existing_container is succeeded

- name: Test LXC container creation and management
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    test_proxmox_host: "{{ hostvars[groups['proxmox_hosts'][0]]['ansible_host'] }}"
    test_proxmox_user: "{{ hostvars[groups['proxmox_hosts'][0]]['proxmox_user'] }}"
    test_proxmox_node: "{{ hostvars[groups['proxmox_hosts'][0]]['proxmox_node'] }}"
    test_container_id: 999
    test_container_name: "ansible-test-lxc"
    test_container_ip: "192.168.0.250"
  tasks:
    - name: Create test LXC container
      community.general.proxmox:
        api_host: "{{ test_proxmox_host }}"
        api_user: "{{ test_proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ test_proxmox_node }}"
        vmid: "{{ test_container_id }}"
        hostname: "{{ test_container_name }}"
        ostemplate: "{{ test_proxmox_node }}:vztmpl/{{ container_defaults.template }}"
        cores: 1
        memory: 512
        swap: 0
        disk: "{{ test_proxmox_node }}-local-lvm:4"
        netif: |
          {
            "net0": "name=eth0,bridge=vmbr0,ip={{ test_container_ip }}/24,gw={{ homelab_network.gateway_ip }},firewall=1"
          }
        unprivileged: true
        onboot: false
        state: present
        timeout: 300
      register: container_creation

    - name: Start test container
      community.general.proxmox:
        api_host: "{{ test_proxmox_host }}"
        api_user: "{{ test_proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ test_proxmox_node }}"
        vmid: "{{ test_container_id }}"
        state: started
        timeout: 120

    - name: Wait for container to be reachable
      wait_for:
        host: "{{ test_container_ip }}"
        port: 22
        delay: 10
        timeout: 300
        search_regex: OpenSSH

    - name: Add test container to inventory
      add_host:
        name: "{{ test_container_name }}"
        ansible_host: "{{ test_container_ip }}"
        ansible_user: root
        groups: ["test_containers"]
        container_id: "{{ test_container_id }}"

- name: Test container configuration with common roles
  hosts: test_containers
  become: true
  gather_facts: true
  vars:
    # Test configuration
    common_users:
      - name: testuser
        shell: /bin/bash
        groups: [sudo]
    security_config:
      ssh_key_path: "~/.ssh/id_rsa"
  tasks:
    - name: Test common setup role
      include_role:
        name: homelab.common.common_setup

    - name: Test security hardening role
      include_role:
        name: homelab.common.security_hardening

    - name: Verify SSH service is running
      systemd:
        name: ssh
      register: ssh_status

    - name: Assert SSH is active
      assert:
        that:
          - ssh_status.status.ActiveState == "active"
        fail_msg: "SSH service is not running"
        success_msg: "SSH service is running successfully"

    - name: Verify test user was created
      user:
        name: testuser
        state: present
      check_mode: true
      register: user_check

    - name: Assert user exists
      assert:
        that:
          - not user_check.changed
        fail_msg: "Test user was not created"
        success_msg: "Test user created successfully"

- name: Test container lifecycle management
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    test_proxmox_host: "{{ hostvars[groups['proxmox_hosts'][0]]['ansible_host'] }}"
    test_proxmox_user: "{{ hostvars[groups['proxmox_hosts'][0]]['proxmox_user'] }}"
    test_proxmox_node: "{{ hostvars[groups['proxmox_hosts'][0]]['proxmox_node'] }}"
    test_container_id: 999
  tasks:
    - name: Stop test container
      community.general.proxmox:
        api_host: "{{ test_proxmox_host }}"
        api_user: "{{ test_proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ test_proxmox_node }}"
        vmid: "{{ test_container_id }}"
        state: stopped
        timeout: 120

    - name: Verify container is stopped
      community.general.proxmox:
        api_host: "{{ test_proxmox_host }}"
        api_user: "{{ test_proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ test_proxmox_node }}"
        vmid: "{{ test_container_id }}"
        state: current
      register: container_status

    - name: Assert container is stopped
      assert:
        that:
          - container_status.status == "stopped"
        fail_msg: "Container is not stopped"
        success_msg: "Container stopped successfully"

    - name: Remove test container
      community.general.proxmox:
        api_host: "{{ test_proxmox_host }}"
        api_user: "{{ test_proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ test_proxmox_node }}"
        vmid: "{{ test_container_id }}"
        state: absent
        force: true

    - name: Verify container is removed
      community.general.proxmox:
        api_host: "{{ test_proxmox_host }}"
        api_user: "{{ test_proxmox_user }}"
        api_password: "{{ proxmox_password }}"
        node: "{{ test_proxmox_node }}"
        vmid: "{{ test_container_id }}"
        state: current
      register: container_check
      ignore_errors: true

    - name: Assert container is removed
      assert:
        that:
          - container_check.failed
        fail_msg: "Container still exists"
        success_msg: "Container removed successfully"