---
# System tests for K3s cluster deployment
# Based on the molecule raspberry-pi scenario but as regular playbooks
# This tests against actual Raspberry Pi hardware

- name: K3s cluster system test prerequisites
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Verify test inventory is configured
      assert:
        that:
          - groups['k3s_test_servers'] is defined
          - groups['k3s_test_agents'] is defined
          - groups['k3s_test_servers'] | length > 0
          - groups['k3s_test_agents'] | length > 0
        fail_msg: "Test inventory must define k3s_test_servers and k3s_test_agents groups"
        success_msg: "Test inventory properly configured"

    - name: Check connectivity to test nodes
      wait_for:
        host: "{{ hostvars[item]['ansible_host'] }}"
        port: 22
        timeout: 10
      loop: "{{ groups['k3s_test_servers'] + groups['k3s_test_agents'] }}"
      delegate_to: localhost

- name: Test K3s server deployment
  hosts: k3s_test_servers
  become: true
  gather_facts: true
  vars:
    # Test-specific K3s configuration
    k3s_version: "v1.30.2+k3s1"
    k3s_token: "test-cluster-token-{{ ansible_date_time.epoch }}"
    k3s_cluster_name: "test-cluster"
    k3s_kubeconfig_mode: "644"
    k3s_flannel_backend: "host-gw"
    k3s_cluster_cidr: "10.42.0.0/16"
    k3s_service_cidr: "10.43.0.0/16"
    k3s_disable:
      - traefik  # Test without Traefik
      - local-storage
    security_hardening_enabled: true
  pre_tasks:
    - name: Backup existing K3s configuration
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /etc/rancher/k3s/k3s.yaml.backup
        remote_src: true
      ignore_errors: true
      
    - name: Stop existing K3s services  
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - k3s
        - k3s-node
      ignore_errors: true
      
  roles:
    - role: homelab.common.common_setup
      tags: [common_setup]
    - role: homelab.k3s.prereq
      tags: [prereq]
    - role: homelab.k3s.k3s_server
      tags: [k3s_server]
    - role: homelab.common.security_hardening
      tags: [security_hardening]
      
  post_tasks:
    - name: Wait for K3s API server to be ready
      wait_for:
        port: 6443
        host: "{{ ansible_default_ipv4.address }}"
        timeout: 120
        
    - name: Verify K3s server status
      systemd:
        name: k3s
      register: k3s_status
      
    - name: Assert K3s server is running
      assert:
        that:
          - k3s_status.status.ActiveState == "active"
        fail_msg: "K3s server is not running"
        success_msg: "K3s server is running successfully"

- name: Test K3s agent deployment
  hosts: k3s_test_agents
  become: true
  gather_facts: true
  vars:
    k3s_server: "https://{{ hostvars[groups['k3s_test_servers'][0]]['ansible_default_ipv4']['address'] }}:6443"
    k3s_token: "{{ hostvars[groups['k3s_test_servers'][0]]['k3s_token'] }}"
  roles:
    - role: homelab.common.common_setup
      tags: [common_setup]  
    - role: homelab.k3s.prereq
      tags: [prereq]
    - role: homelab.k3s.k3s_agent
      tags: [k3s_agent]
    - role: homelab.common.security_hardening
      tags: [security_hardening]
      
  post_tasks:
    - name: Verify K3s agent status
      systemd:
        name: k3s-agent
      register: k3s_agent_status
      
    - name: Assert K3s agent is running
      assert:
        that:
          - k3s_agent_status.status.ActiveState == "active"
        fail_msg: "K3s agent is not running"
        success_msg: "K3s agent is running successfully"

- name: Test cluster functionality
  hosts: k3s_test_servers[0]
  become: true
  gather_facts: false
  tasks:
    - name: Check cluster node status
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
        kubeconfig: /etc/rancher/k3s/k3s.yaml
      register: cluster_nodes
      
    - name: Verify all nodes are ready
      assert:
        that:
          - cluster_nodes.resources | length == (groups['k3s_test_servers'] | length + groups['k3s_test_agents'] | length)
          - cluster_nodes.resources | selectattr('status.conditions', 'defined') | list | length > 0
        fail_msg: "Not all nodes are ready in cluster"
        success_msg: "All cluster nodes are ready"
        
    - name: Deploy test workload
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: test-nginx
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: test-nginx
            template:
              metadata:
                labels:
                  app: test-nginx
              spec:
                containers:
                - name: nginx
                  image: nginx:alpine
                  ports:
                  - containerPort: 80
      register: test_deployment
      
    - name: Wait for test deployment to be ready
      kubernetes.core.k8s_info:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        api_version: apps/v1
        kind: Deployment
        name: test-nginx
        namespace: default
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300
      
    - name: Cleanup test deployment
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        name: test-nginx
        api_version: apps/v1
        kind: Deployment
        namespace: default
        state: absent