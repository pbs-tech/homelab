---
# Comprehensive test suite orchestrator for homelab infrastructure
# Runs all test categories in the correct order with proper setup/teardown

- name: Test suite initialization
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    test_results: []
    test_start_time: {{ ansible_date_time.epoch }}
  tasks:
    - name: Create test results directory
      file:
        path: {{ playbook_dir }}/results
        state: directory
        mode: 0755

    - name: Initialize test tracking
      set_fact:
        test_session_id: test-{{ ansible_date_time.iso8601_basic_short }}
        test_summary_file: {{ playbook_dir }}/results/test-summary-{{ ansible_date_time.iso8601_basic_short }}.json

    - name: Display test suite banner
      debug:
        msg: |
          ================================
          Homelab Infrastructure Test Suite
          ================================
          Session ID: {{ test_session_id }}
          Start Time: {{ ansible_date_time.iso8601 }}
          Test Types: {{ test_types | default(['unit', 'integration', 'system']) | join(', ') }}

          Available test types:
          - unit: Role and module unit tests
          - integration: Service stack integration tests
          - system: Full system tests against real infrastructure

          Usage Examples:
            ansible-playbook tests/test_suite.yml
            ansible-playbook tests/test_suite.yml -e "test_types=['unit']"
            ansible-playbook tests/test_suite.yml -e "test_types=[integration, system]"
            ansible-playbook tests/test_suite.yml --tags "quick"

- name: Run unit tests
  import_playbook: unit/test_common_roles.yml
  when: 'unit' in (test_types | default(['unit', 'integration', 'system']))
  tags: [unit, quick]

- name: Run integration tests
  import_playbook: integration/test_service_stacks.yml
  when: 'integration' in (test_types | default(['unit', 'integration', 'system']))
  tags: [integration]

- name: Run K3s cluster system tests
  import_playbook: system/test_k3s_cluster.yml
  when:
    - "'system' in (test_types | default(['unit', 'integration', 'system']))"
    - groups['k3s_test_servers'] is defined
    - groups['k3s_test_servers'] | length > 0
  tags: [system, k3s]

- name: Run Proxmox integration system tests
  import_playbook: system/test_proxmox_integration.yml
  when:
    - "'system' in (test_types | default(['unit', 'integration', 'system']))"
    - groups['proxmox_hosts'] is defined
    - groups['proxmox_hosts'] | length > 0
    - proxmox_password is defined
  tags: [system, proxmox]

- name: Test suite summary
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Calculate test duration
      set_fact:
        test_duration: {{ (ansible_date_time.epoch | int) - (test_start_time | int) }}
        test_end_time: {{ ansible_date_time.iso8601 }}

    - name: Generate test summary
      copy:
        content: |
          {
            "test_session_id": "{{ test_session_id }}",
            "start_time": "{{ test_start_time }}",
            "end_time": "{{ ansible_date_time.epoch }}",
            "duration_seconds": {{ test_duration }},
            "test_types_run": {{ test_types | default(['unit', 'integration', 'system']) | to_json }},
            "ansible_version": "{{ ansible_version.full }}",
            "python_version": "{{ ansible_python_version }}",
            "status": completed
          }
        dest: {{ test_summary_file }}
        mode: 0644

    - name: Display test suite completion
      debug:
        msg: |
          ================================
          Test Suite Completion Summary
          ================================
          Session ID: {{ test_session_id }}
          Duration: {{ test_duration }} seconds
          End Time: {{ test_end_time }}

          Results saved to: {{ test_summary_file }}

          Next steps:
          - Review test results in tests/results/
          - Check molecule test results for detailed coverage
          - Run specific test types if any failed

          For continuous testing, consider:
            watch -n 300 'ansible-playbook tests/test_suite.yml -e test_types="[\"unit\"]" --tags quick'
