---
# Integration tests for service stack deployment
# Based on the molecule service-stack scenario but as regular playbooks

- name: Setup test containers for service integration
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    test_containers:
      - name: monitoring-test
        image: "geerlingguy/docker-ubuntu2204-ansible:latest"
        ports:
          - "19090:9090"  # Prometheus
          - "13000:3000"  # Grafana
          - "13100:3100"  # Loki
        groups: ["monitoring"]
      - name: networking-test
        image: "geerlingguy/docker-ubuntu2204-ansible:latest"
        ports:
          - "18080:8080"  # Traefik
          - "1053:53/udp"  # DNS
        groups: ["networking"]
  tasks:
    - name: Create test containers
      containers.podman.podman_container:
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        state: started
        privileged: true
        published_ports: "{{ item.ports }}"
        volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
        command: /lib/systemd/systemd
        capabilities:
          - SYS_ADMIN
      loop: "{{ test_containers }}"
      register: container_info

    - name: Add containers to inventory
      add_host:
        name: "{{ item.item.name }}"
        ansible_connection: podman
        ansible_user: root
        groups: "{{ item.item.groups }}"
        test_container: true
        service_port: "{{ item.item.ports[0].split(':')[1] if item.item.ports else '80' }}"
      loop: "{{ container_info.results }}"
      when: item.changed

- name: Test monitoring stack configuration
  hosts: monitoring
  gather_facts: true
  vars:
    # Mock homelab configuration for testing
    homelab_domain: "test.local"
    prometheus_storage_retention: "2h"
    loki_retention_period: "6h"
    grafana_admin_password: "test123"
    homelab_network:
      gateway_ip: "172.17.0.1"
      dns_servers: ["8.8.8.8"]
    security_config:
      ssh_key_path: "/tmp/test_key"
  tasks:
    - name: Test common setup on monitoring container
      include_role:
        name: homelab.common.common_setup
      vars:
        common_users: []  # Skip user creation in test
        
    - name: Verify container accessibility
      wait_for:
        port: "{{ service_port }}"
        host: "127.0.0.1"
        timeout: 30
      delegate_to: localhost
      when: service_port is defined

    - name: Test service health endpoint
      uri:
        url: "http://127.0.0.1:{{ service_port }}"
        method: GET
        timeout: 10
        status_code: [200, 302, 404]  # Many services return 404 for root path
      delegate_to: localhost
      when: service_port is defined
      ignore_errors: true

- name: Test networking stack configuration  
  hosts: networking
  gather_facts: true
  vars:
    homelab_domain: "test.local"
    ssl_email: "test@test.local"
    traefik_version: "3.0.4"
    traefik_dashboard_enabled: true
    homelab_network:
      gateway_ip: "172.17.0.1"  
      dns_servers: ["8.8.8.8"]
    security_config:
      ssh_key_path: "/tmp/test_key"
  tasks:
    - name: Test common setup on networking container
      include_role:
        name: homelab.common.common_setup
      vars:
        common_users: []  # Skip user creation in test
        
    - name: Verify networking container accessibility
      wait_for:
        port: "{{ service_port }}"
        host: "127.0.0.1"
        timeout: 30
      delegate_to: localhost
      when: service_port is defined

- name: Cleanup test containers
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Stop and remove test containers
      containers.podman.podman_container:
        name: "{{ item }}"
        state: absent
      loop:
        - monitoring-test
        - networking-test
      ignore_errors: true