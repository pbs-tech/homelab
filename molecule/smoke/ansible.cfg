[defaults]
# Molecule smoke test configuration
# Fixed paths for Docker/CI testing - no variable expansion
remote_tmp = /tmp/ansible-tmp
local_tmp = /tmp/ansible-tmp

# Ansible behavior settings
host_key_checking = False
retry_files_enabled = False
deprecation_warnings = False
callbacks_enabled = profile_tasks, timer
stdout_callback = default
# Use YAML format for output (ansible-core 2.15+)
result_format = yaml

# Collection paths - repo root (.) for local source, ~/.ansible for installed deps
collections_paths = .:~/.ansible/collections:/usr/share/ansible/collections

# Performance settings
gathering = smart
fact_caching = memory
forks = 5
timeout = 30
gather_timeout = 30

[ssh_connection]
pipelining = True
# Static path for Docker/CI - no variable expansion
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
