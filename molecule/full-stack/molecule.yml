---
# Full-stack molecule test for the complete homelab architecture
# Tests the integration between all three collections

dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: podman

platforms:
  # Foundation infrastructure
  - name: bastion-test
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN
    published_ports:
      - "2222:22"  # SSH
    groups:
      - bastion_host

  # Networking services
  - name: networking-test
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN
    published_ports:
      - "8080:8080"  # Traefik
      - "53:53/udp"  # DNS
    groups:
      - networking
    depends_on:
      - bastion-test

  # Monitoring services
  - name: monitoring-test
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN
    published_ports:
      - "9090:9090"  # Prometheus
      - "3000:3000"  # Grafana
      - "3100:3100"  # Loki
    groups:
      - monitoring
    depends_on:
      - networking-test

  # Mock K3s node for integration testing
  - name: k3s-mock
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    capabilities:
      - SYS_ADMIN
    published_ports:
      - "6443:6443"  # K3s API
    groups:
      - k3s_servers
    depends_on:
      - monitoring-test

provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: profile_tasks,timer,yaml
      stdout_callback: yaml
      host_key_checking: false
      collections_paths: ./ansible_collections
  inventory:
    host_vars:
      bastion-test:
        ansible_user: root
        ansible_connection: podman
        ansible_host: "127.0.0.1"
        container_id: 110
        
      networking-test:
        ansible_user: root
        ansible_connection: podman
        ansible_host: "127.0.0.1"
        container_id: 205
        service_port: 8080
        
      monitoring-test:
        ansible_user: root
        ansible_connection: podman
        ansible_host: "127.0.0.1"
        container_id: 200
        service_port: 9090
        
      k3s-mock:
        ansible_user: root
        ansible_connection: podman
        ansible_host: "127.0.0.1"
        k3s_role: server
        k3s_server_init: true

    group_vars:
      all:
        # Import from common collection
        homelab_domain: "molecule.test"
        homelab_network:
          gateway_ip: "172.17.0.1"
          dns_servers: ["127.0.0.1"]
          cluster_cidr: "10.42.0.0/16"
          service_cidr: "10.43.0.0/16"
        
        # Mock Proxmox config
        proxmox_config:
          pve_mac:
            host: "127.0.0.1"
            user: "root@pam"
            node: "mock-node"
        
        # Security config
        security_config:
          hardening_enabled: true
          ssh_key_path: "/tmp/molecule_key"
          log_retention_days: 1
          
        # Container defaults
        container_defaults:
          template: "ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
          disk_size: "4"
          cores: 1
          memory: 512
          swap: 0
          onboot: false
          unprivileged: true
          
        # Service configuration
        services_config:
          ssl_email: "test@molecule.test"
          traefik:
            host: "127.0.0.1"
            dashboard_port: 8080
          prometheus:
            host: "127.0.0.1"
            port: 9090
          grafana:
            host: "127.0.0.1"
            port: 3000

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy