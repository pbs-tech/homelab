---
- name: Prepare full-stack test environment
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Install basic requirements
      package:
        name:
          - python3
          - python3-pip
          - curl
          - wget
        state: present

    - name: Create systemd service directory
      file:
        path: /etc/systemd/system
        state: directory
        mode: '0755'

    - name: Start and enable systemd
      command: systemctl daemon-reload
      changed_when: false
      ignore_errors: true

    - name: Create mock Proxmox password for testing
      set_fact:
        proxmox_password: "molecule-test-password"

    - name: Create mock vault file
      file:
        path: /tmp/vault_pass
        state: touch
        mode: '0600'
