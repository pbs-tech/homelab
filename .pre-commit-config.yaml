---
# Pre-commit hooks for homelab infrastructure
# Setup: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

# Exclude vendored third-party ansible collections from all hooks
exclude: '^ansible_collections/(ansible|community|kubernetes|containers)[./]'

repos:
  # File checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint]

  # Ansible linting
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.3.0
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$
        additional_dependencies:
          - ansible-core>=2.17

  # Markdown linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.16.0
    hooks:
      - id: markdownlint-cli2

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x, --severity=error]

  # Security - secrets scanning (lightweight, local-only)
  - repo: local
    hooks:
      - id: check-secrets
        name: Check for hardcoded secrets
        entry: bash -c
        args:
          - |
            pattern="(password|secret|preshared_key|private_key|api_key|token|credential):\s*['\"][^'\"]{8,}"
            if grep -rI --include="*.yml" --include="*.yaml" -E "$pattern" . \
                | grep -v "ansible_collections/ansible[./]\|ansible_collections/community[./]\|ansible_collections/kubernetes[./]\|ansible_collections/containers[./]" \
                | grep -v "{{"; then
              echo "⚠️  Potential hardcoded secrets detected"
              exit 1
            fi
        language: system
        pass_filenames: false

# Configuration
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: '3.0.0'
